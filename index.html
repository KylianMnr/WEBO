<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<title>WEBO Asset Management — Hub v12</title>
<link rel="apple-mobile-web-app-capable" content="yes"/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,700&family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
<style>
:root{
--bg:#0B0E14;--bg2:#111520;--bg3:#171C28;--bg4:#1E2436;--bg5:#252C3D;
--border:#2A2D35;--border2:#353A48;
--gold:#C5A059;--gold2:#D4AF6A;--bordeaux:#4A0E0E;--bordeaux2:#6B1A1A;--bordeaux-bg:#2A0808;
--green:#089981;--red:#E74C4C;--blue:#2962FF;--purple:#8B5CF6;
--text:#F5F5F7;--text2:#9CA3AF;--text3:#5A6270;--text4:#3A4050;
--serif:'Playfair Display',Georgia,serif;--sans:'Inter',-apple-system,sans-serif;--mono:'JetBrains Mono',monospace;
--radius:8px;--glass:rgba(17,21,32,.78);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--sans);font-weight:400;min-height:100dvh;overflow-x:hidden;-webkit-font-smoothing:antialiased;font-size:13px}
::selection{background:var(--gold);color:var(--bg)}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideR{from{transform:translateX(24px);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes glow{0%,100%{box-shadow:0 0 6px rgba(197,160,89,.15)}50%{box-shadow:0 0 20px rgba(197,160,89,.3)}}
@keyframes urgPulse{0%,100%{border-color:var(--bordeaux)}50%{border-color:var(--red)}}
.fu{animation:fadeUp .35s ease-out both}.fi{animation:fadeIn .3s ease-out both}
button{font-family:inherit;cursor:pointer;-webkit-tap-highlight-color:transparent;border:none;background:transparent}
select,input,textarea{font-family:var(--sans);font-size:14px;background:var(--bg);color:var(--text);border:1px solid var(--border);border-radius:var(--radius);padding:10px 12px;outline:none;transition:border-color .2s}
select:focus,input:focus,textarea:focus{border-color:var(--gold)}
::-webkit-scrollbar{width:4px;height:4px}::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:2px}
/* TOPNAV */
.topnav{position:sticky;top:0;z-index:100;background:var(--glass);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-bottom:1px solid var(--border);padding:0 20px;display:flex;align-items:center;height:54px;gap:12px}
.logo{display:flex;align-items:baseline;gap:1px;text-decoration:none;cursor:pointer}
.logo .w{font-family:var(--serif);font-weight:700;font-size:22px;color:var(--gold);font-style:italic}
.logo .r{font-family:var(--serif);font-weight:600;font-size:18px;color:var(--text)}
.logo-tag{font-size:8px;color:var(--text3);letter-spacing:2.5px;text-transform:uppercase;font-family:var(--mono);margin-left:6px}
.nb{padding:7px 14px;border-radius:var(--radius);font-size:11px;font-weight:600;color:var(--text2);transition:all .2s;display:flex;align-items:center;gap:5px}
.nb:hover{color:var(--text);background:var(--bg3)}
.nb.active{color:var(--gold);background:rgba(197,160,89,.08)}
.nb i{font-size:12px}
/* LEADERBOARD MINI */
.lb-mini{display:flex;gap:8px;align-items:center;padding:4px 12px;border-radius:20px;border:1px solid var(--border);background:var(--bg2)}
.lb-item{display:flex;align-items:center;gap:4px;font-size:10px;font-weight:600}
.lb-rank{width:16px;height:16px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:800;font-family:var(--mono)}
/* HUB */
.hub{padding:40px 24px;max-width:1200px;margin:0 auto}
.hub-header{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:32px;flex-wrap:wrap;gap:16px}
.hub-title{font-family:var(--serif);font-size:32px;font-weight:600;line-height:1.2}
.hub-sub{font-size:13px;color:var(--text2);font-weight:300;margin-top:4px}
.hub-stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:28px}
.stat-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;transition:all .25s}
.stat-card:hover{border-color:var(--border2);transform:translateY(-1px)}
.stat-label{font-size:9px;font-weight:600;color:var(--text3);letter-spacing:1.5px;text-transform:uppercase;font-family:var(--mono);margin-bottom:3px}
.stat-val{font-size:24px;font-weight:700;font-family:var(--mono);line-height:1.1}
.hub-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:14px}
.hub-card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:24px 22px;cursor:pointer;transition:all .3s;position:relative;overflow:hidden}
.hub-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--gold);opacity:0;transition:opacity .3s}
.hub-card:hover{border-color:rgba(197,160,89,.3);transform:translateY(-2px);box-shadow:0 12px 40px rgba(0,0,0,.25)}
.hub-card:hover::before{opacity:1}
.hub-card-icon{width:44px;height:44px;border-radius:10px;background:rgba(197,160,89,.08);display:flex;align-items:center;justify-content:center;margin-bottom:14px;font-size:18px;color:var(--gold)}
.hub-card h3{font-family:var(--serif);font-size:17px;font-weight:600;margin-bottom:5px}
.hub-card p{font-size:11px;color:var(--text2);line-height:1.6}
.hub-card .cnt{position:absolute;top:18px;right:18px;font-family:var(--mono);font-size:22px;font-weight:800;color:rgba(197,160,89,.12)}
/* TABLE */
.tbl{width:100%;border-collapse:separate;border-spacing:0}
.tbl th{font-size:9px;font-weight:600;color:var(--text3);letter-spacing:1.5px;text-transform:uppercase;font-family:var(--mono);padding:10px 12px;text-align:left;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--bg2);z-index:5}
.tbl td{padding:10px 12px;border-bottom:1px solid var(--border);font-size:12px;vertical-align:middle}
.tbl tbody tr{transition:background .15s;cursor:pointer}.tbl tbody tr:hover{background:var(--bg3)}
/* BADGE */
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:20px;font-size:9px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;font-family:var(--mono)}
.badge-green{color:var(--green);background:rgba(8,153,129,.1);border:1px solid rgba(8,153,129,.2)}
.badge-red{color:var(--red);background:rgba(231,76,76,.1);border:1px solid rgba(231,76,76,.2)}
.badge-gold{color:var(--gold);background:rgba(197,160,89,.1);border:1px solid rgba(197,160,89,.2)}
.badge-purple{color:var(--purple);background:rgba(139,92,246,.1);border:1px solid rgba(139,92,246,.2)}
.badge-blue{color:var(--blue);background:rgba(41,98,255,.1);border:1px solid rgba(41,98,255,.2)}
.badge-ghost{color:var(--text3);background:var(--bg4);border:1px solid var(--border)}
.badge-bordeaux{color:#E88;background:rgba(74,14,14,.4);border:1px solid rgba(107,26,26,.6)}
/* CARD */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);transition:all .25s}
.card:hover{border-color:var(--border2);box-shadow:0 6px 20px rgba(0,0,0,.12)}
.card-h{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.card-b{padding:14px 18px}
/* PROGRESS */
.prog{height:4px;border-radius:2px;background:var(--bg4);overflow:hidden}.prog-fill{height:100%;border-radius:2px;transition:width .6s}
/* TIMELINE */
.tl{position:relative;padding-left:24px}
.tl::before{content:'';position:absolute;left:7px;top:0;bottom:0;width:1px;background:var(--border)}
.tl-item{position:relative;padding:10px 0;border-bottom:1px solid rgba(42,45,53,.5)}
.tl-dot{position:absolute;left:-20px;top:14px;width:10px;height:10px;border-radius:50%;border:2px solid var(--bg);z-index:2}
.tl-time{font-family:var(--mono);font-size:10px;color:var(--text3);margin-bottom:3px}
.tl-title{font-weight:600;font-size:13px;margin-bottom:2px}
.tl-sub{font-size:11px;color:var(--text2)}
/* AVATAR */
.av{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;flex-shrink:0}
/* MODAL */
.overlay{position:fixed;inset:0;z-index:1000;display:flex;align-items:center;justify-content:center;animation:fadeIn .12s}
.overlay-bg{position:absolute;inset:0;background:rgba(0,0,0,.55);backdrop-filter:blur(6px)}
.modal{position:relative;background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:28px;width:95%;max-width:540px;max-height:85vh;overflow-y:auto;box-shadow:0 24px 80px rgba(0,0,0,.4);animation:fadeUp .25s}
.modal::-webkit-scrollbar{width:3px}
/* KANBAN */
.kanban-scroll{display:flex;gap:8px;overflow-x:auto;padding:8px;flex:1;-webkit-overflow-scrolling:touch}.kanban-scroll::-webkit-scrollbar{display:none}
.kanban-col{min-width:230px;flex:1;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);padding:6px;display:flex;flex-direction:column}
.kc{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:9px;margin-bottom:4px;cursor:grab;transition:all .2s}
.kc:hover{transform:translateY(-1px);box-shadow:0 6px 18px rgba(0,0,0,.18);border-color:var(--border2)}.kc:active{cursor:grabbing}
.kcol.over{background:rgba(41,98,255,.04)!important}
/* CMD */
.cmd-ov{position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,.5);backdrop-filter:blur(4px);display:flex;align-items:flex-start;justify-content:center;padding-top:15vh;animation:fadeIn .1s}
.cmd-box{background:var(--bg2);border:1px solid var(--border);border-radius:12px;width:90%;max-width:520px;overflow:hidden;box-shadow:0 24px 80px rgba(0,0,0,.5)}
.cmd-in{width:100%;padding:16px 20px;font-size:16px;background:transparent;border:none;border-bottom:1px solid var(--border);color:var(--text);outline:none}
.cmd-r{display:flex;align-items:center;gap:12px;padding:12px 20px;cursor:pointer;transition:background .1s;font-size:13px}
.cmd-r:hover{background:var(--bg3)}
/* RIGHT PANEL */
.rpanel{position:fixed;right:0;top:0;bottom:0;width:380px;max-width:90vw;background:var(--bg2);border-left:1px solid var(--border);z-index:200;overflow-y:auto;box-shadow:-10px 0 30px rgba(0,0,0,.25);animation:slideR .2s ease-out}
.rpanel::-webkit-scrollbar{width:3px}
/* UTILS */
.sep{height:1px;background:linear-gradient(90deg,transparent,rgba(197,160,89,.2),transparent);margin:10px 0}
.blur{filter:blur(6px);user-select:none;pointer-events:none}
.sync-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.sync-dot.on{background:var(--green)}.sync-dot.off{background:var(--red)}.sync-dot.loading{background:var(--gold);animation:pulse 1s infinite}
.ff label{display:block;font-size:9px;font-weight:600;color:var(--text3);margin-bottom:4px;letter-spacing:1.2px;text-transform:uppercase;font-family:var(--mono)}
.ff{margin-bottom:10px}
.wa{padding:4px 8px;border-radius:var(--radius);border:1px solid rgba(37,211,102,.2);color:#25D366;font-size:11px;transition:all .15s}.wa:hover{background:rgba(37,211,102,.06)}
.match-card{background:rgba(139,92,246,.06);border:1px solid rgba(139,92,246,.15);border-radius:8px;padding:8px;margin-top:4px;cursor:pointer;transition:all .15s}.match-card:hover{background:rgba(139,92,246,.12)}
@media(max-width:768px){.topnav{padding:0 12px;height:48px;gap:6px}.hub{padding:20px 12px}.hub-grid{grid-template-columns:1fr}.logo-tag,.lb-mini{display:none}.kanban-col{min-width:210px;flex:none}.rpanel{width:85vw}}
@media(min-width:1200px){.kanban-col{min-width:0}}
</style>
</head>

<script type="text/babel">

const SB_URL="https://smgglunijtmftjchxdgy.supabase.co";
const SB_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNtZ2dsdW5panRtZnRqY2h4ZGd5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI1NzYyNDMsImV4cCI6MjA4ODE1MjI0M30.RM7JmWaY0z8vw4cpL1GqsZN2gCwNK-KMet2hNxMDd5A";

{id:"kylian",name:"Kylian Meunier",role:"Fondateur",color:"#C5A059",isAdmin:true,isFondateur:true,login:"kylian",email:"kylian.andremeunier@gmail.com",pass:"Webo2024!"},
{id:"keddy",name:"Keddy",role:"Chasseur",color:"#2962FF",isAdmin:false,isFondateur:false,login:"keddy",email:"keddy@webo.fr",pass:"Keddy2024!"},

/* ═══ DATA MAPPING ═══ */
const db2L=r=>({id:r.id,nom:r.nom,service:r.service,valeur:r.valeur,memberId:r.member_id,status:r.status,dateCreated:r.date_created||"",lastInteraction:r.last_interaction||"",nextRelance:r.next_relance||"",notes:r.notes||"",source:r.source||"DM Instagram",echecReason:r.echec_reason||"—",tentatives:r.tentatives||0,paymentProof:r.payment_proof||"",verifStatus:r.verif_status||"none",verifNote:r.verif_note||"",prestaId:r.presta_id||"",email:r.email||"",phone:r.phone||"",adresse:r.adresse||"",temperature:r.temperature||"tiede",activityLog:r.activity_log||"",paymentLink:r.payment_link||"",externalLink:r.external_link||""});
const L2db=l=>({id:l.id,nom:l.nom,service:l.service,valeur:l.valeur,member_id:l.memberId,status:l.status,date_created:l.dateCreated,last_interaction:l.lastInteraction,next_relance:l.nextRelance,notes:l.notes,source:l.source,echec_reason:l.echecReason,tentatives:l.tentatives,payment_proof:l.paymentProof,verif_status:l.verifStatus,verif_note:l.verifNote,presta_id:l.prestaId,email:l.email,phone:l.phone,adresse:l.adresse,temperature:l.temperature,activity_log:l.activityLog,payment_link:l.paymentLink,external_link:l.externalLink});

/* ═══ CONSTANTS ═══ */
const COLS=[{id:"nouveau",label:"Qualifié",icon:"fa-diamond",accent:"#8B5CF6",proba:.10,urgDays:5},{id:"contacte",label:"Audit",icon:"fa-magnifying-glass",accent:"#2962FF",proba:.25,urgDays:3},{id:"relance1",label:"Négociation",icon:"fa-handshake",accent:"#C5A059",proba:.40,urgDays:4},{id:"relance2",label:"Closing",icon:"fa-gavel",accent:"#E74C4C",proba:.60,urgDays:7},{id:"call",label:"Due Diligence",icon:"fa-shield-halved",accent:"#7C5CBF",proba:.80,urgDays:5},{id:"injoignable",label:"Perdu",icon:"fa-ban",accent:"#5A6270",proba:0,urgDays:999},{id:"signe",label:"Signé",icon:"fa-circle-check",accent:"#089981",proba:1,urgDays:999}];
const SERVICES=["Web Design","Montage Vidéo","Vidéaste"];
const SOURCES=["DM Instagram","LinkedIn","Email froid","Appel à froid","Prospection terrain","Référence","Autre"];
const ECHECS=["—","Prix trop élevé","Pas de besoin","Déjà équipé","Pas de budget","Concurrent choisi","Projet reporté"];
const GHOST_MAP={"DM Instagram":"Email/Appel","LinkedIn":"DM/Appel","Email froid":"DM/LinkedIn","Appel à froid":"DM/Email","Prospection terrain":"Email/Appel","Référence":"Via ref","Autre":"DM+Email"};
const VERIFS=[{id:"none",label:"—"},{id:"pending",label:"En attente",color:"#C5A059"},{id:"confirmed",label:"Confirmé",color:"#089981"},{id:"alert",label:"Alerte",color:"#E74C4C"}];
const SPECIALITES=["Landing Page","Montage Vidéo","Vidéaste","Motion Design","Web Design","SEO","Social Media","Autre"];
const TEMPS=[{id:"froid",e:"❄️",l:"Froid"},{id:"tiede",e:"☁️",l:"Tiède"},{id:"chaud",e:"🔥",l:"Chaud"}];
const OBJ=15000;const HOT=3000;
const TPL={nouveau:"Bonjour [N], [P] de WEBO Asset Management. Nous accompagnons [E] dans sa stratégie [S]. Disponible pour un audit gratuit de 15min ? — WEBO",contacte:"Bonjour [N], suite à notre échange pour [E], avez-vous étudié notre proposition [S] ? — [P]",relance1:"Bonjour [N], je reviens pour le projet [S] de [E]. Un call stratégique ? — [P]",relance2:"Bonjour [N], dernière relance pour [E]. — [P]",call:"Bonjour [N], suite à notre call pour [E] : [S] validé. — [P]",signe:"Bienvenue dans le portefeuille WEBO. Projet [S] pour [E] activé. — [P]"};

/* ═══ HELPERS ═══ */
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,8);
const E=n=>new Intl.NumberFormat("fr-FR",{style:"currency",currency:"EUR",minimumFractionDigits:0,maximumFractionDigits:0}).format(n||0);
const hA=i=>i?(Date.now()-new Date(i).getTime())/3.6e6:null;
const dA=i=>i?(Date.now()-new Date(i).getTime())/8.64e7:null;
const fA=h=>{if(!h)return"";if(h<1)return"<1h";if(h<24)return Math.floor(h)+"h";return Math.floor(h/24)+"j"};
const dU=i=>{if(!i)return null;return Math.ceil((new Date(i+"T23:59:59").getTime()-Date.now())/8.64e7)};
const mN=id=>(TEAM.find(t=>t.id===id)?.name||id).split(" ")[0];
const mC=id=>TEAM.find(t=>t.id===id)?.color||"#5A6270";
const td=()=>new Date().toISOString().slice(0,10);
const addD=(d,n)=>{const x=new Date(d);x.setDate(x.getDate()+n);return x.toISOString().slice(0,10)};
const cDays=(c,s)=>s==="signe"&&c?Math.floor((Date.now()-new Date(c).getTime())/8.64e7):null;
const isUrg=l=>{const c=COLS.find(x=>x.id===l.status);return c&&c.urgDays<999&&dA(l.lastInteraction)>=c.urgDays};
const genTpl=(l,mn)=>(TPL[l.status]||TPL.nouveau).replace(/\[N\]/g,l.nom.split(" ")[0]).replace(/\[E\]/g,l.nom).replace(/\[S\]/g,l.service).replace(/\[P\]/g,mn);
const openWA=(l,mn)=>{const m=genTpl(l,mn);const p=(l.phone||"").replace(/\s/g,"").replace(/^0/,"+33");window.open("https://wa.me/"+p+"?text="+encodeURIComponent(m),"_blank")};
const cp=(t,f)=>{if(navigator.clipboard)navigator.clipboard.writeText(t).then(()=>f("Copié ✓"))};
const addLog=(c,m)=>new Date().toLocaleDateString("fr-FR",{day:"2-digit",month:"2-digit"})+"—"+m+(c?"\n"+c:"");
const matchP=(l,ps)=>ps.map(p=>{let s=0;const sp=(p.specialite||"").toLowerCase(),sv=l.service.toLowerCase();if(sp.includes(sv)||sv.includes(sp))s+=50;if(sv.includes("vid")&&(sp.includes("vid")||sp.includes("motion")))s+=30;if(sv.includes("web")&&(sp.includes("web")||sp.includes("land")))s+=30;return{...p,score:s}}).filter(p=>p.score>0).sort((a,b)=>b.score-a.score).slice(0,2);
const healthScore=l=>{let s=0;const c=COLS.find(x=>x.id===l.status);s+=c?c.proba*40:0;if(l.temperature==="chaud")s+=30;else if(l.temperature==="tiede")s+=15;const h=hA(l.lastInteraction);if(h&&h<24)s+=20;else if(h&&h<72)s+=10;return Math.min(Math.round(s),100)};

const hCol=s=>s>=60?"#089981":s>=40?"#C5A059":"#E74C4C";

const calcMargin=(valeur,memberId)=>{const m=TEAM.find(t=>t.id===memberId);const comWebo=valeur*.2;if(m?.isFondateur)return{comWebo,comProsp:0,margeNette:comWebo};const comProsp=comWebo*.5;return{comWebo,comProsp,margeNette:comWebo-comProsp}};

/* ═══ COMPONENTS ═══ */
function Av({id,sz=36}){const m=TEAM.find(t=>t.id===id);if(!m)return null;return <div className="av" style={{width:sz,height:sz,background:m.color+"18",border:"2px solid "+m.color+"40",color:m.color,fontSize:sz*.38}}>{m.name[0]}</div>}
function Badge({type,children}){return <span className={"badge badge-"+type}>{children}</span>}
function Prog({pct,color}){return <div className="prog"><div className="prog-fill" style={{width:Math.min(pct,100)+"%",background:color||"var(--gold)"}}/></div>}
function P$({v,p}){return <span className={p?"blur":""}>{v}</span>}
function SBadge({status}){const c=COLS.find(x=>x.id===status);if(!c)return null;const t=status==="signe"?"green":status==="injoignable"?"ghost":["relance2","call"].includes(status)?"gold":"blue";return <Badge type={t}><i className={"fa-solid "+c.icon} style={{fontSize:8}}/> {c.label}</Badge>}
function FF({l,children}){return <div className="ff"><label>{l}</label>{children}</div>}
const IS={width:"100%",padding:"10px 12px",borderRadius:"var(--radius)",border:"1px solid var(--border)",background:"var(--bg)",color:"var(--text)",fontSize:14,outline:"none",boxSizing:"border-box",fontFamily:"var(--sans)"};

/* ═══ APP ═══ */
function App(){
const[sess,setSess]=useState(()=>{try{return localStorage.getItem("webo_session")||""}catch(e){return""}});
const[logId,setLogId]=useState("");const[logPw,setLogPw]=useState("");const[logErr,setLogErr]=useState("");
const isA=TEAM.find(t=>t.id===sess)?.isAdmin||false;const sU=TEAM.find(t=>t.id===sess);
const[leads,setLeads]=useState([]);const[prestas,setPrestas]=useState([]);const[ready,setReady]=useState(false);const[sync,setSync]=useState("loading");
const[page,setPage]=useState("hub");const[pView,setPView]=useState("table");
const[showForm,setShowForm]=useState(false);const[editId,setEditId]=useState(null);
const[dragOver,setDragOver]=useState(null);const[fM,setFM]=useState("all");const[sortBy,setSortBy]=useState("default");
const[toast,setToast]=useState(null);const[showVerif,setShowVerif]=useState(null);
const[showPF,setShowPF]=useState(false);const[editP,setEditP]=useState(null);
const[now,setNow]=useState(Date.now());const[aiMsgs,setAiMsgs]=useState([]);const[aiIn,setAiIn]=useState("");const[aiLoad,setAiLoad]=useState(false);
const[cmd,setCmd]=useState(false);const[cmdQ,setCmdQ]=useState("");
const[privacy,setPrivacy]=useState(false);const[selLead,setSelLead]=useState(null);
const aiRef=useRef(null);const pm=privacy;
const flash=m=>{setToast(m);setTimeout(()=>setToast(null),2200)};
const pN=id=>prestas.find(x=>x.id===id)?.nom||"";

const doLogin=()=>{const q=logId.trim().toLowerCase();const a=ACCTS.find(x=>x.login===q||x.email===q);if(!a){setLogErr("Identifiant inconnu");return}if(logPw!==a.pass){setLogErr("Mot de passe incorrect");return}setSess(a.id);try{localStorage.setItem("webo_session",a.id)}catch(e){}};

useEffect(()=>{const h=e=>{const t=e.target.tagName;if(t==="INPUT"||t==="TEXTAREA"||t==="SELECT")return;if((e.metaKey||e.ctrlKey)&&e.key==="k"){e.preventDefault();setCmd(p=>!p);setCmdQ("")}if(e.key==="n"||e.key==="N"){e.preventDefault();setPage("pipeline");setShowForm(true)}if(e.key==="Escape"){setCmd(false);setSelLead(null)}if(e.key==="Backspace"&&page!=="hub"){e.preventDefault();setPage("hub")}};window.addEventListener("keydown",h);return()=>window.removeEventListener("keydown",h)},[page]);

/* CRUD */
const upsert=useCallback(async l=>{const c={...l};delete c._isNew;setLeads(p=>p.some(x=>x.id===c.id)?p.map(x=>x.id===c.id?c:x):[...p,c]);setShowForm(false);setEditId(null);flash(l._isNew?"Ajouté ✓":"Mis à jour ✓");await sb.from("leads").upsert(L2db(c))},[]);
const del=useCallback(async id=>{setLeads(p=>p.filter(l=>l.id!==id));setShowForm(false);setEditId(null);flash("Supprimé");await sb.from("leads").delete().eq("id",id)},[]);
const touch=useCallback(async(id,msg)=>{const l=leads.find(x=>x.id===id);if(!l)return;const t=(l.tentatives||0)+1;const nl=addLog(l.activityLog,msg||"Contact #"+t);setLeads(p=>p.map(x=>x.id===id?{...x,lastInteraction:new Date().toISOString(),tentatives:t,activityLog:nl}:x));await sb.from("leads").update({last_interaction:new Date().toISOString(),tentatives:t,activity_log:nl}).eq("id",id)},[leads]);
const upd=useCallback(async(id,f)=>{setLeads(p=>p.map(l=>l.id===id?{...l,...f}:l));const db={};const m={status:"status",lastInteraction:"last_interaction",nextRelance:"next_relance",verifStatus:"verif_status",verifNote:"verif_note",activityLog:"activity_log"};Object.keys(f).forEach(k=>{if(m[k])db[m[k]]=f[k]});await sb.from("leads").update(db).eq("id",id)},[]);
const updV=useCallback(async(id,vs,vn)=>{const nl=addLog(leads.find(l=>l.id===id)?.activityLog||"","Vérif:"+vs);setLeads(p=>p.map(l=>l.id===id?{...l,verifStatus:vs,verifNote:vn,activityLog:nl}:l));setShowVerif(null);flash("Vérif ✓");await sb.from("leads").update({verif_status:vs,verif_note:vn,verif_date:td(),activity_log:nl}).eq("id",id)},[leads]);
const upsP=useCallback(async p=>{const c={...p};delete c._isNew;setPrestas(pr=>pr.some(x=>x.id===c.id)?pr.map(x=>x.id===c.id?c:x):[...pr,c]);setShowPF(false);setEditP(null);flash("Presta ✓");await sb.from("prestataires").upsert(c)},[]);
const delP=useCallback(async id=>{setPrestas(pr=>pr.filter(x=>x.id!==id));setShowPF(false);setEditP(null);flash("Supprimé");await sb.from("prestataires").delete().eq("id",id)},[]);

const onDS=(e,id)=>{e.dataTransfer.effectAllowed="move";e.dataTransfer.setData("text/plain",id)};
const onDr=async(e,col)=>{e.preventDefault();const id=e.dataTransfer.getData("text/plain");if(id){const l=leads.find(x=>x.id===id);const nd={status:col,lastInteraction:new Date().toISOString(),tentatives:(l?.tentatives||0)+1};const nl=addLog(l?.activityLog||"","→"+COLS.find(c=>c.id===col)?.label);setLeads(p=>p.map(x=>x.id===id?{...x,...nd,activityLog:nl}:x));flash(l?.nom+" → "+COLS.find(c=>c.id===col)?.label);await sb.from("leads").update({status:col,last_interaction:nd.lastInteraction,tentatives:nd.tentatives,activity_log:nl}).eq("id",id)}setDragOver(null)};

const askAI=async pr=>{setAiMsgs(p=>[...p,{role:"user",content:pr}]);setAiIn("");setAiLoad(true);try{const sg=leads.filter(l=>l.status==="signe");const r=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,system:"Assistant WEBO Asset Management. Com 20%, Fondateur garde 100%, Chasseur split 50%. "+leads.length+" leads, "+sg.length+" signés. Français, expert, concret.",messages:[...aiMsgs.slice(-6).map(m=>({role:m.role,content:m.content})),{role:"user",content:pr}]})});const d=await r.json();const t=(d.content||[]).map(b=>b.type==="text"?b.text:"").filter(Boolean).join("\n")||"Erreur";setAiMsgs(p=>[...p,{role:"assistant",content:t}])}catch(e){setAiMsgs(p=>[...p,{role:"assistant",content:"Erreur IA."}])}setAiLoad(false)};
useEffect(()=>{if(aiRef.current)aiRef.current.scrollIntoView({behavior:"smooth"})},[aiMsgs,aiLoad]);

/* Supabase */
useEffect(()=>{(async()=>{setSync("loading");try{const lr=await sb.from("leads").select("*");setLeads((lr.data||[]).map(db2L));try{const pr=await sb.from("prestataires").select("*");setPrestas(pr.data||[])}catch(e){}setSync(lr.error?"off":"on")}catch(e){setSync("off")}setReady(true)})()},[]);
useEffect(()=>{const ch=sb.channel("rt").on("postgres_changes",{event:"*",schema:"public",table:"leads"},p=>{if(p.eventType==="INSERT"){const n=db2L(p.new);setLeads(pr=>pr.some(l=>l.id===n.id)?pr:[...pr,n])}if(p.eventType==="UPDATE"){const u=db2L(p.new);setLeads(pr=>pr.map(l=>l.id===u.id?u:l))}if(p.eventType==="DELETE")setLeads(pr=>pr.filter(l=>l.id!==p.old.id))}).on("postgres_changes",{event:"*",schema:"public",table:"prestataires"},p=>{if(p.eventType==="INSERT")setPrestas(pr=>pr.some(x=>x.id===p.new.id)?pr:[...pr,p.new]);if(p.eventType==="UPDATE")setPrestas(pr=>pr.map(x=>x.id===p.new.id?p.new:x));if(p.eventType==="DELETE")setPrestas(pr=>pr.filter(x=>x.id!==p.old.id))}).subscribe(s=>{if(s==="SUBSCRIBED")setSync("on")});return()=>sb.removeChannel(ch)},[]);
useEffect(()=>{const t=setInterval(()=>setNow(Date.now()),60000);return()=>clearInterval(t)},[]);

/* Computed */
const myL=useMemo(()=>isA?leads:leads.filter(l=>l.memberId===sess),[leads,sess,isA]);
const filt=useMemo(()=>{let f=myL;if(fM!=="all")f=f.filter(l=>l.memberId===fM);return f},[myL,fM]);
const srt=c=>{if(sortBy==="valeur")return[...c].sort((a,b)=>b.valeur-a.valeur);if(sortBy==="date")return[...c].sort((a,b)=>new Date(b.dateCreated)-new Date(a.dateCreated));return c};
const urgL=useMemo(()=>myL.filter(isUrg).sort((a,b)=>new Date(a.lastInteraction)-new Date(b.lastInteraction)),[myL,now]);

/* Agenda: relances du jour + overdue + 3 days dormant */
const agendaItems=useMemo(()=>{const items=[];
myL.filter(l=>l.nextRelance&&!["signe","injoignable"].includes(l.status)&&dU(l.nextRelance)<=0).forEach(l=>items.push({type:"relance",urgency:dU(l.nextRelance)<0?"bordeaux":"gold",lead:l,time:l.nextRelance,label:"Relance "+l.nom}));
myL.filter(l=>!["signe","injoignable"].includes(l.status)&&hA(l.lastInteraction)>=72).forEach(l=>{if(!items.find(x=>x.lead.id===l.id))items.push({type:"dormant",urgency:"bordeaux",lead:l,time:l.lastInteraction,label:l.nom+" — "+Math.floor(dA(l.lastInteraction))+"j sans contact"})});
leads.filter(l=>l.status==="signe"&&!l.paymentProof).forEach(l=>items.push({type:"paiement",urgency:"gold",lead:l,time:l.dateCreated,label:"Preuve paiement — "+l.nom}));
leads.filter(l=>l.status==="signe"&&dA(l.dateCreated)>=30&&l.verifStatus!=="confirmed").forEach(l=>{if(!items.find(x=>x.type==="paiement"&&x.lead.id===l.id))items.push({type:"verif",urgency:"bordeaux",lead:l,time:l.dateCreated,label:"Vérif commission — "+l.nom+" ("+Math.floor(dA(l.dateCreated))+"j)"})});
return items.sort((a,b)=>a.urgency==="bordeaux"&&b.urgency!=="bordeaux"?-1:1)},[myL,leads,now]);

/* Leaderboard */
const leaderboard=useMemo(()=>TEAM.map(m=>{const sg=leads.filter(l=>l.status==="signe"&&l.memberId===m.id);return{...m,signes:sg.length,ca:sg.reduce((s,l)=>s+l.valeur,0)}}).sort((a,b)=>b.signes-a.signes),[leads]);

/* Stats */
const st=useMemo(()=>{const src=isA?leads:myL;const sg=src.filter(l=>l.status==="signe");const pipe=src.filter(l=>!["injoignable","signe"].includes(l.status));const ca=sg.reduce((s,l)=>s+l.valeur,0);const w=pipe.reduce((s,l)=>{const c=COLS.find(x=>x.id===l.status);return s+(l.valeur*(c?.proba||0))},0);
const totalMargeNette=sg.reduce((s,l)=>s+calcMargin(l.valeur,l.memberId).margeNette,0);
const totalComProsp=sg.reduce((s,l)=>s+calcMargin(l.valeur,l.memberId).comProsp,0);
const stale=src.filter(l=>!["signe","injoignable"].includes(l.status)&&hA(l.lastInteraction)>=48).length;
const od=src.filter(l=>l.nextRelance&&!["signe","injoignable"].includes(l.status)&&dU(l.nextRelance)<0).length;
const avgC=sg.length?Math.round(sg.reduce((s,l)=>s+(cDays(l.dateCreated,l.status)||0),0)/sg.length):0;
const byM=TEAM.map(m=>{const ml=src.filter(l=>l.memberId===m.id);const ms=ml.filter(l=>l.status==="signe");const mc=ms.reduce((s,l)=>s+l.valeur,0);const margins=ms.reduce((s,l)=>s+calcMargin(l.valeur,l.memberId).margeNette,0);const prosp=ms.reduce((s,l)=>s+calcMargin(l.valeur,l.memberId).comProsp,0);return{...m,total:ml.length,signes:ms.length,conv:ml.length?Math.round(ms.length/ml.length*100):0,ca:mc,marge:margins,prosp}}).sort((a,b)=>b.signes-a.signes);
const bySrc=SOURCES.map(s=>{const sl=src.filter(l=>l.source===s);const ss=sl.filter(l=>l.status==="signe");return{source:s,total:sl.length,signes:ss.length,rate:sl.length?Math.round(ss.length/sl.length*100):0,ca:ss.reduce((a,l)=>a+l.valeur,0)}}).filter(s=>s.total>0).sort((a,b)=>b.ca-a.ca);
return{total:src.length,signes:sg.length,stale,od,urg:urgL.length,ca,w,tw:w+ca,margeNette:totalMargeNette,comProsp:totalComProsp,avgC,byM,bySrc,obj:Math.min(Math.round(ca/OBJ*100),100),agenda:agendaItems.length}},[leads,myL,isA,now,urgL,agendaItems]);

/* CMD palette */
const cmdRes=useMemo(()=>{if(!cmdQ)return[];const q=cmdQ.toLowerCase();return[
...[{i:"fa-plus",l:"Nouveau Lead",a:()=>{setPage("pipeline");setShowForm(true)}},{i:"fa-users",l:"Nouveau Prestataire",a:()=>{setPage("talents");setShowPF(true)}},{i:"fa-house",l:"Hub",a:()=>setPage("hub")},{i:"fa-calendar",l:"Agenda",a:()=>setPage("agenda")},{i:"fa-chart-pie",l:"Finance",a:()=>setPage("finance")},{i:"fa-robot",l:"Agent IA",a:()=>setPage("ia")}].filter(c=>c.l.toLowerCase().includes(q)),
...leads.filter(l=>l.nom.toLowerCase().includes(q)).slice(0,5).map(l=>({i:"fa-user",l:l.nom+" — "+l.service,a:()=>{setSelLead(l);setPage("pipeline")}}))
]},[cmdQ,leads]);

/* ═══ LOGIN ═══ */
if(!sess)return(
<div style={{display:"flex",alignItems:"center",justifyContent:"center",minHeight:"100dvh",background:"var(--bg)"}}>
<div className="fu" style={{background:"var(--bg2)",border:"1px solid var(--border)",borderRadius:12,padding:48,maxWidth:400,width:"95%",textAlign:"center"}}>
  <div style={{marginBottom:4}}><span style={{fontFamily:"var(--serif)",fontWeight:700,fontSize:48,color:"var(--gold)",fontStyle:"italic"}}>W</span><span style={{fontFamily:"var(--serif)",fontWeight:600,fontSize:42,color:"var(--text)"}}>ebo</span></div>
  <div style={{fontSize:9,color:"var(--text3)",letterSpacing:4,textTransform:"uppercase",fontFamily:"var(--mono)",marginBottom:24}}>Asset Management</div>
  <div className="sep"/>
  <p style={{fontSize:13,color:"var(--text2)",margin:"12px 0 20px",fontFamily:"var(--serif)",fontStyle:"italic"}}>Votre croissance, notre expertise.</p>
  <div style={{textAlign:"left"}}><FF l="Identifiant"><input style={IS} value={logId} onChange={e=>{setLogId(e.target.value);setLogErr("")}} placeholder="kylian ou email" onKeyDown={e=>{if(e.key==="Enter")doLogin()}}/></FF>
  <FF l="Mot de passe"><input style={IS} type="password" value={logPw} onChange={e=>{setLogPw(e.target.value);setLogErr("")}} placeholder="••••••" onKeyDown={e=>{if(e.key==="Enter")doLogin()}}/></FF></div>
  {logErr&&<div style={{color:"var(--red)",fontSize:12,marginBottom:8}}>{logErr}</div>}
  <button onClick={doLogin} style={{width:"100%",padding:14,borderRadius:"var(--radius)",background:"var(--gold)",color:"var(--bg)",fontSize:14,fontWeight:700,letterSpacing:.5}}>Accéder au Terminal</button>
  <div style={{marginTop:14,fontSize:9,color:"var(--text4)",fontFamily:"var(--mono)"}}>⌘K Commandes · N Lead · ⌫ Hub</div>
</div></div>);
if(!ready)return <div style={{display:"flex",alignItems:"center",justifyContent:"center",minHeight:"100dvh"}}><div style={{color:"var(--gold)"}}>Initialisation…</div></div>;

/* ═══ NAV ═══ */
const Nav=()=>(
<nav className="topnav">
  <span className="logo" onClick={()=>setPage("hub")}><span className="w">W</span><span className="r">ebo</span></span>
  <span className="logo-tag">Asset Management</span>
  <div style={{flex:1}}/>
  {/* LEADERBOARD LIVE */}
  <div className="lb-mini">
    <span style={{fontSize:9,color:"var(--text3)",fontFamily:"var(--mono)",marginRight:4}}>TOP</span>
    {leaderboard.slice(0,3).map((m,i)=><div key={m.id} className="lb-item">
      <div className="lb-rank" style={{background:i===0?"var(--gold)":i===1?"var(--text3)":"#8B4513",color:i===0?"var(--bg)":"var(--text)"}}>{i+1}</div>
      <span style={{color:m.color}}>{mN(m.id)}</span>
      <span style={{fontFamily:"var(--mono)",color:"var(--green)"}}>{m.signes}</span>
    </div>)}
  </div>
  <div style={{display:"flex",gap:4,alignItems:"center"}}>
    {page!=="hub"&&<button className="nb" onClick={()=>setPage("hub")}><i className="fa-solid fa-arrow-left"/> Hub</button>}
    <button className="nb" onClick={()=>setCmd(true)}><i className="fa-solid fa-magnifying-glass"/></button>
    <button className="nb" onClick={()=>setPrivacy(p=>!p)} style={{color:privacy?"var(--red)":"var(--text2)"}}><i className={"fa-solid "+(privacy?"fa-eye-slash":"fa-eye")}/></button>
    <button className="nb" onClick={()=>{const d=JSON.stringify({v:"12",leads,prestas},null,2);const b=new Blob([d],{type:"application/json"});const u=URL.createObjectURL(b);const a=document.createElement("a");a.href=u;a.download="webo-"+td()+".json";a.click();flash("Backup ✓")}}><i className="fa-solid fa-cloud-arrow-down"/></button>
    <div style={{display:"flex",alignItems:"center",gap:4,padding:"3px 8px",borderRadius:"var(--radius)",border:"1px solid var(--border)"}}><Av id={sess} sz={22}/><span style={{fontSize:11,fontWeight:600,color:sU?.color}}>{mN(sess)}</span><span style={{fontSize:9,color:"var(--text3)"}}>{sU?.role}</span><span className={"sync-dot "+sync}/></div>
    <button className="nb" onClick={()=>{setSess("");try{localStorage.removeItem("webo_session")}catch(e){}}} style={{color:"var(--text3)"}}><i className="fa-solid fa-power-off"/></button>
  </div>
</nav>);

/* ═══ HUB ═══ */
const HubPage=()=>(
<div className="hub">
  <div className="hub-header fu">
    <div><h1 className="hub-title">Bienvenue, {sU?.name||""}</h1><p className="hub-sub">{sU?.role} — WEBO Asset Management · Fondateur & Expert en Croissance</p></div>
  </div>
  <div className="hub-stats">
    {[{l:"Portefeuille",v:st.total,c:"var(--gold)"},{l:"Signés",v:st.signes,c:"var(--green)"},{l:"CA Signé",v:E(st.ca),c:"var(--green)"},{l:"Marge Nette",v:E(st.margeNette),c:"var(--gold)"},{l:"Pipeline",v:E(st.tw),c:"#7C5CBF"},{l:"Objectif",v:st.obj+"%",c:st.obj>=80?"var(--green)":"var(--gold)"},{l:"Agenda",v:st.agenda+" tâches",c:st.agenda>0?"var(--red)":"var(--green)"}].map((s,i)=>
    <div key={i} className="stat-card fu" style={{animationDelay:i*40+"ms"}}><div className="stat-label">{s.l}</div><div className="stat-val" style={{color:s.c,fontSize:20}}><P$ v={s.v} p={pm}/></div></div>)}
  </div>
  <div className="hub-grid">
    {[{icon:"fa-chart-line",title:"Pipeline Commercial",desc:"Kanban, leads, prospection, cycle de vente.",pg:"pipeline",cnt:st.total+" deals"},
    {icon:"fa-users-gear",title:"Réseau de Talents",desc:"Prestataires d'élite, compétences, charge.",pg:"talents",cnt:prestas.length+" prestas"},
    {icon:"fa-calendar-check",title:"Agenda & Échéances",desc:"Daily Focus : relances, audits, deadlines paiement.",pg:"agenda",cnt:st.agenda+" tâches"},
    {icon:"fa-chart-pie",title:"Contrôle Financier",desc:"CA, marge nette, ROI, commissions Fondateur vs Chasseurs.",pg:"finance",cnt:E(st.margeNette)},
    {icon:"fa-robot",title:"Agent IA Stratégique",desc:"Analyse, coaching, prévisions automatisées.",pg:"ia",cnt:"IA"},
    ].map((c,i)=><div key={i} className="hub-card fu" style={{animationDelay:(i+7)*40+"ms"}} onClick={()=>setPage(c.pg)}>
      <div className="hub-card-icon"><i className={"fa-solid "+c.icon}/></div>
      <h3>{c.title}</h3><p>{c.desc}</p><div className="cnt">{c.cnt}</div>
    </div>)}
  </div>
</div>);

/* ═══ PIPELINE ═══ */
const Pipeline=()=>{
const views=[{id:"table",l:"Tableau",i:"fa-table"},{id:"kanban",l:"Kanban",i:"fa-columns"},{id:"focus",l:"Focus",i:"fa-fire"}];
return <div style={{padding:"14px 18px",flex:1,overflow:"auto",display:"flex",flexDirection:"column"}}>
  <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12,flexWrap:"wrap",gap:8}}>
    <h2 style={{fontFamily:"var(--serif)",fontSize:20,fontWeight:600}}>Pipeline Commercial</h2>
    <div style={{display:"flex",gap:4,alignItems:"center",flexWrap:"wrap"}}>
      {views.map(v=><button key={v.id} onClick={()=>setPView(v.id)} style={{padding:"5px 10px",borderRadius:"var(--radius)",border:"1px solid "+(pView===v.id?"var(--gold)":"var(--border)"),color:pView===v.id?"var(--gold)":"var(--text2)",fontSize:11,fontWeight:600,background:pView===v.id?"rgba(197,160,89,.06)":"transparent"}}><i className={"fa-solid "+v.i} style={{marginRight:3}}/>{v.l}</button>)}
      <span style={{width:1,height:18,background:"var(--border)"}}/>
      {isA&&<select value={fM} onChange={e=>setFM(e.target.value)} style={{...IS,padding:"4px 8px",fontSize:11,width:"auto"}}><option value="all">Tous</option>{TEAM.map(m=><option key={m.id} value={m.id}>{mN(m.id)} ({m.role})</option>)}</select>}

  <div style={{padding:"12px 16px"}}>
    <div style={{marginBottom:12}}><div style={{fontSize:9,color:"var(--text3)",fontFamily:"var(--mono)",marginBottom:4}}>SCORE DE SANTÉ</div>
    <div style={{display:"flex",alignItems:"center",gap:6}}><span style={{fontSize:22,fontWeight:800,fontFamily:"var(--mono)",color:hCol(hs)}}>{hs}</span><div style={{flex:1}}><Prog pct={hs} color={hCol(hs)}/></div><Badge type={hs>=60?"green":hs>=40?"gold":"red"}>{hLab(hs)}</Badge></div></div>
    <div className="sep"/>
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:12}}>

      <div><div style={{fontSize:9,color:"var(--text3)",fontFamily:"var(--mono)"}}>STATUT</div><SBadge status={l.status}/></div>
    </div>
    {/* Margin breakdown */}
    <div style={{background:"rgba(197,160,89,.06)",border:"1px solid rgba(197,160,89,.12)",borderRadius:"var(--radius)",padding:10,marginBottom:12}}>
      <div style={{fontSize:9,color:"var(--gold)",fontFamily:"var(--mono)",marginBottom:6}}>VENTILATION FINANCIÈRE</div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6,fontSize:11,fontFamily:"var(--mono)"}}>
        <div><span style={{color:"var(--text3)"}}>Com. WEBO 20%</span><div style={{fontWeight:700,color:"var(--gold)"}}><P$ v={E(mg.comWebo)} p={pm}/></div></div>
        <div><span style={{color:"var(--text3)"}}>Part {TEAM.find(t=>t.id===l.memberId)?.role}</span><div style={{fontWeight:700,color:mg.comProsp>0?"var(--blue)":"var(--text3)"}}>{mg.comProsp>0?<P$ v={E(mg.comProsp)} p={pm}/>:"—"}</div></div>
        <div style={{gridColumn:"1/3",borderTop:"1px solid var(--border)",paddingTop:6}}><span style={{color:"var(--text3)"}}>Marge Nette</span><div style={{fontSize:16,fontWeight:800,color:"var(--gold)"}}><P$ v={E(mg.margeNette)} p={pm}/></div></div>
      </div>
      {cd!==null&&<div style={{fontSize:10,color:"var(--text3)",marginTop:4}}>Cycle: {cd}j</div>}
    </div>
    <div className="sep"/>
    <div style={{fontSize:10,color:"var(--text2)",marginBottom:3}}><i className="fa-solid fa-phone" style={{width:14}}/> <P$ v={l.phone||"—"} p={pm}/></div>
    <div style={{fontSize:10,color:"var(--text2)",marginBottom:3}}><i className="fa-solid fa-envelope" style={{width:14}}/> {l.email||"—"}</div>
    <div style={{fontSize:10,color:"var(--text2)",marginBottom:3}}><i className="fa-solid fa-location-dot" style={{width:14}}/> {l.adresse||"—"}</div>
    <div style={{fontSize:10,color:"var(--text2)",marginBottom:3}}><i className="fa-solid fa-user" style={{width:14}}/> <span style={{color:mC(l.memberId)}}>{mN(l.memberId)}</span> · {TEAM.find(t=>t.id===l.memberId)?.role} · {l.source}</div>
    {l.prestaId&&<div style={{fontSize:10,color:"var(--gold)",marginBottom:3}}><i className="fa-solid fa-handshake" style={{width:14}}/> {pN(l.prestaId)}</div>}
    {l.notes&&<div style={{fontSize:10,color:"var(--text2)",background:"var(--bg)",borderRadius:6,padding:6,marginTop:6}}>{l.notes}</div>}
    {l.activityLog&&<div style={{marginTop:8}}><div style={{fontSize:9,color:"var(--text3)",fontFamily:"var(--mono)",marginBottom:3}}>HISTORIQUE</div><div style={{fontSize:10,color:"var(--text3)",background:"var(--bg)",borderRadius:6,padding:6,whiteSpace:"pre-wrap",maxHeight:80,overflowY:"auto"}}>{l.activityLog}</div></div>}
    <div className="sep"/>

      <button onClick={()=>openWA(l,mN(l.memberId))} className="wa" style={{padding:"6px 10px",borderRadius:"var(--radius)"}}><i className="fa-brands fa-whatsapp"/> WhatsApp</button>
      <button onClick={()=>cp(genTpl(l,mN(l.memberId)),flash)} style={{padding:"6px 10px",borderRadius:"var(--radius)",border:"1px solid var(--border)",color:"var(--text2)",fontSize:10}}><i className="fa-solid fa-copy"/> Template</button>

    </div>
  </div>
</div>};

return (
<div style={{display:"flex",flexDirection:"column",height:"100dvh"}}>
  <Nav/>
  <div style={{flex:1,overflow:"hidden",display:"flex",flexDirection:"column"}}>
    {page==="hub"&&<HubPage/>}
    {page==="pipeline"&&<Pipeline/>}
    {page==="talents"&&<Talents/>}
    {page==="agenda"&&<Agenda/>}
    {page==="finance"&&<Finance/>}
    {page==="ia"&&<IA/>}
  </div>
  {selLead&&<Detail l={selLead} onClose={()=>setSelLead(null)}/>}
  {/* CMD */}
  {cmd&&<div className="cmd-ov" onClick={()=>setCmd(false)}><div className="cmd-box" onClick={e=>e.stopPropagation()}><input className="cmd-in" value={cmdQ} onChange={e=>setCmdQ(e.target.value)} placeholder="Commande, lead ou prestataire…" autoFocus onKeyDown={e=>{if(e.key==="Escape")setCmd(false);if(e.key==="Enter"&&cmdRes.length>0){cmdRes[0].a();setCmd(false);setCmdQ("")}}}/><div style={{maxHeight:300,overflowY:"auto"}}>{cmdRes.map((r,i)=><div key={i} className="cmd-r" onClick={()=>{r.a();setCmd(false);setCmdQ("")}}><i className={"fa-solid "+r.i} style={{width:18,textAlign:"center",color:"var(--gold)"}}/><span>{r.l}</span></div>)}</div></div></div>}
  {/* MODALS */}
  {showForm&&<div className="overlay" onClick={()=>{setShowForm(false);setEditId(null)}}><div className="overlay-bg"/><div className="modal" onClick={e=>e.stopPropagation()}>
  <LForm lead={editId?leads.find(l=>l.id===editId):null} onSave={upsert} onDel={editId?()=>del(editId):null} onX={()=>{setShowForm(false);setEditId(null)}} prestas={prestas} sess={sess} isA={isA} pm={pm}/>
  </div></div>}
  {showVerif&&<div className="overlay" onClick={()=>setShowVerif(null)}><div className="overlay-bg"/><div className="modal" style={{maxWidth:440}} onClick={e=>e.stopPropagation()}>
  <VForm lead={leads.find(l=>l.id===showVerif)} onSave={updV} onX={()=>setShowVerif(null)}/></div></div>}
  {showPF&&<div className="overlay" onClick={()=>{setShowPF(false);setEditP(null)}}><div className="overlay-bg"/><div className="modal" style={{maxWidth:440}} onClick={e=>e.stopPropagation()}>
  <PForm presta={editP} onSave={upsP} onDel={editP?()=>delP(editP.id):null} onX={()=>{setShowPF(false);setEditP(null)}}/></div></div>}
  {toast&&<div className="fu" style={{position:"fixed",bottom:20,left:"50%",transform:"translateX(-50%)",zIndex:2000,background:"var(--bg2)",border:"1px solid rgba(197,160,89,.2)",borderRadius:"var(--radius)",padding:"8px 18px",color:"var(--text)",fontSize:12,boxShadow:"0 8px 30px rgba(0,0,0,.3)"}}>{toast}</div>}
</div>);
}

/* ═══ LEAD FORM ═══ */
function LForm({lead,onSave,onDel,onX,prestas,sess,isA,pm}){
const IS={width:"100%",padding:"10px 12px",borderRadius:"var(--radius)",border:"1px solid var(--border)",background:"var(--bg)",color:"var(--text)",fontSize:14,outline:"none",boxSizing:"border-box"};
const[f,setF]=useState(lead?{...lead}:{nom:"",service:SERVICES[0],valeur:"",memberId:sess||"keddy",status:"nouveau",dateCreated:td(),lastInteraction:new Date().toISOString(),nextRelance:addD(td(),2),notes:"",source:SOURCES[0],echecReason:"—",tentatives:0,paymentProof:"",verifStatus:"none",verifNote:"",prestaId:"",email:"",phone:"",adresse:"",temperature:"tiede",activityLog:"",paymentLink:"",externalLink:""});
const[pQ,setPQ]=useState("");const[showM,setShowM]=useState(false);const s=(k,v)=>setF(p=>({...p,[k]:v}));
const fp=prestas.filter(p=>{if(!pQ)return true;const q=pQ.toLowerCase();return p.nom.toLowerCase().includes(q)||p.specialite.toLowerCase().includes(q)});
const sp=prestas.find(p=>p.id===f.prestaId);const matches=useMemo(()=>matchP(f,prestas),[f.service,prestas]);
const mg=f.valeur?calcMargin(Number(f.valeur),f.memberId):null;const apporteur=TEAM.find(t=>t.id===f.memberId);
return <div>
<div style={{display:"flex",justifyContent:"space-between",marginBottom:10}}><h3 style={{fontFamily:"var(--serif)",fontSize:17,fontWeight:600}}>{lead?"Modifier — "+lead.nom:"Nouveau Lead"}</h3><button onClick={onX} style={{color:"var(--text3)"}}><i className="fa-solid fa-xmark"/></button></div><div className="sep"/>
<FF l="Entreprise"><input style={IS} value={f.nom} onChange={e=>s("nom",e.target.value)} placeholder="Nom"/></FF>
<div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}><FF l="Téléphone"><input style={IS} value={f.phone} onChange={e=>s("phone",e.target.value)} type="tel"/></FF><FF l="Email"><input style={IS} value={f.email} onChange={e=>s("email",e.target.value)} type="email"/></FF></div>
<FF l="Adresse"><input style={IS} value={f.adresse} onChange={e=>s("adresse",e.target.value)}/></FF>
<div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}><FF l="Service"><select style={IS} value={f.service} onChange={e=>s("service",e.target.value)}>{SERVICES.map(v=><option key={v}>{v}</option>)}</select></FF><FF l="Valeur HT"><input style={IS} type="number" value={f.valeur} onChange={e=>s("valeur",e.target.value)}/></FF></div>
<div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
  <FF l="Apporteur d'Affaires"><select style={IS} value={f.memberId} onChange={e=>s("memberId",e.target.value)} disabled={!isA}>{TEAM.map(m=><option key={m.id} value={m.id}>{m.name} ({m.role})</option>)}</select></FF>
  <FF l="Source"><select style={IS} value={f.source} onChange={e=>s("source",e.target.value)}>{SOURCES.map(v=><option key={v}>{v}</option>)}</select></FF>
</div>
<div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8}}><FF l="Statut"><select style={IS} value={f.status} onChange={e=>s("status",e.target.value)}>{COLS.map(c=><option key={c.id} value={c.id}>{c.label}</option>)}</select></FF><FF l="Température"><select style={IS} value={f.temperature} onChange={e=>s("temperature",e.target.value)}>{TEMPS.map(t=><option key={t.id} value={t.id}>{t.e} {t.l}</option>)}</select></FF><FF l="Relance"><input style={IS} type="date" value={f.nextRelance} onChange={e=>s("nextRelance",e.target.value)}/></FF></div>
<FF l="Prestataire">{sp?<div style={{display:"flex",alignItems:"center",gap:6,padding:"7px 10px",borderRadius:"var(--radius)",border:"1px solid rgba(197,160,89,.2)",background:"rgba(197,160,89,.04)"}}><span style={{fontWeight:600}}>{sp.nom}</span><span style={{fontSize:10,color:"var(--gold)"}}>{sp.specialite}</span><button onClick={()=>s("prestaId","")} style={{marginLeft:"auto",color:"var(--red)",fontSize:10}}>✕</button></div>:<div><div style={{display:"flex",gap:4,marginBottom:3}}><input value={pQ} onChange={e=>setPQ(e.target.value)} placeholder="Chercher…" style={{...IS,flex:1,fontSize:13}}/><button onClick={()=>setShowM(p=>!p)} style={{padding:"7px 10px",borderRadius:"var(--radius)",border:"1px solid var(--gold)",color:"var(--gold)",fontSize:11,fontWeight:600}}><i className="fa-solid fa-brain"/> Suggérer</button></div>
{showM&&matches.map(m=><div key={m.id} className="match-card" onClick={()=>{s("prestaId",m.id);setShowM(false)}}><span style={{fontWeight:600}}>{m.nom}</span> <span style={{color:"var(--gold)",fontSize:11}}>Score:{m.score}%</span> <span style={{color:"var(--green)",fontSize:11,float:"right"}}>Sélectionner →</span></div>)}
{!showM&&prestas.length>0&&<div style={{maxHeight:70,overflowY:"auto",borderRadius:"var(--radius)",border:"1px solid var(--border)",background:"var(--bg)"}}>{fp.map(p=><button key={p.id} onClick={()=>{s("prestaId",p.id);setPQ("")}} style={{display:"flex",gap:5,padding:"5px 7px",width:"100%",textAlign:"left",color:"var(--text)",fontSize:11}}><span style={{fontWeight:600}}>{p.nom}</span><span style={{color:"var(--text2)"}}>{p.specialite}</span></button>)}</div>}
</div>}</FF>
<FF l="Lien externe"><input style={IS} value={f.externalLink} onChange={e=>s("externalLink",e.target.value)} placeholder="Loom, Drive…"/></FF>
<FF l="Notes"><textarea style={{...IS,height:45,resize:"vertical"}} value={f.notes} onChange={e=>s("notes",e.target.value)}/></FF>
{f.status==="signe"&&<><FF l="Preuve paiement"><input style={IS} value={f.paymentProof} onChange={e=>s("paymentProof",e.target.value)}/></FF><FF l="Lien paiement"><input style={IS} value={f.paymentLink} onChange={e=>s("paymentLink",e.target.value)}/></FF></>}
{f.status==="injoignable"&&<FF l="Raison"><select style={IS} value={f.echecReason} onChange={e=>s("echecReason",e.target.value)}>{ECHECS.map(r=><option key={r}>{r}</option>)}</select></FF>}
{mg&&mg.comWebo>0&&<div style={{background:"rgba(197,160,89,.06)",border:"1px solid rgba(197,160,89,.12)",borderRadius:"var(--radius)",padding:10,marginBottom:10}}>
  <div style={{fontSize:10,color:"var(--gold)",fontFamily:"var(--mono)",marginBottom:4}}>VENTILATION — {apporteur?.role}</div>
  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:6,fontFamily:"var(--mono)",fontSize:12}}>
    <div><div style={{fontSize:9,color:"var(--text3)"}}>Com. 20%</div><div style={{fontWeight:700,color:"var(--gold)"}}>{E(mg.comWebo)}</div></div>
    <div><div style={{fontSize:9,color:"var(--text3)"}}>Part {apporteur?.role}</div><div style={{fontWeight:700,color:mg.comProsp>0?"var(--blue)":"var(--text3)"}}>{mg.comProsp>0?E(mg.comProsp):"—"}</div></div>
    <div><div style={{fontSize:9,color:"var(--text3)"}}>Marge WEBO</div><div style={{fontWeight:800,color:"var(--gold)"}}>{E(mg.margeNette)}</div></div>
  </div>
  {!apporteur?.isFondateur&&<div style={{fontSize:9,color:"var(--text3)",marginTop:4}}>Chasseur → Split 50/50 de la commission</div>}
  {apporteur?.isFondateur&&<div style={{fontSize:9,color:"var(--gold)",marginTop:4}}>Fondateur → 100% de la commission conservée</div>}
</div>}
<div className="sep"/>
<div style={{display:"flex",gap:4,justifyContent:"flex-end",flexWrap:"wrap"}}>
  {onDel&&<button onClick={onDel} style={{padding:"9px 12px",borderRadius:"var(--radius)",border:"1px solid var(--red)",color:"var(--red)",fontSize:12,fontWeight:600,marginRight:"auto"}}>Supprimer</button>}
  <button onClick={onX} style={{padding:"9px 14px",borderRadius:"var(--radius)",border:"1px solid var(--border)",color:"var(--text2)",fontSize:12}}>Annuler</button>
  <button onClick={()=>{if(!f.nom.trim())return;const nl=f.id?f.activityLog:addLog("","Créé");onSave({...f,id:f.id||uid(),valeur:Number(f.valeur)||0,lastInteraction:new Date().toISOString(),activityLog:nl,_isNew:!f.id})}} style={{padding:"9px 18px",borderRadius:"var(--radius)",background:"var(--gold)",color:"var(--bg)",fontSize:13,fontWeight:700}}>{lead?"Enregistrer":"Ajouter"}</button>
</div></div>}

function VForm({lead,onSave,onX}){const IS={width:"100%",padding:"10px 12px",borderRadius:"var(--radius)",border:"1px solid var(--border)",background:"var(--bg)",color:"var(--text)",fontSize:14,outline:"none"};const[st,setSt]=useState(lead?.verifStatus||"pending");const[n,setN]=useState(lead?.verifNote||"");if(!lead)return null;
return <div><div style={{display:"flex",justifyContent:"space-between",marginBottom:10}}><h3 style={{fontFamily:"var(--serif)",fontSize:15}}>Vérification — {lead.nom}</h3><button onClick={onX} style={{color:"var(--text3)"}}><i className="fa-solid fa-xmark"/></button></div>
<FF l="Statut"><div style={{display:"flex",gap:3}}>{VERIFS.filter(v=>v.id!=="none").map(v=><button key={v.id} onClick={()=>setSt(v.id)} style={{flex:1,padding:7,borderRadius:"var(--radius)",border:"1px solid "+(st===v.id?(v.color||"var(--border)"):"var(--border)"),color:st===v.id?(v.color||"var(--text)"):"var(--text2)",background:st===v.id?(v.color||"")+"10":"transparent",fontSize:11,fontWeight:600}}>{v.label}</button>)}</div></FF>
<FF l="Note"><textarea style={{...IS,height:45}} value={n} onChange={e=>setN(e.target.value)}/></FF>
<div style={{display:"flex",gap:4,justifyContent:"flex-end"}}><button onClick={onX} style={{padding:"9px 14px",borderRadius:"var(--radius)",border:"1px solid var(--border)",color:"var(--text2)",fontSize:12}}>Annuler</button><button onClick={()=>onSave(lead.id,st,n)} style={{padding:"9px 18px",borderRadius:"var(--radius)",background:"var(--gold)",color:"var(--bg)",fontSize:13,fontWeight:700}}>Confirmer</button></div></div>}

function PForm({presta,onSave,onDel,onX}){const IS={width:"100%",padding:"10px 12px",borderRadius:"var(--radius)",border:"1px solid var(--border)",background:"var(--bg)",color:"var(--text)",fontSize:14,outline:"none"};
const[f,setF]=useState(presta?{...presta}:{nom:"",specialite:SPECIALITES[0],contact:"",email:"",notes:"",portfolio:"",tjm:""});const s=(k,v)=>setF(p=>({...p,[k]:v}));
return <div><div style={{display:"flex",justifyContent:"space-between",marginBottom:10}}><h3 style={{fontFamily:"var(--serif)",fontSize:15}}>{presta?"Modifier — "+presta.nom:"Nouveau Prestataire"}</h3><button onClick={onX} style={{color:"var(--text3)"}}><i className="fa-solid fa-xmark"/></button></div><div className="sep"/>
<FF l="Nom"><input style={IS} value={f.nom} onChange={e=>s("nom",e.target.value)}/></FF>
<FF l="Spécialité"><select style={IS} value={f.specialite} onChange={e=>s("specialite",e.target.value)}>{SPECIALITES.map(v=><option key={v}>{v}</option>)}</select></FF>
<div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}><FF l="Téléphone"><input style={IS} value={f.contact} onChange={e=>s("contact",e.target.value)} type="tel"/></FF><FF l="Email"><input style={IS} value={f.email} onChange={e=>s("email",e.target.value)} type="email"/></FF></div>
<div style={{display:"grid",gridTemplateColumns:"2fr 1fr",gap:8}}><FF l="Portfolio"><input style={IS} value={f.portfolio||""} onChange={e=>s("portfolio",e.target.value)}/></FF><FF l="TJM €"><input style={IS} type="number" value={f.tjm||""} onChange={e=>s("tjm",e.target.value)}/></FF></div>
<FF l="Notes"><textarea style={{...IS,height:45}} value={f.notes} onChange={e=>s("notes",e.target.value)}/></FF><div className="sep"/>
<div style={{display:"flex",gap:4,justifyContent:"flex-end",flexWrap:"wrap"}}>
  {onDel&&<button onClick={onDel} style={{padding:"9px 12px",borderRadius:"var(--radius)",border:"1px solid var(--red)",color:"var(--red)",fontSize:12,fontWeight:600,marginRight:"auto"}}>Supprimer</button>}
  <button onClick={onX} style={{padding:"9px 14px",borderRadius:"var(--radius)",border:"1px solid var(--border)",color:"var(--text2)",fontSize:12}}>Annuler</button>
  <button onClick={()=>{if(!f.nom.trim())return;onSave({...f,id:f.id||uid(),_isNew:!f.id})}} style={{padding:"9px 18px",borderRadius:"var(--radius)",background:"var(--gold)",color:"var(--bg)",fontSize:13,fontWeight:700}}>{presta?"Enregistrer":"Ajouter"}</button>
</div></div>}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
