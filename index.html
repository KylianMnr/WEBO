</style>

const upd=useCallback(async(id,f)=>{setLeads(p=>p.map(l=>l.id===id?{...l,...f}:l));const db={};const m={status:"status",lastInteraction:"last_interaction",tentatives:"tentatives",nextRelance:"next_relance",verifStatus:"verif_status",verifNote:"verif_note",activityLog:"activity_log"};Object.keys(f).forEach(k=>{if(m[k])db[m[k]]=f[k]});await sb.from("leads").update(db).eq("id",id)},[]);
const updV=useCallback(async(id,vs,vn)=>{const nl=addLog(leads.find(l=>l.id===id)?.activityLog||"","Vérif: "+vs);setLeads(p=>p.map(l=>l.id===id?{...l,verifStatus:vs,verifNote:vn,activityLog:nl}:l));setShowVerif(null);flash("Vérif ✓");await sb.from("leads").update({verif_status:vs,verif_note:vn,verif_date:td(),activity_log:nl}).eq("id",id)},[leads]);
const upsP=useCallback(async p=>{const c={...p};delete c._isNew;setPrestas(pr=>pr.some(x=>x.id===c.id)?pr.map(x=>x.id===c.id?c:x):[...pr,c]);setShowPF(false);setEditP(null);flash("Presta ✓");await sb.from("prestataires").upsert(c)},[]);
const delP=useCallback(async id=>{setPrestas(pr=>pr.filter(x=>x.id!==id));setShowPF(false);setEditP(null);flash("Supprimé");await sb.from("prestataires").delete().eq("id",id)},[]);

/* Drag */

const onDr=async(e,col)=>{e.preventDefault();const id=e.dataTransfer.getData("text/plain");if(id){const l=leads.find(x=>x.id===id);const nd={status:col,lastInteraction:new Date().toISOString(),tentatives:(l?.tentatives||0)+1};const nl=addLog(l?.activityLog||"","→ "+COLS.find(c=>c.id===col)?.label);setLeads(p=>p.map(x=>x.id===id?{...x,...nd,activityLog:nl}:x));flash(l?.nom+" → "+COLS.find(c=>c.id===col)?.label);await sb.from("leads").update({status:col,last_interaction:nd.lastInteraction,tentatives:nd.tentatives,activity_log:nl}).eq("id",id)}setDragOver(null)};

/* Supabase */
useEffect(()=>{(async()=>{setSync("loading");try{const lr=await sb.from("leads").select("*");setLeads((lr.data||[]).map(db2L));try{const pr=await sb.from("prestataires").select("*");setPrestas(pr.data||[])}catch(e){}setSync(lr.error?"off":"on")}catch(e){setSync("off")}setReady(true)})()},[]);
useEffect(()=>{const ch=sb.channel("rt").on("postgres_changes",{event:"*",schema:"public",table:"leads"},p=>{if(p.eventType==="INSERT"){const n=db2L(p.new);setLeads(pr=>pr.some(l=>l.id===n.id)?pr:[...pr,n])}if(p.eventType==="UPDATE"){const u=db2L(p.new);setLeads(pr=>pr.map(l=>l.id===u.id?u:l))}if(p.eventType==="DELETE")setLeads(pr=>pr.filter(l=>l.id!==p.old.id))}).on("postgres_changes",{event:"*",schema:"public",table:"prestataires"},p=>{if(p.eventType==="INSERT")setPrestas(pr=>pr.some(x=>x.id===p.new.id)?pr:[...pr,p.new]);if(p.eventType==="UPDATE")setPrestas(pr=>pr.map(x=>x.id===p.new.id?p.new:x));if(p.eventType==="DELETE")setPrestas(pr=>pr.filter(x=>x.id!==p.old.id))}).subscribe(s=>{if(s==="SUBSCRIBED")setSync("on")});return()=>sb.removeChannel(ch)},[]);

const myL=useMemo(()=>isA?leads:leads.filter(l=>l.memberId===sess),[leads,sess,isA]);

const st=useMemo(()=>{const src=isA?leads:myL;const sg=src.filter(l=>l.status==="signe");const pipe=src.filter(l=>!["injoignable","signe"].includes(l.status));const ca=sg.reduce((s,l)=>s+l.valeur,0);const w=pipe.reduce((s,l)=>{const c=COLS.find(x=>x.id===l.status);return s+(l.valeur*(c?.proba||0))},0);const stale=src.filter(l=>!["signe","injoignable"].includes(l.status)&&hA(l.lastInteraction)>=48).length;const od=src.filter(l=>l.nextRelance&&!["signe","injoignable"].includes(l.status)&&dU(l.nextRelance)<0).length;const urg=myL.filter(isUrg).length;
const avgC=sg.length?Math.round(sg.reduce((s,l)=>s+(cDays(l.dateCreated,l.status)||0),0)/sg.length):0;
const byM=TEAM.filter(t=>t.role==="Prospecteur").map(m=>{const ml=src.filter(l=>l.memberId===m.id);const ms=ml.filter(l=>l.status==="signe");const mc=ms.reduce((s,l)=>s+l.valeur,0);return{...m,total:ml.length,signes:ms.length,conv:ml.length?Math.round(ms.length/ml.length*100):0,ca:mc,comW:mc*.2,comP:mc*.10}}).sort((a,b)=>b.comW-a.comW);
const bySrc=SOURCES.map(s=>{const sl=src.filter(l=>l.source===s);const ss=sl.filter(l=>l.status==="signe");return{source:s,total:sl.length,signes:ss.length,rate:sl.length?Math.round(ss.length/sl.length*100):0,ca:ss.reduce((a,l)=>a+l.valeur,0)}}).filter(s=>s.total>0).sort((a,b)=>b.ca-a.ca);
return{total:src.length,signes:sg.length,stale,od,urg,ca,w,tw:w+ca,profit:ca*.2,comP:ca*.10,avgC,byM,bySrc,obj:Math.min(Math.round(ca/OBJ*100),100)}},[leads,myL,isA,now]);

  {selLead&&<LeadDetail l={selLead} onClose={()=>setSelLead(null)}/>}

  {/* Command Palette */}
  {cmd&&<div className="cmd-overlay" onClick={()=>setCmd(false)}><div className="cmd-box" onClick={e=>e.stopPropagation()}><input className="cmd-input" value={cmdQ} onChange={e=>setCmdQ(e.target.value)} placeholder="Rechercher commande, lead ou prestataire…" autoFocus onKeyDown={e=>{if(e.key==="Escape")setCmd(false);if(e.key==="Enter"&&cmdRes.length>0){cmdRes[0].a();setCmd(false);setCmdQ("")}}}/><div style={{maxHeight:300,overflowY:"auto"}}>{cmdRes.map((r,i)=><div key={i} className="cmd-item" onClick={()=>{r.a();setCmd(false);setCmdQ("")}}><i className={"fa-solid "+r.i} style={{width:20,textAlign:"center",color:"var(--gold)"}}/><span>{r.l}</span></div>)}{cmdRes.length===0&&cmdQ&&<div style={{padding:16,textAlign:"center",color:"var(--text3)"}}>Aucun résultat</div>}</div></div></div>}

  {/* MODALS */}
  {showForm&&<div className="overlay" onClick={()=>{setShowForm(false);setEditId(null)}}><div className="overlay-bg"/><div className="modal" onClick={e=>e.stopPropagation()}>
  <LForm lead={editId?leads.find(l=>l.id===editId):null} onSave={upsert} onDel={editId?()=>del(editId):null} onX={()=>{setShowForm(false);setEditId(null)}} IS={IS} prestas={prestas} sess={sess} isA={isA} pm={pm}/>
  </div></div>}
  {showVerif&&<div className="overlay" onClick={()=>setShowVerif(null)}><div className="overlay-bg"/><div className="modal" style={{maxWidth:440}} onClick={e=>e.stopPropagation()}>
  <VForm lead={leads.find(l=>l.id===showVerif)} onSave={updV} onX={()=>setShowVerif(null)} IS={IS}/>
  </div></div>}
  {showPF&&<div className="overlay" onClick={()=>{setShowPF(false);setEditP(null)}}><div className="overlay-bg"/><div className="modal" style={{maxWidth:440}} onClick={e=>e.stopPropagation()}>
  <PForm presta={editP} onSave={upsP} onDel={editP?()=>delP(editP.id):null} onX={()=>{setShowPF(false);setEditP(null)}} IS={IS}/>
  </div></div>}
  {toast&&<div className="fu" style={{position:"fixed",bottom:24,left:"50%",transform:"translateX(-50%)",zIndex:2000,background:"var(--bg2)",border:"1px solid var(--gold)30",borderRadius:"var(--radius)",padding:"10px 20px",color:"var(--text)",fontSize:12,fontWeight:500,boxShadow:"0 8px 30px rgba(0,0,0,.3)"}}>{toast}</div>}
</div>);
}

/* LEAD FORM */
function LForm({lead,onSave,onDel,onX,IS,prestas,sess,isA,pm}){
const[f,setF]=useState(lead?{...lead}:{nom:"",service:SERVICES[0],valeur:"",memberId:sess||"keddy",status:"nouveau",dateCreated:td(),lastInteraction:new Date().toISOString(),nextRelance:addD(td(),2),notes:"",source:SOURCES[0],echecReason:"—",tentatives:0,paymentProof:"",verifStatus:"none",verifNote:"",prestaId:"",email:"",phone:"",adresse:"",temperature:"tiede",activityLog:"",paymentLink:"",externalLink:""});
const[pQ,setPQ]=useState("");const[showM,setShowM]=useState(false);const s=(k,v)=>setF(p=>({...p,[k]:v}));
const fp=prestas.filter(p=>{if(!pQ)return true;const q=pQ.toLowerCase();return p.nom.toLowerCase().includes(q)||p.specialite.toLowerCase().includes(q)});
const sp=prestas.find(p=>p.id===f.prestaId);const matches=useMemo(()=>matchP(f,prestas),[f.service,prestas]);
return <div>
<div style={{display:"flex",justifyContent:"space-between",marginBottom:12}}><h3 style={{fontFamily:"var(--serif)",fontSize:18,fontWeight:600}}>{lead?"Modifier — "+lead.nom:"Nouveau Lead"}</h3><button onClick={onX} style={{color:"var(--text3)",fontSize:16}}><i className="fa-solid fa-xmark"/></button></div><div className="sep"/>
<FF l="Entreprise"><input style={IS} value={f.nom} onChange={e=>s("nom",e.target.value)} placeholder="Nom"/></FF>
<div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}><FF l="Téléphone"><input style={IS} value={f.phone} onChange={e=>s("phone",e.target.value)} type="tel"/></FF><FF l="Email"><input style={IS} value={f.email} onChange={e=>s("email",e.target.value)} type="email"/></FF></div>
<FF l="Adresse"><input style={IS} value={f.adresse} onChange={e=>s("adresse",e.target.value)}/></FF>
<div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}><FF l="Service"><select style={IS} value={f.service} onChange={e=>s("service",e.target.value)}>{SERVICES.map(v=><option key={v}>{v}</option>)}</select></FF><FF l="Valeur HT"><input style={IS} type="number" value={f.valeur} onChange={e=>s("valeur",e.target.value)}/></FF></div>
<div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}><FF l="Prospecteur"><select style={IS} value={f.memberId} onChange={e=>s("memberId",e.target.value)} disabled={!isA}>{TEAM.map(m=><option key={m.id} value={m.id}>{mN(m.id)}</option>)}</select></FF><FF l="Source"><select style={IS} value={f.source} onChange={e=>s("source",e.target.value)}>{SOURCES.map(v=><option key={v}>{v}</option>)}</select></FF></div>
<div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8}}><FF l="Statut"><select style={IS} value={f.status} onChange={e=>s("status",e.target.value)}>{COLS.map(c=><option key={c.id} value={c.id}>{c.label}</option>)}</select></FF><FF l="Température"><select style={IS} value={f.temperature} onChange={e=>s("temperature",e.target.value)}>{TEMPS.map(t=><option key={t.id} value={t.id}>{t.e} {t.label}</option>)}</select></FF><FF l="Relance"><input style={IS} type="date" value={f.nextRelance} onChange={e=>s("nextRelance",e.target.value)}/></FF></div>
<FF l="Prestataire">{sp?<div style={{display:"flex",alignItems:"center",gap:8,padding:"8px 12px",borderRadius:"var(--radius)",border:"1px solid var(--gold)30",background:"var(--gold)08"}}><span style={{fontWeight:600}}>{sp.nom}</span><span style={{fontSize:11,color:"var(--gold)"}}>{sp.specialite}</span><button onClick={()=>s("prestaId","")} style={{marginLeft:"auto",color:"var(--red)",fontSize:11}}>✕</button></div>:<div><div style={{display:"flex",gap:4,marginBottom:4}}><input value={pQ} onChange={e=>setPQ(e.target.value)} placeholder="Chercher…" style={{...IS,flex:1,fontSize:13}}/><button onClick={()=>setShowM(p=>!p)} style={{padding:"8px 12px",borderRadius:"var(--radius)",border:"1px solid var(--gold)",color:"var(--gold)",fontSize:11,fontWeight:600}}><i className="fa-solid fa-brain"/> Suggérer</button></div>
{showM&&matches.map(m=><div key={m.id} className="match-card" onClick={()=>{s("prestaId",m.id);setShowM(false)}}><div style={{display:"flex",justifyContent:"space-between"}}><span style={{fontWeight:600}}>{m.nom} <span style={{color:"var(--gold)",fontSize:11}}>Score: {m.score}%</span></span><span style={{color:"var(--green)",fontSize:11}}>Sélectionner →</span></div></div>)}
{!showM&&prestas.length>0&&<div style={{maxHeight:80,overflowY:"auto",borderRadius:"var(--radius)",border:"1px solid var(--border)",background:"var(--bg)"}}>{fp.map(p=><button key={p.id} onClick={()=>{s("prestaId",p.id);setPQ("")}} style={{display:"flex",alignItems:"center",gap:6,padding:"6px 8px",width:"100%",textAlign:"left",color:"var(--text)",fontSize:11}}><span style={{fontWeight:600}}>{p.nom}</span><span style={{color:"var(--text2)"}}>{p.specialite}</span></button>)}</div>}
</div>}</FF>
<FF l="Lien externe"><input style={IS} value={f.externalLink} onChange={e=>s("externalLink",e.target.value)} placeholder="Loom, Drive…"/></FF>
<FF l="Notes"><textarea style={{...IS,height:50,resize:"vertical"}} value={f.notes} onChange={e=>s("notes",e.target.value)}/></FF>
{f.status==="signe"&&<><FF l="Preuve paiement"><input style={IS} value={f.paymentProof} onChange={e=>s("paymentProof",e.target.value)}/></FF><FF l="Lien paiement"><input style={IS} value={f.paymentLink} onChange={e=>s("paymentLink",e.target.value)}/></FF></>}
{f.status==="injoignable"&&<FF l="Raison"><select style={IS} value={f.echecReason} onChange={e=>s("echecReason",e.target.value)}>{ECHECS.map(r=><option key={r}>{r}</option>)}</select></FF>}
{f.valeur&&Number(f.valeur)>0&&isA&&<div style={{background:"var(--gold)08",border:"1px solid var(--gold)15",borderRadius:"var(--radius)",padding:12,marginBottom:12,display:"flex",justifyContent:"space-between",fontFamily:"var(--mono)"}}>
  <div><div style={{color:"var(--gold)",fontSize:12}}>Com. Webo 20%</div><div style={{color:"var(--green)",fontSize:11}}>Prosp. 50%→{E(Number(f.valeur)*.10)}</div></div>
  <div style={{fontSize:18,fontWeight:700,color:"var(--gold)"}}>{E(Number(f.valeur)*.2)}</div>
</div>}
<div className="sep"/>
<div style={{display:"flex",gap:6,justifyContent:"flex-end",flexWrap:"wrap"}}>
  {onDel&&<button onClick={onDel} style={{padding:"10px 14px",borderRadius:"var(--radius)",border:"1px solid var(--red)",color:"var(--red)",fontSize:12,fontWeight:600,marginRight:"auto"}}>Supprimer</button>}
  <button onClick={onX} style={{padding:"10px 16px",borderRadius:"var(--radius)",border:"1px solid var(--border)",color:"var(--text2)",fontSize:12}}>Annuler</button>
  <button onClick={()=>{if(!f.nom.trim())return;const nl=f.id?f.activityLog:addLog("","Créé");onSave({...f,id:f.id||uid(),valeur:Number(f.valeur)||0,lastInteraction:new Date().toISOString(),activityLog:nl,_isNew:!f.id})}} style={{padding:"10px 20px",borderRadius:"var(--radius)",background:"var(--gold)",color:"var(--bg)",fontSize:13,fontWeight:700}}>{lead?"Enregistrer":"Ajouter"}</button>
</div></div>}

function VForm({lead,onSave,onX,IS}){const[st,setSt]=useState(lead?.verifStatus||"pending");const[n,setN]=useState(lead?.verifNote||"");if(!lead)return null;
return <div><div style={{display:"flex",justifyContent:"space-between",marginBottom:12}}><h3 style={{fontFamily:"var(--serif)",fontSize:16}}>Vérification — {lead.nom}</h3><button onClick={onX} style={{color:"var(--text3)"}}><i className="fa-solid fa-xmark"/></button></div>
<FF l="Statut"><div style={{display:"flex",gap:4}}>{VERIFS.filter(v=>v.id!=="none").map(v=><button key={v.id} onClick={()=>setSt(v.id)} style={{flex:1,padding:8,borderRadius:"var(--radius)",border:"1px solid "+(st===v.id?(v.color||"var(--border)"):"var(--border)"),color:st===v.id?(v.color||"var(--text)"):"var(--text2)",background:st===v.id?(v.color||"")+"10":"transparent",fontSize:12,fontWeight:600}}>{v.label}</button>)}</div></FF>
<FF l="Note"><textarea style={{...IS,height:50}} value={n} onChange={e=>setN(e.target.value)}/></FF>
<div style={{display:"flex",gap:6,justifyContent:"flex-end"}}><button onClick={onX} style={{padding:"10px 16px",borderRadius:"var(--radius)",border:"1px solid var(--border)",color:"var(--text2)",fontSize:12}}>Annuler</button><button onClick={()=>onSave(lead.id,st,n)} style={{padding:"10px 20px",borderRadius:"var(--radius)",background:"var(--gold)",color:"var(--bg)",fontSize:13,fontWeight:700}}>Confirmer</button></div></div>}

function PForm({presta,onSave,onDel,onX,IS}){
const[f,setF]=useState(presta?{...presta}:{nom:"",specialite:SPECIALITES[0],contact:"",email:"",notes:"",portfolio:"",tjm:""});const s=(k,v)=>setF(p=>({...p,[k]:v}));
return <div><div style={{display:"flex",justifyContent:"space-between",marginBottom:12}}><h3 style={{fontFamily:"var(--serif)",fontSize:16}}>{presta?"Modifier — "+presta.nom:"Nouveau Prestataire"}</h3><button onClick={onX} style={{color:"var(--text3)"}}><i className="fa-solid fa-xmark"/></button></div><div className="sep"/>
<FF l="Nom"><input style={IS} value={f.nom} onChange={e=>s("nom",e.target.value)}/></FF>
<FF l="Spécialité"><select style={IS} value={f.specialite} onChange={e=>s("specialite",e.target.value)}>{SPECIALITES.map(v=><option key={v}>{v}</option>)}</select></FF>
<div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}><FF l="Téléphone"><input style={IS} value={f.contact} onChange={e=>s("contact",e.target.value)} type="tel"/></FF><FF l="Email"><input style={IS} value={f.email} onChange={e=>s("email",e.target.value)} type="email"/></FF></div>
<div style={{display:"grid",gridTemplateColumns:"2fr 1fr",gap:8}}><FF l="Portfolio"><input style={IS} value={f.portfolio||""} onChange={e=>s("portfolio",e.target.value)}/></FF><FF l="TJM €"><input style={IS} type="number" value={f.tjm||""} onChange={e=>s("tjm",e.target.value)}/></FF></div>
<FF l="Notes"><textarea style={{...IS,height:50}} value={f.notes} onChange={e=>s("notes",e.target.value)}/></FF><div className="sep"/>
<div style={{display:"flex",gap:6,justifyContent:"flex-end",flexWrap:"wrap"}}>
  {onDel&&<button onClick={onDel} style={{padding:"10px 14px",borderRadius:"var(--radius)",border:"1px solid var(--red)",color:"var(--red)",fontSize:12,fontWeight:600,marginRight:"auto"}}>Supprimer</button>}
  <button onClick={onX} style={{padding:"10px 16px",borderRadius:"var(--radius)",border:"1px solid var(--border)",color:"var(--text2)",fontSize:12}}>Annuler</button>
  <button onClick={()=>{if(!f.nom.trim())return;onSave({...f,id:f.id||uid(),_isNew:!f.id})}} style={{padding:"10px 20px",borderRadius:"var(--radius)",background:"var(--gold)",color:"var(--bg)",fontSize:13,fontWeight:700}}>{presta?"Enregistrer":"Ajouter"}</button>
</div></div>}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
