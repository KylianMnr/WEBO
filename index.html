<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%}
body{background:#06060e;color:#b0b0c0;font-family:'DM Sans',-apple-system,sans-serif;min-height:100vh;min-height:100dvh;overflow-x:hidden;-webkit-font-smoothing:antialiased}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.fu{animation:fadeUp .3s ease-out both}
.blink{animation:blink 1s ease-in-out infinite}
.kcol{transition:all .2s}.kcol.over{background:rgba(220,38,38,.05)!important}
.kc{transition:all .15s;cursor:grab}.kc:hover{transform:translateY(-2px);box-shadow:0 8px 20px rgba(0,0,0,.4)}.kc:active{cursor:grabbing}
::-webkit-scrollbar{width:4px;height:4px}::-webkit-scrollbar-thumb{background:#1a1a2a;border-radius:3px}
button{font-family:inherit;-webkit-tap-highlight-color:transparent}
select,input,textarea{font-family:inherit;font-size:16px}
.overlay{position:fixed;inset:0;z-index:1000;display:flex;align-items:flex-end;justify-content:center}
.overlay-bg{position:absolute;inset:0;background:rgba(0,0,0,.78);backdrop-filter:blur(5px)}

.sync-dot.on{background:#34d399;box-shadow:0 0 6px #34d39966}
.sync-dot.off{background:#ef4444;box-shadow:0 0 6px #ef444466}
.sync-dot.loading{background:#fbbf24;animation:pulse 1s infinite}
.ai-msg{padding:12px 14px;border-radius:10px;font-size:13px;line-height:1.7;white-space:pre-wrap;word-wrap:break-word}
.ai-msg.user{background:#DC262618;border:1px solid #DC262625;color:#dddde8;margin-left:20px}
.ai-msg.bot{background:#818cf808;border:1px solid #818cf815;color:#b0b0c0;margin-right:20px}
.ai-msg strong{color:#fff}.ai-msg em{color:#818cf8}
.ai-typing{display:inline-flex;gap:4px;padding:8px 14px}
.ai-typing span{width:6px;height:6px;border-radius:50%;background:#818cf8;animation:pulse 1s infinite}
.ai-typing span:nth-child(2){animation-delay:.2s}.ai-typing span:nth-child(3){animation-delay:.4s}
.ai-action{padding:10px 14px;border-radius:10px;border:1px solid #1a1a2a;background:#09091a;color:#b0b0c0;font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:8px;text-align:left;width:100%}
.ai-action:hover{border-color:#818cf840;background:#818cf808}
.tab-bar{display:flex;gap:2px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;padding:2px;background:#06060e;border-radius:8px;flex-shrink:0}
.tab-bar::-webkit-scrollbar{display:none}
.tab-btn{padding:7px 12px;border-radius:6px;border:none;background:transparent;color:#555;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;display:flex;align-items:center;gap:4px;flex-shrink:0}
.tab-btn.active{background:#141428;color:#fff}
.m-card{background:#09091a;border:1px solid #111122;border-radius:10px;padding:14px;cursor:pointer}
.m-card:active{background:#0d0d1a}
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;padding:10px 14px}
.kanban-scroll{display:flex;gap:8px;overflow-x:auto;-webkit-overflow-scrolling:touch;padding:0 14px 14px;scroll-snap-type:x mandatory}
.kanban-scroll::-webkit-scrollbar{display:none}
.kanban-col{min-width:260px;max-width:300px;flex-shrink:0;scroll-snap-align:start}
.cards-grid{display:grid;grid-template-columns:1fr;gap:8px}
@media(min-width:640px){.cards-grid{grid-template-columns:repeat(2,1fr)}}
@media(min-width:1024px){.cards-grid{grid-template-columns:repeat(3,1fr)}}
@media(min-width:768px){
  .stats-grid{grid-template-columns:repeat(7,1fr);padding:12px 20px;gap:8px}
  .overlay{align-items:center}
  .modal{border-radius:14px;max-height:88vh}
  .kanban-scroll{padding:0 20px 20px}
  .kanban-col{min-width:0;max-width:none;flex:1}
}
@media(max-width:639px){
  .stats-grid .stat-7,.stats-grid .stat-6,.stats-grid .stat-5{display:none}
  select,input,textarea{font-size:16px!important}
}

const eur=n=>new Intl.NumberFormat("fr-FR",{style:"currency",currency:"EUR",minimumFractionDigits:0,maximumFractionDigits:0}).format(n||0);

const fAgo=h=>{if(!h)return"";if(h<1)return"<1h";if(h<24)return Math.floor(h)+"h";return Math.floor(h/24)+"j"};
const dUntil=iso=>{if(!iso)return null;return Math.ceil((new Date(iso+"T23:59:59").getTime()-Date.now())/8.64e7)};

const mN=id=>TEAM.find(t=>t.id===id)?.name||id;

const addD=(d,n)=>{const x=new Date(d);x.setDate(x.getDate()+n);return x.toISOString().slice(0,10)};

function Dot({id,sz=18}){const m=TEAM.find(t=>t.id===id);if(!m)return null;return <div title={m.name} style={{width:sz,height:sz,borderRadius:"50%",background:m.color+"20",border:"2px solid "+m.color,display:"flex",alignItems:"center",justifyContent:"center",fontSize:sz*.5,fontWeight:800,color:m.color,fontFamily:"'Outfit'",flexShrink:0}}>{m.name[0]}</div>}
function StaleTag({li,st}){if(["signe","injoignable"].includes(st))return null;const h=hAgo(li);if(!h||h<48)return null;const c=h>=120?"#ef4444":h>=72?"#fb923c":"#fbbf24";const l=h>=120?"CRITIQUE":h>=72?"EN DANGER":"DORMANT";return <span style={{display:"inline-flex",alignItems:"center",gap:3,padding:"2px 7px",borderRadius:4,background:c+"14",fontSize:10,fontWeight:700,color:c,border:"1px solid "+c+"25"}}><span style={{width:5,height:5,borderRadius:"50%",background:c}}/> {fAgo(h)} · {l}</span>}
function RelanceTag({nr,st}){if(!nr||["signe","injoignable"].includes(st))return null;const d=dUntil(nr);if(d===null)return null;if(d<0)return <span className="blink" style={{fontSize:10,fontWeight:700,color:"#ef4444",background:"#ef444418",padding:"2px 7px",borderRadius:4}}>⏰ J{d}</span>;if(d===0)return <span style={{fontSize:10,fontWeight:700,color:"#fbbf24",background:"#fbbf2418",padding:"2px 7px",borderRadius:4}}>Aujourd'hui</span>;return <span style={{fontSize:10,fontWeight:600,color:"#3a3a4a",background:"#0e0e1a",padding:"2px 7px",borderRadius:4}}>J+{d}</span>}
function Tent({n}){if(!n)return null;const c=n>=4?"#ef4444":n>=2?"#fb923c":"#3a3a4a";return <span style={{fontSize:10,fontWeight:700,color:c,fontFamily:"'DM Mono'"}}>{n}×</span>}
function VBadge({s}){const v=VERIFS.find(x=>x.id===s);if(!v||s==="none")return null;return <span style={{fontSize:10,fontWeight:700,color:v.color,background:v.color+"15",padding:"2px 7px",borderRadius:4}}>{v.label}</span>}
function FF({l,children}){return <div style={{marginBottom:10}}><label style={{display:"block",fontSize:10,fontWeight:700,color:"#3a3a4a",marginBottom:4,letterSpacing:1,fontFamily:"'DM Mono'"}}>{l}</label>{children}</div>}

function doExportCSV(leads){const h=["Nom","Service","Statut","Valeur HT","Commission 20%","Prospecteur","Source","Tentatives","Prochaine Relance","Raison Echec","Notes"];const rows=leads.map(l=>[l.nom,l.service,COLS.find(c=>c.id===l.status)?.label||"",l.valeur,Math.round(l.valeur*.2),mN(l.memberId),l.source||"",l.tentatives||0,l.nextRelance||"",l.echecReason||"",'"'+(l.notes||"").replace(/"/g,'""')+'"']);const csv=[h.join(";"),...rows.map(r=>r.join(";"))].join("\n");const blob=new Blob(["\uFEFF"+csv],{type:"text/csv;charset=utf-8"});const url=URL.createObjectURL(blob);const a=document.createElement("a");a.href=url;a.download="webo-export-"+td()+".csv";a.click();URL.revokeObjectURL(url)}

function LeadCard({lead,onClick,extra}){const col=COLS.find(c=>c.id===lead.status);const h=hAgo(lead.lastInteraction);const isS=!["signe","injoignable"].includes(lead.status)&&h>=48;const isOD=lead.nextRelance&&!["signe","injoignable"].includes(lead.status)&&dUntil(lead.nextRelance)<0;
return <div className="m-card fu" onClick={()=>onClick&&onClick(lead.id)} style={{borderLeft:"3px solid "+(isOD?"#ef4444":isS?(h>=120?"#ef4444":h>=72?"#fb923c":"#fbbf24"):col?.accent+"40")}}>
<div style={{display:"flex",alignItems:"center",gap:8,marginBottom:6}}><Dot id={lead.memberId}/><div style={{flex:1,minWidth:0}}><div style={{fontWeight:700,color:"#dddde8",fontSize:14,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{lead.nom}</div><div style={{display:"flex",alignItems:"center",gap:6,marginTop:2,flexWrap:"wrap"}}><span style={{fontSize:11,color:col?.accent,fontWeight:600}}>{col?.icon} {col?.label}</span><span style={{fontSize:11,color:sC(lead.service),fontWeight:600}}>{lead.service}</span><Tent n={lead.tentatives}/></div></div><div style={{textAlign:"right",flexShrink:0}}><div style={{fontSize:16,fontWeight:800,color:"#DC2626",fontFamily:"'Outfit'"}}>{eur(lead.valeur)}</div>{lead.status==="signe"&&<div style={{fontSize:11,fontWeight:700,color:"#34d399",fontFamily:"'DM Mono'"}}>+{eur(lead.valeur*.2)}</div>}</div></div>
<div style={{display:"flex",flexWrap:"wrap",gap:4,alignItems:"center"}}>{lead.source&&lead.source!=="Autre"&&<span style={{fontSize:10,color:"#3a3a4a",background:"#0a0a12",padding:"2px 6px",borderRadius:4}}>{lead.source}</span>}<StaleTag li={lead.lastInteraction} st={lead.status}/><RelanceTag nr={lead.nextRelance} st={lead.status}/>{lead.status==="signe"&&!lead.paymentProof&&<span style={{fontSize:10,color:"#fb923c",fontWeight:700}}>⚠ Preuve</span>}{lead.status==="signe"&&<VBadge s={lead.verifStatus}/>}</div>
{extra&&<div style={{marginTop:8}}>{extra}</div>}</div>}

function App(){
const[leads,setLeads]=useState([]);const[ready,setReady]=useState(false);const[syncStatus,setSyncStatus]=useState("loading");const[view,setView]=useState("kanban");const[showForm,setShowForm]=useState(false);const[editId,setEditId]=useState(null);const[dragId,setDragId]=useState(null);const[dragOver,setDragOver]=useState(null);const[fM,setFM]=useState("all");const[fS,setFS]=useState("all");const[toast,setToast]=useState(null);const[showVerif,setShowVerif]=useState(null);const[showFilters,setShowFilters]=useState(false);const[now,setNow]=useState(Date.now());const[aiMessages,setAiMessages]=useState([]);const[aiInput,setAiInput]=useState("");const[aiLoading,setAiLoading]=useState(false);const[aiShowActions,setAiShowActions]=useState(true);const aiEndRef=useRef(null);

const buildContext=()=>{const sg=leads.filter(l=>l.status==="signe");const stale=leads.filter(l=>!["signe","injoignable"].includes(l.status)&&hAgo(l.lastInteraction)>=48);const overdue=leads.filter(l=>l.nextRelance&&!["signe","injoignable"].includes(l.status)&&dUntil(l.nextRelance)<0);const pipe=leads.filter(l=>!["signe","injoignable"].includes(l.status));const weighted=pipe.reduce((s,l)=>{const col=COLS.find(c=>c.id===l.status);return s+(l.valeur*(col?.proba||0))},0);
return "Tu es l assistant IA de WEBO, agence digitale de Kylian. Commission 20%.\nEQUIPE: Kylian (Gerant), Keddy (Prospecteur), Dylan (Prospecteur)\nPIPELINE: "+leads.length+" leads | "+sg.length+" signes ("+sg.reduce((s,l)=>s+l.valeur,0)+"EUR) | Pondere: "+Math.round(weighted)+"EUR | Dormants: "+stale.length+" | Overdue: "+overdue.length+"\nLEADS:\n"+leads.map(l=>"- "+l.nom+"|"+l.service+"|"+(COLS.find(c=>c.id===l.status)?.label)+"|"+l.valeur+"EUR|"+mN(l.memberId)+"|"+l.source+"|T:"+l.tentatives+"|"+(l.nextRelance?"R:"+l.nextRelance:"")+"|"+l.notes).join("\n")+"\nReponds en francais. Sois direct, concret, actionnable. Utilise des emojis."};

const askAI=async(prompt)=>{setAiMessages(p=>[...p,{role:"user",content:prompt}]);setAiInput("");setAiLoading(true);setAiShowActions(false);
try{const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,system:buildContext(),messages:[...aiMessages.slice(-8).map(m=>({role:m.role,content:m.content})),{role:"user",content:prompt}]})});const data=await res.json();const text=data.content?.map(b=>b.type==="text"?b.text:"").filter(Boolean).join("\n")||"Erreur.";setAiMessages(p=>[...p,{role:"assistant",content:text}])}catch(e){setAiMessages(p=>[...p,{role:"assistant",content:"Erreur connexion IA."}])}setAiLoading(false)};
useEffect(()=>{if(aiEndRef.current)aiEndRef.current.scrollIntoView({behavior:"smooth"})},[aiMessages,aiLoading]);

useEffect(()=>{if(!isConfigured){setSyncStatus("off");setReady(true);return}(async()=>{setSyncStatus("loading");const{data,error}=await supabase.from("leads").select("*");if(error){setSyncStatus("off");setReady(true);return}setLeads((data||[]).map(dbToLead));setSyncStatus("on");setReady(true)})()},[]);
useEffect(()=>{if(!isConfigured)return;const ch=supabase.channel("leads-rt").on("postgres_changes",{event:"INSERT",schema:"public",table:"leads"},p=>{const n=dbToLead(p.new);setLeads(pr=>pr.some(l=>l.id===n.id)?pr:[...pr,n])}).on("postgres_changes",{event:"UPDATE",schema:"public",table:"leads"},p=>{const u=dbToLead(p.new);setLeads(pr=>pr.map(l=>l.id===u.id?u:l))}).on("postgres_changes",{event:"DELETE",schema:"public",table:"leads"},p=>{setLeads(pr=>pr.filter(l=>l.id!==p.old.id))}).subscribe(s=>{if(s==="SUBSCRIBED")setSyncStatus("on");else if(s==="CLOSED"||s==="CHANNEL_ERROR")setSyncStatus("off")});return()=>supabase.removeChannel(ch)},[]);
useEffect(()=>{const t=setInterval(()=>setNow(Date.now()),60000);return()=>clearInterval(t)},[]);
const flash=m=>{setToast(m);setTimeout(()=>setToast(null),2800)};

const upsertLead=useCallback(async(lead)=>{const clean={...lead};delete clean._isNew;setLeads(p=>p.some(x=>x.id===clean.id)?p.map(x=>x.id===clean.id?clean:x):[...p,clean]);setShowForm(false);setEditId(null);flash(lead._isNew?"Lead ajouté ✓":"Mis à jour ✓");if(isConfigured){const{error}=await supabase.from("leads").upsert(leadToDb(clean));if(error)flash("⚠ Erreur sync")}},[]);
const deleteLead=useCallback(async(id)=>{setLeads(p=>p.filter(l=>l.id!==id));setShowForm(false);setEditId(null);flash("Supprimé");if(isConfigured)await supabase.from("leads").delete().eq("id",id)},[]);
const touchLead=useCallback(async(id)=>{setLeads(p=>p.map(l=>l.id===id?{...l,lastInteraction:new Date().toISOString(),tentatives:(l.tentatives||0)+1}:l));if(isConfigured){const lead=leads.find(l=>l.id===id);if(lead)await supabase.from("leads").update({last_interaction:new Date().toISOString(),tentatives:(lead.tentatives||0)+1}).eq("id",id)}},[leads]);
const updateField=useCallback(async(id,fields)=>{setLeads(p=>p.map(l=>l.id===id?{...l,...fields}:l));if(isConfigured){const db={};if("status" in fields)db.status=fields.status;if("lastInteraction" in fields)db.last_interaction=fields.lastInteraction;if("tentatives" in fields)db.tentatives=fields.tentatives;if("nextRelance" in fields)db.next_relance=fields.nextRelance;if("verifStatus" in fields)db.verif_status=fields.verifStatus;if("verifNote" in fields)db.verif_note=fields.verifNote;if("verifDate" in fields)db.verif_date=fields.verifDate;await supabase.from("leads").update(db).eq("id",id)}},[]);
const updVerif=useCallback(async(id,vs,vn)=>{setLeads(p=>p.map(l=>l.id===id?{...l,verifStatus:vs,verifNote:vn,verifDate:td()}:l));setShowVerif(null);flash("Vérification ✓");if(isConfigured)await supabase.from("leads").update({verif_status:vs,verif_note:vn,verif_date:td()}).eq("id",id)},[]);

const onDS=(e,id)=>{setDragId(id);e.dataTransfer.effectAllowed="move";e.dataTransfer.setData("text/plain",id)};const onDE=()=>{setDragId(null);setDragOver(null)};

<div style={{background:"linear-gradient(135deg,#1a0808,#09091a)",border:"1px solid #DC262625",borderRadius:10,padding:16,display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:8}}>
  <div><div style={{fontSize:10,color:"#DC2626",fontWeight:700,fontFamily:"'DM Mono'"}}>TOTAL COMMISSIONS</div><div style={{fontSize:24,fontWeight:900,color:"#DC2626",fontFamily:"'Outfit'"}}>{eur(stats.commission)}</div></div>
  <div style={{textAlign:"right"}}><div style={{fontSize:10,color:"#3a3a4a",fontFamily:"'DM Mono'"}}>PIPELINE PONDÉRÉ</div><div style={{fontSize:18,fontWeight:800,color:"#c084fc",fontFamily:"'Outfit'"}}>{eur(stats.weighted)}</div></div>
</div>
</div>}

{/* ROI */}
{view==="roi"&&<div className="fu" style={{padding:"0 "+px+" "+px}}>
<h2 style={{fontSize:16,fontWeight:800,color:"#fff",fontFamily:"'Outfit'",marginBottom:12}}>📊 ROI par Source</h2>
<div className="cards-grid">{stats.bySrc.map((s,i)=>{const maxC=Math.max(...stats.bySrc.map(x=>x.com),1);const pct=Math.round(s.com/maxC*100);
return <div key={s.source} className="fu" style={{animationDelay:i*50+"ms",background:"#09091a",border:"1px solid #111122",borderRadius:10,padding:14}}>
  <div style={{fontSize:14,fontWeight:700,color:"#fff",fontFamily:"'Outfit'",marginBottom:10}}>{s.source}</div>
  <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:6,marginBottom:10}}>
    {[{l:"LEADS",v:s.total,c:"#818cf8"},{l:"SIGNÉS",v:s.signes,c:"#34d399"},{l:"TAUX",v:s.rate+"%",c:s.rate>=30?"#34d399":"#f87171"},{l:"CA",v:eur(s.ca),c:"#DC2626"}].map(x=><div key={x.l}><div style={{fontSize:8,color:"#3a3a4a",fontFamily:"'DM Mono'"}}>{x.l}</div><div style={{fontSize:14,fontWeight:900,color:x.c,fontFamily:"'Outfit'"}}>{x.v}</div></div>)}
  </div>
  <div style={{marginBottom:6}}><div style={{height:5,borderRadius:3,background:"#111122",overflow:"hidden"}}><div style={{width:pct+"%",height:"100%",borderRadius:3,background:s.com>0?"#DC2626":"#1a1a2a"}}/></div></div>
  <div style={{display:"flex",justifyContent:"space-between"}}><span style={{fontSize:10,color:"#4a4a5a",fontFamily:"'DM Mono'"}}>{pct}%</span><span style={{fontSize:15,fontWeight:800,color:"#DC2626",fontFamily:"'Outfit'"}}>+{eur(s.com)}</span></div>
</div>})}</div></div>}

{/* AGENT IA */}
{view==="ia"&&<div className="fu" style={{padding:"0 "+px,display:"flex",flexDirection:"column",flex:1,minHeight:0}}>
{aiShowActions&&<div style={{marginBottom:8}}>
<div style={{fontSize:11,fontWeight:700,color:"#818cf8",fontFamily:"'DM Mono'",marginBottom:6}}>⚡ ACTIONS RAPIDES</div>
<div style={{display:"grid",gridTemplateColumns:"repeat(2,1fr)",gap:6}}>
{[
{e:"📊",t:"Analyse pipeline",p:"Fais une analyse complète du pipeline. Points forts, risques, 3 actions prioritaires."},
{e:"🎯",t:"Plan semaine",p:"Plan d action hebdo pour Keddy et Dylan. Actions urgentes par prospecteur."},
{e:"✉️",t:"Messages relance",p:"Redige un message de relance personnalise pour chaque lead en retard. Adapte au canal."},
{e:"🧲",t:"Templates prospection",p:"3 templates cold outreach par service pour DM Instagram et Email froid."},
{e:"📉",t:"Analyse échecs",p:"Analyse les leads injoignables et patterns d echec. Propose des solutions."},
{e:"🏆",t:"Coaching",p:"Compare Keddy et Dylan: conversion, vitesse, volume. Forces et axes d amelioration."},
{e:"🔮",t:"Prévisions CA",p:"Predis le CA 30 jours. Scenario optimiste, realiste, pessimiste."},
{e:"📋",t:"Brief équipe",p:"Redige le message de reunion hebdo. Resume, wins, objectifs semaine."},
].map(a=><button key={a.t} className="ai-action" onClick={()=>askAI(a.p)}><span style={{fontSize:16}}>{a.e}</span><div style={{fontSize:12,color:"#fff",fontWeight:700}}>{a.t}</div></button>)}
</div>
</div>}

<div style={{flex:1,minHeight:0,background:"#09091a",border:"1px solid #111122",borderRadius:10,display:"flex",flexDirection:"column",overflow:"hidden",marginBottom:14}}>
<div style={{padding:"10px 14px",borderBottom:"1px solid #111122",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
  <div style={{display:"flex",alignItems:"center",gap:6}}><span style={{fontSize:16}}>🤖</span><span style={{fontSize:13,fontWeight:700,color:"#fff",fontFamily:"'Outfit'"}}>Agent IA</span><span style={{width:6,height:6,borderRadius:"50%",background:"#34d399"}}/></div>
  <div style={{display:"flex",gap:6}}>
    <button onClick={()=>setAiShowActions(p=>!p)} style={{padding:"4px 8px",borderRadius:5,border:"1px solid #1a1a2a",background:aiShowActions?"#141428":"transparent",color:aiShowActions?"#818cf8":"#444",fontSize:10,fontWeight:600,cursor:"pointer"}}>⚡</button>
    <button onClick={()=>{setAiMessages([]);setAiShowActions(true)}} style={{padding:"4px 8px",borderRadius:5,border:"1px solid #1a1a2a",background:"transparent",color:"#3a3a4a",fontSize:10,fontWeight:600,cursor:"pointer"}}>🗑</button>
  </div>
</div>
<div style={{flex:1,overflowY:"auto",padding:12,display:"flex",flexDirection:"column",gap:8}}>
  {aiMessages.length===0&&<div style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",color:"#2a2a3a",padding:20}}>
    <div style={{fontSize:40,marginBottom:8}}>🤖</div>
    <div style={{fontSize:12,color:"#2a2a3a",textAlign:"center",lineHeight:1.6}}>Clique une action ou pose ta question.</div>
  </div>}
  {aiMessages.map((m,i)=><div key={i} className={"ai-msg fu "+(m.role==="user"?"user":"bot")}>
    {m.role==="assistant"&&<div style={{fontSize:9,fontWeight:700,color:"#818cf8",marginBottom:4,fontFamily:"'DM Mono'"}}>🤖 AGENT IA</div>}
    {m.content}
  </div>)}
  {aiLoading&&<div className="ai-msg bot fu"><div className="ai-typing"><span/><span/><span/></div></div>}
  <div ref={aiEndRef}/>
</div>
<div style={{padding:"10px 12px",borderTop:"1px solid #111122",display:"flex",gap:6}}>
  <input value={aiInput} onChange={e=>setAiInput(e.target.value)} onKeyDown={e=>{if(e.key==="Enter"&&aiInput.trim()&&!aiLoading)askAI(aiInput.trim())}}
    placeholder="Pose ta question..." style={{flex:1,padding:"10px 12px",borderRadius:8,border:"1px solid #1a1a2a",background:"#06060e",color:"#dddde8",fontSize:16,outline:"none",fontFamily:"'DM Sans'"}}/>
  <button onClick={()=>{if(aiInput.trim()&&!aiLoading)askAI(aiInput.trim())}} disabled={aiLoading||!aiInput.trim()}
    style={{padding:"10px 16px",borderRadius:8,border:"none",background:aiLoading?"#1a1a2a":"#818cf8",color:aiLoading?"#3a3a4a":"#fff",fontSize:14,fontWeight:700,cursor:aiLoading?"not-allowed":"pointer"}}>
    {aiLoading?"...":"→"}
  </button>
</div>
</div>
</div>}

{/* MODALS */}
{showForm&&<div className="overlay" onClick={closeForm}><div className="overlay-bg"/><div className="modal fu" onClick={e=>e.stopPropagation()}>
<LeadForm lead={editId?leads.find(l=>l.id===editId):null} onSave={upsertLead} onDel={editId?()=>deleteLead(editId):null} onX={closeForm} IS={IS}/>
</div></div>}
{showVerif&&<div className="overlay" onClick={()=>setShowVerif(null)}><div className="overlay-bg"/><div className="modal fu" style={{maxWidth:500}} onClick={e=>e.stopPropagation()}>
<VerifForm lead={leads.find(l=>l.id===showVerif)} onSave={updVerif} onX={()=>setShowVerif(null)} IS={IS}/>
</div></div>}
{toast&&<div className="fu" style={{position:"fixed",bottom:20,left:"50%",transform:"translateX(-50%)",zIndex:2000,background:"#111122",border:"1px solid #DC262635",borderRadius:8,padding:"10px 18px",color:"#dddde8",fontSize:13,fontWeight:600,boxShadow:"0 10px 30px rgba(0,0,0,.5)",whiteSpace:"nowrap"}}>{toast}</div>}
</div>);
}

function LeadForm({lead,onSave,onDel,onX,IS}){
const[f,setF]=useState(lead?{...lead}:{nom:"",service:SERVICES[0],valeur:"",memberId:"keddy",lien:"",status:"nouveau",dateCreated:td(),lastInteraction:new Date().toISOString(),nextRelance:addD(td(),2),notes:"",source:SOURCES[0],echecReason:"—",tentatives:0,paymentProof:"",verifStatus:"none",verifNote:""});
const s=(k,v)=>setF(p=>({...p,[k]:v}));const col=COLS.find(c=>c.id===f.status);
return <div>
<div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14}}>
  <h3 style={{margin:0,fontSize:17,fontWeight:800,color:"#fff",fontFamily:"'Outfit'"}}>{lead?"✎ "+lead.nom:"✦ Nouveau Lead"}</h3>
  <button onClick={onX} style={{background:"none",border:"none",color:"#555",fontSize:22,cursor:"pointer",padding:4}}>✕</button>
</div>
<FF l="Nom entreprise"><input style={IS} value={f.nom} onChange={e=>s("nom",e.target.value)} placeholder="Studio Lumière"/></FF>
<div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
  <FF l="Service"><select style={{...IS,cursor:"pointer"}} value={f.service} onChange={e=>s("service",e.target.value)}>{SERVICES.map(sv=><option key={sv}>{sv}</option>)}</select></FF>
  <FF l="Valeur HT (€)"><input style={IS} type="number" value={f.valeur} onChange={e=>s("valeur",e.target.value)} placeholder="2500"/></FF>
</div>
<div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
  <FF l="Prospecteur"><select style={{...IS,cursor:"pointer"}} value={f.memberId} onChange={e=>s("memberId",e.target.value)}>{TEAM.map(m=><option key={m.id} value={m.id}>{m.name}</option>)}</select></FF>
  <FF l="Source"><select style={{...IS,cursor:"pointer"}} value={f.source} onChange={e=>s("source",e.target.value)}>{SOURCES.map(src=><option key={src}>{src}</option>)}</select></FF>
</div>
<div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
  <FF l="Statut"><select style={{...IS,cursor:"pointer"}} value={f.status} onChange={e=>s("status",e.target.value)}>{COLS.map(c=><option key={c.id} value={c.id}>{c.icon} {c.label}</option>)}</select></FF>
  <FF l="Prochaine relance"><input style={IS} type="date" value={f.nextRelance} onChange={e=>s("nextRelance",e.target.value)}/></FF>
</div>
<FF l="Notes"><textarea style={{...IS,height:60,resize:"vertical"}} value={f.notes} onChange={e=>s("notes",e.target.value)} placeholder="Contexte..."/></FF>
{(f.status==="signe"||lead?.status==="signe")&&<FF l="Preuve paiement"><input style={IS} value={f.paymentProof} onChange={e=>s("paymentProof",e.target.value)} placeholder="Lien Stripe, virement..."/>{!f.paymentProof&&<div style={{fontSize:11,color:"#fb923c",marginTop:3}}>⚠ Obligatoire</div>}</FF>}
{(f.status==="injoignable"||lead?.status==="injoignable")&&<FF l="Raison échec"><select style={{...IS,cursor:"pointer"}} value={f.echecReason} onChange={e=>s("echecReason",e.target.value)}>{ECHECS.map(r=><option key={r}>{r}</option>)}</select></FF>}
{f.valeur&&Number(f.valeur)>0&&<div style={{background:"#DC262610",border:"1px solid #DC262620",borderRadius:8,padding:"10px 14px",marginBottom:10,display:"flex",justifyContent:"space-between",alignItems:"center"}}><span style={{fontSize:12,color:"#DC2626",fontWeight:600}}>Commission 20%</span><div style={{textAlign:"right"}}><div style={{fontSize:16,fontWeight:800,color:"#DC2626",fontFamily:"'Outfit'"}}>{eur(Number(f.valeur)*.2)}</div>{f.status!=="signe"&&col&&<div style={{fontSize:10,color:"#c084fc"}}>Pondéré: {eur(Number(f.valeur)*col.proba)}</div>}</div></div>}
<div style={{display:"flex",gap:8,justifyContent:"flex-end",marginTop:14,flexWrap:"wrap"}}>
  {onDel&&<button onClick={onDel} style={{padding:"10px 14px",borderRadius:8,border:"1px solid #ef444425",background:"transparent",color:"#ef4444",fontSize:12,fontWeight:700,cursor:"pointer",marginRight:"auto"}}>Supprimer</button>}
  <button onClick={onX} style={{padding:"10px 16px",borderRadius:8,border:"1px solid #1a1a2a",background:"transparent",color:"#555",fontSize:12,fontWeight:600,cursor:"pointer"}}>Annuler</button>
  <button onClick={()=>{if(!f.nom.trim())return;onSave({...f,id:f.id||uid(),valeur:Number(f.valeur)||0,lastInteraction:new Date().toISOString(),_isNew:!f.id})}} style={{padding:"10px 20px",borderRadius:8,border:"none",background:"#DC2626",color:"#fff",fontSize:13,fontWeight:700,cursor:"pointer"}}>{lead?"Enregistrer":"Ajouter"}</button>
</div></div>}

function VerifForm({lead,onSave,onX,IS}){
const[st,setSt]=useState(lead?.verifStatus||"pending");const[note,setNote]=useState(lead?.verifNote||"");
if(!lead)return null;
return <div>
<div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14}}><h3 style={{margin:0,fontSize:16,fontWeight:800,color:"#fff",fontFamily:"'Outfit'"}}>🛡 {lead.nom}</h3><button onClick={onX} style={{background:"none",border:"none",color:"#555",fontSize:22,cursor:"pointer"}}>✕</button></div>
<FF l="Statut"><div style={{display:"flex",gap:6,flexWrap:"wrap"}}>{VERIFS.filter(v=>v.id!=="none").map(v=><button key={v.id} onClick={()=>setSt(v.id)} style={{flex:1,minWidth:80,padding:"10px",borderRadius:7,border:"1px solid "+(st===v.id?v.color:"#1a1a2a"),background:st===v.id?v.color+"15":"transparent",color:st===v.id?v.color:"#3a3a4a",fontSize:12,fontWeight:700,cursor:"pointer"}}>{v.label}</button>)}</div></FF>
<FF l="Note"><textarea style={{...IS,height:60,resize:"vertical"}} value={note} onChange={e=>setNote(e.target.value)} placeholder="Client confirme..."/></FF>
<div style={{display:"flex",gap:8,justifyContent:"flex-end",marginTop:14}}>
  <button onClick={onX} style={{padding:"10px 16px",borderRadius:8,border:"1px solid #1a1a2a",background:"transparent",color:"#555",fontSize:12,fontWeight:600,cursor:"pointer"}}>Annuler</button>
  <button onClick={()=>onSave(lead.id,st,note)} style={{padding:"10px 20px",borderRadius:8,border:"none",background:"#fbbf24",color:"#06060e",fontSize:13,fontWeight:800,cursor:"pointer"}}>Enregistrer</button>
</div></div>}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
