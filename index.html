.ai-msg{padding:12px 14px;border-radius:14px;font-size:13px;line-height:1.7;white-space:pre-wrap;word-wrap:break-word}
.ai-msg.user{background:#DC262610;border:1px solid #DC262618;color:#d0d0e0;margin-left:16px}

.ai-typing{display:inline-flex;gap:4px;padding:8px 14px}.ai-typing span{width:5px;height:5px;border-radius:50%;background:#818cf8;animation:pulse 1s infinite}.ai-typing span:nth-child(2){animation-delay:.2s}.ai-typing span:nth-child(3){animation-delay:.4s}

function genBrief(lead,prestaName,memberName){
  const col=COLS.find(c=>c.id===lead.status);
  const L=["📋 *BRIEF — "+lead.nom+"*","","🎯 Service : "+lead.service,"💰 Budget : "+eur(lead.valeur)+" HT","📊 Statut : "+(col?col.label:""),"👤 Prospecteur : "+memberName,"📡 Source : "+(lead.source||"—")];
  if(prestaName)L.push("🤝 Prestataire : "+prestaName);
  if(lead.nextRelance)L.push("📅 Relance : "+lead.nextRelance);
  if(lead.notes){L.push("");L.push("📝 Notes :");L.push(lead.notes)}
  L.push("");L.push("—");L.push("Envoyé depuis WEBO Tracker");
  return L.join("\n");
}

function Dot({id,sz=18}){const m=TEAM.find(t=>t.id===id);if(!m)return null;return <div title={m.name} style={{width:sz,height:sz,borderRadius:"50%",background:m.color+"15",border:"1.5px solid "+m.color+"80",display:"flex",alignItems:"center",justifyContent:"center",fontSize:sz*.45,fontWeight:700,color:m.color,flexShrink:0}}>{m.name[0]}</div>}

function RelanceTag({nr,st}){if(!nr||["signe","injoignable"].includes(st))return null;const d=dUntil(nr);if(d===null)return null;if(d<0)return <span className="blink" style={{fontSize:10,fontWeight:600,color:"#ef4444",background:"#ef444410",padding:"2px 7px",borderRadius:5}}>⏰ J{d}</span>;if(d===0)return <span style={{fontSize:10,fontWeight:600,color:"#fbbf24",background:"#fbbf2410",padding:"2px 7px",borderRadius:5}}>Aujourd'hui</span>;return <span style={{fontSize:10,fontWeight:500,color:"#2a2a40",background:"#0a0a14",padding:"2px 7px",borderRadius:5}}>J+{d}</span>}

function SignedAlert({dateCreated,status}){if(status!=="signe"||!dateCreated)return null;const days=dAgo(dateCreated);if(!days||days<30)return null;return <span className="glow30" style={{display:"inline-flex",alignItems:"center",gap:3,padding:"2px 8px",borderRadius:5,background:"#ef444410",fontSize:10,fontWeight:600,color:"#ef4444"}}>🔄 {Math.floor(days)}j</span>}

function doExportCSV(leads){const h=["Nom","Service","Statut","Valeur","Commission","Prospecteur","Source","Tentatives","Relance","Echec","Notes"];const rows=leads.map(l=>[l.nom,l.service,COLS.find(c=>c.id===l.status)?.label||"",l.valeur,Math.round(l.valeur*.2),mN(l.memberId),l.source||"",l.tentatives||0,l.nextRelance||"",l.echecReason||"",'"'+(l.notes||"").replace(/"/g,'""')+'"']);const csv=[h.join(";"),...rows.map(r=>r.join(";"))].join("\n");const blob=new Blob(["\uFEFF"+csv],{type:"text/csv;charset=utf-8"});const url=URL.createObjectURL(blob);const a=document.createElement("a");a.href=url;a.download="webo-"+td()+".csv";a.click();URL.revokeObjectURL(url)}

function App(){

const isAdmin=TEAM.find(t=>t.id===session)?.isAdmin||false;
const sessionUser=TEAM.find(t=>t.id===session);
const[leads,setLeads]=useState([]);const[prestas,setPrestas]=useState([]);const[ready,setReady]=useState(false);const[syncStatus,setSyncStatus]=useState("loading");
const[mainTab,setMainTab]=useState("leads");const[view,setView]=useState("kanban");const[showForm,setShowForm]=useState(false);const[editId,setEditId]=useState(null);
const[dragId,setDragId]=useState(null);const[dragOver,setDragOver]=useState(null);const[fM,setFM]=useState("all");const[fS,setFS]=useState("all");
const[toast,setToast]=useState(null);const[showVerif,setShowVerif]=useState(null);const[showFilters,setShowFilters]=useState(false);

const[now,setNow]=useState(Date.now());const[aiMessages,setAiMessages]=useState([]);const[aiInput,setAiInput]=useState("");

const pN=id=>{const p=prestas.find(x=>x.id===id);return p?p.nom:""};

const shareBrief=(lead)=>{const presta=lead.prestaId?pN(lead.prestaId):"";const brief=genBrief(lead,presta,mN(lead.memberId));if(navigator.share){navigator.share({title:"Brief — "+lead.nom,text:brief}).catch(()=>{})}else if(navigator.clipboard){navigator.clipboard.writeText(brief).then(()=>flash("Brief copié ✓")).catch(()=>{})}else{flash("Brief non supporté")}};

const buildContext=()=>{const sg=leads.filter(l=>l.status==="signe");const stale=leads.filter(l=>!["signe","injoignable"].includes(l.status)&&hAgo(l.lastInteraction)>=48);const overdue=leads.filter(l=>l.nextRelance&&!["signe","injoignable"].includes(l.status)&&dUntil(l.nextRelance)<0);const pipe=leads.filter(l=>!["signe","injoignable"].includes(l.status));const w=pipe.reduce((s,l)=>{const c=COLS.find(x=>x.id===l.status);return s+(l.valeur*(c?.proba||0))},0);return "Tu es l assistant IA de WEBO, agence digitale. Commission 20% HT. Equipe: Kylian (Gerant), Keddy+Dylan (Prospecteurs). "+leads.length+" leads | "+sg.length+" signes ("+sg.reduce((s,l)=>s+l.valeur,0)+"EUR) | Pondere:"+Math.round(w)+"EUR | Dormants:"+stale.length+" | Overdue:"+overdue.length+". Prestas:"+prestas.map(p=>p.nom+"("+p.specialite+")").join(",")+". LEADS:\n"+leads.map(l=>"- "+l.nom+"|"+l.service+"|"+(COLS.find(c=>c.id===l.status)?.label)+"|"+l.valeur+"EUR|"+mN(l.memberId)+"|"+l.source+"|T:"+l.tentatives+"|"+(l.prestaId?pN(l.prestaId):"—")+"|"+l.notes).join("\n")+"\nReponds en francais, concret et actionnable."};

/* SUPABASE INIT - with try/catch for missing prestataires table */
useEffect(()=>{if(!isConfigured){setSyncStatus("off");setReady(true);return}
(async()=>{setSyncStatus("loading");
try{
  const lr=await supabase.from("leads").select("*");
  setLeads((lr.data||[]).map(dbToLead));
  try{const pr=await supabase.from("prestataires").select("*");setPrestas(pr.data||[])}catch(e){console.log("prestataires table not found")}
  setSyncStatus(lr.error?"off":"on");
}catch(e){setSyncStatus("off");console.error(e)}
setReady(true)})()},[]);

useEffect(()=>{if(!isConfigured)return;
const ch=supabase.channel("rt")
  .on("postgres_changes",{event:"*",schema:"public",table:"leads"},p=>{
    if(p.eventType==="INSERT"){const n=dbToLead(p.new);setLeads(pr=>pr.some(l=>l.id===n.id)?pr:[...pr,n])}
    if(p.eventType==="UPDATE"){const u=dbToLead(p.new);setLeads(pr=>pr.map(l=>l.id===u.id?u:l))}
    if(p.eventType==="DELETE")setLeads(pr=>pr.filter(l=>l.id!==p.old.id))
  })
  .on("postgres_changes",{event:"*",schema:"public",table:"prestataires"},p=>{
    if(p.eventType==="INSERT"){const n=p.new;setPrestas(pr=>pr.some(x=>x.id===n.id)?pr:[...pr,n])}
    if(p.eventType==="UPDATE")setPrestas(pr=>pr.map(x=>x.id===p.new.id?p.new:x));
    if(p.eventType==="DELETE")setPrestas(pr=>pr.filter(x=>x.id!==p.old.id))
  })
  .subscribe(s=>{if(s==="SUBSCRIBED")setSyncStatus("on")});

  <div style={{width:32,height:32,borderRadius:10,background:"#818cf812",display:"flex",alignItems:"center",justifyContent:"center",fontSize:14,fontWeight:700,color:"#818cf8"}}>{selPresta.nom[0].toUpperCase()}</div>
  <div style={{flex:1}}><div style={{fontWeight:600,color:"#d0d0e0",fontSize:13}}>{selPresta.nom}</div><div style={{fontSize:11,color:"#818cf8aa"}}>{selPresta.specialite}{selPresta.contact?" · "+selPresta.contact:""}</div></div>
  <button onClick={()=>s("prestaId","")} style={{padding:"4px 8px",borderRadius:6,border:"1px solid #ef444418",background:"transparent",color:"#ef4444",fontSize:10,fontWeight:600}}>✕</button>
</div>:<div>
  <input value={prestaQ} onChange={e=>setPrestaQ(e.target.value)} placeholder={prestas.length>0?"Chercher un prestataire…":"Aucun prestataire créé"} style={{...IS,marginBottom:6,fontSize:14}}/>
  {prestas.length>0&&<div style={{maxHeight:140,overflowY:"auto",display:"flex",flexDirection:"column",gap:4,borderRadius:10,border:"1px solid #10102a",background:"#07070f",padding:4}}>
    {fPrestas.length===0&&<div style={{padding:12,textAlign:"center",color:"#2a2a40",fontSize:12}}>Aucun résultat</div>}
    {fPrestas.map(p=><button key={p.id} onClick={()=>{s("prestaId",p.id);setPrestaQ("")}} type="button" style={{display:"flex",alignItems:"center",gap:8,padding:"8px 10px",borderRadius:8,border:"none",background:"transparent",cursor:"pointer",textAlign:"left",width:"100%"}}>
      <div style={{width:28,height:28,borderRadius:8,background:"#818cf810",display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,fontWeight:700,color:"#818cf8",flexShrink:0}}>{p.nom[0].toUpperCase()}</div>
      <div style={{flex:1,minWidth:0}}><div style={{fontWeight:600,color:"#c0c0d0",fontSize:13}}>{p.nom}</div><div style={{fontSize:10,color:"#4a4a60"}}>{p.specialite}</div></div>
    </button>)}
  </div>}
</div>}
</FF>

<FF l="NOTES"><textarea style={{...IS,height:56,resize:"vertical",fontSize:14}} value={f.notes} onChange={e=>s("notes",e.target.value)} placeholder="Contexte, échanges…"/></FF>
{(f.status==="signe"||lead?.status==="signe")&&<FF l="PREUVE PAIEMENT"><input style={IS} value={f.paymentProof} onChange={e=>s("paymentProof",e.target.value)} placeholder="Lien Stripe, virement…"/>{!f.paymentProof&&<div style={{fontSize:11,color:"#fb923c",marginTop:4}}>⚠ Obligatoire</div>}</FF>}
{(f.status==="injoignable"||lead?.status==="injoignable")&&<FF l="RAISON ÉCHEC"><select style={IS} value={f.echecReason} onChange={e=>s("echecReason",e.target.value)}>{ECHECS.map(r=><option key={r}>{r}</option>)}</select></FF>}

{f.valeur&&Number(f.valeur)>0&&<div style={{background:"#DC262608",border:"1px solid #DC262615",borderRadius:12,padding:"12px 14px",marginBottom:12,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
  <div><div style={{fontSize:12,color:"#DC2626",fontWeight:500}}>Commission 20%</div>{col&&<div style={{fontSize:10,color:"#c084fcaa",marginTop:2}}>Prob: {Math.round(col.proba*100)}%</div>}</div>
  <div style={{textAlign:"right"}}><div style={{fontSize:16,fontWeight:700,color:"#DC2626"}}>{eur(Number(f.valeur)*.2)}</div>{f.status!=="signe"&&col&&<div style={{fontSize:10,color:"#c084fcaa"}}>Pondéré: {eur(Number(f.valeur)*col.proba)}</div>}</div>
</div>}

<div style={{display:"flex",gap:8,justifyContent:"flex-end",marginTop:16,flexWrap:"wrap"}}>
  {onDel&&<button onClick={onDel} style={{padding:"10px 14px",borderRadius:10,border:"1px solid #ef444418",background:"transparent",color:"#ef4444",fontSize:12,fontWeight:600,marginRight:"auto"}}>Supprimer</button>}
  <button onClick={onX} style={{padding:"10px 16px",borderRadius:10,border:"1px solid #10102a",background:"transparent",color:"#4a4a60",fontSize:12,fontWeight:500}}>Annuler</button>
  <button onClick={()=>{if(!f.nom.trim())return;onSave({...f,id:f.id||uid(),valeur:Number(f.valeur)||0,lastInteraction:new Date().toISOString(),_isNew:!f.id})}} style={{padding:"10px 22px",borderRadius:10,border:"none",background:"#DC2626",color:"#fff",fontSize:13,fontWeight:600}}>  {lead?"Enregistrer":"Ajouter"}</button>
</div></div>}

/* ═══ VERIF FORM ═══ */
function VerifForm({lead,onSave,onX,IS}){
const[st,setSt]=useState(lead?.verifStatus||"pending");const[note,setNote]=useState(lead?.verifNote||"");
if(!lead)return null;
return <div>
<div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:16}}><h3 style={{margin:0,fontSize:16,fontWeight:700,color:"#e8e8f0"}}>🛡 {lead.nom}</h3><button onClick={onX} style={{background:"none",border:"none",color:"#3a3a52",fontSize:20}}>✕</button></div>
<FF l="STATUT"><div style={{display:"flex",gap:6,flexWrap:"wrap"}}>{VERIFS.filter(v=>v.id!=="none").map(v=><button key={v.id} onClick={()=>setSt(v.id)} style={{flex:1,minWidth:80,padding:10,borderRadius:10,border:"1px solid "+(st===v.id?v.color+"40":"#10102a"),background:st===v.id?v.color+"10":"transparent",color:st===v.id?v.color:"#2a2a40",fontSize:12,fontWeight:600}}>{v.label}</button>)}</div></FF>
<FF l="NOTE"><textarea style={{...IS,height:56,resize:"vertical",fontSize:14}} value={note} onChange={e=>setNote(e.target.value)} placeholder="Client confirme…"/></FF>
<div style={{display:"flex",gap:8,justifyContent:"flex-end",marginTop:16}}>
  <button onClick={onX} style={{padding:"10px 16px",borderRadius:10,border:"1px solid #10102a",background:"transparent",color:"#4a4a60",fontSize:12}}>Annuler</button>
  <button onClick={()=>onSave(lead.id,st,note)} style={{padding:"10px 22px",borderRadius:10,border:"none",background:"#fbbf24",color:"#050509",fontSize:13,fontWeight:700}}>Enregistrer</button>
</div></div>}

/* ═══ PRESTA FORM ═══ */
function PrestaForm({presta,onSave,onDel,onX,IS}){
const[f,setF]=useState(presta?{...presta}:{nom:"",specialite:SPECIALITES[0],contact:"",email:"",notes:""});
const s=(k,v)=>setF(p=>({...p,[k]:v}));
return <div>
<div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:16}}>
  <h3 style={{margin:0,fontSize:17,fontWeight:700,color:"#e8e8f0"}}>{presta?"✎ "+presta.nom:"🤝 Nouveau Prestataire"}</h3>
  <button onClick={onX} style={{background:"none",border:"none",color:"#3a3a52",fontSize:20,padding:4}}>✕</button>
</div>
<FF l="NOM"><input style={IS} value={f.nom} onChange={e=>s("nom",e.target.value)} placeholder="Jean Dupont"/></FF>
<FF l="SPÉCIALITÉ"><select style={IS} value={f.specialite} onChange={e=>s("specialite",e.target.value)}>{SPECIALITES.map(sp=><option key={sp}>{sp}</option>)}</select></FF>
<div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
  <FF l="TÉLÉPHONE"><input style={IS} value={f.contact} onChange={e=>s("contact",e.target.value)} placeholder="06 12 34 56 78" type="tel"/></FF>
  <FF l="EMAIL"><input style={IS} value={f.email} onChange={e=>s("email",e.target.value)} placeholder="jean@studio.com" type="email"/></FF>
</div>
<FF l="NOTES"><textarea style={{...IS,height:56,resize:"vertical",fontSize:14}} value={f.notes} onChange={e=>s("notes",e.target.value)} placeholder="Tarifs, dispo…"/></FF>
<div style={{display:"flex",gap:8,justifyContent:"flex-end",marginTop:16,flexWrap:"wrap"}}>
  {onDel&&<button onClick={onDel} style={{padding:"10px 14px",borderRadius:10,border:"1px solid #ef444418",background:"transparent",color:"#ef4444",fontSize:12,fontWeight:600,marginRight:"auto"}}>Supprimer</button>}
  <button onClick={onX} style={{padding:"10px 16px",borderRadius:10,border:"1px solid #10102a",background:"transparent",color:"#4a4a60",fontSize:12}}>Annuler</button>
  <button onClick={()=>{if(!f.nom.trim())return;onSave({...f,id:f.id||uid(),_isNew:!f.id})}} style={{padding:"10px 22px",borderRadius:10,border:"none",background:"#818cf8",color:"#fff",fontSize:13,fontWeight:600}}>{presta?"Enregistrer":"Ajouter"}</button>
</div></div>}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
