function PSearchBar({value,onChange}){
  const ref=React.useRef(null);
  // Après chaque render : si on était en train de chercher, on rend le focus à l'input
  React.useLayoutEffect(()=>{
    if(window.__psFocused&&ref.current&&document.activeElement!==ref.current){
      const el=ref.current;el.focus();
      const pos=window.__psCaret!=null?window.__psCaret:el.value.length;
      try{el.setSelectionRange(pos,pos)}catch(e){}
    }
  });
  const handle=(v,caret)=>{window.__psCaret=caret;onChange(v)};
  return <div style={{display:"flex",alignItems:"center",gap:3,background:"var(--bg3)",borderRadius:6,padding:"3px 8px"}}><i className="fa-solid fa-search" style={{color:"var(--text4)",fontSize:9}}/><input ref={ref} value={value} onFocus={()=>{window.__psFocused=true}} onBlur={()=>{window.__psFocused=false}} onChange={e=>handle(e.target.value,e.target.selectionStart)} placeholder="Rechercher..." style={{background:"transparent",border:"none",color:"var(--text)",fontSize:11,outline:"none",width:120,padding:"2px 0"}}/>{value&&<button onMouseDown={e=>e.preventDefault()} onClick={()=>{onChange("")}} style={{color:"var(--text3)",fontSize:9,lineHeight:1}}><i className="fa-solid fa-xmark"/></button>}</div>;
}
function WebhookBtn({label,icon,color,url,payload,flash}){
const[st,setSt]=useState("idle");
const fire=async()=>{setSt("loading");try{await fetch(url,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(payload)});setSt("done");flash(label+" — Envoyé ✓");setTimeout(()=>setSt("idle"),3000)}catch(e){setSt("idle");flash("Erreur webhook")}};
return <button onClick={fire} disabled={st==="loading"} style={{padding:"7px 12px",borderRadius:"var(--radius)",border:"1px solid "+(st==="done"?"var(--green)":color),color:st==="done"?"var(--green)":color,fontSize:10,fontWeight:600,display:"flex",alignItems:"center",gap:4,transition:"all .2s",opacity:st==="loading"?.5:1}}><i className={"fa-solid "+(st==="loading"?"fa-spinner fa-spin":st==="done"?"fa-check":icon)}/>{st==="loading"?"Envoi...":st==="done"?"Envoyé !":label}</button>}

/* ═══ SCRIPT D'APPEL MODAL — Arborescent interactif ═══ */
const CALL_TREE={
start:{phase:0,tag:"Ouverture",title:"Le prospect décroche",say:'Bonjour, <b>[PRENOM]</b> ? Kylian de WEBO. Je vais être transparent : c\'est un appel de prospection — <b>vous m\'accordez 30 secondes</b> pour vous dire pourquoi je vous appelle, et vous me dites si ça vaut la peine de continuer ?',tip:{k:"ok",t:"L\'honnêteté (« appel de prospection ») désarme le rejet. La question « 30 secondes ? » redonne le contrôle au prospect."},choices:[{label:"« Oui, allez-y. »",sub:"Feu vert",kind:"win",to:"accroche"},{label:"« C\'est à quel sujet ? »",sub:"Curiosité neutre",to:"accroche"},{label:"« Je n\'ai pas le temps. »",sub:"Objection temps",kind:"obj",to:"o_temps"},{label:"« Envoyez-moi un mail. »",sub:"Esquive",kind:"obj",to:"o_mail"},{label:"Standardiste / barrage",sub:"Pas le décideur",kind:"obj",to:"o_barrage"}]},
accroche:{phase:1,tag:"Accroche",title:"Votre phrase d\'accroche (la plus importante)",say:'Merci. En un mot : <b>depuis juin 2025, l\'accessibilité numérique est une obligation légale</b> pour beaucoup d\'entreprises en Europe — l\'<b>European Accessibility Act</b>. La plupart des sites ne sont pas conformes et risquent des sanctions. Nous, chez WEBO, on audite le site, on dit précisément ce qui bloque, et on le met en conformité. J\'ai regardé <span class="fill">[NOM]</span> — <b>est-ce un sujet dont quelqu\'un s\'occupe déjà chez vous ?</b>',tip:{k:"ok",t:"On finit sur une question ouverte tournée vers LUI, pas sur le produit. Ça ouvre au lieu de déclencher un refus."},choices:[{label:"« Non, personne. »",sub:"Le boulevard",kind:"win",to:"q_situation"},{label:"« On est déjà conformes. »",sub:"Déjà équipé",kind:"obj",to:"o_deja"},{label:"« C\'est quoi l\'accessibilité ? »",sub:"Pédagogie",to:"o_cquoi"},{label:"« Ça ne me concerne pas. »",sub:"Doute obligation",kind:"obj",to:"o_concerne"},{label:"« Ça coûte combien ? »",sub:"Prix (trop tôt)",kind:"obj",to:"o_prix"},{label:"« Ça ne m\'intéresse pas. »",sub:"Rejet sec",kind:"obj",to:"o_pasinteresse"}]},
q_situation:{phase:2,tag:"Qualification",title:"Comprendre sa situation (2-3 questions max)",say:'Parfait, c\'est justement pour ça que mon appel peut être utile. Pour situer : <b>votre site sert surtout à quoi</b> — vitrine, contact, vente en ligne ? Et <b>vous recevez du public / des clients particuliers dessus ?</b>',tip:{k:"ok",t:"2 questions suffisent : usage du site + s\'il touche des particuliers (ça conditionne l\'obligation EAA). Vous n\'auditez pas au téléphone."},choices:[{label:"Site avec trafic / clients",sub:"Besoin réel",kind:"win",to:"closing"},{label:"« Bof, petit site vitrine. »",sub:"Minimise",to:"q_petit"},{label:"« Pourquoi ces questions ? »",sub:"Défensive",to:"q_pourquoi"}]},
q_petit:{phase:2,tag:"Qualification",title:"Il minimise (« petit site »)",say:'Je comprends — et justement, un site vitrine <b>c\'est souvent rapide à mettre en conformité</b>, donc peu coûteux. Le risque, lui, est le même : une mise en demeure ne regarde pas la taille. Le mieux : je vous montre <b>en 15 min où vous en êtes</b>, sans engagement.',tip:{k:"ok",t:"Retournez l\'objection : petit site = conformité rapide = argument POUR."},choices:[{label:"« Ok, pourquoi pas. »",sub:"Ouverture RDV",kind:"win",to:"closing"},{label:"« Envoyez un mail. »",sub:"Re-esquive",kind:"obj",to:"o_mail"}]},
q_pourquoi:{phase:2,tag:"Qualification",title:"« Pourquoi ces questions ? »",say:'Question légitime. C\'est que <b>l\'obligation ne s\'applique pas pareil à tout le monde</b> — ça dépend de votre activité et de votre audience. Je préfère vérifier que c\'est pertinent <b>avant</b> de vous faire perdre du temps. Si ça ne vous concerne pas, je vous le dirai franchement.',tip:{k:"ok",t:"La transparence crée la confiance et vous distingue d\'un vendeur pressant."},choices:[{label:"« D\'accord, je vous écoute. »",sub:"Confiance",kind:"win",to:"q_situation"},{label:"« Envoyez un mail. »",sub:"Re-esquive",kind:"obj",to:"o_mail"}]},
closing:{phase:3,tag:"Closing",title:"Proposer le rendez-vous (créneau précis)",say:'Voilà ce que je propose : <b>un rendez-vous de 15 minutes en visio</b>, où je vous montre l\'état de conformité de votre site et les 2-3 points prioritaires. Pas de blabla — vous repartez avec du concret, qu\'on travaille ensemble ou pas. <b>Vous préférez <span class="fill">jeudi fin de matinée</span>, ou <span class="fill">vendredi début d\'après-midi</span> ?</b>',tip:{k:"ok",t:"CLÉ : proposez DEUX créneaux précis (choix fermé), jamais « quand êtes-vous dispo ? »."},choices:[{label:"« Jeudi / vendredi me va. »",sub:"RDV OBTENU",kind:"win",to:"gagne"},{label:"« Ni l\'un ni l\'autre. »",sub:"Créneaux refusés",to:"c_autre"},{label:"« Rappelez dans quelques mois. »",sub:"Report",kind:"obj",to:"o_plustard"},{label:"« Il me faut l\'avis de mon associé. »",sub:"Décision partagée",to:"c_associe"}]},
c_autre:{phase:3,tag:"Closing",title:"Les 2 créneaux ne vont pas",say:'Pas de souci, vous menez la danse. <b>Quel jour vous arrange le mieux la semaine prochaine ?</b> Je m\'adapte — c\'est 15 minutes, on trouve.',tip:{k:"ok",t:"S\'il refuse VOS créneaux, laissez-le proposer les siens. L\'important : qu\'il pose une date."},choices:[{label:"Il propose un jour",sub:"RDV OBTENU",kind:"win",to:"gagne"},{label:"« Je verrai, rappelez. »",sub:"Fuit",kind:"obj",to:"o_plustard"}]},
c_associe:{phase:3,tag:"Closing",title:"« Il me faut l\'avis de mon associé »",say:'Normal d\'être plusieurs à décider. Justement : <b>autant avoir les éléments concrets à lui présenter</b>. On fait le point 15 min, je vous prépare un récap clair à lui transmettre. <b>Et si c\'est plus simple, invitez-le au RDV.</b> <span class="fill">Jeudi</span> ou <span class="fill">vendredi</span> ?',tip:{k:"ok",t:"Ne combattez pas le co-décideur : intégrez-le. Ça accélère au lieu de bloquer."},choices:[{label:"« Ok, calons ça. »",sub:"RDV OBTENU",kind:"win",to:"gagne"},{label:"« J\'en parle et je reviens. »",sub:"Report soft",kind:"obj",to:"o_plustard"}]},
o_temps:{phase:1,tag:"Objection",obj:true,title:"« Je n\'ai pas le temps »",say:'Je comprends, je ne veux pas vous retarder. <b>C\'est pour ça que je propose 15 minutes, pas plus.</b> Juste pour savoir si ça vaut le coup : <b>la mise en conformité de votre site est déjà réglée chez vous, ou pas encore ?</b>',tip:{k:"ok",t:"« Pas le temps » = « pas convaincu que ça vaut mon temps ». Reformulez vers une micro-question de valeur."},choices:[{label:"« Pas encore réglé. »",sub:"La porte s\'ouvre",kind:"win",to:"accroche"},{label:"« Là je dois filer. »",sub:"Vraiment pas dispo",to:"o_rappel"},{label:"« Envoyez un mail. »",sub:"Esquive",kind:"obj",to:"o_mail"}]},
o_mail:{phase:1,tag:"Objection",obj:true,title:"« Envoyez-moi un e-mail »",say:'Avec plaisir. <b>Mais soyons honnêtes : un mail de plus finit rarement lu</b> 🙂. Ce qui a de la valeur, c\'est le point précis sur VOTRE site, 15 minutes de vive voix. <b>On cale ça, et je vous envoie le mail juste après en complément ?</b>',tip:{k:"ok",t:"« Envoyez un mail » = enterrement poli. Acceptez MAIS conditionnez au RDV. L\'humour fait tomber la garde."},choices:[{label:"« Ok, 15 minutes. »",sub:"RDV décroché",kind:"win",to:"closing"},{label:"« Non, juste le mail. »",sub:"Insiste",to:"o_mail2"}]},
o_mail2:{phase:1,tag:"Objection",title:"Il insiste pour le mail seul",say:'Pas de souci, je respecte. <b>Pour que ce soit utile, je vous mets les 2-3 points spécifiques à votre site</b> — je peux avoir votre adresse, et je vous rappelle <span class="fill">en fin de semaine</span> pour votre réaction à chaud ?',tip:{k:"warn",t:"S\'il refuse le RDV, sécurisez : (1) e-mail personnalisé, (2) accord pour un rappel daté. Jamais les mains vides."},choices:[{label:"« Ok, rappelez-moi. »",sub:"Rappel programmé",kind:"win",to:"demi"},{label:"« Non merci. »",sub:"Fin",kind:"obj",to:"o_stop"}]},
o_deja:{phase:1,tag:"Objection",obj:true,title:"« On est déjà conformes »",say:'Excellente chose, sincèrement. Juste pour être sûr : <b>vous parlez d\'une conformité RGAA/EAA formelle, avec déclaration d\'accessibilité publiée ?</b> Beaucoup de sites « refaits récemment » passent à côté de <b>80% des critères</b> sans le savoir. Si vous êtes carrés, mon audit de 15 min vous le confirmera <b>gratuitement</b>.',tip:{k:"ok",t:"Ne contredisez pas frontalement. Distinguez « site moderne » de « site conforme » et offrez la vérif gratuite."},choices:[{label:"« Je ne suis pas sûr en fait. »",sub:"Le doute",kind:"win",to:"closing"},{label:"« On a une déclaration publiée. »",sub:"Vraiment conforme",to:"o_vraiment"},{label:"« On verra plus tard. »",sub:"Botte en touche",kind:"obj",to:"o_plustard"}]},
o_vraiment:{phase:1,tag:"Objection",title:"Il est vraiment déjà conforme",say:'Chapeau, c\'est rare. <b>Je ne vais pas vous faire perdre de temps.</b> Deux choses : la conformité doit être <b>maintenue à chaque mise à jour du site</b> — on propose un suivi léger pour ça. Et si vous connaissez d\'autres dirigeants moins avancés, <b>une recommandation est bienvenue.</b> Je vous laisse mon contact ?',tip:{k:"ok",t:"Un « vraiment conforme » n\'est pas un échec : semez le suivi + la recommandation."},choices:[{label:"« Oui, laissez ça. »",sub:"Graine plantée",kind:"win",to:"demi"},{label:"« C\'est bon merci. »",sub:"Clôture propre",kind:"obj",to:"o_stop"}]},
o_cquoi:{phase:1,tag:"Objection",obj:true,title:"« C\'est quoi l\'accessibilité ? »",say:'Bonne question. En clair : <b>rendre votre site utilisable par tout le monde</b>, y compris les personnes malvoyantes, malentendantes ou à mobilité réduite — près d\'<b>une personne sur cinq</b>. Concrètement : contrastes lisibles, navigation clavier, textes pour les images. Depuis 2025 c\'est <b>une obligation légale</b>, et au-delà de la loi, <b>c\'est 15% de clients potentiels en plus.</b>',tip:{k:"ok",t:"Pédagogie = confiance. Chiffre marquant (1 sur 5) + double bénéfice légal ET commercial."},choices:[{label:"« Intéressant, dites-m\'en plus. »",sub:"Curiosité",kind:"win",to:"q_situation"},{label:"« Je risque quoi ? »",sub:"Veut le risque",to:"o_concerne"},{label:"« Ça coûte combien ? »",sub:"Prix",kind:"obj",to:"o_prix"}]},
o_concerne:{phase:1,tag:"Objection",obj:true,title:"« Ça ne me concerne pas »",say:'Peut-être, et c\'est ce qu\'on va vérifier ensemble — je ne vais pas vous inventer une obligation. Ce que je peux dire : l\'EAA vise <b>tout ce qui se vend en ligne au grand public — e-commerce, banque, transport, télécoms, médias, livres numériques</b>, et les sanctions vont <b>jusqu\'à des mises en demeure et amendes</b>. Beaucoup se croyaient hors périmètre… à tort. <b>Le point de 15 min lève le doute une bonne fois.</b>',tip:{k:"warn",t:"Ne surjouez JAMAIS la peur. Restez factuel, positionnez le RDV comme « lever le doute »."},choices:[{label:"« Bon, autant vérifier. »",sub:"Accepte",kind:"win",to:"closing"},{label:"« Je pense pas être concerné. »",sub:"Sceptique",to:"o_sceptique"}]},
o_sceptique:{phase:1,tag:"Objection",title:"Reste sceptique sur l\'obligation",say:'Je respecte. Faisons simple : je vous envoie <b>un mini-diagnostic gratuit de votre page d\'accueil</b>, noir sur blanc. <b>Si tout est vert, vous ne me devez rien et vous êtes rassuré.</b> Sinon, on en parle. Quelle est la meilleure adresse ?',tip:{k:"ok",t:"Face au sceptique, baissez l\'engagement : diagnostic gratuit. « Si tout est vert vous ne me devez rien » est sans risque."},choices:[{label:"« Ok, envoyez ça. »",sub:"Lead récupéré",kind:"win",to:"demi"},{label:"« Non, laissez tomber. »",sub:"Refus",kind:"obj",to:"o_stop"}]},
o_prix:{phase:1,tag:"Objection",obj:true,title:"« Ça coûte combien ? »",say:'Je préfère être honnête : <b>vous donner un prix maintenant serait du pifomètre</b>, et ce serait vous manquer de respect. Ça dépend de l\'état de votre site — un site propre coûte une fraction d\'un site à reprendre. <b>Tout l\'intérêt de l\'audit de 15 min : vous repartez avec une fourchette précise, sans engagement.</b> On cale ça ?',tip:{k:"warn",t:"Ne donnez JAMAIS un prix au téléphone à froid. Le prix se donne APRÈS l\'audit."},choices:[{label:"« Ok pour l\'audit. »",sub:"RDV décroché",kind:"win",to:"closing"},{label:"« Un ordre d\'idée au moins. »",sub:"Insiste",to:"o_fourchette"}]},
o_fourchette:{phase:1,tag:"Objection",title:"Il insiste pour une fourchette",say:'Je comprends. Pour un ordre d\'idée : <b>nos accompagnements démarrent par des missions courtes pour un site vitrine, et montent selon la complexité.</b> Mais la fourchette précise sort de l\'audit — et il est gratuit. <b>Autant l\'avoir juste, non ?</b> <span class="fill">Jeudi</span> ou <span class="fill">vendredi</span> ?',tip:{k:"warn",t:"Si forcé, fourchette large SANS chiffre engageant, et revenez à l\'audit."},choices:[{label:"« Ok, voyons l\'audit. »",sub:"RDV décroché",kind:"win",to:"closing"},{label:"« Trop cher pour moi. »",sub:"Budget",kind:"obj",to:"o_budget"}]},
o_budget:{phase:1,tag:"Objection",obj:true,title:"« C\'est trop cher »",say:'J\'entends. Deux choses : d\'abord <b>vous ne connaissez pas encore le montant pour votre cas</b> — peut-être bien plus bas que vous pensez. Ensuite, <b>le coût d\'une mise en demeure ou de clients perdus dépasse celui d\'une mise en conformité.</b> L\'audit est gratuit et donne les chiffres réels. <b>Vous décidez après, en connaissance de cause.</b>',tip:{k:"ok",t:"« Trop cher » avant le prix = réflexe. Recadrez : coût de l\'inaction > coût de l\'action."},choices:[{label:"« D\'accord, l\'audit ne coûte rien. »",sub:"RDV décroché",kind:"win",to:"closing"},{label:"« Non, pas maintenant. »",sub:"Report",kind:"obj",to:"o_plustard"}]},
o_pasinteresse:{phase:1,tag:"Objection",obj:true,title:"« Ça ne m\'intéresse pas »",say:'Aucun souci — normal, <b>vous ne pouvez pas être intéressé par ce que vous n\'avez pas encore vu</b> 🙂. Je ne demande pas d\'être intéressé, juste <b>curieux 15 secondes</b> : saviez-vous que depuis 2025, un site non accessible peut valoir <b>une mise en demeure à son dirigeant ?</b>',tip:{k:"ok",t:"Ne pitchez pas plus fort. Reconnaissez, puis relancez par UNE question de curiosité factuelle."},choices:[{label:"« Non, je savais pas. »",sub:"Curiosité",kind:"win",to:"accroche"},{label:"« Oui je sais, pas intéressé. »",sub:"Vrai non",to:"o_stop"},{label:"« Pas le temps pour ça. »",sub:"Bascule temps",kind:"obj",to:"o_temps"}]},
o_barrage:{phase:0,tag:"Objection",obj:true,title:"Barrage : standardiste / assistant(e)",say:'Bonjour, Kylian de WEBO. <b>Vous allez pouvoir m\'aider :</b> je cherche la personne qui s\'occupe du <b>site internet et de sa conformité</b> — c\'est un sujet légal (accessibilité). Vous me diriez plutôt vers le dirigeant, ou le responsable technique ? Et <b>quel est le meilleur moment pour le/la joindre ?</b>',tip:{k:"ok",t:"Traitez l\'assistant(e) en allié (« vous allez pouvoir m\'aider »), motif clair (légal = sérieux), demandez QUI + QUAND."},choices:[{label:"« Je vous passe M. X. »",sub:"Transfert obtenu",kind:"win",to:"start"},{label:"« Il/elle n\'est pas là. »",sub:"Absent",to:"o_barrabsent"},{label:"« Mail à contact@ »",sub:"Filtre mail",kind:"obj",to:"o_mail"}]},
o_barrabsent:{phase:0,tag:"Objection",title:"Le décideur est absent",say:'Pas de souci. <b>Quel serait le meilleur créneau pour le/la rappeler</b> — début ou fin de journée ? Et à qui ai-je l\'honneur, pour vous recontacter directement ?',tip:{k:"ok",t:"Transformez l\'absence en rappel daté + récupérez le prénom de l\'interlocuteur."},choices:[{label:"« Rappelez vers 9h. »",sub:"Créneau obtenu",kind:"win",to:"demi"},{label:"« Envoyez un mail. »",sub:"Filtre",kind:"obj",to:"o_mail"}]},
o_plustard:{phase:2,tag:"Objection",obj:true,title:"« Rappelez dans quelques mois »",say:'Bien sûr, je note. Pour ne pas vous rappeler pour rien : <b>qu\'est-ce qui aura changé dans quelques mois</b> — un budget, une refonte ? Si c\'est le sujet accessibilité en lui-même, <b>autant que je vous envoie le diagnostic gratuit maintenant</b> : vous l\'aurez sous la main le jour venu, sans engagement.',tip:{k:"ok",t:"« Rappelez dans X mois » = souvent un non poli. Creusez le pourquoi, ou récupérez le lead avec le diagnostic gratuit."},choices:[{label:"« Oui, envoyez le diagnostic. »",sub:"Lead conservé",kind:"win",to:"demi"},{label:"« Un vrai projet arrive. »",sub:"Rappel qualifié",kind:"win",to:"demi"},{label:"« Non, rappelez c\'est tout. »",sub:"Report ferme",to:"o_stop"}]},
o_rappel:{phase:1,tag:"Objection",title:"Vraiment pas disponible maintenant",say:'Pas de souci, je n\'insiste pas. <b>Je vous rappelle <span class="fill">demain à la même heure</span>, ça vous convient ?</b> D\'ici là je vous envoie 2 lignes par mail pour savoir de quoi il s\'agit.',tip:{k:"ok",t:"Un « pas maintenant » sincère = rappel PRÉCIS (jour + heure) + mail teaser."},choices:[{label:"« Ok, demain. »",sub:"Rappel calé",kind:"win",to:"demi"},{label:"« Ne me rappelez pas. »",sub:"Refus",kind:"obj",to:"o_stop"}]},
gagne:{phase:3,win:true,tag:"Rendez-vous obtenu",badge:"win",winTitle:"Rendez-vous décroché 🎯",winText:"Bravo. Verrouillez-le maintenant, à chaud — un RDV confirmé par écrit ne se perd pas.",recap:["Confirmez le créneau à voix haute : « Donc jeudi 11h, je note. »","Récupérez son e-mail ET son portable direct.","Envoyez l\'invitation agenda TOUT DE SUITE.","Annoncez le format : « 15 min, en visio, je vous envoie le lien. »","Passez le lead en RDV dans le CRM avec la date."]},
demi:{phase:2,win:true,tag:"Demi-victoire",badge:"soft",winTitle:"Lead sécurisé — à relancer",winText:"Pas de RDV ferme, mais vous ne repartez pas les mains vides. Base solide pour la relance.",recap:["Notez ce qui a été convenu (mail ? rappel ? diagnostic ?).","Récupérez l\'e-mail et le bon interlocuteur.","Envoyez le diagnostic / mail promis dans l\'heure.","Programmez le rappel daté dans le CRM.","Statut CRM : « Relance » + date."]},
o_stop:{phase:1,win:true,tag:"Fin d\'appel",badge:"hard",winTitle:"Fin de l\'appel — proprement",winText:"Un vrai « non » se respecte. Terminez avec classe : un non d\'aujourd\'hui peut devenir un oui dans 6 mois.",recap:["Remerciez pour le temps accordé, sans amertume.","Laissez la porte ouverte : « Si le sujet revient, gardez mon nom. »","Ne brûlez pas le contact : pas d\'insistance.","Notez « Perdu » + la raison dans le CRM.","80% des appels finissent en non — statistique, pas personnel. 💪"]}
};
const CALL_IDX=[{t:"Pas le temps",ic:"⏱",to:"o_temps"},{t:"Envoyez un mail",ic:"✉️",to:"o_mail"},{t:"Pas intéressé",ic:"🙅",to:"o_pasinteresse"},{t:"Déjà conformes",ic:"✅",to:"o_deja"},{t:"C'est quoi ?",ic:"❓",to:"o_cquoi"},{t:"Ça me concerne ?",ic:"⚖️",to:"o_concerne"},{t:"Combien ?",ic:"💶",to:"o_prix"},{t:"Trop cher",ic:"📉",to:"o_budget"},{t:"Plus tard",ic:"📅",to:"o_plustard"},{t:"Barrage",ic:"🚪",to:"o_barrage"}];
function ScriptModal({lead,onClose,flash}){
const[cur,setCur]=useState("start");const[hist,setHist]=useState(["start"]);
if(!lead)return null;
const prenom=(lead.nom||"").split(" ")[0]||"votre interlocuteur";
const fillTxt=s=>(s||"").replace(/\[PRENOM\]/g,prenom).replace(/\[NOM\]/g,lead.nom||"votre entreprise");
const go=id=>{if(!CALL_TREE[id])return;setCur(id);setHist(h=>[...h,id])};
const back=()=>{setHist(h=>{const n=h.slice(0,-1);setCur(n[n.length-1]||"start");return n.length?n:["start"]})};
const restart=()=>{setCur("start");setHist(["start"])};
const n=CALL_TREE[cur];const phase=n.phase;
const RAIL=["Ouverture","Accroche","Qualification","Closing"];
return <div className="overlay" onMouseDown={e=>{if(e.target===e.currentTarget)onClose()}}><div className="overlay-bg"/><div className="modal" style={{maxWidth:640,maxHeight:"94vh",overflowY:"auto"}} onClick={e=>e.stopPropagation()}>
<div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
  <h3 style={{fontFamily:"var(--serif)",fontSize:17,display:"flex",alignItems:"center",gap:6}}><span style={{fontSize:20}}>📞</span> Script d'Appel — {lead.nom}</h3>
  <button onClick={onClose} style={{color:"var(--text3)",fontSize:14}}><i className="fa-solid fa-xmark"/></button>
</div>
{lead.auditErreurs&&<div style={{marginBottom:10,padding:10,background:"rgba(231,76,76,.05)",border:"1px solid rgba(231,76,76,.14)",borderRadius:8}}><div style={{fontSize:8,fontWeight:700,color:"var(--red)",fontFamily:"var(--mono)",letterSpacing:1,marginBottom:3}}>⚠ ERREURS DÉTECTÉES — À GLISSER DANS L'ACCROCHE{lead.auditScore!==""&&lead.auditScore!=null?" · SCORE "+lead.auditScore+"/100":""}</div><div style={{fontSize:11,color:"var(--text2)",lineHeight:1.6,whiteSpace:"pre-wrap"}}>{lead.auditErreurs}</div></div>}
<div style={{display:"flex",gap:5,marginBottom:14}}>{RAIL.map((r,i)=><div key={i} style={{flex:1}}><div style={{height:4,borderRadius:3,background:i<phase?"var(--gold)":i===phase?"var(--gold)":"var(--bg4)",opacity:i<=phase?1:.3,transition:"all .4s"}}/><div style={{fontSize:8,letterSpacing:.5,textTransform:"uppercase",color:i<=phase?"var(--gold)":"var(--text3)",fontWeight:700,marginTop:5,textAlign:"center"}}>{r}</div></div>)}</div>
{n.win?
<div style={{textAlign:"center",padding:"8px 4px"}}>
  <div style={{width:58,height:58,borderRadius:"50%",margin:"0 auto 14px",display:"grid",placeItems:"center",fontSize:26,color:"#fff",background:n.badge==="hard"?"var(--text3)":n.badge==="soft"?"var(--gold)":"var(--green)"}}>{n.badge==="hard"?"↺":n.badge==="soft"?"◑":"✓"}</div>
  <h3 style={{fontFamily:"var(--serif)",fontSize:21,color:"var(--text)",marginBottom:6}}>{n.winTitle}</h3>
  <p style={{fontSize:13,color:"var(--text2)",maxWidth:420,margin:"0 auto 14px",lineHeight:1.5}}>{n.winText}</p>
  <div style={{textAlign:"left",background:"var(--bg)",border:"1px solid var(--border)",borderRadius:12,padding:"14px 16px",maxWidth:440,margin:"0 auto"}}>
    <div style={{fontSize:10,letterSpacing:1,textTransform:"uppercase",color:"var(--gold)",fontWeight:700,marginBottom:8}}>À faire maintenant</div>

/* V26 — AI Input Bar (module-scope = stable component, no remount, no focus loss) */
function AIInputBar({onSend,loading}){
const[val,setVal]=useState("");
const send=()=>{const t=val.trim();if(t&&!loading){onSend(t);setVal("")}};
const IS2={flex:1,padding:"10px 12px",borderRadius:"var(--radius)",border:"1px solid var(--border)",background:"var(--bg)",color:"var(--text)",fontSize:14,outline:"none",fontFamily:"var(--sans)"};
return <div style={{padding:8,borderTop:"1px solid var(--border)",display:"flex",gap:4}}>
  <input style={IS2} value={val} onChange={e=>setVal(e.target.value)} onKeyDown={e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();send()}}} placeholder="Question..." autoFocus/>
  <button onClick={send} disabled={loading||!val.trim()} style={{padding:"10px 16px",borderRadius:"var(--radius)",background:(loading||!val.trim())?"var(--bg3)":"var(--gold)",color:(loading||!val.trim())?"var(--text3)":"var(--bg)",fontSize:14,fontWeight:700}}>{loading?"...":"→"}</button>
</div>}

<script>
/* v52.1 — reflet liquide : listener local, rect mis en cache, zero reflow en continu */
(function(){
  var cur=null,rect=null,raf=null,px=0,py=0;
  function paint(){
    raf=null;
    if(!cur||!rect)return;
    cur.style.setProperty("--mx",((px-rect.left)/rect.width*100).toFixed(1)+"%");
    cur.style.setProperty("--my",((py-rect.top)/rect.height*100).toFixed(1)+"%");
  }
  function move(e){
    px=e.clientX; py=e.clientY;
    if(!raf)raf=requestAnimationFrame(paint);
  }
  function leave(){
    if(cur)cur.removeEventListener("pointermove",move);
    cur=null; rect=null;
  }
  document.addEventListener("pointerover",function(e){
    var el=e.target.closest&&e.target.closest(".hub-card");
    if(el===cur)return;
    leave();
    if(!el)return;
    cur=el; rect=el.getBoundingClientRect();
    el.addEventListener("pointermove",move,{passive:true});
    el.addEventListener("pointerleave",leave,{once:true});
  },{passive:true});
})();
</script>
