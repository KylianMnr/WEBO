<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<title>WEBO — Hub v54</title>
<link rel="apple-mobile-web-app-capable" content="yes"/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,700&family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
<style>
:root{
--bg:#0B0E14;--bg2:#111520;--bg3:#171C28;--bg4:#1E2436;--bg5:#252C3D;
--border:#2A2D35;--border2:#353A48;
--gold:#C5A059;--gold2:#D4AF6A;--bordeaux:#4A0E0E;--bordeaux2:#6B1A1A;--bordeaux-bg:#2A0808;
--green:#089981;--red:#E74C4C;--blue:#2962FF;--purple:#8B5CF6;
--text:#F5F5F7;--text2:#9CA3AF;--text3:#5A6270;--text4:#3A4050;
--serif:'Playfair Display',Georgia,serif;--sans:'Inter',-apple-system,sans-serif;--mono:'JetBrains Mono',monospace;
--radius:8px;--glass:rgba(17,21,32,.78);
}
[data-theme="light"]{
--bg:#F2EDDF;--bg2:#FFFDF8;--bg3:#FAF6EB;--bg4:#EDE5D0;--bg5:#E2D8BE;
--border:#E3D8BE;--border2:#CDBF9D;
--gold:#8B6A2E;--gold2:#A07A38;--bordeaux:#6B1A1A;--bordeaux2:#8B2828;--bordeaux-bg:#FFF0F0;
--green:#067961;--red:#C73838;--blue:#1E54E0;--purple:#7045D0;
--text:#292319;--text2:#544B39;--text3:#847961;--text4:#B3A88D;
--glass:rgba(255,253,248,.92);
/* Ombres modernes en couches — teinte brune chaude */
--sh-sm:0 1px 2px rgba(92,72,36,.08),0 2px 6px rgba(92,72,36,.05);
--sh-md:0 1px 2px rgba(92,72,36,.07),0 4px 12px rgba(92,72,36,.08),0 12px 28px rgba(92,72,36,.06);
--sh-lg:0 2px 4px rgba(92,72,36,.08),0 8px 24px rgba(92,72,36,.1),0 24px 56px rgba(92,72,36,.1);
--ring:0 0 0 3px rgba(139,106,46,.14);
}
/* ═══ LIGHT MODE — refonte moderne v33 ═══ */
[data-theme="light"] body{
  background:#F2EDDF;
  background-image:
    radial-gradient(circle at 12% 15%,rgba(197,160,89,.09) 0%,transparent 42%),
    radial-gradient(circle at 88% 85%,rgba(107,26,26,.05) 0%,transparent 42%),
    linear-gradient(180deg,rgba(255,253,248,.4),transparent 300px);
}
[data-theme="light"] .topnav{
  background:rgba(255,253,248,.96);
  border-bottom:1px solid #E3D8BE;
  box-shadow:0 1px 0 rgba(255,255,255,.8) inset,0 4px 16px rgba(92,72,36,.07),0 1px 3px rgba(92,72,36,.05);
}
[data-theme="light"] .logo .w{color:#8B6A2E}
[data-theme="light"] .logo .r{color:#292319}
[data-theme="light"] .logo-tag{color:#8B6A2E;opacity:.72}
[data-theme="light"] .nb{color:var(--text2)}
[data-theme="light"] .nb:hover{background:rgba(139,106,46,.08);color:var(--text)}
[data-theme="light"] .nb.active{
  background:linear-gradient(135deg,rgba(139,106,46,.16),rgba(139,106,46,.06));
  color:#8B6A2E;
  box-shadow:inset 0 0 0 1px rgba(139,106,46,.3),0 1px 3px rgba(92,72,36,.08);
}

/* ═══ Cards : blanc chaud sur crème, ombres en couches, lift au hover ═══ */
[data-theme="light"] .card{
  background:#FFFDF8;
  border:1px solid #E9DFC8;
  box-shadow:var(--sh-sm);
  transition:box-shadow .2s ease,border-color .2s ease,transform .2s ease;
}
[data-theme="light"] .card:hover{
  border-color:#D4C49E;
  box-shadow:var(--sh-md);
}
[data-theme="light"] .card-h{border-bottom:1px solid #EFE6D2}

[data-theme="light"] .stat-card{
  background:#FFFDF8;
  border:1px solid #E9DFC8;
  box-shadow:var(--sh-sm);
  transition:all .2s ease;
}
[data-theme="light"] .stat-card:hover{
  box-shadow:var(--sh-md);
  transform:translateY(-1px);
  border-color:#D4C49E;
}

[data-theme="light"] .hub-card{
  background:#FFFDF8;
  border:1px solid #E9DFC8;
  box-shadow:var(--sh-md);
  transition:all .25s cubic-bezier(.2,.8,.3,1);
}
[data-theme="light"] .hub-card:hover{
  border-color:rgba(139,106,46,.45);
  box-shadow:var(--sh-lg),var(--ring);
  transform:translateY(-4px) scale(1.012);
}
[data-theme="light"] .hub-card-icon{
  background:linear-gradient(135deg,rgba(139,106,46,.14),rgba(139,106,46,.05));
  border:1px solid rgba(139,106,46,.25);
  color:#8B6A2E;
  box-shadow:0 2px 6px rgba(92,72,36,.08);
}
[data-theme="light"] .hub-title{
  background:linear-gradient(135deg,#5E451B,#A07A38);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
}

/* ═══ Kanban : colonnes creusées, cartes qui flottent ═══ */
[data-theme="light"] .kanban-col{
  background:linear-gradient(180deg,#ECE4CE,#F0E9D6);
  border:1px solid #DFD3B4;
  box-shadow:inset 0 2px 6px rgba(92,72,36,.06),inset 0 1px 0 rgba(255,255,255,.5);
}
[data-theme="light"] .kc{
  background:#FFFDF8;
  border:1px solid #E6DBC1;
  box-shadow:0 1px 3px rgba(92,72,36,.09),0 3px 8px rgba(92,72,36,.05);
  transition:all .18s ease;
}
[data-theme="light"] .kc:hover{
  border-color:rgba(139,106,46,.4);
  box-shadow:0 2px 6px rgba(92,72,36,.1),0 8px 20px rgba(92,72,36,.12);
  transform:translateY(-2px);
}

/* Arrows kanban */
[data-theme="light"] .k-arrow{
  background:rgba(255,253,248,.96);
  border:1px solid #DFD3B4;
  color:#8B6A2E;
  box-shadow:var(--sh-md);
}
[data-theme="light"] .k-arrow:hover{background:#FFFDF8;border-color:#8B6A2E;box-shadow:var(--sh-lg)}

/* ═══ Surfaces flottantes : ombres dramatiques ═══ */
[data-theme="light"] .overlay-bg{background:rgba(70,54,26,.28);backdrop-filter:blur(10px)}
[data-theme="light"] .modal{
  background:#FFFDF8;
  border:1px solid #E3D8BE;
  box-shadow:0 8px 24px rgba(92,72,36,.14),0 32px 80px rgba(92,72,36,.22),0 0 0 1px rgba(139,106,46,.06);
}
[data-theme="light"] .rpanel{
  background:linear-gradient(180deg,#FFFDF8,#FAF6EB);
  border-left:1px solid #E3D8BE;
  box-shadow:-16px 0 48px rgba(92,72,36,.12),-2px 0 8px rgba(92,72,36,.06);
}
[data-theme="light"] .notif-panel{
  background:#FFFDF8;
  border:1px solid #E3D8BE;
  box-shadow:0 8px 24px rgba(92,72,36,.12),0 24px 64px rgba(92,72,36,.18);
}
[data-theme="light"] .day-panel{
  background:#FFFDF8;
  border-left:1px solid #E3D8BE;
  box-shadow:-16px 0 48px rgba(92,72,36,.12);
}
[data-theme="light"] .cmd-ov{background:rgba(70,54,26,.28);backdrop-filter:blur(8px)}
[data-theme="light"] .cmd-box{background:#FFFDF8;border:1px solid #E3D8BE;box-shadow:0 12px 32px rgba(92,72,36,.16),0 40px 96px rgba(92,72,36,.24)}

[data-theme="light"] .chart-card{
  background:#FFFDF8;
  border:1px solid #E9DFC8;
  box-shadow:var(--sh-sm);
  transition:box-shadow .2s ease;
}
[data-theme="light"] .chart-card:hover{box-shadow:var(--sh-md)}

/* ═══ Inputs : fond blanc, focus ring net ═══ */
[data-theme="light"] select,
[data-theme="light"] input,
[data-theme="light"] textarea{
  background:#FFFDF8;
  border:1px solid #DCCFAF;
  color:var(--text);
  box-shadow:inset 0 1px 2px rgba(92,72,36,.04);
}
[data-theme="light"] select:focus,
[data-theme="light"] input:focus,
[data-theme="light"] textarea:focus{
  border-color:#8B6A2E;
  box-shadow:var(--ring),inset 0 1px 2px rgba(92,72,36,.03);
}

[data-theme="light"] button[style*="background:var(--gold)"]{color:#FFFDF8 !important}

[data-theme="light"] .sep{background:linear-gradient(90deg,transparent,rgba(139,106,46,.3),transparent)}
[data-theme="light"] .tl-dot{border-color:#FFFDF8;box-shadow:0 0 0 1px rgba(92,72,36,.12)}

/* Cards spéciaux */
[data-theme="light"] .enrich-card{
  background:linear-gradient(135deg,rgba(41,98,255,.05),rgba(112,69,208,.05));
  border:1px solid rgba(41,98,255,.22);
  box-shadow:var(--sh-sm);
}
[data-theme="light"] .match-hero{
  background:linear-gradient(135deg,rgba(112,69,208,.07),rgba(139,106,46,.05));
  border:1px solid rgba(112,69,208,.22);
  box-shadow:var(--sh-sm);
}
[data-theme="light"] .outreach-card{
  background:linear-gradient(135deg,rgba(139,106,46,.06),rgba(107,26,26,.04));
  border:1px solid rgba(139,106,46,.25);
  box-shadow:var(--sh-sm);
}

[data-theme="light"] .bulk-bar{
  background:linear-gradient(180deg,transparent,#FFFDF8 25%);
  border-top:1px solid #E3D8BE;
  box-shadow:0 -8px 32px rgba(92,72,36,.08);
}

[data-theme="light"] .ai-fab{box-shadow:0 4px 12px rgba(139,106,46,.3),0 12px 32px rgba(139,106,46,.35)}

[data-theme="light"] ::-webkit-scrollbar-thumb{background:#CDBF9D;border-radius:8px}
[data-theme="light"] ::-webkit-scrollbar-thumb:hover{background:#8B6A2E}

[data-theme="light"] .sync-dot.on{background:#067961;box-shadow:0 0 0 3px rgba(6,121,97,.18)}
[data-theme="light"] .sync-dot.off{background:#C73838;box-shadow:0 0 0 3px rgba(199,56,56,.18)}
[data-theme="light"] .sync-dot.loading{background:#A07A38;box-shadow:0 0 0 3px rgba(160,122,56,.18)}

/* Badges : bordures nettes + micro-ombre */
[data-theme="light"] .badge-gold{background:rgba(139,106,46,.12);color:#5E451B;border:1px solid rgba(139,106,46,.35);box-shadow:0 1px 2px rgba(92,72,36,.06)}
[data-theme="light"] .badge-green{background:rgba(6,121,97,.12);color:#03543F;border:1px solid rgba(6,121,97,.35);box-shadow:0 1px 2px rgba(92,72,36,.06)}
[data-theme="light"] .badge-red{background:rgba(199,56,56,.12);color:#8A1F1F;border:1px solid rgba(199,56,56,.35);box-shadow:0 1px 2px rgba(92,72,36,.06)}
[data-theme="light"] .badge-blue{background:rgba(30,84,224,.12);color:#1640B0;border:1px solid rgba(30,84,224,.35);box-shadow:0 1px 2px rgba(92,72,36,.06)}

/* Pills filtres */
[data-theme="light"] .pill{background:#FFFDF8;border:1px solid #E3D8BE;box-shadow:0 1px 2px rgba(92,72,36,.05)}
[data-theme="light"] .pill:hover{border-color:#CDBF9D}
[data-theme="light"] .pill.active{background:rgba(139,106,46,.12);border-color:#8B6A2E;color:#8B6A2E;box-shadow:inset 0 1px 2px rgba(92,72,36,.06)}

/* Table rows */
[data-theme="light"] tbody tr:hover{background:rgba(139,106,46,.05)}
[data-theme="light"] thead th{background:#F6F0DF;border-bottom:2px solid #E3D8BE}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--sans);font-weight:400;min-height:100dvh;-webkit-font-smoothing:antialiased;font-size:13px;background-image:radial-gradient(circle at 20% 50%,rgba(197,160,89,.02) 0%,transparent 50%),radial-gradient(circle at 80% 20%,rgba(41,98,255,.02) 0%,transparent 50%)}
::selection{background:var(--gold);color:var(--bg)}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideR{from{transform:translateX(24px);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes glow{0%,100%{box-shadow:0 0 6px rgba(197,160,89,.15)}50%{box-shadow:0 0 20px rgba(197,160,89,.3)}}
@keyframes urgPulse{0%,100%{border-color:var(--bordeaux)}50%{border-color:var(--red)}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-3px)}}
.fu{animation:fadeUp .35s ease-out both}.fi{animation:fadeIn .3s ease-out both}
button{font-family:inherit;cursor:pointer;-webkit-tap-highlight-color:transparent;border:none;background:transparent}
select,input,textarea{font-family:var(--sans);font-size:14px;background:var(--bg);color:var(--text);border:1px solid var(--border);border-radius:var(--radius);padding:10px 12px;outline:none;transition:border-color .2s}
select:focus,input:focus,textarea:focus{border-color:var(--gold)}
::-webkit-scrollbar{width:4px;height:4px}::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:2px}
/* TOPNAV */
.topnav{position:sticky;top:0;z-index:100;background:var(--glass);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid rgba(197,160,89,.08);padding:0 20px;display:flex;align-items:center;height:56px;gap:12px}
.logo{display:flex;align-items:baseline;gap:1px;text-decoration:none;cursor:pointer}
.logo .w{font-family:var(--serif);font-weight:700;font-size:22px;color:var(--gold);font-style:italic}
.logo .r{font-family:var(--serif);font-weight:600;font-size:18px;color:var(--text)}
.logo-tag{font-size:8px;color:var(--text3);letter-spacing:2.5px;text-transform:uppercase;font-family:var(--mono);margin-left:6px}
.nb{padding:7px 14px;border-radius:var(--radius);font-size:11px;font-weight:600;color:var(--text2);transition:all .2s;display:flex;align-items:center;gap:5px}
.nb:hover{color:var(--text);background:var(--bg3)}
.nb.active{color:var(--gold);background:rgba(197,160,89,.08)}
.nb i{font-size:12px}
/* LEADERBOARD MINI */
.lb-mini{display:flex;gap:8px;align-items:center;padding:4px 12px;border-radius:20px;border:1px solid var(--border);background:var(--bg2)}
.lb-item{display:flex;align-items:center;gap:4px;font-size:10px;font-weight:600}
.lb-rank{width:16px;height:16px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:800;font-family:var(--mono)}
/* HUB */
.hub{padding:24px 28px;max-width:1680px;margin:0 auto;width:100%}
.hub-header{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:12px}
.hub-title{font-family:var(--serif);font-size:28px;font-weight:700;line-height:1.2;background:linear-gradient(135deg,var(--gold),#E8D5A8);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hub-sub{font-size:13px;color:var(--text2);font-weight:300;margin-top:4px}
.hub-stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:22px;overscroll-behavior-x:contain}
.stat-card{background:linear-gradient(145deg,var(--bg2),var(--bg3));border:1px solid var(--border);border-radius:12px;padding:16px;transition:all .3s;position:relative;overflow:hidden}
.stat-card:hover{border-color:var(--gold);transform:translateY(-3px);box-shadow:0 8px 25px rgba(197,160,89,.08)}
.stat-label{font-size:9px;font-weight:600;color:var(--text3);letter-spacing:1.5px;text-transform:uppercase;font-family:var(--mono);margin-bottom:3px}
.stat-val{font-size:22px;font-weight:800;font-family:var(--mono);line-height:1.1}
.hub-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
.hub-card{background:linear-gradient(145deg,var(--bg2),rgba(30,36,54,.6));border:1px solid var(--border);border-radius:14px;padding:22px 20px;cursor:pointer;transition:all .35s;position:relative;overflow:hidden}
.hub-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--gold),var(--gold2),transparent);opacity:0;transition:opacity .3s}
.hub-card:hover{border-color:rgba(197,160,89,.25);transform:translateY(-4px) scale(1.01);box-shadow:0 16px 48px rgba(0,0,0,.3),0 0 0 1px rgba(197,160,89,.1)}
.hub-card:hover::before{opacity:1}
.hub-card-icon{width:48px;height:48px;border-radius:14px;background:linear-gradient(135deg,rgba(197,160,89,.12),rgba(197,160,89,.04));border:1px solid rgba(197,160,89,.1);display:flex;align-items:center;justify-content:center;margin-bottom:14px;font-size:20px;color:var(--gold)}
.hub-card h3{font-family:var(--serif);font-size:17px;font-weight:600;margin-bottom:5px}
.hub-card p{font-size:11px;color:var(--text2);line-height:1.6}
.hub-card .cnt{position:absolute;top:16px;right:16px;font-family:var(--mono);font-size:28px;font-weight:900;color:rgba(197,160,89,.06)}
/* TABLE */
.tbl{width:100%;border-collapse:separate;border-spacing:0}
.tbl th{font-size:9px;font-weight:600;color:var(--text3);letter-spacing:1.5px;text-transform:uppercase;font-family:var(--mono);padding:10px 12px;text-align:left;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--bg2);z-index:5}
.tbl td{padding:10px 12px;border-bottom:1px solid var(--border);font-size:12px;vertical-align:middle}
.tbl tbody tr{transition:all .15s;cursor:pointer}.tbl tbody tr:hover{background:rgba(197,160,89,.03)}
/* BADGE */
.badge{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:20px;font-size:9px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;font-family:var(--mono)}
.badge-green{color:var(--green);background:rgba(8,153,129,.1);border:1px solid rgba(8,153,129,.2)}
.badge-red{color:var(--red);background:rgba(231,76,76,.1);border:1px solid rgba(231,76,76,.2)}
.badge-gold{color:var(--gold);background:rgba(197,160,89,.1);border:1px solid rgba(197,160,89,.2)}
.badge-purple{color:var(--purple);background:rgba(139,92,246,.1);border:1px solid rgba(139,92,246,.2)}
.badge-blue{color:var(--blue);background:rgba(41,98,255,.1);border:1px solid rgba(41,98,255,.2)}
.badge-ghost{color:var(--text3);background:var(--bg4);border:1px solid var(--border)}
.badge-bordeaux{color:#E88;background:rgba(74,14,14,.4);border:1px solid rgba(107,26,26,.6)}
/* CARD */
.card{background:linear-gradient(160deg,var(--bg2),rgba(23,28,40,.7));border:1px solid var(--border);border-radius:12px;transition:all .25s}
.card:hover{border-color:var(--border2);box-shadow:0 6px 20px rgba(0,0,0,.12)}
.card-h{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.card-b{padding:14px 18px}
/* PROGRESS */
.prog{height:5px;border-radius:3px;background:var(--bg4);overflow:hidden}.prog-fill{height:100%;border-radius:3px;transition:width .8s ease-out}
/* TIMELINE */
.tl{position:relative;padding-left:24px}
.tl::before{content:'';position:absolute;left:7px;top:0;bottom:0;width:1px;background:var(--border)}
.tl-item{position:relative;padding:10px 0;border-bottom:1px solid rgba(42,45,53,.5)}
.tl-dot{position:absolute;left:-20px;top:14px;width:10px;height:10px;border-radius:50%;border:2px solid var(--bg);z-index:2}
.tl-time{font-family:var(--mono);font-size:10px;color:var(--text3);margin-bottom:3px}
.tl-title{font-weight:600;font-size:13px;margin-bottom:2px}
.tl-sub{font-size:11px;color:var(--text2)}
/* AVATAR */
.av{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;flex-shrink:0}
/* MODAL */
.overlay{position:fixed;inset:0;z-index:1000;display:flex;align-items:center;justify-content:center;animation:fadeIn .12s}
.overlay-bg{position:absolute;inset:0;background:rgba(0,0,0,.55);backdrop-filter:blur(6px)}
.modal{position:relative;background:linear-gradient(160deg,var(--bg2),var(--bg3));border:1px solid var(--border);border-radius:16px;padding:28px;width:95%;max-width:540px;max-height:85vh;overflow-y:auto;box-shadow:0 32px 80px rgba(0,0,0,.5),0 0 0 1px rgba(197,160,89,.05);animation:fadeUp .25s}
.modal::-webkit-scrollbar{width:3px}
/* KANBAN */
.kanban-scroll{display:flex;gap:10px;overflow-x:auto;overflow-y:hidden;padding:10px;flex:1;-webkit-overflow-scrolling:touch;scroll-snap-type:x proximity;scroll-behavior:smooth;overscroll-behavior-x:contain}.kanban-scroll::-webkit-scrollbar{display:none}
.kanban-col{min-width:260px;width:260px;flex-shrink:0;background:linear-gradient(180deg,var(--bg),rgba(17,21,32,.4));border:1px solid var(--border);border-radius:10px;padding:8px;display:flex;flex-direction:column;scroll-snap-align:start}
.kc{background:linear-gradient(145deg,var(--bg2),rgba(23,28,40,.5));border:1px solid var(--border);border-radius:10px;padding:10px;margin-bottom:5px;cursor:grab;transition:all .2s}
.kc:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.25);border-color:rgba(197,160,89,.2)}.kc:active{cursor:grabbing;transform:scale(.98)}
.kcol.over{background:rgba(41,98,255,.04)!important}
/* CMD */
.cmd-ov{position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,.5);backdrop-filter:blur(4px);display:flex;align-items:flex-start;justify-content:center;padding-top:15vh;animation:fadeIn .1s}
.cmd-box{background:var(--bg2);border:1px solid var(--border);border-radius:12px;width:90%;max-width:520px;overflow:hidden;box-shadow:0 24px 80px rgba(0,0,0,.5)}
.cmd-in{width:100%;padding:16px 20px;font-size:16px;background:transparent;border:none;border-bottom:1px solid var(--border);color:var(--text);outline:none}
.cmd-r{display:flex;align-items:center;gap:12px;padding:12px 20px;cursor:pointer;transition:background .1s;font-size:13px}
.cmd-r:hover{background:var(--bg3)}
/* RIGHT PANEL */
.rpanel-ov{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.55);backdrop-filter:blur(3px);display:flex;align-items:center;justify-content:center;padding:24px;animation:fadeIn .18s ease-out}
.rpanel{position:relative;width:960px;max-width:94vw;max-height:86vh;background:linear-gradient(180deg,var(--bg2),var(--bg3));border:1px solid rgba(197,160,89,.18);border-radius:16px;overflow-y:auto;box-shadow:0 24px 70px rgba(0,0,0,.5);animation:popIn .22s cubic-bezier(.2,.9,.3,1)}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes popIn{from{opacity:0;transform:scale(.94) translateY(12px)}to{opacity:1;transform:none}}
.rpanel::-webkit-scrollbar{width:3px}
/* UTILS */
.sep{height:1px;background:linear-gradient(90deg,transparent,rgba(197,160,89,.25),transparent);margin:12px 0}
.blur{filter:blur(6px);user-select:none;pointer-events:none}
.sync-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.sync-dot.on{background:var(--green)}.sync-dot.off{background:var(--red)}.sync-dot.loading{background:var(--gold);animation:pulse 1s infinite}
.ff label{display:block;font-size:9px;font-weight:600;color:var(--text3);margin-bottom:4px;letter-spacing:1.2px;text-transform:uppercase;font-family:var(--mono)}
.ff{margin-bottom:10px}
.wa{padding:4px 8px;border-radius:var(--radius);border:1px solid rgba(37,211,102,.2);color:#25D366;font-size:11px;transition:all .15s}.wa:hover{background:rgba(37,211,102,.06)}
.match-card{background:rgba(139,92,246,.06);border:1px solid rgba(139,92,246,.15);border-radius:8px;padding:8px;margin-top:4px;cursor:pointer;transition:all .15s}.match-card:hover{background:rgba(139,92,246,.12)}
.notif-wrap{position:relative}
/* ═══ V36 — nav LinkedIn-style ═══ */
.lnav{display:flex;flex-direction:column;align-items:center;gap:2px;padding:4px 14px;border-radius:8px;cursor:pointer;color:var(--text3);background:transparent;border:none;position:relative;transition:color .15s}
.lnav:hover{color:var(--text)}
.lnav.active{color:var(--gold)}
.lnav.active::after{content:"";position:absolute;bottom:-9px;left:10%;width:80%;height:2px;background:var(--gold);border-radius:2px}
.lnav i{font-size:16px}
.lnav .lnav-lb{font-size:8.5px;font-weight:600;letter-spacing:.2px}
.lnav-badge{position:absolute;top:0;right:8px;min-width:15px;height:15px;border-radius:8px;background:var(--red);color:#fff;font-size:8px;font-weight:800;display:flex;align-items:center;justify-content:center;padding:0 4px;border:2px solid var(--bg2)}
.you-menu{position:absolute;top:calc(100% + 10px);right:0;width:260px;background:var(--bg2);border:1px solid var(--border);border-radius:12px;box-shadow:0 12px 40px rgba(0,0,0,.35);z-index:300;overflow:hidden}
.you-item{display:flex;align-items:center;gap:10px;padding:9px 14px;font-size:12px;color:var(--text2);cursor:pointer;border:none;background:transparent;width:100%;text-align:left}
.you-item:hover{background:var(--bg3);color:var(--text)}
.you-item i{width:16px;text-align:center;font-size:12px}
/* ═══ V36 — widget messages flottant ═══ */
.msg-fab{position:fixed;bottom:20px;left:20px;z-index:500;width:48px;height:48px;border-radius:50%;background:linear-gradient(135deg,#0EA5E9,var(--blue));color:#fff;font-size:18px;display:flex;align-items:center;justify-content:center;box-shadow:0 6px 24px rgba(14,165,233,.35);border:none;transition:all .3s;opacity:.85}
.msg-fab:hover{opacity:1;transform:scale(1.1)}
.msg-widget{position:fixed;bottom:80px;left:20px;z-index:499;width:350px;height:480px;max-height:calc(100dvh - 110px);background:var(--bg2);border:1px solid var(--border);border-radius:14px;box-shadow:0 16px 56px rgba(0,0,0,.4);display:flex;flex-direction:column;overflow:hidden}
[data-theme="light"] .you-menu{box-shadow:var(--sh-lg)}
[data-theme="light"] .msg-widget{box-shadow:0 8px 24px rgba(92,72,36,.14),0 32px 80px rgba(92,72,36,.22)}

/* V37 — menus contextuels chat */
.msg-row{position:relative}
.msg-dots{width:26px;height:26px;border-radius:6px;border:1px solid var(--border);background:var(--bg2);color:var(--text3);font-size:11px;opacity:0;transition:opacity .12s;cursor:pointer;flex-shrink:0;align-self:center}
.msg-row:hover .msg-dots,.grp-row:hover .grp-dots{opacity:1}

.ctx-menu,.ctx-menu-fixed{background:var(--bg2);border:1px solid var(--border);border-radius:10px;box-shadow:0 10px 30px rgba(0,0,0,.35);min-width:150px;overflow:hidden}

.ctx-item{display:flex;align-items:center;gap:8px;width:100%;padding:8px 12px;font-size:11px;color:var(--text2);background:transparent;border:none;cursor:pointer;text-align:left}
.ctx-item:hover{background:var(--bg3);color:var(--text)}

.grp-dots{width:22px;height:22px;border-radius:6px;border:none;background:transparent;color:var(--text3);font-size:11px;opacity:0;transition:opacity .15s;cursor:pointer;flex-shrink:0}
.grp-dots:hover{color:var(--red)}
.notif-bell{position:relative;cursor:pointer;padding:7px 10px;border-radius:var(--radius);transition:all .2s}

.notif-dot{position:absolute;top:3px;right:5px;width:9px;height:9px;border-radius:50%;background:var(--red);border:2px solid var(--bg2);animation:pulse 2s infinite}
.notif-panel{position:absolute;top:calc(100% + 6px);right:-20px;width:340px;max-height:420px;overflow-y:auto;background:var(--bg2);border:1px solid var(--border);border-radius:12px;box-shadow:0 16px 48px rgba(0,0,0,.5);z-index:600;animation:fadeUp .2s}
.notif-item{padding:11px 14px;border-bottom:1px solid var(--border);display:flex;gap:10px;align-items:flex-start;transition:background .15s;cursor:pointer;font-size:12px}
.notif-item:hover{background:var(--bg3)}
.notif-item.unread{border-left:3px solid var(--gold)}
.notif-ic{width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:11px}
.bulk-bar{position:sticky;bottom:0;left:0;right:0;background:linear-gradient(180deg,transparent,var(--bg) 20%);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-top:1px solid rgba(197,160,89,.15);padding:12px 18px;display:flex;align-items:center;gap:10px;z-index:50;animation:fadeUp .2s}
.bulk-cnt{font-family:var(--mono);font-weight:700;color:var(--gold);font-size:14px}
.bulk-btn{padding:6px 12px;border-radius:var(--radius);font-size:10px;font-weight:600;transition:all .15s;border:1px solid var(--border);color:var(--text2)}
.bulk-btn:hover{border-color:var(--gold);color:var(--gold);background:rgba(197,160,89,.06)}
.chk{width:16px;height:16px;accent-color:var(--gold);cursor:pointer;flex-shrink:0}
/* Pipeline calendar removed — using Agenda only */
.chart-card{background:linear-gradient(160deg,var(--bg2),var(--bg3));border:1px solid var(--border);border-radius:12px;overflow:hidden}
.chart-hd{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.chart-hd span{font-size:11px;font-weight:600;font-family:var(--mono);color:var(--text2)}
.funnel-step{display:flex;align-items:center;gap:10px;padding:7px 14px;transition:background .15s}
.funnel-step:hover{background:var(--bg3)}
.funnel-bar{height:26px;border-radius:8px;transition:width .8s ease-out;min-width:6px;display:flex;align-items:center;justify-content:flex-end;padding-right:10px;font-size:10px;font-weight:700;color:rgba(255,255,255,.95);font-family:var(--mono);box-shadow:inset 0 1px 0 rgba(255,255,255,.1)}
.feed{max-height:280px;overflow-y:auto}
.feed-item{display:flex;gap:10px;padding:10px 14px;border-bottom:1px solid var(--border);transition:background .15s;animation:fadeUp .3s ease-out both}
.feed-item:hover{background:var(--bg3)}
.feed-dot{width:8px;height:8px;border-radius:50%;margin-top:5px;flex-shrink:0}

/* ═══ V13 — ENRICHMENT ═══ */
.enrich-card{background:linear-gradient(135deg,rgba(41,98,255,.06),rgba(139,92,246,.06));border:1px solid rgba(41,98,255,.15);border-radius:var(--radius);padding:12px;margin-top:10px;animation:fadeUp .3s}
.enrich-card .enrich-title{font-size:9px;font-weight:700;color:var(--blue);font-family:var(--mono);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:6px;display:flex;align-items:center;gap:5px}
.enrich-card .enrich-body{font-size:11px;color:var(--text2);line-height:1.7;white-space:pre-wrap}
.enrich-btn{padding:6px 10px;border-radius:var(--radius);border:1px solid rgba(41,98,255,.3);color:var(--blue);font-size:10px;font-weight:600;transition:all .2s;display:inline-flex;align-items:center;gap:4px}
.enrich-btn:hover{background:rgba(41,98,255,.08);border-color:var(--blue)}
.enrich-btn.loading{opacity:.6;pointer-events:none}
/* ═══ V13 — MATCHING ═══ */
.match-hero{background:linear-gradient(135deg,rgba(139,92,246,.08),rgba(197,160,89,.05));border:1px solid rgba(139,92,246,.15);border-radius:12px;padding:24px;margin-bottom:20px}
.match-form{display:grid;grid-template-columns:1fr 1fr 1fr 1fr auto;gap:10px;align-items:end}
.match-result{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:18px;margin-bottom:10px;transition:all .3s;position:relative;overflow:hidden;animation:fadeUp .3s ease-out both}
.match-result:hover{border-color:rgba(139,92,246,.3);transform:translateY(-2px);box-shadow:0 8px 30px rgba(0,0,0,.2)}
.match-result::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;border-radius:3px 3px 0 0}
.match-score{width:56px;height:56px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:800;font-family:var(--mono);flex-shrink:0}
.match-tags{display:flex;gap:4px;flex-wrap:wrap;margin-top:6px}
.match-tag{padding:2px 8px;border-radius:12px;font-size:9px;font-weight:600;font-family:var(--mono)}
.match-empty{text-align:center;padding:50px 20px;color:var(--text3)}
.match-empty i{font-size:32px;display:block;margin-bottom:12px;color:rgba(139,92,246,.3)}
/* V13.2 — Talent scoring glow */
.talent-card{position:relative;transition:all .3s}
.talent-card.hot{border-color:rgba(197,160,89,.35);box-shadow:0 0 12px rgba(197,160,89,.1)}
.talent-card.warm{border-color:rgba(197,160,89,.2)}
.heat-bar{height:3px;border-radius:2px;background:var(--bg4);overflow:hidden;margin-top:4px}
.heat-fill{height:100%;border-radius:2px;transition:width .6s}
/* V13.2 — Quick filters */
.qf{display:flex;gap:4px;flex-wrap:wrap}
.qf-btn{padding:5px 12px;border-radius:20px;font-size:10px;font-weight:600;border:1px solid var(--border);color:var(--text2);transition:all .2s}
.qf-btn:hover{border-color:var(--gold);color:var(--gold)}
.qf-btn.active{background:rgba(197,160,89,.1);border-color:var(--gold);color:var(--gold)}
/* V13.2 — Pitch button */
.pitch-btn{padding:4px 8px;border-radius:var(--radius);border:1px solid rgba(139,92,246,.25);color:var(--purple);font-size:10px;transition:all .15s}
.pitch-btn:hover{background:rgba(139,92,246,.06)}
/* V13.2 — Client mode */
.client-blur{filter:blur(5px);user-select:none;pointer-events:none}
/* V13.2 — Day Panel */
.day-panel-ov{position:fixed;inset:0;z-index:300;background:rgba(0,0,0,.55);backdrop-filter:blur(3px);display:flex;align-items:center;justify-content:center;padding:24px;animation:fadeIn .18s ease-out}
.day-panel{position:relative;width:960px;max-width:94vw;max-height:86vh;background:var(--bg2);border:1px solid rgba(197,160,89,.18);border-radius:16px;overflow-y:auto;box-shadow:0 24px 70px rgba(0,0,0,.5);animation:popIn .22s cubic-bezier(.2,.9,.3,1)}
.day-panel::-webkit-scrollbar{width:3px}
.day-hdr{padding:16px 20px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--bg2);z-index:5}
.day-date{font-family:var(--serif);font-size:20px;font-weight:600}
.day-sub{font-size:11px;color:var(--text3);margin-top:2px;text-transform:capitalize}
.day-timeline{padding:8px 20px 20px}

.day-hour-content{flex:1;padding:4px 0;display:flex;flex-direction:column;gap:3px}
.day-ev{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:8px;transition:all .2s;cursor:pointer}

.day-ev-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.day-ev-body{flex:1}
.day-ev-title{font-size:12px;font-weight:600}
.day-ev-meta{font-size:10px;color:var(--text3);margin-top:1px}

.day-ev:hover .day-ev-actions{opacity:1}
.day-act-btn{padding:3px 7px;border-radius:4px;border:1px solid var(--border);color:var(--text2);font-size:9px;transition:all .15s}
.day-act-btn:hover{border-color:var(--gold);color:var(--gold)}
.day-act-btn.del:hover{border-color:var(--red);color:var(--red)}
.day-new-form{padding:14px 20px;border-top:1px solid var(--border);background:var(--bg);position:sticky;bottom:0}
/* V13.2 — Agenda calendar */
.ag-cal{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.ag-head{font-size:9px;font-weight:700;color:var(--text3);text-align:center;padding:8px 0;font-family:var(--mono)}
.ag-day{min-height:90px;background:var(--bg2);border:1px solid var(--border);border-radius:6px;padding:5px 6px;transition:all .15s;cursor:pointer}

.ag-day.ag-today{border-color:rgba(197,160,89,.4);background:rgba(197,160,89,.04)}
.ag-day.ag-other{opacity:.25}
.ag-num{font-size:11px;font-weight:700;font-family:var(--mono);margin-bottom:3px}
.ag-ev{font-size:8px;padding:2px 5px;border-radius:3px;margin-bottom:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:600;cursor:pointer;transition:opacity .15s}
.ag-ev:hover{opacity:.7}
.ag-add{position:absolute;bottom:3px;right:3px;width:16px;height:16px;border-radius:50%;background:var(--bg3);border:1px solid var(--border);color:var(--text3);font-size:9px;display:none;align-items:center;justify-content:center}
.ag-day:hover .ag-add{display:flex}

.ai-fab{opacity:.85;transition:all .3s}.ai-fab:hover{opacity:1;transform:scale(1.1)}

/* V19 — Pipeline Pro */
.pill-bar{display:flex;gap:3px;padding:2px;background:var(--bg);border-radius:8px;border:1px solid var(--border)}

/* ══════════════════════════════════════════════════════════════
   v52 — FINITIONS : profondeur, verre, lumière
   Ajouté en fin de feuille : rien n'est remplacé, tout s'affine.
   ══════════════════════════════════════════════════════════════ */

/* — Échelle d'ombres du thème sombre (le clair a déjà la sienne) — */
:root{
  --d-sm:0 1px 2px rgba(0,0,0,.32), 0 2px 6px rgba(0,0,0,.22);
  --d-md:0 1px 2px rgba(0,0,0,.3), 0 6px 16px rgba(0,0,0,.28), 0 14px 34px rgba(0,0,0,.22);
  --d-lg:0 2px 6px rgba(0,0,0,.34), 0 12px 32px rgba(0,0,0,.34), 0 32px 68px rgba(0,0,0,.3);
  --d-xl:0 4px 12px rgba(0,0,0,.4), 0 24px 60px rgba(0,0,0,.42), 0 56px 120px rgba(0,0,0,.36);
  /* Filet de lumière haute : l'arête qu'attrape une surface vitrée */
  --sheen:inset 0 1px 0 rgba(255,255,255,.055);
  --sheen-strong:inset 0 1px 0 rgba(255,255,255,.09);
  --ease:cubic-bezier(.22,.9,.28,1);
}
[data-theme="light"]{
  --sheen:inset 0 1px 0 rgba(255,255,255,.9);
  --sheen-strong:inset 0 1px 0 rgba(255,255,255,1);
}

/* — Surfaces : profondeur au repos, élévation au survol — */
.card,.stat-card,.chart-card,.enrich-card,.outreach-card,.match-card{
  box-shadow:var(--sheen), var(--d-sm);
  transition:box-shadow .28s var(--ease), border-color .28s var(--ease), transform .28s var(--ease);
}
.card:hover,.chart-card:hover{
  box-shadow:var(--sheen-strong), var(--d-md);
  border-color:var(--border2);
}
[data-theme="light"] .card,[data-theme="light"] .stat-card,
[data-theme="light"] .chart-card{ box-shadow:var(--sheen), var(--sh-sm); }
[data-theme="light"] .card:hover,[data-theme="light"] .chart-card:hover{
  box-shadow:var(--sheen-strong), var(--sh-md);
}

/* — Tuiles du Hub : la goutte qui roule sous le doigt — */
.hub-card{
  box-shadow:var(--sheen), var(--d-md);
  transition:transform .34s var(--ease), box-shadow .34s var(--ease), border-color .34s var(--ease);
}
.hub-card:hover{
  transform:translateY(-3px);
  box-shadow:var(--sheen-strong), var(--d-lg);
}
.hub-card:active{ transform:translateY(-1px) scale(.994); transition-duration:.09s; }
[data-theme="light"] .hub-card{ box-shadow:var(--sheen), var(--sh-md); }
[data-theme="light"] .hub-card:hover{ box-shadow:var(--sheen-strong), var(--sh-lg); }

/* Reflet liquide : une lueur qui suit le curseur sur la tuile */
.hub-card::after{
  content:'';
  position:absolute; inset:0;
  border-radius:inherit;
  pointer-events:none;
  opacity:0;
  will-change:opacity;
  transition:opacity .4s var(--ease);
  background:radial-gradient(320px circle at var(--mx,50%) var(--my,0%),
    rgba(197,160,89,.16), transparent 62%);
}
.hub-card:hover::after{ opacity:1; }
[data-theme="light"] .hub-card::after{
  background:radial-gradient(320px circle at var(--mx,50%) var(--my,0%),
    rgba(139,106,46,.13), transparent 62%);
}

/* — Cartes du Kanban : elles se soulèvent, elles ne s'allument pas — */
.kc{
  box-shadow:var(--sheen), var(--d-sm);
  transition:transform .2s var(--ease), box-shadow .2s var(--ease), border-color .2s var(--ease);
  contain:layout style;
}
.kc:hover{ transform:translateY(-2px); box-shadow:var(--sheen-strong), var(--d-md); }
.kc:active{ transform:translateY(0) scale(.997); transition-duration:.08s; }

/* — Modales et panneaux : la profondeur porte la hiérarchie — */
.modal,.rpanel,.day-panel,.notif-panel,.cmd-box{
  box-shadow:var(--sheen-strong), var(--d-xl);
}
[data-theme="light"] .modal,[data-theme="light"] .rpanel,
[data-theme="light"] .day-panel,[data-theme="light"] .notif-panel{
  box-shadow:var(--sheen-strong), 0 8px 24px rgba(92,72,36,.14),
    0 32px 80px rgba(92,72,36,.2), 0 0 0 1px rgba(139,106,46,.05);
}

/* Voile des overlays : plus doux, moins opaque, vrai flou */
/* Le flou des overlays est deja defini plus haut : on ne le surcharge pas. */

/* — Barre de navigation : verre dépoli — */
.topnav{
  box-shadow:var(--sheen), 0 1px 0 var(--border), 0 6px 22px rgba(0,0,0,.24);
}
[data-theme="light"] .topnav{
  box-shadow:var(--sheen-strong), 0 1px 0 rgba(227,216,190,.9), 0 6px 20px rgba(92,72,36,.07);
}

/* — Boutons flottants : la goutte tenue en suspension — */
.ai-fab,.msg-fab{
  box-shadow:var(--sheen-strong), 0 4px 12px rgba(0,0,0,.3), 0 12px 30px rgba(139,106,46,.3);
  transition:transform .26s var(--ease), box-shadow .26s var(--ease);
}
.ai-fab:hover,.msg-fab:hover{
  transform:translateY(-2px) scale(1.04);
  box-shadow:var(--sheen-strong), 0 8px 20px rgba(0,0,0,.34), 0 20px 46px rgba(139,106,46,.42);
}
.ai-fab:active,.msg-fab:active{ transform:translateY(0) scale(.97); transition-duration:.08s; }

/* — Boutons : appui physique — */
button:not(.you-item):not(.lnav):active{ transform:scale(.978); }
button{ transition:background .16s var(--ease), transform .1s var(--ease); }

/* — Champs : anneau de focus net, sans halo baveux — */
input:focus-visible,textarea:focus-visible,select:focus-visible{
  outline:none;
  border-color:var(--gold);
  box-shadow:0 0 0 3px rgba(197,160,89,.18);
}
[data-theme="light"] input:focus-visible,
[data-theme="light"] textarea:focus-visible,
[data-theme="light"] select:focus-visible{
  box-shadow:0 0 0 3px rgba(139,106,46,.15);
}

/* — Badges et pastilles : légèrement bombés — */
.badge,.pill{ box-shadow:var(--sheen), 0 1px 2px rgba(0,0,0,.16); }
[data-theme="light"] .badge,[data-theme="light"] .pill{
  box-shadow:var(--sheen), 0 1px 2px rgba(92,72,36,.07);
}

/* — Barres de progression : creusées, remplissage bombé — */
.prog{ box-shadow:inset 0 1px 3px rgba(0,0,0,.28); overflow:hidden; }
.prog-fill{ box-shadow:inset 0 1px 0 rgba(255,255,255,.22); }
[data-theme="light"] .prog{ box-shadow:inset 0 1px 3px rgba(92,72,36,.13); }

/* — Avatars : galets polis — */
.av{ box-shadow:var(--sheen), 0 2px 6px rgba(0,0,0,.26); }
[data-theme="light"] .av{ box-shadow:var(--sheen), 0 2px 5px rgba(92,72,36,.14); }

/* — Point de synchro : pulsation vivante — */
.sync-dot.on{ box-shadow:0 0 0 0 rgba(8,153,129,.5); animation:pulseDot 2.6s ease-out infinite; }
@keyframes pulseDot{
  0%{ box-shadow:0 0 0 0 rgba(8,153,129,.45); }
  70%{ box-shadow:0 0 0 7px rgba(8,153,129,0); }
  100%{ box-shadow:0 0 0 0 rgba(8,153,129,0); }
}

/* — Lignes de tableau : surlignage discret — */
.tbl tbody tr{ transition:background .16s var(--ease); }
.tbl tbody tr:hover{ background:rgba(197,160,89,.045); }
[data-theme="light"] .tbl tbody tr:hover{ background:rgba(139,106,46,.05); }

/* — Défilement : barres fines et sobres — */
*::-webkit-scrollbar{ width:9px; height:9px; }
*::-webkit-scrollbar-track{ background:transparent; }
*::-webkit-scrollbar-thumb{
  background:rgba(197,160,89,.2); border-radius:20px;
  border:2px solid transparent; background-clip:content-box;
}
*::-webkit-scrollbar-thumb:hover{ background:rgba(197,160,89,.36); background-clip:content-box; }

/* — Rendu typographique — */
body{ -webkit-font-smoothing:antialiased; -moz-osx-font-smoothing:grayscale; text-rendering:optimizeLegibility; }

/* — Accessibilité : mouvement réduit respecté — */
@media (prefers-reduced-motion:reduce){
  *,*::before,*::after{
    animation-duration:.01ms!important; animation-iteration-count:1!important;
    transition-duration:.01ms!important; scroll-behavior:auto!important;
  }
  .hub-card:hover,.kc:hover,.ai-fab:hover,.msg-fab:hover{ transform:none; }
}

/* ═══ HUB ═══ */
const HubPage=()=>{
const[hubDayOff,setHubDayOff]=useState(0);
const hubDate=(()=>{const d=new Date();d.setDate(d.getDate()+hubDayOff);return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0")})();
const hubDayLabel=hubDayOff===0?"Aujourd'hui":hubDayOff===1?"Demain":hubDayOff===-1?"Hier":new Date(hubDate).toLocaleDateString("fr-FR",{weekday:"short",day:"numeric",month:"short"});
const me=st.byM.find(m=>m.id===effSess)||{};
const myWeek=myL.filter(l=>(Date.now()-new Date(l.dateCreated).getTime())/8.64e7<=7).length;
const myUrg=myL.filter(isUrg).length;
const myMoney=isA?st.margeNette:(me.prosp||0);
const moneyLabel=isA?"Marge Nette":"Ma Commission";
const moneyEmoji=isA?"🏆":"💸";
/* Objectifs : clients signés semaine / mois + CA mois */
const nowD=new Date();const startMonth=new Date(nowD.getFullYear(),nowD.getMonth(),1).getTime();
const signedThisWeek=l=>l.status==="reussi"&&(Date.now()-new Date(l.dateCreated).getTime())/8.64e7<=7;
const signedThisMonth=l=>l.status==="reussi"&&new Date(l.dateCreated).getTime()>=startMonth;
const myObj=objectives[effSess]||OBJ_DEFAULTS[effSess]||{week:5,month:20,caMonth:10000};
const mySignWeek=mineL.filter(signedThisWeek).length;
const mySignMonth=mineL.filter(signedThisMonth).length;
const objWeekPct=myObj.week>0?Math.round(mySignWeek/myObj.week*100):0;
const objMonthPct=myObj.month>0?Math.round(mySignMonth/myObj.month*100):0;
const myCaMonth=mineL.filter(signedThisMonth).reduce((s,l)=>s+(l.valeur||0),0);
const teamCaMonth=leads.filter(signedThisMonth).reduce((s,l)=>s+(l.valeur||0),0);
const myCaObj=myObj.caMonth||0;
const teamCaObj=Object.values(objectives).reduce((s,o)=>s+(o.caMonth||0),0);
const caMonthPct=myCaObj>0?Math.round(myCaMonth/myCaObj*100):0;
return(
<div className="hub">
  <div className="hub-header fu">
    <div><h1 className="hub-title">Bienvenue, {sU?.name||""}</h1><p className="hub-sub">{sU?.role} — WEBO</p></div>
    <div style={{display:"flex",gap:6}}><button onClick={generateRapport} style={{padding:"8px 14px",borderRadius:"var(--radius)",border:"1px solid var(--gold)",color:"var(--gold)",fontSize:11,fontWeight:600}}><i className="fa-solid fa-chart-bar" style={{marginRight:4}}/>Rapport</button></div>
  </div>
  {/* ═══ DASHBOARD ═══ */}
  <div className="card fu" style={{marginBottom:18,background:"linear-gradient(135deg,rgba(197,160,89,.04),rgba(41,98,255,.02))",border:"1px solid rgba(197,160,89,.12)"}}>
    <div style={{padding:"16px 20px"}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <Av id={effSess} sz={42}/>
          <div><div style={{fontWeight:700,fontSize:16}}>{sU?.name}</div><div style={{fontSize:11,color:"var(--text2)"}}>{sU?.role}</div></div>
        </div>
        <button onClick={()=>setShowObjForm(true)} style={{padding:"6px 12px",borderRadius:"var(--radius)",border:"1px solid var(--border)",color:"var(--text2)",fontSize:11,fontWeight:600}}><i className="fa-solid fa-bullseye" style={{marginRight:5,color:"var(--gold)"}}/>Objectifs</button>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(100px,1fr))",gap:10,marginBottom:14}}>
        {[{l:"Cette semaine",v:myWeek,c:"var(--blue)",e:"📥"},{l:"Total leads",v:st.total,c:"var(--gold)",e:"📁"},{l:"Obj. Semaine",v:mySignWeek+" / "+myObj.week,c:objWeekPct>=100?"var(--green)":objWeekPct>=50?"var(--gold)":"var(--red)",e:"🎯"},{l:"Obj. Mois",v:mySignMonth+" / "+myObj.month,c:objMonthPct>=100?"var(--green)":objMonthPct>=50?"var(--gold)":"var(--red)",e:"📆"},{l:"Conversion",v:(me.conv||0)+"%",c:(me.conv||0)>=25?"var(--green)":"var(--red)",e:me.conv>=25?"🔥":"📊"},{l:moneyLabel,v:E(myMoney),c:isA?"var(--gold)":"var(--blue)",e:moneyEmoji},{l:"CA Signé",v:E(st.ca),c:"var(--green)",e:"💰"},{l:"Urgents",v:myUrg,c:myUrg>0?"var(--red)":"var(--green)",e:myUrg>0?"🔥":"✅"}].map((s,i)=>
        <div key={i} className="fu" style={{animationDelay:i*40+"ms",textAlign:"center",padding:"10px 6px",background:"var(--bg)",borderRadius:10,border:"1px solid var(--border)"}}>
          <div style={{fontSize:18,marginBottom:2}}>{s.e}</div>
          <div style={{fontSize:16,fontWeight:800,fontFamily:"var(--mono)",color:s.c}}>{typeof s.v==="string"?<P$ v={s.v} p={pm}/>:s.v}</div>
          <div style={{fontSize:8,color:"var(--text3)",fontFamily:"var(--mono)",letterSpacing:.5,textTransform:"uppercase",marginTop:2}}>{s.l}</div>
        </div>)}
      </div>
      {/* Barres objectifs perso + équipe */}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:14}}>
        <div>
          <div style={{fontSize:9,color:"var(--text3)",fontFamily:"var(--mono)",marginBottom:3,display:"flex",justifyContent:"space-between"}}><span>MES CLIENTS / MOIS — {mySignMonth}/{myObj.month}</span><span style={{color:objMonthPct>=80?"var(--green)":"var(--gold)"}}>{objMonthPct}%</span></div>
          <div style={{height:8,borderRadius:4,background:"var(--bg4)",overflow:"hidden"}}><div style={{height:"100%",borderRadius:4,background:objMonthPct>=100?"var(--green)":objMonthPct>=50?"var(--gold)":"var(--red)",width:Math.min(objMonthPct,100)+"%",transition:"width 1s ease-out"}}/></div>
        </div>
        <div>
          <div style={{fontSize:9,color:"var(--text3)",fontFamily:"var(--mono)",marginBottom:3,display:"flex",justifyContent:"space-between"}}><span>MON CA / MOIS — {E(myCaMonth)}/{E(myCaObj)}</span><span style={{color:caMonthPct>=80?"var(--green)":"var(--gold)"}}>{caMonthPct}%</span></div>
          <div style={{height:8,borderRadius:4,background:"var(--bg4)",overflow:"hidden"}}><div style={{height:"100%",borderRadius:4,background:caMonthPct>=100?"var(--green)":caMonthPct>=50?"var(--gold)":"var(--red)",width:Math.min(caMonthPct,100)+"%",transition:"width 1s ease-out"}}/></div>
        </div>
        <div>
          <div style={{fontSize:9,color:"var(--text3)",fontFamily:"var(--mono)",marginBottom:3,display:"flex",justifyContent:"space-between"}}><span>ÉQUIPE CA / MOIS — {E(teamCaMonth)}/{E(teamCaObj)}</span><span style={{color:(teamCaObj&&teamCaMonth/teamCaObj>=.8)?"var(--green)":"var(--gold)"}}>{teamCaObj?Math.round(teamCaMonth/teamCaObj*100):0}%</span></div>
          <div style={{height:8,borderRadius:4,background:"var(--bg4)",overflow:"hidden"}}><div style={{height:"100%",borderRadius:4,background:"linear-gradient(90deg,var(--gold),var(--blue))",width:Math.min(teamCaObj?teamCaMonth/teamCaObj*100:0,100)+"%",transition:"width 1s ease-out"}}/></div>
        </div>
      </div>
    </div>
  </div>
  {/* ═══ FUNNEL (clic → Pipeline) + AGENDA DU JOUR (clic → Agenda) ═══ */}
  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14,marginBottom:18}}>
    <div className="chart-card" onClick={()=>setPage("pipeline")} style={{cursor:"pointer"}} title="Ouvrir le Pipeline">
      <div className="chart-hd"><span><i className="fa-solid fa-filter" style={{color:"var(--gold)",marginRight:6}}/>Funnel</span><span style={{color:"var(--text3)"}}>{st.total} leads <i className="fa-solid fa-arrow-right" style={{fontSize:9,marginLeft:4}}/></span></div>
      <div style={{padding:"4px 0"}}>{COLS.filter(c=>!["perdu","pas_potentiel"].includes(c.id)).map((col,i)=>{const cnt=myL.filter(l=>l.status===col.id).length;const mx=Math.max(...COLS.map(c=>myL.filter(l=>l.status===c.id).length),1);const pct=Math.round(cnt/mx*100);const val=myL.filter(l=>l.status===col.id).reduce((s,l)=>s+l.valeur,0);
      return <div key={col.id} className="funnel-step">
        <div style={{width:80,fontSize:9,fontWeight:600,color:col.accent,flexShrink:0}}><i className={"fa-solid "+col.icon} style={{marginRight:4,fontSize:8}}/>{col.label}</div>
        <div style={{flex:1}}><div className="funnel-bar" style={{width:Math.max(pct,8)+"%",background:"linear-gradient(90deg,"+col.accent+"CC,"+col.accent+"55)"}}>{cnt>0?cnt:""}</div></div>
        <div style={{width:70,textAlign:"right",fontSize:10,fontFamily:"var(--mono)",color:"var(--text2)"}}><P$ v={E(val)} p={pm}/></div>
      </div>})}</div>
    </div>
    {/* AGENDA DU JOUR */}
    <div className="chart-card" onClick={()=>setPage("agenda")} style={{cursor:"pointer"}} title="Ouvrir l'Agenda">
      <div className="chart-hd"><span><i className="fa-solid fa-calendar-day" style={{color:"var(--gold)",marginRight:6}}/>Agenda — {hubDayLabel}</span><span style={{display:"flex",gap:4,alignItems:"center"}} onClick={e=>e.stopPropagation()}><button onClick={e=>{e.stopPropagation();setHubDayOff(o=>o-1)}} style={{width:22,height:22,borderRadius:6,border:"1px solid var(--border)",color:"var(--text3)",fontSize:10,display:"flex",alignItems:"center",justifyContent:"center"}} title="Jour précédent"><i className="fa-solid fa-chevron-left"/></button>{hubDayOff!==0&&<button onClick={e=>{e.stopPropagation();setHubDayOff(0)}} style={{padding:"2px 8px",borderRadius:6,border:"1px solid var(--gold)",color:"var(--gold)",fontSize:9,fontWeight:700}}>Auj.</button>}<button onClick={e=>{e.stopPropagation();setHubDayOff(o=>o+1)}} style={{width:22,height:22,borderRadius:6,border:"1px solid var(--border)",color:"var(--text3)",fontSize:10,display:"flex",alignItems:"center",justifyContent:"center"}} title="Jour suivant"><i className="fa-solid fa-chevron-right"/></button></span><span style={{color:"var(--text3)"}}>{td()} <i className="fa-solid fa-arrow-right" style={{fontSize:9,marginLeft:4}}/></span></div>

    {icon:"fa-layer-group",title:"Espace",desc:"Tâches & notes partagées",pg:"espace",roles:["admin","commercial","technicien"],cnt:(visibleWsTasks.filter(t=>t.status!=="done").length)+" tâches",ac:"#8B5CF6",em:"🗂️"},

        <div><span style={{fontWeight:600}}>{l.nom}</span> <span style={{color:"var(--text3)",fontSize:10}}>{l.service}</span></div>

            {ev.tp==="custom"&&<button className="day-act-btn" onClick={()=>{setMoveEv(ev);setMvDate(date);setMvTime(ev.time||"09:00");setMvTitle(ev.lb||ev.title||"")}} style={{borderColor:"var(--gold)",color:"var(--gold)"}}><i className="fa-solid fa-calendar-day" style={{marginRight:3}}/>Modifier</button>}
            {ev.tp==="custom"&&<button className="day-act-btn del" onClick={()=>onDelEvent(ev.id)}>Suppr</button>}
            {ev.lead&&ev.tp==="relance"&&<button className="day-act-btn del" onClick={()=>onMoveLead(ev.lead.id,"")}>Retirer</button>}
          </div>
        </div>)}
        {hEvts.length===0&&<div style={{minHeight:20}}/>}
      </div>
    </div>})}
  </div>
  {moveEv&&<div className="day-new-form">
    <div style={{fontSize:10,fontWeight:600,color:"var(--gold)",fontFamily:"var(--mono)",marginBottom:8}}><i className="fa-solid fa-calendar-day" style={{marginRight:4}}/>DÉCALER — {moveEv.lb||moveEv.title}</div>
    <div style={{fontSize:10,color:"var(--text3)",marginBottom:8}}>Raccourcis</div>
    <div style={{display:"flex",gap:4,flexWrap:"wrap",marginBottom:10}}>

        const ds=base.getFullYear()+"-"+String(base.getMonth()+1).padStart(2,"0")+"-"+String(base.getDate()).padStart(2,"0");

    </div>
    <div className="sep"/>

    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>

    </div>
    <div style={{display:"flex",gap:4,justifyContent:"flex-end",marginTop:8}}>
      <button onClick={()=>setMoveEv(null)} style={{padding:"8px 12px",borderRadius:"var(--radius)",border:"1px solid var(--border)",color:"var(--text2)",fontSize:11}}>Annuler</button>
      <button onClick={()=>{if(mvDate){onMoveEvent(moveEv.id,mvDate,mvTime,moveEv.endTime,mvTitle);setMoveEv(null);onClose()}}} style={{padding:"8px 16px",borderRadius:"var(--radius)",background:"var(--gold)",color:"var(--bg)",fontSize:12,fontWeight:700}}>Enregistrer</button>
    </div>
  </div>}
  {showNew&&<div className="day-new-form">
    <div style={{fontSize:10,fontWeight:600,color:"var(--gold)",fontFamily:"var(--mono)",marginBottom:8}}>NOUVEL EVENT</div>
    <div className="ff"><label>Titre</label><input style={IS2} value={nt} onChange={e=>setNt(e.target.value)} placeholder="Call client, Deadline, RDV..." autoFocus/></div>
    <div className="ff"><label>Pour qui ? (sélection multiple)</label>
      <div style={{display:"flex",gap:6,marginTop:4,flexWrap:"wrap"}}>
        {TEAM.map(m=>{const on=nAssignees.includes(m.id);return(
          <button key={m.id} onClick={()=>setNAssignees(p=>{const nx=on?p.filter(a=>a!==m.id):[...p,m.id];return nx.length?nx:[m.id]})} style={{display:"flex",alignItems:"center",gap:4,padding:"6px 12px",borderRadius:14,fontSize:11,fontWeight:700,border:"1px solid "+(on?m.color:"var(--border)"),background:on?m.color+"22":"transparent",color:on?m.color:"var(--text3)",cursor:"pointer"}}>
            {on&&<i className="fa-solid fa-check" style={{fontSize:8}}/>}{m.name.split(" ")[0]}
          </button>)})}
      </div>
    </div>
    <div className="ff"><label>Plage horaire</label>
      <div style={{display:"flex",gap:6,marginTop:4,marginBottom:6}}>
        <button onClick={()=>setNAllDay(false)} style={{flex:1,padding:"7px",borderRadius:6,border:"1px solid "+(!nAllDay?"var(--gold)":"var(--border)"),background:!nAllDay?"rgba(197,160,89,.1)":"transparent",color:!nAllDay?"var(--gold)":"var(--text2)",fontSize:11,fontWeight:700}}><i className="fa-solid fa-clock" style={{marginRight:4}}/>Créneau précis</button>
        <button onClick={()=>setNAllDay(true)} style={{flex:1,padding:"7px",borderRadius:6,border:"1px solid "+(nAllDay?"var(--gold)":"var(--border)"),background:nAllDay?"rgba(197,160,89,.1)":"transparent",color:nAllDay?"var(--gold)":"var(--text2)",fontSize:11,fontWeight:700}}><i className="fa-solid fa-sun" style={{marginRight:4}}/>Toute la journée</button>

      <div className="ff"><label>Début</label><input style={IS2} type="time" value={ntime} onChange={e=>setNtime(e.target.value)}/></div>
      <div className="ff"><label>Fin</label><input style={IS2} type="time" value={nend} onChange={e=>setNend(e.target.value)}/></div>
    </div>}
    <div className="ff"><label>Couleur</label><div style={{display:"flex",gap:4,marginTop:4}}>{["var(--purple)","var(--gold)","var(--red)","var(--green)","var(--blue)"].map(c=><button key={c} onClick={()=>setNcol(c)} style={{width:22,height:22,borderRadius:6,background:c,border:ncol===c?"2px solid var(--text)":"2px solid transparent"}}/>)}</div></div>
    <div style={{display:"flex",gap:4,justifyContent:"flex-end",marginTop:8}}>
      <button onClick={()=>setShowNew(false)} style={{padding:"8px 12px",borderRadius:"var(--radius)",border:"1px solid var(--border)",color:"var(--text2)",fontSize:11}}>Annuler</button>

    </div>
  </div>}
</div></div>}

/* ═══ FINANCE ═══ */
const Finance=()=>(
<div style={{padding:"14px 18px",flex:1,overflow:"auto"}}>

  </div>
  <div className="finance-grid" style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14,marginBottom:14}}>
    <div className="chart-card">
      <div className="chart-hd"><span><i className="fa-solid fa-chart-pie" style={{color:"var(--gold)",marginRight:6}}/>Commission</span><button onClick={exportFinance} style={{fontSize:9,color:"var(--gold)",fontWeight:600,padding:"3px 8px",border:"1px solid rgba(197,160,89,.2)",borderRadius:"var(--radius)"}}><i className="fa-solid fa-file-csv" style={{marginRight:3}}/>Export</button></div>

            <div style={{textAlign:"center"}}><div style={{width:10,height:10,borderRadius:3,background:"var(--blue)",display:"inline-block",marginRight:4}}/>Chasseurs<div style={{fontFamily:"var(--mono)",fontWeight:700,fontSize:15,color:"var(--blue)",marginTop:2}}><P$ v={E(prosp)} p={pm}/></div><div style={{fontSize:10,color:"var(--text3)"}}>{pP}%</div></div>

          </div>
        </div>})()}
      </div>
    </div>
    <div className="chart-card">
      <div className="chart-hd"><span><i className="fa-solid fa-signal" style={{color:"var(--gold)",marginRight:6}}/>Par Etape</span></div>

/* ═══ ChatInput — GLOBAL, state local (fix perte de focus) ═══ */
function ChatInput({ch,compact,onSend,uploadFile,TEAM,me,viewAs,flash}){
  const[text,setText]=useState("");
  const[mention,setMention]=useState(null);
  const[uploading,setUploading]=useState(false);
  const fileRef=useRef(null);
  const taRef=useRef(null);
  const caretRef=useRef(null);
  const hadFocusRef=useRef(false);
  const others=TEAM.filter(m=>m.id!==me);
  useEffect(()=>{if(hadFocusRef.current&&taRef.current){const el=taRef.current;el.focus();if(caretRef.current!=null){try{el.setSelectionRange(caretRef.current,caretRef.current)}catch(e){}}}});
  const onType=v=>{if(taRef.current)caretRef.current=taRef.current.selectionStart;setText(v);const mm=v.match(/@([A-Za-zÀ-ÿ]*)$/);setMention(mm?mm[1].toLowerCase():null)};
  const applyMention=name=>{setText(t=>t.replace(/@([A-Za-zÀ-ÿ]*)$/,"@"+name+" "));setMention(null);if(taRef.current)taRef.current.focus()};
  const suggestions=mention!==null?others.filter(m=>m.name.split(" ")[0].toLowerCase().startsWith(mention)):[];
  const doSend=()=>{const t=text.trim();if(!t)return;hadFocusRef.current=true;caretRef.current=0;onSend(t);setText("");if(taRef.current)taRef.current.focus()};
  const onPickFile=async e=>{const f=e.target.files&&e.target.files[0];e.target.value="";if(!f)return;setUploading(true);const att=await uploadFile(f);setUploading(false);if(att){onSend(text.trim(),{attachment_url:att.url,attachment_name:att.name,attachment_type:att.type});setText("")}};
  return <div style={{padding:compact?"8px 10px":"10px 12px",borderTop:"1px solid var(--border)",position:"relative"}}>
    {suggestions.length>0&&<div style={{position:"absolute",bottom:"100%",left:12,background:"var(--bg2)",border:"1px solid var(--border)",borderRadius:10,boxShadow:"0 8px 24px rgba(0,0,0,.3)",overflow:"hidden",zIndex:10,minWidth:180}}>
      {suggestions.map(m=><button key={m.id} onClick={()=>applyMention(m.name.split(" ")[0])} style={{display:"flex",alignItems:"center",gap:8,padding:"8px 12px",width:"100%",background:"transparent",border:"none",cursor:"pointer",textAlign:"left"}} onMouseOver={e=>e.currentTarget.style.background="var(--bg3)"} onMouseOut={e=>e.currentTarget.style.background="transparent"}>
        <div style={{width:24,height:24,borderRadius:6,background:m.color+"20",border:"1.5px solid "+m.color+"50",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:700,color:m.color,fontSize:10}}>{m.name[0]}</div>
        <div><div style={{fontSize:11,fontWeight:600,color:"var(--text)"}}>{m.name}</div><div style={{fontSize:8,color:"var(--text3)"}}>{m.role}</div></div>
      </button>)}
    </div>}
    <div style={{display:"flex",gap:6,alignItems:"flex-end"}}>
      <input ref={fileRef} type="file" style={{display:"none"}} onChange={onPickFile}/>
      <button onClick={()=>fileRef.current&&fileRef.current.click()} disabled={uploading||!!viewAs} title="Joindre un fichier (max 5 Mo)" style={{width:34,height:34,borderRadius:8,border:"1px solid var(--border)",background:"var(--bg)",color:uploading?"var(--gold)":"var(--text3)",fontSize:13,flexShrink:0,opacity:viewAs?.4:1}}><i className={"fa-solid "+(uploading?"fa-spinner fa-spin":"fa-paperclip")}/></button>
      <textarea ref={taRef} value={text} disabled={!!viewAs} onFocus={()=>{hadFocusRef.current=true}} onBlur={()=>{setTimeout(()=>{if(document.activeElement!==taRef.current)hadFocusRef.current=false},0)}} onChange={e=>onType(e.target.value)} onKeyDown={e=>{if(taRef.current)caretRef.current=taRef.current.selectionStart;if(e.key==="Enter"&&!e.shiftKey&&suggestions.length===0){e.preventDefault();doSend()}if(e.key==="Enter"&&suggestions.length>0){e.preventDefault();applyMention(suggestions[0].name.split(" ")[0])}}} placeholder={viewAs?"👁 Simulation — envoi désactivé":"Message… (@ pour mentionner)"} rows={1} style={{flex:1,padding:compact?"8px 10px":"9px 12px",borderRadius:10,border:"1px solid var(--border)",background:"var(--bg)",color:"var(--text)",fontSize:compact?11.5:12.5,outline:"none",resize:"none",fontFamily:"var(--sans)",lineHeight:1.5,maxHeight:100}}/>
      <button onClick={doSend} disabled={!text.trim()||!!viewAs} style={{width:34,height:34,borderRadius:8,background:(text.trim()&&!viewAs)?"linear-gradient(135deg,var(--gold),var(--bordeaux2))":"var(--bg4)",color:(text.trim()&&!viewAs)?"#fff":"var(--text4)",fontSize:13,border:"none",flexShrink:0,cursor:(text.trim()&&!viewAs)?"pointer":"default"}}><i className="fa-solid fa-paper-plane"/></button>
    </div>
  </div>;
}

/* ═══ MsgActions — menu ⋯ au clic (overlay fixe, fermé par clic ailleurs) ═══ */
function MsgActions({m,mine,onDelete,flash,align}){
  const[pos,setPos]=useState(null);
  const openMenu=e=>{e.stopPropagation();const r=e.currentTarget.getBoundingClientRect();setPos({x:align==="right"?r.left:r.right,y:r.bottom+4})};
  useEffect(()=>{if(!pos)return;const close=()=>setPos(null);window.addEventListener("click",close);window.addEventListener("scroll",close,true);return()=>{window.removeEventListener("click",close);window.removeEventListener("scroll",close,true)}},[pos]);
  const doCopy=async()=>{try{await navigator.clipboard.writeText(m.text||"")}catch(e){const ta=document.createElement("textarea");ta.value=m.text||"";document.body.appendChild(ta);ta.select();document.execCommand("copy");document.body.removeChild(ta)}flash("Copié ✓");setPos(null)};
  const doSelect=()=>{const el=document.getElementById("bbl-"+m.id);if(el){const r=document.createRange();r.selectNodeContents(el);const s=window.getSelection();s.removeAllRanges();s.addRange(r)}flash("Message sélectionné");setPos(null)};
  const doDel=()=>{setPos(null);if(confirm("Supprimer ce message ?"))onDelete(m.id)};
  return <><button className="msg-dots" onClick={openMenu} title="Options"><i className="fa-solid fa-ellipsis-vertical"/></button>
    {pos&&<div className="ctx-menu-fixed" style={{position:"fixed",top:pos.y,[align==="right"?"right":"left"]:align==="right"?(window.innerWidth-pos.x):pos.x,zIndex:9999}} onClick={e=>e.stopPropagation()}>
      <button className="ctx-item" onClick={doCopy}><i className="fa-solid fa-copy"/>Copier</button>
      <button className="ctx-item" onClick={doSelect}><i className="fa-solid fa-i-cursor"/>Sélectionner</button>
      {mine&&<button className="ctx-item" onClick={doDel} style={{color:"var(--red)"}}><i className="fa-solid fa-trash"/>Supprimer</button>}
    </div>}
  </>;
}

  const[title,setTitle]=useState(t.title);
  const[desc,setDesc]=useState(t.description||"");
  const[dirty,setDirty]=useState(false);
  useEffect(()=>{setTitle(t.title);setDesc(t.description||"")},[t.id]);
  const prio=WS_PRIO.find(p=>p.id===t.priority);
  const assignees=t.assignee_ids||(t.assignee_id?[t.assignee_id]:[]);
  const lead=t.lead_id?leads.find(l=>l.id===t.lead_id):null;
  const toggleAssignee=(mid)=>{let next=assignees.includes(mid)?assignees.filter(a=>a!==mid):[...assignees,mid];if(next.length===0)next=[mid];onSave(t.id,{assignee_ids:next,assignee_id:next[0]})};
  const onFocus=()=>setEditing&&setEditing(t.id,true);

/* ═══ NoteEditor — état local, sauvegarde au blur ═══ */

  const[content,setContent]=useState(note.content||"");

  useEffect(()=>{setTitle(note.title);setTags(note.tags||"");setContent(note.content||"");setSaved(true)},[note.id]);
  const onFocus=()=>setEditing&&setEditing(note.id,true);

  <div className="card" style={{display:"flex",flexDirection:"column",minHeight:0}}>

      <button onClick={()=>onDel(note.id)} style={{color:"var(--red)",fontSize:13}} title="Supprimer"><i className="fa-solid fa-trash"/></button>
    </div>
    <div style={{padding:"8px 14px",borderBottom:"1px solid var(--border)"}}>
      <input value={tags} onFocus={onFocus} onChange={e=>{setTags(e.target.value);setSaved(false)}} onBlur={()=>save({tags})} placeholder="Tags séparés par des virgules (ex: eaa, audit, urgent)" style={{width:"100%",background:"transparent",border:"none",color:"var(--text2)",fontSize:11,outline:"none",fontFamily:"var(--mono)"}}/>
    </div>
    <textarea value={content} onFocus={onFocus} onChange={e=>{setContent(e.target.value);setSaved(false)}} onBlur={()=>save({content})} placeholder="Écrivez ici… (compte-rendu, specs, idées, doc partagée). Sauvegarde quand vous cliquez ailleurs ou sur Enregistrer." style={{flex:1,width:"100%",background:"transparent",border:"none",color:"var(--text)",fontSize:14,lineHeight:1.7,outline:"none",resize:"none",padding:"14px",fontFamily:"var(--sans)",minHeight:300}}/>

  </div>);
}
