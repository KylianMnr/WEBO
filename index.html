function Dot({id,sz=18}){const m=TEAM.find(t=>t.id===id);if(!m)return null;return <div title={m.name} style={{width:sz,height:sz,borderRadius:"50%",background:m.color+"18",border:"2px solid "+m.color,display:"flex",alignItems:"center",justifyContent:"center",fontSize:sz*.48,fontWeight:800,color:m.color,flexShrink:0}}>{m.name[0]}</div>}
function ProbBar({status}){const col=COLS.find(c=>c.id===status);if(!col)return null;const pct=Math.round(col.proba*100);const color=pct>=70?"#34d399":pct>=40?"#fbbf24":pct>=20?"#fb923c":"#818cf8";return <div><div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}><span style={{fontSize:9,fontWeight:700,color:color,fontFamily:"'DM Mono'"}}>{pct}%</span></div><div className="prob-bar"><div className="prob-fill" style={{width:pct+"%",background:color}}/></div></div>}
function StaleTag({li,st}){if(["signe","injoignable"].includes(st))return null;const h=hAgo(li);if(!h||h<48)return null;const c=h>=120?"#ef4444":h>=72?"#fb923c":"#fbbf24";const l=h>=120?"CRITIQUE":h>=72?"DANGER":"DORMANT";return <span style={{display:"inline-flex",alignItems:"center",gap:3,padding:"2px 7px",borderRadius:4,background:c+"12",fontSize:10,fontWeight:700,color:c}}><span style={{width:4,height:4,borderRadius:"50%",background:c}}/>{fAgo(h)}·{l}</span>}
function RelanceTag({nr,st}){if(!nr||["signe","injoignable"].includes(st))return null;const d=dUntil(nr);if(d===null)return null;if(d<0)return <span className="blink" style={{fontSize:10,fontWeight:700,color:"#ef4444",background:"#ef444414",padding:"2px 7px",borderRadius:4}}>⏰J{d}</span>;if(d===0)return <span style={{fontSize:10,fontWeight:700,color:"#fbbf24",background:"#fbbf2414",padding:"2px 7px",borderRadius:4}}>Aujourd'hui</span>;return <span style={{fontSize:10,fontWeight:600,color:"#333",background:"#0e0e1a",padding:"2px 7px",borderRadius:4}}>J+{d}</span>}

function VBadge({s}){const v=VERIFS.find(x=>x.id===s);if(!v||s==="none")return null;return <span style={{fontSize:10,fontWeight:700,color:v.color,background:v.color+"12",padding:"2px 7px",borderRadius:4}}>{v.label}</span>}
function SignedAlert({dateCreated,status}){if(status!=="signe"||!dateCreated)return null;const days=dAgo(dateCreated);if(!days||days<30)return null;return <span className="glow30" style={{display:"inline-flex",alignItems:"center",gap:3,padding:"2px 7px",borderRadius:4,background:"#ef444412",fontSize:10,fontWeight:700,color:"#ef4444",border:"1px solid #ef444420"}}>🔄 Vérif. récurrence ({Math.floor(days)}j)</span>}

function doExportCSV(leads){const h=["Nom","Service","Statut","Valeur","Commission","Prospecteur","Source","Tentatives","Relance","Echec","Notes"];const rows=leads.map(l=>[l.nom,l.service,COLS.find(c=>c.id===l.status)?.label||"",l.valeur,Math.round(l.valeur*.2),mN(l.memberId),l.source||"",l.tentatives||0,l.nextRelance||"",l.echecReason||"",'"'+(l.notes||"").replace(/"/g,'""')+'"']);const csv=[h.join(";"),...rows.map(r=>r.join(";"))].join("\n");const blob=new Blob(["\uFEFF"+csv],{type:"text/csv;charset=utf-8"});const url=URL.createObjectURL(blob);const a=document.createElement("a");a.href=url;a.download="webo-"+td()+".csv";a.click();URL.revokeObjectURL(url)}

function App(){
/* SESSION */

const[leads,setLeads]=useState([]);const[prestas,setPrestas]=useState([]);const[ready,setReady]=useState(false);const[syncStatus,setSyncStatus]=useState("loading");
const[mainTab,setMainTab]=useState("leads");const[view,setView]=useState("kanban");const[showForm,setShowForm]=useState(false);const[editId,setEditId]=useState(null);
const[dragId,setDragId]=useState(null);const[dragOver,setDragOver]=useState(null);const[fM,setFM]=useState("all");const[fS,setFS]=useState("all");
const[toast,setToast]=useState(null);const[showVerif,setShowVerif]=useState(null);const[showFilters,setShowFilters]=useState(false);
const[showPrestaForm,setShowPrestaForm]=useState(false);const[editPresta,setEditPresta]=useState(null);
const[now,setNow]=useState(Date.now());const[aiMessages,setAiMessages]=useState([]);const[aiInput,setAiInput]=useState("");
const[aiLoading,setAiLoading]=useState(false);const[aiShowActions,setAiShowActions]=useState(true);const[aiSummaryId,setAiSummaryId]=useState(null);
const aiEndRef=useRef(null);

const flash=m=>{setToast(m);setTimeout(()=>setToast(null),2800)};
const pN=id=>{const p=prestas.find(x=>x.id===id);return p?p.nom:""};

/* AI */
const buildContext=()=>{const sg=leads.filter(l=>l.status==="signe");const stale=leads.filter(l=>!["signe","injoignable"].includes(l.status)&&hAgo(l.lastInteraction)>=48);const overdue=leads.filter(l=>l.nextRelance&&!["signe","injoignable"].includes(l.status)&&dUntil(l.nextRelance)<0);const pipe=leads.filter(l=>!["signe","injoignable"].includes(l.status));const w=pipe.reduce((s,l)=>{const c=COLS.find(x=>x.id===l.status);return s+(l.valeur*(c?.proba||0))},0);
return "Tu es l assistant IA de WEBO, agence digitale de Kylian. Commission 20% HT. Equipe: Kylian (Gerant), Keddy (Prospecteur), Dylan (Prospecteur). "+leads.length+" leads | "+sg.length+" signes ("+sg.reduce((s,l)=>s+l.valeur,0)+"EUR) | Pondere: "+Math.round(w)+"EUR | Dormants: "+stale.length+" | Overdue: "+overdue.length+". Prestataires: "+prestas.map(p=>p.nom+" ("+p.specialite+")").join(", ")+". LEADS:\n"+leads.map(l=>"- "+l.nom+"|"+l.service+"|"+(COLS.find(c=>c.id===l.status)?.label)+"|"+l.valeur+"EUR|"+mN(l.memberId)+"|"+l.source+"|T:"+l.tentatives+"|"+(l.prestaId?pN(l.prestaId):"pas de presta")+"|"+l.notes).join("\n")+"\nReponds en francais. Direct, concret, actionnable."};

const askAI=async(prompt)=>{setAiMessages(p=>[...p,{role:"user",content:prompt}]);setAiInput("");setAiLoading(true);setAiShowActions(false);
try{const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,system:buildContext(),messages:[...aiMessages.slice(-8).map(m=>({role:m.role,content:m.content})),{role:"user",content:prompt}]})});const data=await res.json();const text=data.content?.map(b=>b.type==="text"?b.text:"").filter(Boolean).join("\n")||"Erreur.";setAiMessages(p=>[...p,{role:"assistant",content:text}])}catch(e){setAiMessages(p=>[...p,{role:"assistant",content:"Erreur connexion IA."}])}setAiLoading(false)};

askAI(prompt)};

/* SUPABASE LOAD */
useEffect(()=>{if(!isConfigured){setSyncStatus("off");setReady(true);return}
(async()=>{setSyncStatus("loading");
const[lr,pr]=await Promise.all([supabase.from("leads").select("*"),supabase.from("prestataires").select("*")]);
if(lr.error)console.error(lr.error);if(pr.error)console.error("prestas:",pr.error);
setLeads((lr.data||[]).map(dbToLead));setPrestas(pr.data||[]);setSyncStatus("on");setReady(true)})()},[]);

useEffect(()=>{if(!isConfigured)return;
const ch=supabase.channel("rt").on("postgres_changes",{event:"*",schema:"public",table:"leads"},p=>{
if(p.eventType==="INSERT"){const n=dbToLead(p.new);setLeads(pr=>pr.some(l=>l.id===n.id)?pr:[...pr,n])}
if(p.eventType==="UPDATE"){const u=dbToLead(p.new);setLeads(pr=>pr.map(l=>l.id===u.id?u:l))}
if(p.eventType==="DELETE")setLeads(pr=>pr.filter(l=>l.id!==p.old.id))
}).on("postgres_changes",{event:"*",schema:"public",table:"prestataires"},p=>{
if(p.eventType==="INSERT"){const n=p.new;setPrestas(pr=>pr.some(x=>x.id===n.id)?pr:[...pr,n])}
if(p.eventType==="UPDATE")setPrestas(pr=>pr.map(x=>x.id===p.new.id?p.new:x));
if(p.eventType==="DELETE")setPrestas(pr=>pr.filter(x=>x.id!==p.old.id))
}).subscribe(s=>{if(s==="SUBSCRIBED")setSyncStatus("on");else if(s==="CLOSED"||s==="CHANNEL_ERROR")setSyncStatus("off")});
return()=>supabase.removeChannel(ch)},[]);

useEffect(()=>{const t=setInterval(()=>setNow(Date.now()),60000);return()=>clearInterval(t)},[]);

/* LEAD CRUD */
const upsertLead=useCallback(async(lead)=>{const clean={...lead};delete clean._isNew;setLeads(p=>p.some(x=>x.id===clean.id)?p.map(x=>x.id===clean.id?clean:x):[...p,clean]);setShowForm(false);setEditId(null);flash(lead._isNew?"Lead ajouté ✓":"Mis à jour ✓");if(isConfigured){const{error}=await supabase.from("leads").upsert(leadToDb(clean));if(error)flash("⚠ Erreur sync")}},[]);
const deleteLead=useCallback(async(id)=>{setLeads(p=>p.filter(l=>l.id!==id));setShowForm(false);setEditId(null);flash("Supprimé");if(isConfigured)await supabase.from("leads").delete().eq("id",id)},[]);

/* AI */
const buildContext=()=>{const sg=leads.filter(l=>l.status==="signe");const stale=leads.filter(l=>!["signe","injoignable"].includes(l.status)&&hAgo(l.lastInteraction)>=48);const overdue=leads.filter(l=>l.nextRelance&&!["signe","injoignable"].includes(l.status)&&dUntil(l.nextRelance)<0);const pipe=leads.filter(l=>!["signe","injoignable"].includes(l.status));const w=pipe.reduce((s,l)=>{const c=COLS.find(x=>x.id===l.status);return s+(l.valeur*(c?.proba||0))},0);
return "Tu es l assistant IA de WEBO, agence digitale de Kylian. Commission 20% HT. Equipe: Kylian (Gerant), Keddy (Prospecteur), Dylan (Prospecteur). "+leads.length+" leads | "+sg.length+" signes ("+sg.reduce((s,l)=>s+l.valeur,0)+"EUR) | Pondere: "+Math.round(w)+"EUR | Dormants: "+stale.length+" | Overdue: "+overdue.length+". Prestataires: "+prestas.map(p=>p.nom+" ("+p.specialite+")").join(", ")+". LEADS:\n"+leads.map(l=>"- "+l.nom+"|"+l.service+"|"+(COLS.find(c=>c.id===l.status)?.label)+"|"+l.valeur+"EUR|"+mN(l.memberId)+"|"+l.source+"|T:"+l.tentatives+"|"+(l.prestaId?pN(l.prestaId):"pas de presta")+"|"+l.notes).join("\n")+"\nReponds en francais. Direct, concret, actionnable."};

const askAI=async(prompt)=>{setAiMessages(p=>[...p,{role:"user",content:prompt}]);setAiInput("");setAiLoading(true);setAiShowActions(false);
try{const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,system:buildContext(),messages:[...aiMessages.slice(-8).map(m=>({role:m.role,content:m.content})),{role:"user",content:prompt}]})});const data=await res.json();const text=data.content?.map(b=>b.type==="text"?b.text:"").filter(Boolean).join("\n")||"Erreur.";setAiMessages(p=>[...p,{role:"assistant",content:text}])}catch(e){setAiMessages(p=>[...p,{role:"assistant",content:"Erreur connexion IA."}])}setAiLoading(false)};

askAI(prompt)};

/* SUPABASE LOAD */
useEffect(()=>{if(!isConfigured){setSyncStatus("off");setReady(true);return}
(async()=>{setSyncStatus("loading");
const[lr,pr]=await Promise.all([supabase.from("leads").select("*"),supabase.from("prestataires").select("*")]);
if(lr.error)console.error(lr.error);if(pr.error)console.error("prestas:",pr.error);
setLeads((lr.data||[]).map(dbToLead));setPrestas(pr.data||[]);setSyncStatus("on");setReady(true)})()},[]);

useEffect(()=>{if(!isConfigured)return;
const ch=supabase.channel("rt").on("postgres_changes",{event:"*",schema:"public",table:"leads"},p=>{
if(p.eventType==="INSERT"){const n=dbToLead(p.new);setLeads(pr=>pr.some(l=>l.id===n.id)?pr:[...pr,n])}
if(p.eventType==="UPDATE"){const u=dbToLead(p.new);setLeads(pr=>pr.map(l=>l.id===u.id?u:l))}
if(p.eventType==="DELETE")setLeads(pr=>pr.filter(l=>l.id!==p.old.id))
}).on("postgres_changes",{event:"*",schema:"public",table:"prestataires"},p=>{
if(p.eventType==="INSERT"){const n=p.new;setPrestas(pr=>pr.some(x=>x.id===n.id)?pr:[...pr,n])}
if(p.eventType==="UPDATE")setPrestas(pr=>pr.map(x=>x.id===p.new.id?p.new:x));
if(p.eventType==="DELETE")setPrestas(pr=>pr.filter(x=>x.id!==p.old.id))
}).subscribe(s=>{if(s==="SUBSCRIBED")setSyncStatus("on");else if(s==="CLOSED"||s==="CHANNEL_ERROR")setSyncStatus("off")});
return()=>supabase.removeChannel(ch)},[]);

useEffect(()=>{const t=setInterval(()=>setNow(Date.now()),60000);return()=>clearInterval(t)},[]);

/* LEAD CRUD */
const upsertLead=useCallback(async(lead)=>{const clean={...lead};delete clean._isNew;setLeads(p=>p.some(x=>x.id===clean.id)?p.map(x=>x.id===clean.id?clean:x):[...p,clean]);setShowForm(false);setEditId(null);flash(lead._isNew?"Lead ajouté ✓":"Mis à jour ✓");if(isConfigured){const{error}=await supabase.from("leads").upsert(leadToDb(clean));if(error)flash("⚠ Erreur sync")}},[]);
const deleteLead=useCallback(async(id)=>{setLeads(p=>p.filter(l=>l.id!==id));setShowForm(false);setEditId(null);flash("Supprimé");if(isConfigured)await supabase.from("leads").delete().eq("id",id)},[]);
const touchLead=useCallback(async(id)=>{setLeads(p=>p.map(l=>l.id===id?{...l,lastInteraction:new Date().toISOString(),tentatives:(l.tentatives||0)+1}:l));if(isConfigured){const lead=leads.find(l=>l.id===id);if(lead)await supabase.from("leads").update({last_interaction:new Date().toISOString(),tentatives:(lead.tentatives||0)+1}).eq("id",id)}},[leads]);
const updateField=useCallback(async(id,fields)=>{setLeads(p=>p.map(l=>l.id===id?{...l,...fields}:l));if(isConfigured){const db={};if("status" in fields)db.status=fields.status;if("lastInteraction" in fields)db.last_interaction=fields.lastInteraction;if("tentatives" in fields)db.tentatives=fields.tentatives;if("nextRelance" in fields)db.next_relance=fields.nextRelance;if("verifStatus" in fields)db.verif_status=fields.verifStatus;if("verifNote" in fields)db.verif_note=fields.verifNote;if("verifDate" in fields)db.verif_date=fields.verifDate;await supabase.from("leads").update(db).eq("id",id)}},[]);
const updVerif=useCallback(async(id,vs,vn)=>{setLeads(p=>p.map(l=>l.id===id?{...l,verifStatus:vs,verifNote:vn,verifDate:td()}:l));setShowVerif(null);flash("Vérification ✓");if(isConfigured)await supabase.from("leads").update({verif_status:vs,verif_note:vn,verif_date:td()}).eq("id",id)},[]);

/* PRESTA CRUD */
const upsertPresta=useCallback(async(p)=>{const clean={...p};delete clean._isNew;setPrestas(pr=>pr.some(x=>x.id===clean.id)?pr.map(x=>x.id===clean.id?clean:x):[...pr,clean]);setShowPrestaForm(false);setEditPresta(null);flash(p._isNew?"Prestataire ajouté ✓":"Mis à jour ✓");if(isConfigured){const{error}=await supabase.from("prestataires").upsert(clean);if(error)flash("⚠ Erreur sync prestas")}},[]);
const deletePresta=useCallback(async(id)=>{setPrestas(pr=>pr.filter(x=>x.id!==id));setShowPrestaForm(false);setEditPresta(null);flash("Supprimé");if(isConfigured)await supabase.from("prestataires").delete().eq("id",id)},[]);

/* DRAG & DROP */
const onDS=(e,id)=>{setDragId(id);e.dataTransfer.effectAllowed="move";e.dataTransfer.setData("text/plain",id)};const onDE=()=>{setDragId(null);setDragOver(null)};
const onDr=async(e,col)=>{e.preventDefault();const id=e.dataTransfer.getData("text/plain");if(id){const lead=leads.find(l=>l.id===id);const nd={status:col,lastInteraction:new Date().toISOString(),tentatives:(lead?.tentatives||0)+1};setLeads(p=>p.map(l=>l.id===id?{...l,...nd}:l));const c=COLS.find(x=>x.id===col);if(lead&&c)flash(lead.nom+" → "+c.label);if(isConfigured)await supabase.from("leads").update({status:col,last_interaction:nd.lastInteraction,tentatives:nd.tentatives}).eq("id",id)}setDragOver(null);setDragId(null)};

const openEdit=id=>{setEditId(id);setShowForm(true)};const closeForm=()=>{setShowForm(false);setEditId(null)};

/* FILTERED DATA (session-aware) */

const filtered=useMemo(()=>{let f=myLeads;if(fM!=="all")f=f.filter(l=>l.memberId===fM);if(fS!=="all")f=f.filter(l=>l.service===fS);return f},[myLeads,fM,fS]);

const stats=useMemo(()=>{const src=isAdmin?leads:myLeads;const sg=src.filter(l=>l.status==="signe");const pipe=src.filter(l=>!["injoignable","signe"].includes(l.status));const stale=src.filter(l=>!["signe","injoignable"].includes(l.status)&&hAgo(l.lastInteraction)>=48);const overdue=src.filter(l=>l.nextRelance&&!["signe","injoignable"].includes(l.status)&&dUntil(l.nextRelance)<0);const caSigne=sg.reduce((s,l)=>s+l.valeur,0);const weighted=pipe.reduce((s,l)=>{const col=COLS.find(c=>c.id===l.status);return s+(l.valeur*(col?.proba||0))},0);const proofMiss=sg.filter(l=>!l.paymentProof).length;const bySrc=SOURCES.map(s=>{const sl=src.filter(l=>l.source===s);const ss=sl.filter(l=>l.status==="signe");const ca=ss.reduce((a,l)=>a+l.valeur,0);return{source:s,total:sl.length,signes:ss.length,rate:sl.length?Math.round(ss.length/sl.length*100):0,ca,com:ca*.2}}).filter(s=>s.total>0).sort((a,b)=>b.com-a.com);const byEchec=ECHECS.filter(e=>e!=="—").map(r=>({reason:r,count:src.filter(l=>l.echecReason===r).length})).filter(e=>e.count>0).sort((a,b)=>b.count-a.count);const byM=TEAM.filter(t=>t.role==="Prospecteur").map(m=>{const ml=src.filter(l=>l.memberId===m.id);const ms=ml.filter(l=>l.status==="signe");const ca=ms.reduce((s,l)=>s+l.valeur,0);const st=ml.filter(l=>!["signe","injoignable"].includes(l.status)&&hAgo(l.lastInteraction)>=48).length;const od=ml.filter(l=>l.nextRelance&&!["signe","injoignable"].includes(l.status)&&dUntil(l.nextRelance)<0).length;return{...m,total:ml.length,signes:ms.length,rate:ml.length?Math.round(ms.length/ml.length*100):0,ca,com:ca*.2,stale:st,overdue:od}}).sort((a,b)=>b.com-a.com);return{total:src.length,signes:sg.length,stale:stale.length,overdue:overdue.length,caSigne,weighted,commission:caSigne*.2,proofMiss,bySrc,byEchec,byM}},[leads,myLeads,isAdmin,now]);

</header>

{/* STATS (leads view) */}
{mainTab==="leads"&&<div className="stats-grid">
{[{l:"LEADS",v:stats.total,c:"#818cf8",n:1},{l:"SIGNÉS",v:stats.signes,c:"#34d399",n:2},{l:"STALE",v:stats.stale,c:stats.stale>0?"#fbbf24":"#222",n:3},{l:"OVERDUE",v:stats.overdue,c:stats.overdue>0?"#ef4444":"#222",n:4},{l:"PONDÉRÉ",v:eur(stats.weighted),c:"#c084fc",n:5},{l:"COMMISSIONS",v:eur(stats.commission),c:"#DC2626",n:6},{l:"PREUVES",v:stats.proofMiss,c:stats.proofMiss>0?"#fb923c":"#222",n:7}].map((s,i)=>

</div>
{prestas.length===0&&<div style={{padding:50,textAlign:"center",color:"#1a1a2a"}}><div style={{fontSize:40,marginBottom:10}}>🤝</div><div style={{fontSize:14,fontWeight:600,color:"#333"}}>Aucun prestataire</div><div style={{fontSize:12,color:"#222",marginTop:4}}>Ajoute tes monteurs, agences et freelances</div></div>}
<div className="presta-grid">
{prestas.map((p,i)=>{const assignedLeads=leads.filter(l=>l.prestaId===p.id);const signedCA=assignedLeads.filter(l=>l.status==="signe").reduce((s,l)=>s+l.valeur,0);
return <div key={p.id} className="m-card fu" style={{animationDelay:i*40+"ms",borderLeft:"3px solid #818cf830"}} onClick={()=>{if(isAdmin){setEditPresta(p);setShowPrestaForm(true)}}}>
  <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:10}}>
    <div style={{width:36,height:36,borderRadius:10,background:"#818cf812",border:"1px solid #818cf820",display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,fontWeight:800,color:"#818cf8",flexShrink:0}}>{p.nom?p.nom[0].toUpperCase():"?"}</div>
    <div style={{flex:1,minWidth:0}}>
      <div style={{fontWeight:700,color:"#d8d8e8",fontSize:15}}>{p.nom}</div>
      <div style={{fontSize:12,color:"#818cf8",fontWeight:600}}>{p.specialite}</div>
    </div>
  </div>
  {p.contact&&<div style={{fontSize:12,color:"#555",marginBottom:6}}>📞 {p.contact}</div>}
  {p.email&&<div style={{fontSize:12,color:"#555",marginBottom:6}}>✉️ {p.email}</div>}
  {p.notes&&<div style={{fontSize:11,color:"#444",marginBottom:8,padding:"6px 8px",background:"#08080f",borderRadius:6,lineHeight:1.5}}>{p.notes}</div>}
  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",paddingTop:8,borderTop:"1px solid #14142a"}}>
    <span style={{fontSize:11,color:"#555"}}>{assignedLeads.length} lead{assignedLeads.length>1?"s":""}</span>
    {signedCA>0&&<span style={{fontSize:13,fontWeight:800,color:"#34d399"}}>{eur(signedCA)}</span>}
  </div>
</div>})}
</div>
</div>}

{/* MODALS */}
{showForm&&<div className="overlay" onClick={closeForm}><div className="overlay-bg"/><div className="modal fu" onClick={e=>e.stopPropagation()}>
<LeadForm lead={editId?leads.find(l=>l.id===editId):null} onSave={upsertLead} onDel={editId?()=>deleteLead(editId):null} onX={closeForm} IS={IS} prestas={prestas} session={session} isAdmin={isAdmin} onAiSummary={aiSummary}/>
</div></div>}
{showVerif&&<div className="overlay" onClick={()=>setShowVerif(null)}><div className="overlay-bg"/><div className="modal fu" style={{maxWidth:500}} onClick={e=>e.stopPropagation()}>
<VerifForm lead={leads.find(l=>l.id===showVerif)} onSave={updVerif} onX={()=>setShowVerif(null)} IS={IS}/>
</div></div>}
{showPrestaForm&&<div className="overlay" onClick={()=>{setShowPrestaForm(false);setEditPresta(null)}}><div className="overlay-bg"/><div className="modal fu" style={{maxWidth:480}} onClick={e=>e.stopPropagation()}>
<PrestaForm presta={editPresta} onSave={upsertPresta} onDel={editPresta?()=>deletePresta(editPresta.id):null} onX={()=>{setShowPrestaForm(false);setEditPresta(null)}} IS={IS}/>
</div></div>}
{toast&&<div className="fu" style={{position:"fixed",bottom:20,left:"50%",transform:"translateX(-50%)",zIndex:2000,background:"#111128",border:"1px solid #DC262630",borderRadius:10,padding:"10px 18px",color:"#d8d8e8",fontSize:13,fontWeight:600,boxShadow:"0 10px 30px rgba(0,0,0,.5)",whiteSpace:"nowrap"}}>{toast}</div>}
</div>);
}

/* ═══ LEAD FORM ═══ */
function LeadForm({lead,onSave,onDel,onX,IS,prestas,session,isAdmin,onAiSummary}){
const[f,setF]=useState(lead?{...lead}:{nom:"",service:SERVICES[0],valeur:"",memberId:session||"keddy",lien:"",status:"nouveau",dateCreated:td(),lastInteraction:new Date().toISOString(),nextRelance:addD(td(),2),notes:"",source:SOURCES[0],echecReason:"—",tentatives:0,paymentProof:"",verifStatus:"none",verifNote:"",prestaId:""});
const s=(k,v)=>setF(p=>({...p,[k]:v}));const col=COLS.find(c=>c.id===f.status);
return <div>
<div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14}}>
  <h3 style={{margin:0,fontSize:17,fontWeight:800,color:"#fff"}}>{lead?"✎ "+lead.nom:"✦ Nouveau Lead"}</h3>
  <div style={{display:"flex",gap:6}}>{lead&&<button onClick={()=>{onX();onAiSummary(lead)}} style={{padding:"5px 10px",borderRadius:6,border:"1px solid #818cf820",background:"transparent",color:"#818cf8",fontSize:11,fontWeight:600}}>🤖 Résumé</button>}<button onClick={onX} style={{background:"none",border:"none",color:"#555",fontSize:22,padding:4}}>✕</button></div>
</div>
<FF l="Nom entreprise"><input style={IS} value={f.nom} onChange={e=>s("nom",e.target.value)} placeholder="Studio Lumière"/></FF>
<div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
  <FF l="Service"><select style={{...IS}} value={f.service} onChange={e=>s("service",e.target.value)}>{SERVICES.map(sv=><option key={sv}>{sv}</option>)}</select></FF>
  <FF l="Valeur HT (€)"><input style={IS} type="number" value={f.valeur} onChange={e=>s("valeur",e.target.value)} placeholder="2500"/></FF>
</div>
<div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
  <FF l="Prospecteur"><select style={{...IS}} value={f.memberId} onChange={e=>s("memberId",e.target.value)} disabled={!isAdmin}>{TEAM.map(m=><option key={m.id} value={m.id}>{m.name}</option>)}</select></FF>
  <FF l="Source"><select style={{...IS}} value={f.source} onChange={e=>s("source",e.target.value)}>{SOURCES.map(src=><option key={src}>{src}</option>)}</select></FF>
</div>
<div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
  <FF l="Statut"><select style={{...IS}} value={f.status} onChange={e=>s("status",e.target.value)}>{COLS.map(c=><option key={c.id} value={c.id}>{c.icon} {c.label} ({Math.round(c.proba*100)}%)</option>)}</select></FF>
  <FF l="Relance"><input style={IS} type="date" value={f.nextRelance} onChange={e=>s("nextRelance",e.target.value)}/></FF>
</div>
<FF l="🤝 Prestataire assigné"><select style={{...IS}} value={f.prestaId} onChange={e=>s("prestaId",e.target.value)}><option value="">— Aucun —</option>{prestas.map(p=><option key={p.id} value={p.id}>{p.nom} ({p.specialite})</option>)}</select></FF>
<FF l="Notes"><textarea style={{...IS,height:60,resize:"vertical"}} value={f.notes} onChange={e=>s("notes",e.target.value)} placeholder="Contexte, échanges..."/></FF>
{(f.status==="signe"||lead?.status==="signe")&&<FF l="Preuve paiement"><input style={IS} value={f.paymentProof} onChange={e=>s("paymentProof",e.target.value)} placeholder="Lien Stripe, virement..."/>{!f.paymentProof&&<div style={{fontSize:11,color:"#fb923c",marginTop:3}}>⚠ Obligatoire</div>}</FF>}
{(f.status==="injoignable"||lead?.status==="injoignable")&&<FF l="Raison échec"><select style={{...IS}} value={f.echecReason} onChange={e=>s("echecReason",e.target.value)}>{ECHECS.map(r=><option key={r}>{r}</option>)}</select></FF>}
{f.valeur&&Number(f.valeur)>0&&<div style={{background:"#DC262608",border:"1px solid #DC262618",borderRadius:10,padding:"10px 14px",marginBottom:10,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
  <div><span style={{fontSize:12,color:"#DC2626",fontWeight:600}}>Commission 20%</span>{col&&<div style={{fontSize:10,color:"#c084fc",marginTop:2}}>Prob. closing: {Math.round(col.proba*100)}%</div>}</div>
  <div style={{textAlign:"right"}}><div style={{fontSize:16,fontWeight:800,color:"#DC2626"}}>{eur(Number(f.valeur)*.2)}</div>{f.status!=="signe"&&col&&<div style={{fontSize:10,color:"#c084fc"}}>Pondéré: {eur(Number(f.valeur)*col.proba)}</div>}</div>
</div>}
<div style={{display:"flex",gap:8,justifyContent:"flex-end",marginTop:14,flexWrap:"wrap"}}>
  {onDel&&<button onClick={onDel} style={{padding:"10px 14px",borderRadius:8,border:"1px solid #ef444420",background:"transparent",color:"#ef4444",fontSize:12,fontWeight:700,marginRight:"auto"}}>Supprimer</button>}
  <button onClick={onX} style={{padding:"10px 16px",borderRadius:8,border:"1px solid #14142a",background:"transparent",color:"#555",fontSize:12,fontWeight:600}}>Annuler</button>
  <button onClick={()=>{if(!f.nom.trim())return;onSave({...f,id:f.id||uid(),valeur:Number(f.valeur)||0,lastInteraction:new Date().toISOString(),_isNew:!f.id})}} style={{padding:"10px 20px",borderRadius:8,border:"none",background:"#DC2626",color:"#fff",fontSize:13,fontWeight:700}}>{lead?"Enregistrer":"Ajouter"}</button>
</div></div>}

function VerifForm({lead,onSave,onX,IS}){
const[st,setSt]=useState(lead?.verifStatus||"pending");const[note,setNote]=useState(lead?.verifNote||"");
if(!lead)return null;
return <div>
<div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14}}><h3 style={{margin:0,fontSize:16,fontWeight:800,color:"#fff"}}>🛡 {lead.nom}</h3><button onClick={onX} style={{background:"none",border:"none",color:"#555",fontSize:22}}>✕</button></div>
<FF l="Statut"><div style={{display:"flex",gap:6,flexWrap:"wrap"}}>{VERIFS.filter(v=>v.id!=="none").map(v=><button key={v.id} onClick={()=>setSt(v.id)} style={{flex:1,minWidth:80,padding:"10px",borderRadius:8,border:"1px solid "+(st===v.id?v.color:"#14142a"),background:st===v.id?v.color+"12":"transparent",color:st===v.id?v.color:"#333",fontSize:12,fontWeight:700}}>{v.label}</button>)}</div></FF>
<FF l="Note"><textarea style={{...IS,height:60,resize:"vertical"}} value={note} onChange={e=>setNote(e.target.value)} placeholder="Client confirme..."/></FF>
<div style={{display:"flex",gap:8,justifyContent:"flex-end",marginTop:14}}>
  <button onClick={onX} style={{padding:"10px 16px",borderRadius:8,border:"1px solid #14142a",background:"transparent",color:"#555",fontSize:12,fontWeight:600}}>Annuler</button>
  <button onClick={()=>onSave(lead.id,st,note)} style={{padding:"10px 20px",borderRadius:8,border:"none",background:"#fbbf24",color:"#07070f",fontSize:13,fontWeight:800}}>Enregistrer</button>
</div></div>}

function PrestaForm({presta,onSave,onDel,onX,IS}){
const[f,setF]=useState(presta?{...presta}:{nom:"",specialite:SPECIALITES[0],contact:"",email:"",notes:""});
const s=(k,v)=>setF(p=>({...p,[k]:v}));
return <div>
<div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14}}>
  <h3 style={{margin:0,fontSize:17,fontWeight:800,color:"#fff"}}>{presta?"✎ "+presta.nom:"🤝 Nouveau Prestataire"}</h3>
  <button onClick={onX} style={{background:"none",border:"none",color:"#555",fontSize:22,padding:4}}>✕</button>
</div>
<FF l="Nom"><input style={IS} value={f.nom} onChange={e=>s("nom",e.target.value)} placeholder="Jean Dupont / Studio XYZ"/></FF>
<FF l="Spécialité"><select style={{...IS}} value={f.specialite} onChange={e=>s("specialite",e.target.value)}>{SPECIALITES.map(sp=><option key={sp}>{sp}</option>)}</select></FF>
<div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
  <FF l="Téléphone"><input style={IS} value={f.contact} onChange={e=>s("contact",e.target.value)} placeholder="06 12 34 56 78" type="tel"/></FF>
  <FF l="Email"><input style={IS} value={f.email} onChange={e=>s("email",e.target.value)} placeholder="jean@studio.com" type="email"/></FF>
</div>
<FF l="Notes"><textarea style={{...IS,height:60,resize:"vertical"}} value={f.notes} onChange={e=>s("notes",e.target.value)} placeholder="Tarifs, disponibilité, portfolio..."/></FF>
<div style={{display:"flex",gap:8,justifyContent:"flex-end",marginTop:14,flexWrap:"wrap"}}>
  {onDel&&<button onClick={onDel} style={{padding:"10px 14px",borderRadius:8,border:"1px solid #ef444420",background:"transparent",color:"#ef4444",fontSize:12,fontWeight:700,marginRight:"auto"}}>Supprimer</button>}
  <button onClick={onX} style={{padding:"10px 16px",borderRadius:8,border:"1px solid #14142a",background:"transparent",color:"#555",fontSize:12,fontWeight:600}}>Annuler</button>
  <button onClick={()=>{if(!f.nom.trim())return;onSave({...f,id:f.id||uid(),_isNew:!f.id})}} style={{padding:"10px 20px",borderRadius:8,border:"none",background:"#818cf8",color:"#fff",fontSize:13,fontWeight:700}}>{presta?"Enregistrer":"Ajouter"}</button>
</div></div>}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
