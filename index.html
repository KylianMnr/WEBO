const flash=m=>{setToast(m);setTimeout(()=>setToast(null),2400)};

const shareBrief=(lead)=>{const brief=genBrief(lead,lead.prestaId?pN(lead.prestaId):"",mN(lead.memberId));if(navigator.share){navigator.share({title:"Brief — "+lead.nom,text:brief}).catch(()=>{})}else{copyText(brief,flash)}};

const buildContext=()=>{const sg=leads.filter(l=>l.status==="signe");const pipe=leads.filter(l=>!["signe","injoignable"].includes(l.status));const w=pipe.reduce((s,l)=>{const c=COLS.find(x=>x.id===l.status);return s+(l.valeur*(c?.proba||0))},0);return "Tu es l assistant IA de Webo, agence de croissance digitale fondee par Kylian Meunier. Slogan: Votre croissance, notre expertise. Commission 20% HT (prospecteur touche 50% soit 10% du CA). Equipe: Kylian (Gerant), Keddy+Dylan (Prospecteurs). "+leads.length+" leads | "+sg.length+" signes ("+sg.reduce((s,l)=>s+l.valeur,0)+"EUR) | Pondere:"+Math.round(w)+"EUR. Prestas:"+prestas.map(p=>p.nom+"("+p.specialite+")").join(",")+". LEADS:\n"+leads.map(l=>"- "+l.nom+"|"+l.service+"|"+(COLS.find(c=>c.id===l.status)?.label)+"|"+l.valeur+"EUR|"+mN(l.memberId)+"|"+l.source+"|T:"+l.tentatives+"|"+(l.prestaId?pN(l.prestaId):"—")+"|"+(l.adresse||"")+"|"+l.notes).join("\n")+"\nReponds en francais, concret."};

const askAI=async(prompt)=>{setAiMessages(p=>[...p,{role:"user",content:prompt}]);setAiInput("");setAiLoading(true);setAiShowActions(false);try{const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,system:buildContext(),messages:[...aiMessages.slice(-8).map(m=>({role:m.role,content:m.content})),{role:"user",content:prompt}]})});const data=await res.json();const text=(data.content||[]).map(b=>b.type==="text"?b.text:"").filter(Boolean).join("\n")||"Erreur.";setAiMessages(p=>[...p,{role:"assistant",content:text}])}catch(e){setAiMessages(p=>[...p,{role:"assistant",content:"Erreur connexion IA."}])}setAiLoading(false)};
useEffect(()=>{if(aiEndRef.current)aiEndRef.current.scrollIntoView({behavior:"smooth"})},[aiMessages,aiLoading]);
const aiSummary=(lead)=>{setMainTab("leads");setView("ia");setAiShowActions(false);askAI("Resume IA du lead "+lead.nom+": "+lead.service+", "+lead.valeur+"EUR, "+(COLS.find(c=>c.id===lead.status)?.label)+", Prospecteur: "+mN(lead.memberId)+", Tentatives: "+lead.tentatives+", Adresse: "+(lead.adresse||"aucune")+", Presta: "+(lead.prestaId?pN(lead.prestaId):"aucun")+", Notes: "+(lead.notes||"aucune")+". Resume concis + 2 actions.")};

useEffect(()=>{if(!isConfigured){setSyncStatus("off");setReady(true);return}(async()=>{setSyncStatus("loading");try{const lr=await supabase.from("leads").select("*");setLeads((lr.data||[]).map(dbToLead));try{const pr=await supabase.from("prestataires").select("*");setPrestas(pr.data||[])}catch(e){}setSyncStatus(lr.error?"off":"on")}catch(e){setSyncStatus("off")}setReady(true)})()},[]);
useEffect(()=>{if(!isConfigured)return;const ch=supabase.channel("rt").on("postgres_changes",{event:"*",schema:"public",table:"leads"},p=>{if(p.eventType==="INSERT"){const n=dbToLead(p.new);setLeads(pr=>pr.some(l=>l.id===n.id)?pr:[...pr,n])}if(p.eventType==="UPDATE"){const u=dbToLead(p.new);setLeads(pr=>pr.map(l=>l.id===u.id?u:l))}if(p.eventType==="DELETE")setLeads(pr=>pr.filter(l=>l.id!==p.old.id))}).on("postgres_changes",{event:"*",schema:"public",table:"prestataires"},p=>{if(p.eventType==="INSERT")setPrestas(pr=>pr.some(x=>x.id===p.new.id)?pr:[...pr,p.new]);if(p.eventType==="UPDATE")setPrestas(pr=>pr.map(x=>x.id===p.new.id?p.new:x));if(p.eventType==="DELETE")setPrestas(pr=>pr.filter(x=>x.id!==p.old.id))}).subscribe(s=>{if(s==="SUBSCRIBED")setSyncStatus("on")});return()=>supabase.removeChannel(ch)},[]);
useEffect(()=>{const t=setInterval(()=>setNow(Date.now()),60000);return()=>clearInterval(t)},[]);

const upsertLead=useCallback(async(lead)=>{const c={...lead};delete c._isNew;setLeads(p=>p.some(x=>x.id===c.id)?p.map(x=>x.id===c.id?c:x):[...p,c]);setShowForm(false);setEditId(null);flash(lead._isNew?"Lead ajouté ✓":"Mis à jour ✓");if(isConfigured){const{error}=await supabase.from("leads").upsert(leadToDb(c));if(error)flash("⚠ Erreur sync")}},[]);
const deleteLead=useCallback(async(id)=>{setLeads(p=>p.filter(l=>l.id!==id));setShowForm(false);setEditId(null);flash("Supprimé");if(isConfigured)await supabase.from("leads").delete().eq("id",id)},[]);
const touchLead=useCallback(async(id)=>{const lead=leads.find(l=>l.id===id);if(!lead)return;const t=(lead.tentatives||0)+1;setLeads(p=>p.map(l=>l.id===id?{...l,lastInteraction:new Date().toISOString(),tentatives:t}:l));if(isConfigured)await supabase.from("leads").update({last_interaction:new Date().toISOString(),tentatives:t}).eq("id",id)},[leads]);
const updateField=useCallback(async(id,fields)=>{setLeads(p=>p.map(l=>l.id===id?{...l,...fields}:l));if(isConfigured){const db={};const map={status:"status",lastInteraction:"last_interaction",tentatives:"tentatives",nextRelance:"next_relance",verifStatus:"verif_status",verifNote:"verif_note",verifDate:"verif_date"};Object.keys(fields).forEach(k=>{if(map[k])db[map[k]]=fields[k]});await supabase.from("leads").update(db).eq("id",id)}},[]);
const updVerif=useCallback(async(id,vs,vn)=>{setLeads(p=>p.map(l=>l.id===id?{...l,verifStatus:vs,verifNote:vn,verifDate:td()}:l));setShowVerif(null);flash("Vérification ✓");if(isConfigured)await supabase.from("leads").update({verif_status:vs,verif_note:vn,verif_date:td()}).eq("id",id)},[]);
const upsertPresta=useCallback(async(p)=>{const c={...p};delete c._isNew;setPrestas(pr=>pr.some(x=>x.id===c.id)?pr.map(x=>x.id===c.id?c:x):[...pr,c]);setShowPrestaForm(false);setEditPresta(null);flash(p._isNew?"Prestataire ✓":"Mis à jour ✓");if(isConfigured)await supabase.from("prestataires").upsert(c)},[]);
const deletePresta=useCallback(async(id)=>{setPrestas(pr=>pr.filter(x=>x.id!==id));setShowPrestaForm(false);setEditPresta(null);flash("Supprimé");if(isConfigured)await supabase.from("prestataires").delete().eq("id",id)},[]);

const onDS=(e,id)=>{setDragId(id);e.dataTransfer.effectAllowed="move";e.dataTransfer.setData("text/plain",id)};const onDE=()=>{setDragId(null);setDragOver(null)};
const onDr=async(e,col)=>{e.preventDefault();const id=e.dataTransfer.getData("text/plain");if(id){const lead=leads.find(l=>l.id===id);const nd={status:col,lastInteraction:new Date().toISOString(),tentatives:(lead?.tentatives||0)+1};setLeads(p=>p.map(l=>l.id===id?{...l,...nd}:l));const c=COLS.find(x=>x.id===col);if(lead&&c)flash(lead.nom+" → "+c.label);if(isConfigured)await supabase.from("leads").update({status:col,last_interaction:nd.lastInteraction,tentatives:nd.tentatives}).eq("id",id)}setDragOver(null);setDragId(null)};
const openEdit=id=>{setEditId(id);setShowForm(true)};const closeForm=()=>{setShowForm(false);setEditId(null)};

const myLeads=useMemo(()=>isAdmin?leads:leads.filter(l=>l.memberId===session),[leads,session,isAdmin]);
const filtered=useMemo(()=>{let f=myLeads;if(fM!=="all")f=f.filter(l=>l.memberId===fM);if(fS!=="all")f=f.filter(l=>l.service===fS);return f},[myLeads,fM,fS]);
const smartUrgent=useMemo(()=>myLeads.filter(l=>isSmartUrgent(l)).sort((a,b)=>new Date(a.lastInteraction)-new Date(b.lastInteraction)),[myLeads,now]);
const searchResults=useMemo(()=>{if(!searchQ||searchQ.length<2)return[];const q=searchQ.toLowerCase();const lr=leads.filter(l=>l.nom.toLowerCase().includes(q)||(l.notes||"").toLowerCase().includes(q)||(l.email||"").toLowerCase().includes(q)||(l.phone||"").includes(q)||(l.adresse||"").toLowerCase().includes(q)).slice(0,5);const pr=prestas.filter(p=>p.nom.toLowerCase().includes(q)||(p.contact||"").includes(q)||(p.email||"").toLowerCase().includes(q)).slice(0,3);return[...lr.map(l=>({type:"lead",data:l})),...pr.map(p=>({type:"presta",data:p}))]},[searchQ,leads,prestas]);

const stats=useMemo(()=>{const src=isAdmin?leads:myLeads;const sg=src.filter(l=>l.status==="signe");const pipe=src.filter(l=>!["injoignable","signe"].includes(l.status));const stale=src.filter(l=>!["signe","injoignable"].includes(l.status)&&hAgo(l.lastInteraction)>=48);const overdue=src.filter(l=>l.nextRelance&&!["signe","injoignable"].includes(l.status)&&dUntil(l.nextRelance)<0);const caSigne=sg.reduce((s,l)=>s+l.valeur,0);const weighted=pipe.reduce((s,l)=>{const col=COLS.find(c=>c.id===l.status);return s+(l.valeur*(col?.proba||0))},0);const totalWeighted=weighted+caSigne;const proofMiss=sg.filter(l=>!l.paymentProof).length;
const bySrc=SOURCES.map(s=>{const sl=src.filter(l=>l.source===s);const ss=sl.filter(l=>l.status==="signe");const ca=ss.reduce((a,l)=>a+l.valeur,0);return{source:s,total:sl.length,signes:ss.length,rate:sl.length?Math.round(ss.length/sl.length*100):0,ca,com:ca*.2}}).filter(s=>s.total>0).sort((a,b)=>b.com-a.com);
const byEchec=ECHECS.filter(e=>e!=="—").map(r=>({reason:r,count:src.filter(l=>l.echecReason===r).length})).filter(e=>e.count>0).sort((a,b)=>b.count-a.count);
const byM=TEAM.filter(t=>t.role==="Prospecteur").map(m=>{const ml=src.filter(l=>l.memberId===m.id);const ms=ml.filter(l=>l.status==="signe");const ca=ms.reduce((s,l)=>s+l.valeur,0);return{...m,total:ml.length,signes:ms.length,rate:ml.length?Math.round(ms.length/ml.length*100):0,ca,comWebo:ca*.2,comProsp:ca*.10,stale:ml.filter(l=>!["signe","injoignable"].includes(l.status)&&hAgo(l.lastInteraction)>=48).length,overdue:ml.filter(l=>l.nextRelance&&!["signe","injoignable"].includes(l.status)&&dUntil(l.nextRelance)<0).length}}).sort((a,b)=>b.comWebo-a.comWebo);
return{total:src.length,signes:sg.length,stale:stale.length,overdue:overdue.length,smartUrgent:smartUrgent.length,caSigne,weighted,totalWeighted,commission:caSigne*.2,commProsp:caSigne*.10,proofMiss,bySrc,byEchec,byM,objPct:Math.min(Math.round(caSigne/MONTHLY_OBJ*100),100)}},[leads,myLeads,isAdmin,now,smartUrgent]);

function VerifForm({lead,onSave,onX,IS}){const[st,setSt]=useState(lead?.verifStatus||"pending");const[note,setNote]=useState(lead?.verifNote||"");if(!lead)return null;
return <div><div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14}}><h3 style={{margin:0,fontFamily:"'Playfair Display'",fontSize:16,fontWeight:600,color:"#3D3428"}}>🛡 {lead.nom}</h3><button onClick={onX} style={{background:"none",border:"none",color:"#C4B9A8",fontSize:18}}>✕</button></div>
<FF l="Statut"><div style={{display:"flex",gap:5,flexWrap:"wrap"}}>{VERIFS.filter(v=>v.id!=="none").map(v=><button key={v.id} onClick={()=>setSt(v.id)} style={{flex:1,minWidth:75,padding:8,borderRadius:10,border:"1px solid "+(st===v.id?v.color+"40":"#D5CCBD"),background:st===v.id?v.color+"10":"transparent",color:st===v.id?v.color:"#8C7E6A",fontSize:12,fontWeight:600}}>{v.label}</button>)}</div></FF>
<FF l="Note"><textarea style={{...IS,height:50,resize:"vertical",fontSize:14}} value={note} onChange={e=>setNote(e.target.value)} placeholder="Client confirme…"/></FF>
<div style={{display:"flex",gap:6,justifyContent:"flex-end",marginTop:14}}><button onClick={onX} style={{padding:"10px 14px",borderRadius:10,border:"1px solid #D5CCBD",background:"transparent",color:"#8C7E6A",fontSize:12}}>Annuler</button><button onClick={()=>onSave(lead.id,st,note)} style={{padding:"10px 20px",borderRadius:10,border:"none",background:"#D4A03C",color:"#fff",fontSize:13,fontWeight:700}}>Enregistrer</button></div></div>}

function PrestaForm({presta,onSave,onDel,onX,IS}){const[f,setF]=useState(presta?{...presta}:{nom:"",specialite:SPECIALITES[0],contact:"",email:"",notes:""});const s=(k,v)=>setF(p=>({...p,[k]:v}));
return <div><div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14}}><h3 style={{margin:0,fontFamily:"'Playfair Display'",fontSize:16,fontWeight:600,color:"#3D3428"}}>{presta?"✎ "+presta.nom:"🤝 Nouveau Prestataire"}</h3><button onClick={onX} style={{background:"none",border:"none",color:"#C4B9A8",fontSize:18,padding:4}}>✕</button></div>
<div className="sep"/>
<FF l="Nom"><input style={IS} value={f.nom} onChange={e=>s("nom",e.target.value)} placeholder="Jean Dupont"/></FF>
<FF l="Spécialité"><select style={IS} value={f.specialite} onChange={e=>s("specialite",e.target.value)}>{SPECIALITES.map(sp=><option key={sp}>{sp}</option>)}</select></FF>
<div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
  <FF l="📞 Téléphone"><input style={IS} value={f.contact} onChange={e=>s("contact",e.target.value)} placeholder="06 12 34 56 78" type="tel"/></FF>
  <FF l="✉️ Email"><input style={IS} value={f.email} onChange={e=>s("email",e.target.value)} placeholder="jean@studio.com" type="email"/></FF>
</div>
<FF l="Notes"><textarea style={{...IS,height:50,resize:"vertical",fontSize:14}} value={f.notes} onChange={e=>s("notes",e.target.value)} placeholder="Tarifs, dispo…"/></FF>
<div className="sep"/>
<div style={{display:"flex",gap:6,justifyContent:"flex-end",marginTop:14,flexWrap:"wrap"}}>
  {onDel&&<button onClick={onDel} style={{padding:"10px 12px",borderRadius:10,border:"1px solid #C0392B20",background:"transparent",color:"#C0392B",fontSize:12,fontWeight:600,marginRight:"auto"}}>Supprimer</button>}
  <button onClick={onX} style={{padding:"10px 14px",borderRadius:10,border:"1px solid #D5CCBD",background:"transparent",color:"#8C7E6A",fontSize:12}}>Annuler</button>
  <button onClick={()=>{if(!f.nom.trim())return;onSave({...f,id:f.id||uid(),_isNew:!f.id})}} style={{padding:"10px 20px",borderRadius:10,border:"none",background:"#D4A03C",color:"#fff",fontSize:13,fontWeight:600}}>{presta?"Enregistrer":"Ajouter"}</button>
</div></div>}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
