*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{

[data-theme="light"]{

@keyframes fadeUp{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
@keyframes slideR{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}
@keyframes glow{0%,100%{box-shadow:0 0 4px var(--red)}50%{box-shadow:0 0 12px var(--red)}}
@keyframes fire{0%,100%{text-shadow:0 0 3px #ff6b3520}50%{text-shadow:0 0 10px #ff6b3550}}
.fu{animation:fadeUp .2s ease-out both}.blink{animation:blink 1s infinite}.glow30{animation:glow 2s infinite}.fire{animation:fire 1.5s infinite}
button{font-family:inherit;-webkit-tap-highlight-color:transparent;cursor:pointer;border:none;background:transparent}
select,input,textarea{font-family:inherit;font-size:14px;background:var(--bg);color:var(--text);border:1px solid var(--border);border-radius:6px;padding:8px 10px;outline:none}
select:focus,input:focus,textarea:focus{border-color:var(--accent)}
::-webkit-scrollbar{width:4px;height:4px}::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:2px}::-webkit-scrollbar-track{background:transparent}

/* LAYOUT */
.app{display:flex;height:100dvh;overflow:hidden}
.sidebar{width:48px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;align-items:center;padding:8px 0;gap:4px;flex-shrink:0;z-index:50}
.sb-btn{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;color:var(--text2);transition:all .15s}
.sb-btn:hover,.sb-btn.active{background:var(--bg3);color:var(--text)}
.main-area{flex:1;display:flex;flex-direction:column;min-width:0;overflow:hidden}
.right-panel{width:340px;background:var(--bg2);border-left:1px solid var(--border);overflow-y:auto;flex-shrink:0;animation:slideR .2s ease-out;display:flex;flex-direction:column}
.right-panel::-webkit-scrollbar{width:3px}

/* TICKER */
.ticker{height:36px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 12px;gap:16px;overflow-x:auto;flex-shrink:0}
.ticker::-webkit-scrollbar{display:none}
.ticker-item{display:flex;align-items:center;gap:6px;white-space:nowrap;flex-shrink:0}
.ticker-label{font-size:11px;color:var(--text2);font-family:var(--mono)}
.ticker-val{font-size:12px;font-weight:600;font-family:var(--mono)}

/* TOOLBAR */
.toolbar{height:38px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 10px;gap:6px;flex-shrink:0}
.tf-btn{padding:4px 10px;border-radius:4px;font-size:11px;font-weight:600;color:var(--text2);font-family:var(--mono);transition:all .12s}
.tf-btn:hover{background:var(--bg3);color:var(--text)}
.tf-btn.active{background:var(--accent);color:#fff}
.tool-sep{width:1px;height:20px;background:var(--border);flex-shrink:0}

.m-card:hover{border-color:var(--bg4);box-shadow:0 4px 16px rgba(0,0,0,.15)}

.cmd-box{background:var(--modal);border:1px solid var(--border);border-radius:12px;width:90%;max-width:480px;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.4)}

.cmd-results{max-height:300px;overflow-y:auto}
.cmd-item{display:flex;align-items:center;gap:10px;padding:10px 16px;cursor:pointer;transition:background .1s}
.cmd-item:hover,.cmd-item.sel{background:var(--bg3)}
.cmd-item span:first-child{font-size:14px;width:24px;text-align:center}

/* MODAL */
.overlay{position:fixed;inset:0;z-index:1000;display:flex;align-items:center;justify-content:center;animation:fadeIn .12s}
.overlay-bg{position:absolute;inset:0;background:rgba(0,0,0,.5);backdrop-filter:blur(6px)}
.modal{position:relative;background:var(--modal);backdrop-filter:blur(20px);border:1px solid var(--border);border-radius:12px;padding:24px;width:95%;max-width:520px;max-height:85vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.3);animation:fadeUp .2s}
.modal::-webkit-scrollbar{width:3px}

/* MISC */
.prob-bar{height:2px;border-radius:1px;background:var(--bg3);overflow:hidden;margin-top:3px}.prob-fill{height:100%;border-radius:1px;transition:width .4s}
.obj-bar{height:4px;border-radius:2px;background:var(--bg3);overflow:hidden}.obj-fill{height:100%;border-radius:2px;transition:width .5s}
.sep{height:1px;background:var(--border);margin:8px 0}
.blur{filter:blur(6px);user-select:none;pointer-events:none}
.cards-grid{display:grid;grid-template-columns:1fr;gap:6px}
.presta-grid{display:grid;grid-template-columns:1fr;gap:6px}
.kanban-scroll{display:flex;gap:6px;overflow-x:auto;padding:8px;flex:1;-webkit-overflow-scrolling:touch}.kanban-scroll::-webkit-scrollbar{display:none}
.kanban-col{min-width:220px;flex:1;display:flex;flex-direction:column;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:6px}
.share-btn{padding:2px 6px;border-radius:4px;border:1px solid var(--green);color:var(--green);font-size:9px;font-weight:600;transition:all .12s}
.share-btn:hover{background:rgba(8,153,129,.08)}
.wa-btn{padding:2px 6px;border-radius:4px;border:1px solid #25D366;color:#25D366;font-size:10px;transition:all .12s}
.wa-btn:hover{background:rgba(37,211,102,.08)}
.match-card{background:rgba(139,92,246,.06);border:1px solid rgba(139,92,246,.15);border-radius:8px;padding:8px;margin-top:4px;cursor:pointer;transition:all .15s}
.match-card:hover{background:rgba(139,92,246,.12)}
.test-badge{font-size:9px;font-weight:700;color:var(--gold);background:rgba(212,160,60,.1);padding:1px 6px;border-radius:4px;border:1px dashed rgba(212,160,60,.3)}
.sparkline{display:inline-flex;align-items:end;gap:1px;height:16px;vertical-align:middle}
.spark-bar{width:3px;border-radius:1px;transition:height .3s}
.health-gauge{display:flex;gap:2px;align-items:center}
.health-seg{width:8px;height:12px;border-radius:2px;transition:all .2s}
.sync-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.sync-dot.on{background:var(--green)}.sync-dot.off{background:var(--red)}.sync-dot.loading{background:var(--gold);animation:pulse 1s infinite}
@media(max-width:768px){
.sidebar{width:42px}.sidebar .sb-label{display:none}
.right-panel{position:fixed;right:0;top:0;bottom:0;width:85vw;max-width:360px;z-index:200;box-shadow:-10px 0 30px rgba(0,0,0,.3)}
.kanban-col{min-width:200px;flex:none}

@media(min-width:1200px){.cards-grid,.presta-grid{grid-template-columns:repeat(2,1fr)}}
@media(min-width:1600px){.cards-grid,.presta-grid{grid-template-columns:repeat(3,1fr)}}
</style>

const upd=useCallback(async(id,f)=>{setLeads(p=>p.map(l=>l.id===id?{...l,...f}:l));if(SB_OK){const db={};const m={status:"status",lastInteraction:"last_interaction",tentatives:"tentatives",nextRelance:"next_relance",verifStatus:"verif_status",verifNote:"verif_note",verifDate:"verif_date",activityLog:"activity_log"};Object.keys(f).forEach(k=>{if(m[k])db[m[k]]=f[k]});await sb.from("leads").update(db).eq("id",id)}},[]);

const upsP=useCallback(async p=>{const c={...p};delete c._isNew;setPrestas(pr=>pr.some(x=>x.id===c.id)?pr.map(x=>x.id===c.id?c:x):[...pr,c]);setShowPrestaForm(false);setEditPresta(null);flash("Presta ✓");if(SB_OK)await sb.from("prestataires").upsert(c)},[]);
const delP=useCallback(async id=>{setPrestas(pr=>pr.filter(x=>x.id!==id));setShowPrestaForm(false);setEditPresta(null);flash("Supprimé");if(SB_OK)await sb.from("prestataires").delete().eq("id",id)},[]);

/* Drag */

/* AI */
const askAI=async pr=>{setAiMsgs(p=>[...p,{role:"user",content:pr}]);setAiIn("");setAiLoad(true);setAiAct(false);try{const sg=leads.filter(l=>l.status==="signe");const ctx="Assistant Webo. Com 20%, prosp 10%. "+leads.length+" leads, "+sg.length+" signés("+sg.reduce((s,l)=>s+l.valeur,0)+"€). LEADS:\n"+leads.map(l=>l.nom+"|"+l.service+"|"+(COLS.find(c=>c.id===l.status)?.label)+"|"+l.valeur+"€|"+mN(l.memberId)).join("\n")+"\nFrançais, concret.";const r=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,system:ctx,messages:[...aiMsgs.slice(-8).map(m=>({role:m.role,content:m.content})),{role:"user",content:pr}]})});const d=await r.json();const t=(d.content||[]).map(b=>b.type==="text"?b.text:"").filter(Boolean).join("\n")||"Erreur";setAiMsgs(p=>[...p,{role:"assistant",content:t}])}catch(e){setAiMsgs(p=>[...p,{role:"assistant",content:"Erreur IA."}])}setAiLoad(false)};

useEffect(()=>{if(!SB_OK)return;const ch=sb.channel("rt").on("postgres_changes",{event:"*",schema:"public",table:"leads"},p=>{if(p.eventType==="INSERT"){const n=db2L(p.new);setLeads(pr=>pr.some(l=>l.id===n.id)?pr:[...pr,n])}if(p.eventType==="UPDATE"){const u=db2L(p.new);setLeads(pr=>pr.map(l=>l.id===u.id?u:l))}if(p.eventType==="DELETE")setLeads(pr=>pr.filter(l=>l.id!==p.old.id))}).on("postgres_changes",{event:"*",schema:"public",table:"prestataires"},p=>{if(p.eventType==="INSERT")setPrestas(pr=>pr.some(x=>x.id===p.new.id)?pr:[...pr,p.new]);if(p.eventType==="UPDATE")setPrestas(pr=>pr.map(x=>x.id===p.new.id?p.new:x));if(p.eventType==="DELETE")setPrestas(pr=>pr.filter(x=>x.id!==p.old.id))}).subscribe(s=>{if(s==="SUBSCRIBED")setSync("on")});return()=>sb.removeChannel(ch)},[]);

    <div style={{flex:1}}><div style={{display:"flex",alignItems:"center",gap:4}}><span style={{fontWeight:600,fontSize:13}}>{p.nom}</span>{test&&<span className="test-badge">TEST</span>}<span style={{fontSize:9,fontWeight:600,color:busy?"var(--red)":"var(--green)",background:busy?"var(--red)"+"10":"var(--green)"+"10",padding:"1px 6px",borderRadius:4}}>{busy?"⚠ Charge":"Dispo"}</span></div><div style={{fontSize:10,color:"var(--gold)"}}>{p.specialite}{p.tjm?" · "+p.tjm+"€/j":""}</div></div>
  </div>
  {p.contact&&<div style={{fontSize:10,color:"var(--text2)"}}>📞 <P$ v={p.contact} p={pm}/></div>}
  {p.portfolio&&<div style={{fontSize:10}}><a href={p.portfolio} target="_blank" rel="noopener" style={{color:"var(--accent)"}}>🔗 Portfolio</a></div>}
  <div style={{display:"flex",justifyContent:"space-between",paddingTop:4,borderTop:"1px solid var(--border)",marginTop:4,fontSize:11}}>
    <span style={{color:"var(--text2)"}}>{act} actifs · {sgn} signés</span>
    {ca>0&&<span style={{fontWeight:700,color:"var(--green)",fontFamily:"var(--mono)"}}><P$ v={E(ca)} p={pm}/></span>}
  </div>
</div>})}</div></div>}

</div>
</div>

{/* RIGHT PANEL — Lead Details */}
{rPanel&&selLead&&<div className="right-panel">
  <div style={{padding:"10px 12px",borderBottom:"1px solid var(--border)",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
    <span style={{fontWeight:700,fontSize:13}}>{selLead.nom}</span>
    <div style={{display:"flex",gap:3}}><button onClick={()=>{setEditId(selLead.id);setShowForm(true)}} style={{padding:"3px 8px",borderRadius:4,border:"1px solid var(--border)",color:"var(--text2)",fontSize:10,background:"transparent"}}>✎</button><button onClick={()=>setSelLead(null)} style={{color:"var(--text3)",fontSize:14,background:"transparent"}}>✕</button></div>
  </div>
  <div style={{padding:12,flex:1,overflow:"auto"}}>
    {/* Health gauge */}
    <div style={{marginBottom:10}}><div style={{fontSize:10,color:"var(--text2)",fontFamily:"var(--mono)",marginBottom:4}}>SCORE DE SANTÉ</div><HealthGauge score={healthScore(selLead)}/></div>
    <div className="sep"/>
    {/* Key info */}
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6,marginBottom:10}}>
      <div><div style={{fontSize:9,color:"var(--text2)",fontFamily:"var(--mono)"}}>VALEUR</div><div style={{fontSize:18,fontWeight:800,fontFamily:"var(--mono)"}}><P$ v={E(selLead.valeur)} p={pm}/></div></div>
      <div><div style={{fontSize:9,color:"var(--text2)",fontFamily:"var(--mono)"}}>STATUT</div><div style={{fontSize:14,fontWeight:700,color:COLS.find(c=>c.id===selLead.status)?.accent}}>{COLS.find(c=>c.id===selLead.status)?.icon} {COLS.find(c=>c.id===selLead.status)?.label}</div></div>
    </div>
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6,marginBottom:10}}>
      <div><div style={{fontSize:9,color:"var(--text2)",fontFamily:"var(--mono)"}}>PROB.</div><div style={{fontSize:14,fontWeight:700,fontFamily:"var(--mono)"}}>{Math.round((COLS.find(c=>c.id===selLead.status)?.proba||0)*100)}%</div></div>
      <div><div style={{fontSize:9,color:"var(--text2)",fontFamily:"var(--mono)"}}>TEMP.</div><div style={{fontSize:14}}>{TEMPS.find(t=>t.id===selLead.temperature)?.e} {selLead.temperature}</div></div>
    </div>
    {showFin&&<div style={{background:"var(--accent)"+"08",border:"1px solid var(--accent)"+"15",borderRadius:8,padding:8,marginBottom:10}}>
      <div style={{fontSize:9,color:"var(--accent)",fontFamily:"var(--mono)"}}>COMMISSIONS</div>
      <div style={{display:"flex",justifyContent:"space-between",marginTop:4}}>
        <span style={{fontSize:12,fontFamily:"var(--mono)",color:"var(--accent)"}}><P$ v={"Webo: "+E(selLead.valeur*.2)} p={pm}/></span>
        <span style={{fontSize:12,fontFamily:"var(--mono)",color:"var(--gold)"}}><P$ v={"Prosp: "+E(selLead.valeur*.10)} p={pm}/></span>
      </div>
    </div>}
    <div className="sep"/>
    <div style={{fontSize:10,color:"var(--text2)",marginBottom:4}}>📞 <P$ v={selLead.phone||"—"} p={pm}/></div>
    <div style={{fontSize:10,color:"var(--text2)",marginBottom:4}}>✉️ {selLead.email||"—"}</div>
    <div style={{fontSize:10,color:"var(--text2)",marginBottom:4}}>📍 {selLead.adresse||"—"}</div>
    <div style={{fontSize:10,color:"var(--text2)",marginBottom:4}}>👤 {mN(selLead.memberId)} · {selLead.source}</div>
    {selLead.prestaId&&<div style={{fontSize:10,color:"var(--gold)",marginBottom:4}}>🤝 {pN(selLead.prestaId)}</div>}
    {selLead.notes&&<div style={{fontSize:10,color:"var(--text2)",background:"var(--bg)",borderRadius:6,padding:6,marginTop:6,lineHeight:1.5}}>{selLead.notes}</div>}
    {selLead.activityLog&&<div style={{marginTop:8}}><div style={{fontSize:9,color:"var(--text2)",fontFamily:"var(--mono)",marginBottom:4}}>📜 HISTORIQUE</div><div style={{fontSize:10,color:"var(--text2)",background:"var(--bg)",borderRadius:6,padding:6,whiteSpace:"pre-wrap",maxHeight:100,overflowY:"auto",lineHeight:1.5}}>{selLead.activityLog}</div></div>}
    <div className="sep"/>
    <div style={{display:"flex",gap:3,flexWrap:"wrap",marginTop:8}}>
      <button onClick={()=>openWA(selLead,mN(selLead.memberId))} className="wa-btn" style={{padding:"5px 10px",borderRadius:6}}>💬 WhatsApp</button>
      <button onClick={()=>cp(genTpl(selLead,mN(selLead.memberId)),flash)} style={{padding:"5px 10px",borderRadius:6,border:"1px solid var(--border)",color:"var(--text2)",fontSize:10,background:"transparent"}}>✉️ Template</button>
      <button onClick={()=>{const b=genBrief(selLead,selLead.prestaId?pN(selLead.prestaId):"",mN(selLead.memberId));cp(b,flash)}} className="share-btn" style={{padding:"5px 10px",borderRadius:6}}>📤 Brief</button>
      <button onClick={()=>{setMTab("leads");setView("ia");setAiAct(false);askAI("Resume lead "+selLead.nom+": "+selLead.service+", "+selLead.valeur+"EUR. Resume+2 actions.")}} style={{padding:"5px 10px",borderRadius:6,border:"1px solid var(--accent)",color:"var(--accent)",fontSize:10,background:"transparent"}}>🤖 IA</button>
    </div>
  </div>
</div>}

{/* COMMAND PALETTE */}
{cmd&&<div className="cmd-overlay" onClick={()=>setCmd(false)}><div className="cmd-box" onClick={e=>e.stopPropagation()}><input className="cmd-input" ref={cmdRef} value={cmdQ} onChange={e=>setCmdQ(e.target.value)} placeholder="Tapez une commande ou un nom…" autoFocus onKeyDown={e=>{if(e.key==="Escape")setCmd(false);if(e.key==="Enter"&&cmdRes.length>0){cmdRes[0].action();setCmd(false);setCmdQ("")}}}/><div className="cmd-results">{cmdRes.map((r,i)=><div key={i} className="cmd-item" onClick={()=>{r.action();setCmd(false);setCmdQ("")}}><span>{r.icon}</span><span style={{fontSize:13}}>{r.label}</span></div>)}{cmdRes.length===0&&cmdQ&&<div style={{padding:16,textAlign:"center",color:"var(--text3)",fontSize:12}}>Aucun résultat</div>}</div></div></div>}

{/* MODALS */}
{showForm&&<div className="overlay" onClick={()=>{setShowForm(false);setEditId(null)}}><div className="overlay-bg"/><div className="modal" onClick={e=>e.stopPropagation()}>
<LForm lead={editId?leads.find(l=>l.id===editId):null} onSave={upsert} onDel={editId?()=>del(editId):null} onX={()=>{setShowForm(false);setEditId(null)}} IS={IS} prestas={prestas} sess={sess} isA={isA} showFin={showFin} pm={pm} pitch={pitch}/>
</div></div>}
{showVerif&&<div className="overlay" onClick={()=>setShowVerif(null)}><div className="overlay-bg"/><div className="modal" style={{maxWidth:440}} onClick={e=>e.stopPropagation()}>
<VForm lead={leads.find(l=>l.id===showVerif)} onSave={updV} onX={()=>setShowVerif(null)} IS={IS}/>
</div></div>}
{showPrestaForm&&<div className="overlay" onClick={()=>{setShowPrestaForm(false);setEditPresta(null)}}><div className="overlay-bg"/><div className="modal" style={{maxWidth:440}} onClick={e=>e.stopPropagation()}>
<PForm presta={editPresta} onSave={upsP} onDel={editPresta?()=>delP(editPresta.id):null} onX={()=>{setShowPrestaForm(false);setEditPresta(null)}} IS={IS}/>
</div></div>}
{toast&&<div className="fu" style={{position:"fixed",bottom:20,left:"50%",transform:"translateX(-50%)",zIndex:2000,background:"var(--bg2)",border:"1px solid var(--border)",borderRadius:8,padding:"8px 16px",color:"var(--text)",fontSize:12,fontWeight:500,boxShadow:"0 8px 30px rgba(0,0,0,.3)",whiteSpace:"nowrap"}}>{toast}</div>}
</div>);
}

/* LEAD FORM */
function LForm({lead,onSave,onDel,onX,IS,prestas,sess,isA,showFin,pm,pitch}){
const[f,setF]=useState(lead?{...lead}:{nom:"",service:SERVICES[0],valeur:"",memberId:sess||"keddy",status:"nouveau",dateCreated:td(),lastInteraction:new Date().toISOString(),nextRelance:addD(td(),2),notes:"",source:SOURCES[0],echecReason:"—",tentatives:0,paymentProof:"",verifStatus:"none",verifNote:"",prestaId:"",email:"",phone:"",adresse:"",temperature:"tiede",activityLog:"",paymentLink:"",externalLink:""});
const[pQ,setPQ]=useState("");const[showM,setShowM]=useState(false);
const s=(k,v)=>setF(p=>({...p,[k]:v}));const col=COLS.find(c=>c.id===f.status);
const fp=prestas.filter(p=>{if(!pQ)return true;const q=pQ.toLowerCase();return p.nom.toLowerCase().includes(q)||p.specialite.toLowerCase().includes(q)});
const sp=prestas.find(p=>p.id===f.prestaId);const matches=useMemo(()=>matchP(f,prestas),[f.service,f.notes,prestas]);
return <div>
<div style={{display:"flex",justifyContent:"space-between",marginBottom:10}}><h3 style={{fontFamily:"var(--serif)",fontSize:16,fontWeight:600}}>{lead?"✎ "+lead.nom:"✦ Nouveau Lead"}</h3><button onClick={onX} style={{color:"var(--text3)",fontSize:16}}>✕</button></div><div className="sep"/>
<FF l="Nom"><input style={IS} value={f.nom} onChange={e=>s("nom",e.target.value)} placeholder="Studio…"/></FF>
<div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6}}><FF l="📞 Tél"><input style={IS} value={f.phone} onChange={e=>s("phone",e.target.value)} type="tel"/></FF><FF l="✉️ Email"><input style={IS} value={f.email} onChange={e=>s("email",e.target.value)} type="email"/></FF></div>
<FF l="📍 Adresse"><input style={IS} value={f.adresse} onChange={e=>s("adresse",e.target.value)}/></FF>
<div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6}}><FF l="Service"><select style={IS} value={f.service} onChange={e=>s("service",e.target.value)}>{SERVICES.map(v=><option key={v}>{v}</option>)}</select></FF><FF l="Valeur HT"><input style={IS} type="number" value={f.valeur} onChange={e=>s("valeur",e.target.value)}/></FF></div>
<div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6}}><FF l="Prospecteur"><select style={IS} value={f.memberId} onChange={e=>s("memberId",e.target.value)} disabled={!isA}>{TEAM.map(m=><option key={m.id} value={m.id}>{m.name}</option>)}</select></FF><FF l="Source"><select style={IS} value={f.source} onChange={e=>s("source",e.target.value)}>{SOURCES.map(v=><option key={v}>{v}</option>)}</select></FF></div>
<div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:6}}><FF l="Statut"><select style={IS} value={f.status} onChange={e=>s("status",e.target.value)}>{COLS.map(c=><option key={c.id} value={c.id}>{c.icon} {c.label}</option>)}</select></FF><FF l="Temp."><select style={IS} value={f.temperature} onChange={e=>s("temperature",e.target.value)}>{TEMPS.map(t=><option key={t.id} value={t.id}>{t.e}</option>)}</select></FF><FF l="Relance"><input style={IS} type="date" value={f.nextRelance} onChange={e=>s("nextRelance",e.target.value)}/></FF></div>
<FF l="🤝 Prestataire">{sp?<div style={{display:"flex",alignItems:"center",gap:6,padding:"6px 8px",borderRadius:6,border:"1px solid var(--gold)",background:"var(--gold)"+"08"}}><span style={{fontWeight:600,fontSize:12}}>{sp.nom}</span><span style={{fontSize:10,color:"var(--gold)"}}>{sp.specialite}</span><button onClick={()=>s("prestaId","")} style={{marginLeft:"auto",color:"var(--red)",fontSize:10}}>✕</button></div>:<div><div style={{display:"flex",gap:3,marginBottom:3}}><input value={pQ} onChange={e=>setPQ(e.target.value)} placeholder="Chercher…" style={{...IS,flex:1,fontSize:13}}/><button onClick={()=>setShowM(p=>!p)} style={{padding:"6px 10px",borderRadius:6,border:"1px solid var(--accent)",color:"var(--accent)",fontSize:11,fontWeight:600}}>🧠</button></div>
{showM&&matches.length>0&&matches.map(m=><div key={m.id} className="match-card" onClick={()=>{s("prestaId",m.id);setShowM(false)}}><div style={{display:"flex",justifyContent:"space-between"}}><span style={{fontWeight:600,fontSize:12}}>{m.nom} <span style={{color:"var(--accent)",fontSize:10}}>({m.score}%)</span></span><span style={{color:"var(--green)",fontSize:11}}>Sélectionner</span></div></div>)}
{!showM&&prestas.length>0&&<div style={{maxHeight:80,overflowY:"auto",borderRadius:6,border:"1px solid var(--border)",background:"var(--bg)"}}>{fp.map(p=><button key={p.id} onClick={()=>{s("prestaId",p.id);setPQ("")}} style={{display:"flex",alignItems:"center",gap:5,padding:"5px 7px",width:"100%",textAlign:"left",color:"var(--text)",fontSize:11}}><span style={{fontWeight:600}}>{p.nom}</span><span style={{color:"var(--text2)",fontSize:10}}>{p.specialite}</span></button>)}</div>}
</div>}</FF>
<FF l="🔗 Lien externe"><input style={IS} value={f.externalLink} onChange={e=>s("externalLink",e.target.value)}/></FF>
<FF l="Notes"><textarea style={{...IS,height:40,resize:"vertical"}} value={f.notes} onChange={e=>s("notes",e.target.value)}/></FF>
{(f.status==="signe")&&<><FF l="Preuve"><input style={IS} value={f.paymentProof} onChange={e=>s("paymentProof",e.target.value)}/></FF><FF l="💳 Lien paiement"><input style={IS} value={f.paymentLink} onChange={e=>s("paymentLink",e.target.value)}/></FF></>}
{f.status==="injoignable"&&<FF l="Raison"><select style={IS} value={f.echecReason} onChange={e=>s("echecReason",e.target.value)}>{ECHECS.map(r=><option key={r}>{r}</option>)}</select></FF>}
{f.valeur&&Number(f.valeur)>0&&showFin&&<div style={{background:"var(--accent)"+"08",border:"1px solid var(--accent)"+"15",borderRadius:8,padding:8,marginBottom:8,display:"flex",justifyContent:"space-between",fontFamily:"var(--mono)",fontSize:12}}>
  <div><div style={{color:"var(--accent)"}}>Webo 20%</div><div style={{color:"var(--gold)",fontSize:10}}>Prosp 50%→{E(Number(f.valeur)*.10)}</div></div>
  <div style={{textAlign:"right",fontSize:16,fontWeight:700,color:"var(--accent)"}}>{E(Number(f.valeur)*.2)}</div>
</div>}
<div className="sep"/>
<div style={{display:"flex",gap:4,justifyContent:"flex-end",flexWrap:"wrap"}}>
  {onDel&&<button onClick={onDel} style={{padding:"8px 12px",borderRadius:8,border:"1px solid var(--red)",color:"var(--red)",fontSize:12,marginRight:"auto"}}>Supprimer</button>}
  <button onClick={onX} style={{padding:"8px 14px",borderRadius:8,border:"1px solid var(--border)",color:"var(--text2)",fontSize:12}}>Annuler</button>
  <button onClick={()=>{if(!f.nom.trim())return;const nl=f.id?f.activityLog:addLog("","Créé");onSave({...f,id:f.id||uid(),valeur:Number(f.valeur)||0,lastInteraction:new Date().toISOString(),activityLog:nl,_isNew:!f.id})}} style={{padding:"8px 18px",borderRadius:8,background:"var(--accent)",color:"#fff",fontSize:13,fontWeight:600}}>{lead?"OK":"Ajouter"}</button>
</div></div>}

function VForm({lead,onSave,onX,IS}){const[st,setSt]=useState(lead?.verifStatus||"pending");const[n,setN]=useState(lead?.verifNote||"");if(!lead)return null;
return <div><div style={{display:"flex",justifyContent:"space-between",marginBottom:8}}><h3 style={{fontFamily:"var(--serif)",fontSize:15}}>🛡 {lead.nom}</h3><button onClick={onX} style={{color:"var(--text3)",fontSize:15}}>✕</button></div>
<FF l="Statut"><div style={{display:"flex",gap:4}}>{VERIFS.filter(v=>v.id!=="none").map(v=><button key={v.id} onClick={()=>setSt(v.id)} style={{flex:1,padding:6,borderRadius:6,border:"1px solid "+(st===v.id?v.color:"var(--border)"),color:st===v.id?v.color:"var(--text2)",background:st===v.id?v.color+"10":"transparent",fontSize:12,fontWeight:600}}>{v.label}</button>)}</div></FF>
<FF l="Note"><textarea style={{...IS,height:40}} value={n} onChange={e=>setN(e.target.value)}/></FF>
<div style={{display:"flex",gap:4,justifyContent:"flex-end"}}><button onClick={onX} style={{padding:"8px 14px",borderRadius:8,border:"1px solid var(--border)",color:"var(--text2)",fontSize:12}}>Annuler</button><button onClick={()=>onSave(lead.id,st,n)} style={{padding:"8px 18px",borderRadius:8,background:"var(--gold)",color:"#fff",fontSize:13,fontWeight:700}}>OK</button></div></div>}

function PForm({presta,onSave,onDel,onX,IS}){
const[f,setF]=useState(presta?{...presta}:{nom:"",specialite:SPECIALITES[0],contact:"",email:"",notes:"",portfolio:"",tjm:""});const s=(k,v)=>setF(p=>({...p,[k]:v}));
return <div><div style={{display:"flex",justifyContent:"space-between",marginBottom:8}}><h3 style={{fontFamily:"var(--serif)",fontSize:15}}>{presta?"✎ "+presta.nom:"🤝 Nouveau"}</h3><button onClick={onX} style={{color:"var(--text3)",fontSize:15}}>✕</button></div><div className="sep"/>
<FF l="Nom"><input style={IS} value={f.nom} onChange={e=>s("nom",e.target.value)}/></FF>
<FF l="Spécialité"><select style={IS} value={f.specialite} onChange={e=>s("specialite",e.target.value)}>{SPECIALITES.map(v=><option key={v}>{v}</option>)}</select></FF>
<div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6}}><FF l="📞 Tél"><input style={IS} value={f.contact} onChange={e=>s("contact",e.target.value)} type="tel"/></FF><FF l="✉️ Email"><input style={IS} value={f.email} onChange={e=>s("email",e.target.value)} type="email"/></FF></div>
<div style={{display:"grid",gridTemplateColumns:"2fr 1fr",gap:6}}><FF l="🔗 Portfolio"><input style={IS} value={f.portfolio||""} onChange={e=>s("portfolio",e.target.value)}/></FF><FF l="TJM €"><input style={IS} type="number" value={f.tjm||""} onChange={e=>s("tjm",e.target.value)}/></FF></div>
<FF l="Notes"><textarea style={{...IS,height:40}} value={f.notes} onChange={e=>s("notes",e.target.value)}/></FF><div className="sep"/>
<div style={{display:"flex",gap:4,justifyContent:"flex-end",flexWrap:"wrap"}}>
  {onDel&&<button onClick={onDel} style={{padding:"8px 12px",borderRadius:8,border:"1px solid var(--red)",color:"var(--red)",fontSize:12,marginRight:"auto"}}>Supprimer</button>}
  <button onClick={onX} style={{padding:"8px 14px",borderRadius:8,border:"1px solid var(--border)",color:"var(--text2)",fontSize:12}}>Annuler</button>
  <button onClick={()=>{if(!f.nom.trim())return;onSave({...f,id:f.id||uid(),_isNew:!f.id})}} style={{padding:"8px 18px",borderRadius:8,background:"var(--gold)",color:"#fff",fontSize:13,fontWeight:600}}>{presta?"OK":"Ajouter"}</button>
</div></div>}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
