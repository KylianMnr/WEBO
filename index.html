<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<title>WEBO Asset Management — Hub v24</title>
<link rel="apple-mobile-web-app-capable" content="yes"/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,700&family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
<style>
:root{
--bg:#0B0E14;--bg2:#111520;--bg3:#171C28;--bg4:#1E2436;--bg5:#252C3D;
--border:#2A2D35;--border2:#353A48;
--gold:#C5A059;--gold2:#D4AF6A;--bordeaux:#4A0E0E;--bordeaux2:#6B1A1A;--bordeaux-bg:#2A0808;
--green:#089981;--red:#E74C4C;--blue:#2962FF;--purple:#8B5CF6;
--text:#F5F5F7;--text2:#9CA3AF;--text3:#5A6270;--text4:#3A4050;
--serif:'Playfair Display',Georgia,serif;--sans:'Inter',-apple-system,sans-serif;--mono:'JetBrains Mono',monospace;
--radius:8px;--glass:rgba(17,21,32,.78);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--sans);font-weight:400;min-height:100dvh;-webkit-font-smoothing:antialiased;font-size:13px;background-image:radial-gradient(circle at 20% 50%,rgba(197,160,89,.02) 0%,transparent 50%),radial-gradient(circle at 80% 20%,rgba(41,98,255,.02) 0%,transparent 50%)}
::selection{background:var(--gold);color:var(--bg)}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideR{from{transform:translateX(24px);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes glow{0%,100%{box-shadow:0 0 6px rgba(197,160,89,.15)}50%{box-shadow:0 0 20px rgba(197,160,89,.3)}}
@keyframes urgPulse{0%,100%{border-color:var(--bordeaux)}50%{border-color:var(--red)}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-3px)}}
.fu{animation:fadeUp .35s ease-out both}.fi{animation:fadeIn .3s ease-out both}
button{font-family:inherit;cursor:pointer;-webkit-tap-highlight-color:transparent;border:none;background:transparent}
select,input,textarea{font-family:var(--sans);font-size:14px;background:var(--bg);color:var(--text);border:1px solid var(--border);border-radius:var(--radius);padding:10px 12px;outline:none;transition:border-color .2s}
select:focus,input:focus,textarea:focus{border-color:var(--gold)}
::-webkit-scrollbar{width:4px;height:4px}::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:2px}
/* TOPNAV */
.topnav{position:sticky;top:0;z-index:100;background:var(--glass);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid rgba(197,160,89,.08);padding:0 20px;display:flex;align-items:center;height:56px;gap:12px}
.logo{display:flex;align-items:baseline;gap:1px;text-decoration:none;cursor:pointer}
.logo .w{font-family:var(--serif);font-weight:700;font-size:22px;color:var(--gold);font-style:italic}
.logo .r{font-family:var(--serif);font-weight:600;font-size:18px;color:var(--text)}
.logo-tag{font-size:8px;color:var(--text3);letter-spacing:2.5px;text-transform:uppercase;font-family:var(--mono);margin-left:6px}
.nb{padding:7px 14px;border-radius:var(--radius);font-size:11px;font-weight:600;color:var(--text2);transition:all .2s;display:flex;align-items:center;gap:5px}
.nb:hover{color:var(--text);background:var(--bg3)}
.nb.active{color:var(--gold);background:rgba(197,160,89,.08)}
.nb i{font-size:12px}
/* LEADERBOARD MINI */
.lb-mini{display:flex;gap:8px;align-items:center;padding:4px 12px;border-radius:20px;border:1px solid var(--border);background:var(--bg2)}
.lb-item{display:flex;align-items:center;gap:4px;font-size:10px;font-weight:600}
.lb-rank{width:16px;height:16px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:800;font-family:var(--mono)}
/* HUB */
.hub{padding:24px 20px;max-width:1300px;margin:0 auto}
.hub-header{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:12px}
.hub-title{font-family:var(--serif);font-size:28px;font-weight:700;line-height:1.2;background:linear-gradient(135deg,var(--gold),#E8D5A8);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hub-sub{font-size:13px;color:var(--text2);font-weight:300;margin-top:4px}
.hub-stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:22px;overscroll-behavior-x:contain}
.stat-card{background:linear-gradient(145deg,var(--bg2),var(--bg3));border:1px solid var(--border);border-radius:12px;padding:16px;transition:all .3s;position:relative;overflow:hidden}
.stat-card:hover{border-color:var(--gold);transform:translateY(-3px);box-shadow:0 8px 25px rgba(197,160,89,.08)}
.stat-label{font-size:9px;font-weight:600;color:var(--text3);letter-spacing:1.5px;text-transform:uppercase;font-family:var(--mono);margin-bottom:3px}
.stat-val{font-size:22px;font-weight:800;font-family:var(--mono);line-height:1.1}
.hub-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
.hub-card{background:linear-gradient(145deg,var(--bg2),rgba(30,36,54,.6));border:1px solid var(--border);border-radius:14px;padding:22px 20px;cursor:pointer;transition:all .35s;position:relative;overflow:hidden}
.hub-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--gold),var(--gold2),transparent);opacity:0;transition:opacity .3s}
.hub-card:hover{border-color:rgba(197,160,89,.25);transform:translateY(-4px) scale(1.01);box-shadow:0 16px 48px rgba(0,0,0,.3),0 0 0 1px rgba(197,160,89,.1)}
.hub-card:hover::before{opacity:1}
.hub-card-icon{width:48px;height:48px;border-radius:14px;background:linear-gradient(135deg,rgba(197,160,89,.12),rgba(197,160,89,.04));border:1px solid rgba(197,160,89,.1);display:flex;align-items:center;justify-content:center;margin-bottom:14px;font-size:20px;color:var(--gold)}
.hub-card h3{font-family:var(--serif);font-size:17px;font-weight:600;margin-bottom:5px}
.hub-card p{font-size:11px;color:var(--text2);line-height:1.6}
.hub-card .cnt{position:absolute;top:16px;right:16px;font-family:var(--mono);font-size:28px;font-weight:900;color:rgba(197,160,89,.06)}
/* TABLE */
.tbl{width:100%;border-collapse:separate;border-spacing:0}
.tbl th{font-size:9px;font-weight:600;color:var(--text3);letter-spacing:1.5px;text-transform:uppercase;font-family:var(--mono);padding:10px 12px;text-align:left;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--bg2);z-index:5}
.tbl td{padding:10px 12px;border-bottom:1px solid var(--border);font-size:12px;vertical-align:middle}
.tbl tbody tr{transition:all .15s;cursor:pointer}.tbl tbody tr:hover{background:rgba(197,160,89,.03)}
/* BADGE */
.badge{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:20px;font-size:9px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;font-family:var(--mono)}
.badge-green{color:var(--green);background:rgba(8,153,129,.1);border:1px solid rgba(8,153,129,.2)}
.badge-red{color:var(--red);background:rgba(231,76,76,.1);border:1px solid rgba(231,76,76,.2)}
.badge-gold{color:var(--gold);background:rgba(197,160,89,.1);border:1px solid rgba(197,160,89,.2)}
.badge-purple{color:var(--purple);background:rgba(139,92,246,.1);border:1px solid rgba(139,92,246,.2)}
.badge-blue{color:var(--blue);background:rgba(41,98,255,.1);border:1px solid rgba(41,98,255,.2)}
.badge-ghost{color:var(--text3);background:var(--bg4);border:1px solid var(--border)}
.badge-bordeaux{color:#E88;background:rgba(74,14,14,.4);border:1px solid rgba(107,26,26,.6)}
/* CARD */
.card{background:linear-gradient(160deg,var(--bg2),rgba(23,28,40,.7));border:1px solid var(--border);border-radius:12px;transition:all .25s}
.card:hover{border-color:var(--border2);box-shadow:0 6px 20px rgba(0,0,0,.12)}
.card-h{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.card-b{padding:14px 18px}
/* PROGRESS */
.prog{height:5px;border-radius:3px;background:var(--bg4);overflow:hidden}.prog-fill{height:100%;border-radius:3px;transition:width .8s ease-out}
/* TIMELINE */
.tl{position:relative;padding-left:24px}
.tl::before{content:'';position:absolute;left:7px;top:0;bottom:0;width:1px;background:var(--border)}
.tl-item{position:relative;padding:10px 0;border-bottom:1px solid rgba(42,45,53,.5)}
.tl-dot{position:absolute;left:-20px;top:14px;width:10px;height:10px;border-radius:50%;border:2px solid var(--bg);z-index:2}
.tl-time{font-family:var(--mono);font-size:10px;color:var(--text3);margin-bottom:3px}
.tl-title{font-weight:600;font-size:13px;margin-bottom:2px}
.tl-sub{font-size:11px;color:var(--text2)}
/* AVATAR */
.av{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;flex-shrink:0}
/* MODAL */
.overlay{position:fixed;inset:0;z-index:1000;display:flex;align-items:center;justify-content:center;animation:fadeIn .12s}
.overlay-bg{position:absolute;inset:0;background:rgba(0,0,0,.55);backdrop-filter:blur(6px)}
.modal{position:relative;background:linear-gradient(160deg,var(--bg2),var(--bg3));border:1px solid var(--border);border-radius:16px;padding:28px;width:95%;max-width:540px;max-height:85vh;overflow-y:auto;box-shadow:0 32px 80px rgba(0,0,0,.5),0 0 0 1px rgba(197,160,89,.05);animation:fadeUp .25s}
.modal::-webkit-scrollbar{width:3px}
/* KANBAN */
.kanban-scroll{display:flex;gap:10px;overflow-x:auto;overflow-y:hidden;padding:10px;flex:1;-webkit-overflow-scrolling:touch;scroll-snap-type:x proximity;scroll-behavior:smooth;overscroll-behavior-x:contain}.kanban-scroll::-webkit-scrollbar{display:none}
.kanban-col{min-width:260px;width:260px;flex-shrink:0;background:linear-gradient(180deg,var(--bg),rgba(17,21,32,.4));border:1px solid var(--border);border-radius:10px;padding:8px;display:flex;flex-direction:column;scroll-snap-align:start}
.kc{background:linear-gradient(145deg,var(--bg2),rgba(23,28,40,.5));border:1px solid var(--border);border-radius:10px;padding:10px;margin-bottom:5px;cursor:grab;transition:all .2s}
.kc:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.25);border-color:rgba(197,160,89,.2)}.kc:active{cursor:grabbing;transform:scale(.98)}
.kcol.over{background:rgba(41,98,255,.04)!important}
/* CMD */
.cmd-ov{position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,.5);backdrop-filter:blur(4px);display:flex;align-items:flex-start;justify-content:center;padding-top:15vh;animation:fadeIn .1s}
.cmd-box{background:var(--bg2);border:1px solid var(--border);border-radius:12px;width:90%;max-width:520px;overflow:hidden;box-shadow:0 24px 80px rgba(0,0,0,.5)}
.cmd-in{width:100%;padding:16px 20px;font-size:16px;background:transparent;border:none;border-bottom:1px solid var(--border);color:var(--text);outline:none}
.cmd-r{display:flex;align-items:center;gap:12px;padding:12px 20px;cursor:pointer;transition:background .1s;font-size:13px}
.cmd-r:hover{background:var(--bg3)}
/* RIGHT PANEL */
.rpanel{position:fixed;right:0;top:0;bottom:0;width:400px;max-width:90vw;background:linear-gradient(180deg,var(--bg2),var(--bg3));border-left:1px solid rgba(197,160,89,.08);z-index:200;overflow-y:auto;box-shadow:-16px 0 48px rgba(0,0,0,.35);animation:slideR .2s ease-out}
.rpanel::-webkit-scrollbar{width:3px}
/* UTILS */
.sep{height:1px;background:linear-gradient(90deg,transparent,rgba(197,160,89,.25),transparent);margin:12px 0}
.blur{filter:blur(6px);user-select:none;pointer-events:none}
.sync-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.sync-dot.on{background:var(--green)}.sync-dot.off{background:var(--red)}.sync-dot.loading{background:var(--gold);animation:pulse 1s infinite}
.ff label{display:block;font-size:9px;font-weight:600;color:var(--text3);margin-bottom:4px;letter-spacing:1.2px;text-transform:uppercase;font-family:var(--mono)}
.ff{margin-bottom:10px}
.wa{padding:4px 8px;border-radius:var(--radius);border:1px solid rgba(37,211,102,.2);color:#25D366;font-size:11px;transition:all .15s}.wa:hover{background:rgba(37,211,102,.06)}
.match-card{background:rgba(139,92,246,.06);border:1px solid rgba(139,92,246,.15);border-radius:8px;padding:8px;margin-top:4px;cursor:pointer;transition:all .15s}.match-card:hover{background:rgba(139,92,246,.12)}
.notif-wrap{position:relative}
.notif-bell{position:relative;cursor:pointer;padding:7px 10px;border-radius:var(--radius);transition:all .2s}
.notif-bell:hover{background:var(--bg3)}
.notif-dot{position:absolute;top:3px;right:5px;width:9px;height:9px;border-radius:50%;background:var(--red);border:2px solid var(--bg2);animation:pulse 2s infinite}
.notif-panel{position:absolute;top:calc(100% + 6px);right:-20px;width:340px;max-height:420px;overflow-y:auto;background:var(--bg2);border:1px solid var(--border);border-radius:12px;box-shadow:0 16px 48px rgba(0,0,0,.5);z-index:600;animation:fadeUp .2s}
.notif-item{padding:11px 14px;border-bottom:1px solid var(--border);display:flex;gap:10px;align-items:flex-start;transition:background .15s;cursor:pointer;font-size:12px}
.notif-item:hover{background:var(--bg3)}
.notif-item.unread{border-left:3px solid var(--gold)}
.notif-ic{width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:11px}
.bulk-bar{position:sticky;bottom:0;left:0;right:0;background:linear-gradient(180deg,transparent,var(--bg) 20%);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-top:1px solid rgba(197,160,89,.15);padding:12px 18px;display:flex;align-items:center;gap:10px;z-index:50;animation:fadeUp .2s}
.bulk-cnt{font-family:var(--mono);font-weight:700;color:var(--gold);font-size:14px}
.bulk-btn{padding:6px 12px;border-radius:var(--radius);font-size:10px;font-weight:600;transition:all .15s;border:1px solid var(--border);color:var(--text2)}
.bulk-btn:hover{border-color:var(--gold);color:var(--gold);background:rgba(197,160,89,.06)}
.chk{width:16px;height:16px;accent-color:var(--gold);cursor:pointer;flex-shrink:0}
/* Pipeline calendar removed — using Agenda only */
.chart-card{background:linear-gradient(160deg,var(--bg2),var(--bg3));border:1px solid var(--border);border-radius:12px;overflow:hidden}
.chart-hd{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.chart-hd span{font-size:11px;font-weight:600;font-family:var(--mono);color:var(--text2)}
.funnel-step{display:flex;align-items:center;gap:10px;padding:7px 14px;transition:background .15s}
.funnel-step:hover{background:var(--bg3)}
.funnel-bar{height:26px;border-radius:8px;transition:width .8s ease-out;min-width:6px;display:flex;align-items:center;justify-content:flex-end;padding-right:10px;font-size:10px;font-weight:700;color:rgba(255,255,255,.95);font-family:var(--mono);box-shadow:inset 0 1px 0 rgba(255,255,255,.1)}
.feed{max-height:280px;overflow-y:auto}
.feed-item{display:flex;gap:10px;padding:10px 14px;border-bottom:1px solid var(--border);transition:background .15s;animation:fadeUp .3s ease-out both}
.feed-item:hover{background:var(--bg3)}
.feed-dot{width:8px;height:8px;border-radius:50%;margin-top:5px;flex-shrink:0}
@media(max-width:768px){
/* NAV */
.topnav{padding:0 8px;height:48px;gap:3px}
.logo .w{font-size:17px}.logo .r{font-size:14px}
.logo-tag,.lb-mini{display:none}
.nb{padding:5px 7px;font-size:9px;gap:3px}

/* HUB */
.hub{padding:10px 8px}
.hub-title{font-size:18px!important}
.hub-header{margin-bottom:10px!important;gap:8px}
.hub-sub{font-size:10px!important}
.hub-stats{grid-template-columns:repeat(4,1fr)!important;gap:4px!important}
.stat-card{padding:8px 6px!important;min-width:0!important;border-radius:8px!important}
.stat-label{font-size:7px!important;letter-spacing:.8px!important}
.stat-val{font-size:14px!important}
.hub-grid{grid-template-columns:repeat(2,1fr)!important;gap:6px!important}
.hub-card{padding:12px 10px!important;border-radius:10px!important;min-width:0!important}
.hub-card h3{font-size:13px!important}
.hub-card p{font-size:9px!important}
.hub-card .cnt{font-size:18px!important}
.hub-card-icon{width:36px!important;height:36px!important;border-radius:10px!important;font-size:16px!important;margin-bottom:8px!important}

/* DASHBOARD CARD */
.card{border-radius:10px!important}
.card-h{padding:8px 10px!important;font-size:12px}
.card-b{padding:8px 10px!important}
.chart-card{border-radius:10px!important}
.chart-hd{padding:8px 12px!important}
.chart-hd span{font-size:10px!important}

/* FUNNEL */
.funnel-step{padding:4px 8px!important;gap:4px!important}
.funnel-bar{height:16px!important;font-size:8px!important;border-radius:6px!important}
.feed-item{padding:6px 8px!important}

/* PIPELINE */
.kanban-col{min-width:75vw!important;width:75vw!important;flex:none!important;border-radius:8px!important}
.kc{padding:8px!important;border-radius:8px!important}

/* TABLE */
.tbl th,.tbl td{padding:6px 5px;font-size:9px}
.tbl{min-width:650px}

/* PANELS */
.rpanel{width:100vw!important;max-width:100vw!important;border-radius:0!important}
.notif-panel{width:92vw;right:-40px;max-height:70vh}
.modal{width:98%;padding:16px;max-height:95vh;border-radius:12px}

/* FORMS */
select,input,textarea{font-size:16px!important;padding:8px 10px!important;border-radius:6px!important}
.ff{margin-bottom:8px!important}
.ff label{font-size:8px!important}

/* AGENDA */
.ag-day{min-height:50px!important;padding:3px!important;border-radius:4px!important}
.ag-ev{font-size:6px!important;padding:1px 3px!important}
.ag-num{font-size:8px!important}
.ag-head{font-size:7px!important;padding:4px 0!important}

/* BUTTONS */
.bulk-bar{padding:8px 10px;gap:4px;flex-wrap:wrap}
.bulk-btn{padding:4px 6px;font-size:8px}
h2{font-size:16px!important}
.badge{font-size:8px!important;padding:2px 6px!important}
.wa{font-size:9px!important;padding:3px 6px!important}
.sep{margin:6px 0!important}

/* MATCHING */
.match-form{grid-template-columns:1fr 1fr!important}
.match-hero{padding:12px!important;border-radius:10px!important}
.match-result{padding:12px!important}
.match-score{width:40px!important;height:40px!important;font-size:14px!important;border-radius:8px!important}

/* TALENTS */
.talent-card{border-radius:10px!important}
.qf-btn{padding:4px 8px!important;font-size:9px!important}

/* DAY PANEL */
.day-panel{width:100vw!important;max-width:100vw!important}
.day-ev-actions{opacity:1!important}

/* ARROWS */
.k-arrow{width:22px!important;height:40px!important;font-size:10px!important;opacity:.4}

/* FAB */
.ai-fab{opacity:.35!important;width:36px!important;height:36px!important;bottom:12px!important;right:12px!important;font-size:14px!important}

/* FINANCE */
.finance-grid{grid-template-columns:1fr!important}
}

@media(max-width:400px){
.hub-stats{grid-template-columns:repeat(2,1fr)!important}
.kanban-col{min-width:85vw!important;width:85vw!important}
}
/* ═══ V13 — ENRICHMENT ═══ */
.enrich-card{background:linear-gradient(135deg,rgba(41,98,255,.06),rgba(139,92,246,.06));border:1px solid rgba(41,98,255,.15);border-radius:var(--radius);padding:12px;margin-top:10px;animation:fadeUp .3s}
.enrich-card .enrich-title{font-size:9px;font-weight:700;color:var(--blue);font-family:var(--mono);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:6px;display:flex;align-items:center;gap:5px}
.enrich-card .enrich-body{font-size:11px;color:var(--text2);line-height:1.7;white-space:pre-wrap}
.enrich-btn{padding:6px 10px;border-radius:var(--radius);border:1px solid rgba(41,98,255,.3);color:var(--blue);font-size:10px;font-weight:600;transition:all .2s;display:inline-flex;align-items:center;gap:4px}
.enrich-btn:hover{background:rgba(41,98,255,.08);border-color:var(--blue)}
.enrich-btn.loading{opacity:.6;pointer-events:none}
/* ═══ V13 — MATCHING ═══ */

const evByHour={};evts.forEach(ev=>{const hr=parseInt((ev.time||"09").split(":")[0])||9;if(!evByHour[hr])evByHour[hr]=[];evByHour[hr].push(ev)});
const filteredLeads=leads.filter(l=>{if(!leadSearch)return false;const q=leadSearch.toLowerCase();return l.nom.toLowerCase().includes(q)||l.service.toLowerCase().includes(q)}).slice(0,5);
return <div className="day-panel">
  <div className="day-hdr">
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
      <div><div className="day-date">{dt.getDate()} {dt.toLocaleDateString("fr-FR",{month:"long"})}</div><div className="day-sub">{dayLabel}</div></div>
      <div style={{display:"flex",gap:4}}>
        <button onClick={()=>setShowNew(true)} style={{padding:"7px 14px",borderRadius:"var(--radius)",background:"var(--gold)",color:"var(--bg)",fontSize:11,fontWeight:700}}><i className="fa-solid fa-plus" style={{marginRight:3}}/>Event</button>
        <button onClick={onClose} style={{padding:"7px 10px",borderRadius:"var(--radius)",border:"1px solid var(--border)",color:"var(--text3)",fontSize:13}}><i className="fa-solid fa-xmark"/></button>
      </div>
    </div>
    <div style={{display:"flex",gap:6,marginTop:10}}>
      <div style={{fontSize:11,color:"var(--text2)"}}><span style={{fontFamily:"var(--mono)",fontWeight:700,color:"var(--gold)"}}>{evts.length}</span> event{evts.length>1?"s":""}</div>
      <div style={{fontSize:11,color:"var(--text3)"}}>|</div>
      <button onClick={()=>setShowAddLead(p=>!p)} style={{fontSize:11,color:"var(--blue)",fontWeight:600}}><i className="fa-solid fa-user-plus" style={{marginRight:3}}/>Ajouter un prospect</button>
    </div>
    {showAddLead&&<div style={{marginTop:8}}>
      <input style={{...IS2,fontSize:13,marginBottom:4}} value={leadSearch} onChange={e=>setLeadSearch(e.target.value)} placeholder="Chercher un lead..." autoFocus/>
      {filteredLeads.map(l=><div key={l.id} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"6px 8px",borderRadius:6,cursor:"pointer",transition:"background .15s",fontSize:12}} onMouseOver={e=>e.currentTarget.style.background="var(--bg3)"} onMouseOut={e=>e.currentTarget.style.background="transparent"}>
        <div><span style={{fontWeight:600}}>{l.nom}</span> <span style={{color:"var(--text3)",fontSize:10}}>{l.service}</span></div>
        <button onClick={()=>{onMoveLead(l.id,date);setShowAddLead(false);setLeadSearch("")}} style={{padding:"3px 8px",borderRadius:4,border:"1px solid var(--green)",color:"var(--green)",fontSize:10,fontWeight:600}}>Planifier</button>
      </div>)}
      {leadSearch&&filteredLeads.length===0&&<div style={{fontSize:11,color:"var(--text3)",padding:6}}>Aucun lead trouve</div>}
    </div>}
  </div>
  <div className="day-timeline">
    {hours.map(h=>{const hEvts=evByHour[h]||[];
    return <div key={h} className="day-hour">
      <div className="day-hour-label">{String(h).padStart(2,"0")}:00</div>
      <div className="day-hour-content">
        {hEvts.map(ev=><div key={ev.id} className="day-ev">
          <div className="day-ev-dot" style={{background:ev.cl||"var(--gold)"}}/>
          <div className="day-ev-body">
            <div className="day-ev-title">{ev.tp==="relance"?"📅 ":ev.tp==="signe"?"✓ ":ev.tp==="paiement"?"💳 ":"📌 "}{ev.lb}</div>
            <div className="day-ev-meta">{ev.time}{ev.lead?" | "+ev.lead.service+" | "+(COLS.find(c=>c.id===ev.lead.status)?.label||""):""}</div>
          </div>
          <div className="day-ev-actions">
            {ev.lead&&<button className="day-act-btn" onClick={()=>onLeadClick(ev.lead)}>Voir</button>}
            {ev.lead&&<button className="day-act-btn" onClick={()=>openWA(ev.lead,mN(ev.lead.memberId))}><i className="fa-brands fa-whatsapp"/></button>}
            {ev.tp==="custom"&&<button className="day-act-btn del" onClick={()=>onDelEvent(ev.id)}>Suppr</button>}
            {ev.lead&&ev.tp==="relance"&&<button className="day-act-btn del" onClick={()=>onMoveLead(ev.lead.id,"")}>Retirer</button>}
          </div>
        </div>)}
        {hEvts.length===0&&<div style={{minHeight:20}}/>}
      </div>
    </div>})}
  </div>
  {showNew&&<div className="day-new-form">
    <div style={{fontSize:10,fontWeight:600,color:"var(--gold)",fontFamily:"var(--mono)",marginBottom:8}}>NOUVEL EVENT</div>
    <div className="ff"><label>Titre</label><input style={IS2} value={nt} onChange={e=>setNt(e.target.value)} placeholder="Call client, Deadline, RDV..." autoFocus/></div>
    <div className="ff"><label>Pour</label><select style={IS2} value={nFor||""} onChange={e=>setNFor(e.target.value)}><option value="">Moi</option>{TEAM.map(m=><option key={m.id} value={m.id}>{m.name.split(" ")[0]}</option>)}</select></div>
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
      <div className="ff"><label>Heure</label><input style={IS2} type="time" value={ntime} onChange={e=>setNtime(e.target.value)}/></div>
      <div className="ff"><label>Couleur</label><div style={{display:"flex",gap:4,marginTop:4}}>{["var(--purple)","var(--gold)","var(--red)","var(--green)","var(--blue)"].map(c=><button key={c} onClick={()=>setNcol(c)} style={{width:22,height:22,borderRadius:6,background:c,border:ncol===c?"2px solid var(--text)":"2px solid transparent"}}/>)}</div></div>
    </div>
    <div style={{display:"flex",gap:4,justifyContent:"flex-end",marginTop:8}}>
      <button onClick={()=>setShowNew(false)} style={{padding:"8px 12px",borderRadius:"var(--radius)",border:"1px solid var(--border)",color:"var(--text2)",fontSize:11}}>Annuler</button>
      <button onClick={()=>{if(nt.trim()){onAddEvent(nt.trim(),ntime,ncol);setNt("");setNtime("09:00");setShowNew(false)}}} style={{padding:"8px 16px",borderRadius:"var(--radius)",background:"var(--gold)",color:"var(--bg)",fontSize:12,fontWeight:700}}>Ajouter</button>
    </div>
  </div>}
</div>}

/* ═══ FINANCE ═══ */
const Finance=()=>(
<div style={{padding:"14px 18px",flex:1,overflow:"auto"}}>

  <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(160px,1fr))",gap:10,marginBottom:18}}>

    <div key={i} className="stat-card fu" style={{animationDelay:i*30+"ms"}}><div className="stat-label">{s.l}</div><div className="stat-val" style={{color:s.c,fontSize:22}}><P$ v={s.v} p={pm}/></div></div>)}
  </div>
  <div className="finance-grid" style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14,marginBottom:14}}>
    <div className="chart-card">
      <div className="chart-hd"><span><i className="fa-solid fa-chart-pie" style={{color:"var(--gold)",marginRight:6}}/>Commission</span><button onClick={exportFinance} style={{fontSize:9,color:"var(--gold)",fontWeight:600,padding:"3px 8px",border:"1px solid rgba(197,160,89,.2)",borderRadius:"var(--radius)"}}><i className="fa-solid fa-file-csv" style={{marginRight:3}}/>Export</button></div>
      <div style={{padding:16}}>
        {(()=>{const total=st.ca*.2;const net=st.margeNette;const prosp=st.comProsp;const nP=total>0?Math.round(net/total*100):100;const pP=total>0?Math.round(prosp/total*100):0;
        return <div>

            <div style={{width:pP+"%",background:"var(--blue)",transition:"width .8s"}}/>
          </div>
          <div style={{display:"flex",justifyContent:"space-around",fontSize:11}}>
            <div style={{textAlign:"center"}}><div style={{width:10,height:10,borderRadius:3,background:"var(--gold)",display:"inline-block",marginRight:4}}/>Marge<div style={{fontFamily:"var(--mono)",fontWeight:700,fontSize:15,color:"var(--gold)",marginTop:2}}><P$ v={E(net)} p={pm}/></div><div style={{fontSize:10,color:"var(--text3)"}}>{nP}%</div></div>
            <div style={{textAlign:"center"}}><div style={{width:10,height:10,borderRadius:3,background:"var(--blue)",display:"inline-block",marginRight:4}}/>Chasseurs<div style={{fontFamily:"var(--mono)",fontWeight:700,fontSize:15,color:"var(--blue)",marginTop:2}}><P$ v={E(prosp)} p={pm}/></div><div style={{fontSize:10,color:"var(--text3)"}}>{pP}%</div></div>
            <div style={{textAlign:"center"}}><div style={{width:10,height:10,borderRadius:3,background:"var(--green)",display:"inline-block",marginRight:4}}/>CA<div style={{fontFamily:"var(--mono)",fontWeight:700,fontSize:15,color:"var(--green)",marginTop:2}}><P$ v={E(st.ca)} p={pm}/></div></div>
          </div>
        </div>})()}
      </div>
    </div>
    <div className="chart-card">
      <div className="chart-hd"><span><i className="fa-solid fa-signal" style={{color:"var(--gold)",marginRight:6}}/>Par Etape</span></div>
      <div style={{padding:"10px 14px"}}>
        {COLS.map(col=>{const val=leads.filter(l=>l.status===col.id).reduce((s,l)=>s+l.valeur,0);const cnt=leads.filter(l=>l.status===col.id).length;const mxV=Math.max(...COLS.map(c=>leads.filter(l=>l.status===c.id).reduce((s,l)=>s+l.valeur,0)),1);const pct=Math.round(val/mxV*100);

          <div style={{flex:1,height:12,background:"var(--bg4)",borderRadius:3,overflow:"hidden"}}><div style={{height:"100%",width:pct+"%",background:col.accent,borderRadius:3,transition:"width .6s"}}/></div>
          <div style={{width:75,textAlign:"right",fontSize:9,fontFamily:"var(--mono)",color:"var(--text2)"}}>{cnt}x <P$ v={E(val)} p={pm}/></div>
        </div>})}
      </div>
    </div>
  </div>
  <div className="card" style={{marginBottom:14}}><div className="card-h"><span style={{fontWeight:700}}><i className="fa-solid fa-money-bill-transfer" style={{color:"var(--gold)",marginRight:6}}/>Suivi Paiements</span></div><div className="card-b"><div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(130px,1fr))",gap:8,marginBottom:10}}>{[{l:"Encaisse",v:E(st.cEnc),c:"var(--green)"},{l:"En attente",v:E(st.cAtt),c:"var(--gold)"},{l:"Non facture",v:E(st.cNF),c:"var(--text3)"},{l:"Litige",v:E(st.cLit),c:"var(--red)"}].map((s,i)=><div key={i} className="stat-card" style={{borderLeft:"3px solid "+s.c}}><div className="stat-label">{s.l}</div><div className="stat-val" style={{color:s.c,fontSize:18}}><P$ v={s.v} p={pm}/></div></div>)}</div>{isA&&<table className="tbl"><thead><tr><th>Deal</th><th>Valeur</th><th>Paiement</th><th></th></tr></thead><tbody>{leads.filter(l=>l.status==="signe").map(l=><tr key={l.id}><td style={{fontWeight:600,fontSize:11}}>{l.nom}</td><td style={{fontFamily:"var(--mono)",fontSize:11}}><P$ v={E(l.valeur)} p={pm}/></td><td><Badge type={l.paymentStatus==="encaisse"?"green":l.paymentStatus==="litige"?"red":"gold"}>{PAY_ST.find(p=>p.id===(l.paymentStatus||"non_facture"))?.label||"Non facture"}</Badge></td><td><select value={l.paymentStatus||"non_facture"} onChange={async e=>{const v=e.target.value;const nl=addLog(l.activityLog,"Paiement>"+v);setLeads(p=>p.map(x=>x.id===l.id?{...x,paymentStatus:v,activityLog:nl}:x));await sb.from("leads").update({payment_status:v,activity_log:nl}).eq("id",l.id);flash("OK")}} style={{...IS,padding:"3px 6px",fontSize:10,width:"auto"}}>{PAY_ST.map(p=><option key={p.id} value={p.id}>{p.label}</option>)}</select></td></tr>)}</tbody></table>}</div></div>
  {/* Objectif */}
  <div className="card" style={{marginBottom:14}}><div className="card-h"><span style={{fontWeight:600}}>Objectif Mensuel — {E(OBJ)}</span><span style={{fontFamily:"var(--mono)",fontWeight:700,color:st.obj>=80?"var(--green)":"var(--gold)"}}>{st.obj}%</span></div><div className="card-b"><div style={{height:6}}><Prog pct={st.obj} color={st.obj>=100?"var(--green)":"var(--gold)"}/></div></div></div>

  <tbody>{st.byM.map((m,i)=><tr key={m.id}>

    {isA&&<td style={{fontFamily:"var(--mono)",color:"var(--gold)",fontWeight:700}}><P$ v={E(m.marge)} p={pm}/></td>}
    {isA&&<td style={{fontFamily:"var(--mono)",color:m.isFondateur?"var(--text3)":"var(--blue)"}}>{m.isFondateur?"—":<P$ v={E(m.prosp)} p={pm}/>}</td>}
  </tr>)}</tbody></table></div></div>
  {/* ROI Sources */}
  <div className="card"><div className="card-h"><span style={{fontWeight:600}}>ROI par Source d'Acquisition</span></div><div className="card-b">
  {st.bySrc.map(s=>{const mx=Math.max(...st.bySrc.map(x=>x.ca),1);const p=Math.round(s.ca/mx*100);
  return <div key={s.source} style={{marginBottom:10}}><div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}><span style={{fontSize:12,fontWeight:600}}>{s.source}</span><span style={{fontFamily:"var(--mono)",fontSize:11}}>{s.total} leads · {s.rate}% · <P$ v={E(s.ca)} p={pm}/></span></div><Prog pct={p} color="var(--gold)"/></div>})}
  </div></div>
</div>);

/* ═══ IA ═══ */

/* ═══ MATCHING INVERSÉ ═══ */
const Matching=()=>{const mc=matchCrit;const smc=(k,v)=>setMatchCrit(p=>({...p,[k]:v}));
return <div style={{padding:"14px 18px",flex:1,overflow:"auto"}}>
  <h2 style={{fontFamily:"var(--serif)",fontSize:20,fontWeight:600,marginBottom:14}}>Mode Matching</h2>

    <div style={{fontSize:13,fontWeight:600,marginBottom:4}}>Trouvez le prestataire ideal</div>
    <div style={{fontSize:11,color:"var(--text2)",marginBottom:14}}>Saisissez les criteres de votre mission. Le CRM calcule un Score de Compatibilite.</div>
    <div className="match-form">
      <div className="ff"><label>Service</label><select style={{...IS,fontSize:13}} value={mc.service} onChange={e=>smc("service",e.target.value)}><option value="">Tous</option>{SERVICES.map(s=><option key={s}>{s}</option>)}</select></div>
      <div className="ff"><label>Budget TJM max</label><input style={{...IS,fontSize:13}} type="number" placeholder="600" value={mc.budget} onChange={e=>smc("budget",e.target.value)}/></div>
      <div className="ff"><label>Duree (mois)</label><input style={{...IS,fontSize:13}} type="number" placeholder="3" value={mc.duree} onChange={e=>smc("duree",e.target.value)}/></div>
      <div className="ff"><label>Competence cle</label><input style={{...IS,fontSize:13}} placeholder="React, SEO..." value={mc.competence} onChange={e=>smc("competence",e.target.value)}/></div>
      <button onClick={runMatch} style={{padding:"10px 20px",borderRadius:"var(--radius)",background:"var(--purple)",color:"#fff",fontSize:13,fontWeight:700,height:42}}>{matchLoading?"...":"Matcher"}</button>
    </div>
  </div>
  {matchRes===null&&<div className="match-empty"><i className="fa-solid fa-wand-magic-sparkles"/>Definissez vos criteres et lancez le matching.<br/>Le CRM suggerera les meilleurs profils.</div>}
  {matchRes&&matchRes.length===0&&<div className="match-empty"><i className="fa-solid fa-user-slash"/>Aucun prestataire ne correspond. Ajustez vos criteres ou ajoutez des prestataires.</div>}
  {matchRes&&matchRes.length>0&&<div>
    <div style={{fontSize:11,color:"var(--text3)",fontFamily:"var(--mono)",marginBottom:10}}>{matchRes.length} PROFIL{matchRes.length>1?"S":""} TROUVES</div>
    {matchRes.map((p,i)=>{const sCol=p.score>=70?"var(--green)":p.score>=40?"var(--gold)":"var(--red)";const rank=i<3?["#C5A059","#9CA3AF","#8B4513"][i]:null;
    return <div key={p.id} className="match-result" style={{animationDelay:i*60+"ms"}}>
      <div style={{position:"absolute",top:0,left:0,right:0,height:3,background:sCol}}/>
      <div style={{display:"flex",gap:16,alignItems:"center"}}>
        <div className="match-score" style={{background:sCol+"18",color:sCol,border:"2px solid "+sCol+"30"}}>{p.score}</div>
        <div style={{flex:1}}>
          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:3}}>
            {rank&&<div style={{width:20,height:20,borderRadius:"50%",background:rank,display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,fontWeight:800,color:i===0?"var(--bg)":"var(--text)"}}>{i+1}</div>}
            <span style={{fontWeight:700,fontSize:15}}>{p.nom}</span>
            <span style={{fontSize:11,color:"var(--purple)",fontFamily:"var(--mono)"}}>{p.specialite}</span>
            {p.tjm&&<span style={{fontSize:10,color:"var(--text3)",fontFamily:"var(--mono)"}}>{p.tjm}E/j</span>}

<div className="sep"/><div style={{fontSize:9,fontWeight:700,color:"var(--blue)",fontFamily:"var(--mono)",letterSpacing:1.5,marginBottom:6}}>PIPELINE</div><div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8}}><FF l="Statut"><select style={IS} value={f.status} onChange={e=>s("status",e.target.value)}>{COLS.map(c=><option key={c.id} value={c.id}>{c.label}</option>)}</select></FF><FF l="Température"><select style={IS} value={f.temperature} onChange={e=>s("temperature",e.target.value)}>{TEMPS.map(t=><option key={t.id} value={t.id}>{t.e} {t.l}</option>)}</select></FF><FF l="Relance"><input style={IS} type="date" value={f.nextRelance} onChange={e=>s("nextRelance",e.target.value)}/></FF></div>
<FF l="Prestataire">{sp?<div style={{display:"flex",alignItems:"center",gap:6,padding:"7px 10px",borderRadius:"var(--radius)",border:"1px solid rgba(197,160,89,.2)",background:"rgba(197,160,89,.04)"}}><span style={{fontWeight:600}}>{sp.nom}</span><span style={{fontSize:10,color:"var(--gold)"}}>{sp.specialite}</span><button onClick={()=>s("prestaId","")} style={{marginLeft:"auto",color:"var(--red)",fontSize:10}}>✕</button></div>:<div><div style={{display:"flex",gap:4,marginBottom:3}}><input value={pQ} onChange={e=>setPQ(e.target.value)} placeholder="Chercher…" style={{...IS,flex:1,fontSize:13}}/><button onClick={()=>setShowM(p=>!p)} style={{padding:"7px 10px",borderRadius:"var(--radius)",border:"1px solid var(--gold)",color:"var(--gold)",fontSize:11,fontWeight:600}}><i className="fa-solid fa-brain"/> Suggérer</button></div>
{showM&&matches.map(m=><div key={m.id} className="match-card" onClick={()=>{s("prestaId",m.id);setShowM(false)}}><span style={{fontWeight:600}}>{m.nom}</span> <span style={{color:"var(--gold)",fontSize:11}}>Score:{m.score}%</span> <span style={{color:"var(--green)",fontSize:11,float:"right"}}>Sélectionner →</span></div>)}
{!showM&&prestas.length>0&&<div style={{maxHeight:70,overflowY:"auto",borderRadius:"var(--radius)",border:"1px solid var(--border)",background:"var(--bg)"}}>{fp.map(p=><button key={p.id} onClick={()=>{s("prestaId",p.id);setPQ("")}} style={{display:"flex",gap:5,padding:"5px 7px",width:"100%",textAlign:"left",color:"var(--text)",fontSize:11}}><span style={{fontWeight:600}}>{p.nom}</span><span style={{color:"var(--text2)"}}>{p.specialite}</span></button>)}</div>}
</div>}</FF>
<FF l="Lien externe"><input style={IS} value={f.externalLink} onChange={e=>s("externalLink",e.target.value)} placeholder="Loom, Drive…"/></FF>
<div className="sep"/>
{/* ═══ SECTION DIAGNOSTIC EAA ═══ */}
<div style={{background:"linear-gradient(135deg,rgba(231,76,76,.04),rgba(197,160,89,.04))",border:"1px solid rgba(231,76,76,.12)",borderRadius:10,padding:14,marginBottom:12}}>
<div style={{fontSize:9,fontWeight:700,color:"var(--red)",fontFamily:"var(--mono)",letterSpacing:1.5,marginBottom:8,display:"flex",alignItems:"center",gap:5}}><i className="fa-solid fa-universal-access"/>DIAGNOSTIC EAA</div>
<div style={{display:"grid",gridTemplateColumns:"1fr 2fr",gap:8}}><FF l="Score Audit (0-100)"><input style={IS} type="number" min="0" max="100" value={f.auditScore} onChange={e=>s("auditScore",e.target.value)} placeholder="0-100"/></FF><FF l="Lien PDF Audit"><input style={IS} value={f.auditPdfLink} onChange={e=>s("auditPdfLink",e.target.value)} placeholder="https://…rapport.pdf"/></FF></div>
<FF l="Erreurs techniques (top 3)"><textarea style={{...IS,height:60,resize:"vertical",fontSize:12,lineHeight:1.6}} value={f.auditErreurs} onChange={e=>s("auditErreurs",e.target.value)} placeholder="1. Contraste insuffisant sur les CTA&#10;2. Images sans attribut alt&#10;3. Navigation clavier impossible"/></FF>
</div>
{/* ═══ SECTION MULTICANAL ═══ */}
<div style={{background:"linear-gradient(135deg,rgba(41,98,255,.04),rgba(10,102,194,.04))",border:"1px solid rgba(41,98,255,.12)",borderRadius:10,padding:14,marginBottom:12}}>
<div style={{fontSize:9,fontWeight:700,color:"var(--blue)",fontFamily:"var(--mono)",letterSpacing:1.5,marginBottom:8,display:"flex",alignItems:"center",gap:5}}><i className="fa-brands fa-linkedin"/>MULTICANAL</div>
<div style={{display:"grid",gridTemplateColumns:"1fr auto",gap:8,alignItems:"end"}}><FF l="LinkedIn URL"><input style={IS} value={f.linkedinUrl} onChange={e=>s("linkedinUrl",e.target.value)} placeholder="https://linkedin.com/in/…"/></FF><FF l="Campagne IN"><button onClick={()=>s("linkedinCampaign",!f.linkedinCampaign)} style={{padding:"10px 14px",borderRadius:"var(--radius)",border:"1px solid "+(f.linkedinCampaign?"var(--blue)":"var(--border)"),background:f.linkedinCampaign?"rgba(41,98,255,.1)":"var(--bg)",color:f.linkedinCampaign?"var(--blue)":"var(--text3)",fontSize:12,fontWeight:600,whiteSpace:"nowrap",display:"flex",alignItems:"center",gap:4,transition:"all .2s"}}><i className={"fa-solid "+(f.linkedinCampaign?"fa-toggle-on":"fa-toggle-off")}/>{f.linkedinCampaign?"Active":"Off"}</button></FF></div>
<FF l="Étape Séquence"><div style={{display:"flex",gap:3,flexWrap:"wrap"}}>{LI_STEPS.map(st=><button key={st.id} onClick={()=>s("linkedinStep",st.id)} style={{padding:"5px 10px",borderRadius:20,border:"1px solid "+(f.linkedinStep===st.id?st.color:"var(--border)"),background:f.linkedinStep===st.id?st.color+"15":"transparent",color:f.linkedinStep===st.id?st.color:"var(--text3)",fontSize:10,fontWeight:600,display:"flex",alignItems:"center",gap:3,transition:"all .15s"}}><i className={"fa-solid "+st.icon} style={{fontSize:8}}/>{st.label}</button>)}</div></FF>
</div>
<div className="sep"/>
{/* ═══ TIMELINE / JOURNAL ═══ */}
<div style={{background:"linear-gradient(135deg,rgba(197,160,89,.04),rgba(139,92,246,.03))",border:"1px solid rgba(197,160,89,.12)",borderRadius:10,padding:14,marginBottom:12}}>
<div style={{fontSize:9,fontWeight:700,color:"var(--gold)",fontFamily:"var(--mono)",letterSpacing:1.5,marginBottom:8,display:"flex",alignItems:"center",gap:5}}><i className="fa-solid fa-clock-rotate-left"/>JOURNAL D'ACTIVITÉ</div>
<div style={{display:"flex",gap:4,marginBottom:10}}><input style={{...IS,flex:1,fontSize:13}} value={tlInput} onChange={e=>setTlInput(e.target.value)} placeholder="Nouvelle note…" onKeyDown={e=>{if(e.key==="Enter"&&tlInput.trim()){const entry={date:new Date().toISOString(),texte:tlInput.trim()};s("timeline",[entry,...(f.timeline||[])]);setTlInput("")}}}/><button onClick={()=>{if(!tlInput.trim())return;const entry={date:new Date().toISOString(),texte:tlInput.trim()};s("timeline",[entry,...(f.timeline||[])]);setTlInput("")}} style={{padding:"8px 16px",borderRadius:"var(--radius)",background:"var(--gold)",color:"var(--bg)",fontSize:12,fontWeight:700,whiteSpace:"nowrap"}}><i className="fa-solid fa-plus" style={{marginRight:3}}/>Ajouter</button></div>
{(f.timeline||[]).length>0?<div className="tl" style={{maxHeight:180,overflowY:"auto",paddingRight:4}}>{(f.timeline||[]).map((e,i)=>{const d=new Date(e.date);const ds=d.toLocaleDateString("fr-FR",{day:"2-digit",month:"2-digit",year:"2-digit"});const ts=d.toLocaleTimeString("fr-FR",{hour:"2-digit",minute:"2-digit"});return <div key={i} className="tl-item" style={{padding:"6px 0"}}><div className="tl-dot" style={{background:i===0?"var(--gold)":"var(--text3)"}}/><div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}><div><div className="tl-time">{ds} à {ts}</div><div style={{fontSize:11,color:"var(--text)",lineHeight:1.6}}>{e.texte}</div></div><button onClick={()=>{const nTl=[...(f.timeline||[])];nTl.splice(i,1);s("timeline",nTl)}} style={{color:"var(--text4)",fontSize:9,flexShrink:0,padding:"2px 4px",marginLeft:6}} title="Supprimer"><i className="fa-solid fa-xmark"/></button></div></div>})}</div>:<div style={{textAlign:"center",padding:"14px 0",color:"var(--text3)",fontSize:11}}><i className="fa-solid fa-book-open" style={{fontSize:14,display:"block",marginBottom:4,opacity:.4}}/>Aucune entrée</div>}
{f.notes&&<div style={{marginTop:8,padding:8,background:"var(--bg)",borderRadius:6,border:"1px solid var(--border)"}}><div style={{fontSize:8,fontWeight:700,color:"var(--text3)",fontFamily:"var(--mono)",letterSpacing:1,marginBottom:3}}>NOTES LEGACY</div><div style={{fontSize:10,color:"var(--text2)",whiteSpace:"pre-wrap",lineHeight:1.5}}>{f.notes}</div></div>}
</div>
{f.status==="signe"&&<><FF l="Statut Paiement"><select style={IS} value={f.paymentStatus||"non_facture"} onChange={e=>s("paymentStatus",e.target.value)}>{PAY_ST.map(p=><option key={p.id} value={p.id}>{p.label}</option>)}</select></FF><FF l="Preuve paiement"><input style={IS} value={f.paymentProof} onChange={e=>s("paymentProof",e.target.value)}/></FF><FF l="Lien paiement"><input style={IS} value={f.paymentLink} onChange={e=>s("paymentLink",e.target.value)}/></FF></>}
{f.status==="injoignable"&&<FF l="Raison"><select style={IS} value={f.echecReason} onChange={e=>s("echecReason",e.target.value)}>{ECHECS.map(r=><option key={r}>{r}</option>)}</select></FF>}
{mg&&mg.comWebo>0&&<div style={{background:"rgba(197,160,89,.06)",border:"1px solid rgba(197,160,89,.12)",borderRadius:"var(--radius)",padding:10,marginBottom:10}}>
  <div style={{fontSize:10,color:"var(--gold)",fontFamily:"var(--mono)",marginBottom:4}}>VENTILATION — {apporteur?.role}</div>
  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:6,fontFamily:"var(--mono)",fontSize:12}}>
    <div><div style={{fontSize:9,color:"var(--text3)"}}>Com. 20%</div><div style={{fontWeight:700,color:"var(--gold)"}}>{E(mg.comWebo)}</div></div>
    {isA&&<div><div style={{fontSize:9,color:"var(--text3)"}}>Part {apporteur?.role}</div><div style={{fontWeight:700,color:mg.comProsp>0?"var(--blue)":"var(--text3)"}}>{mg.comProsp>0?E(mg.comProsp):"—"}</div></div>}
    {isA&&<div><div style={{fontSize:9,color:"var(--text3)"}}>Marge WEBO</div><div style={{fontWeight:800,color:"var(--gold)"}}>{E(mg.margeNette)}</div></div>}
  </div>
  {!apporteur?.isFondateur&&<div style={{fontSize:9,color:"var(--text3)",marginTop:4}}>Chasseur → Split 50/50 de la commission</div>}
  {apporteur?.isFondateur&&<div style={{fontSize:9,color:"var(--gold)",marginTop:4}}>Fondateur → 100% de la commission conservée</div>}
</div>}
<div className="sep"/>
<div style={{display:"flex",gap:4,justifyContent:"flex-end",flexWrap:"wrap"}}>
  {onDel&&<button onClick={onDel} style={{padding:"9px 12px",borderRadius:"var(--radius)",border:"1px solid var(--red)",color:"var(--red)",fontSize:12,fontWeight:600,marginRight:"auto"}}>Supprimer</button>}
  <button onClick={onX} style={{padding:"9px 14px",borderRadius:"var(--radius)",border:"1px solid var(--border)",color:"var(--text2)",fontSize:12}}>Annuler</button>
  <button onClick={()=>{if(!f.nom.trim())return;const nl=f.id?f.activityLog:addLog("","Créé");onSave({...f,id:f.id||uid(),valeur:Number(f.valeur)||0,lastInteraction:new Date().toISOString(),activityLog:nl,_isNew:!f.id})}} style={{padding:"9px 18px",borderRadius:"var(--radius)",background:"var(--gold)",color:"var(--bg)",fontSize:13,fontWeight:700}}>{lead?"Enregistrer":"Ajouter"}</button>
</div></div>}

function VForm({lead,onSave,onX}){const IS={width:"100%",padding:"10px 12px",borderRadius:"var(--radius)",border:"1px solid var(--border)",background:"var(--bg)",color:"var(--text)",fontSize:14,outline:"none"};const[st,setSt]=useState(lead?.verifStatus||"pending");const[n,setN]=useState(lead?.verifNote||"");if(!lead)return null;
return <div><div style={{display:"flex",justifyContent:"space-between",marginBottom:10}}><h3 style={{fontFamily:"var(--serif)",fontSize:15}}>Vérification — {lead.nom}</h3><button onClick={onX} style={{color:"var(--text3)"}}><i className="fa-solid fa-xmark"/></button></div>
<FF l="Statut"><div style={{display:"flex",gap:3}}>{VERIFS.filter(v=>v.id!=="none").map(v=><button key={v.id} onClick={()=>setSt(v.id)} style={{flex:1,padding:7,borderRadius:"var(--radius)",border:"1px solid "+(st===v.id?(v.color||"var(--border)"):"var(--border)"),color:st===v.id?(v.color||"var(--text)"):"var(--text2)",background:st===v.id?(v.color||"")+"10":"transparent",fontSize:11,fontWeight:600}}>{v.label}</button>)}</div></FF>
<FF l="Note"><textarea style={{...IS,height:45}} value={n} onChange={e=>setN(e.target.value)}/></FF>
<div style={{display:"flex",gap:4,justifyContent:"flex-end"}}><button onClick={onX} style={{padding:"9px 14px",borderRadius:"var(--radius)",border:"1px solid var(--border)",color:"var(--text2)",fontSize:12}}>Annuler</button><button onClick={()=>onSave(lead.id,st,n)} style={{padding:"9px 18px",borderRadius:"var(--radius)",background:"var(--gold)",color:"var(--bg)",fontSize:13,fontWeight:700}}>Confirmer</button></div></div>}

function PForm({presta,onSave,onDel,onX}){const IS={width:"100%",padding:"10px 12px",borderRadius:"var(--radius)",border:"1px solid var(--border)",background:"var(--bg)",color:"var(--text)",fontSize:14,outline:"none",boxSizing:"border-box"};
const[f,setF]=useState(presta?{...presta}:{nom:"",specialite:SPECIALITES[0],contact:"",email:"",notes:"",portfolio:"",tjm:""});const s=(k,v)=>setF(p=>({...p,[k]:v}));
return <div><div style={{display:"flex",justifyContent:"space-between",marginBottom:10}}><h3 style={{fontFamily:"var(--serif)",fontSize:15}}>{presta?"Modifier — "+presta.nom:<span><i className="fa-solid fa-user-plus" style={{color:"var(--purple)",marginRight:6}}/>Nouveau Prestataire</span>}</h3><button onClick={onX} style={{color:"var(--text3)"}}><i className="fa-solid fa-xmark"/></button></div><div className="sep"/>
<FF l="Nom"><input style={IS} value={f.nom} onChange={e=>s("nom",e.target.value)}/></FF>
<FF l="Spécialité"><select style={IS} value={f.specialite} onChange={e=>s("specialite",e.target.value)}>{SPECIALITES.map(v=><option key={v}>{v}</option>)}</select></FF>
<div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}><FF l="Téléphone"><input style={IS} value={f.contact} onChange={e=>s("contact",e.target.value)} type="tel"/></FF><FF l="Email"><input style={IS} value={f.email} onChange={e=>s("email",e.target.value)} type="email"/></FF></div>
<div style={{display:"grid",gridTemplateColumns:"2fr 1fr",gap:8}}><FF l="Portfolio"><input style={IS} value={f.portfolio||""} onChange={e=>s("portfolio",e.target.value)}/></FF><FF l="TJM €"><input style={IS} type="number" value={f.tjm||""} onChange={e=>s("tjm",e.target.value)}/></FF></div>
<FF l="Notes"><textarea style={{...IS,height:45}} value={f.notes} onChange={e=>s("notes",e.target.value)}/></FF><div className="sep"/>
<div style={{display:"flex",gap:4,justifyContent:"flex-end",flexWrap:"wrap"}}>
  {onDel&&<button onClick={onDel} style={{padding:"9px 12px",borderRadius:"var(--radius)",border:"1px solid var(--red)",color:"var(--red)",fontSize:12,fontWeight:600,marginRight:"auto"}}>Supprimer</button>}
  <button onClick={onX} style={{padding:"9px 14px",borderRadius:"var(--radius)",border:"1px solid var(--border)",color:"var(--text2)",fontSize:12}}>Annuler</button>
  <button onClick={()=>{if(!f.nom.trim())return;onSave({...f,id:f.id||uid(),_isNew:!f.id})}} style={{padding:"9px 18px",borderRadius:"var(--radius)",background:"var(--gold)",color:"var(--bg)",fontSize:13,fontWeight:700}}>{presta?"Enregistrer":"Ajouter"}</button>
</div></div>}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
