<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:#E6DED0;color:#3D3428;font-family:'Inter',-apple-system,sans-serif;font-weight:400;min-height:100dvh;overflow-x:hidden;-webkit-font-smoothing:antialiased}

.fu{animation:fadeUp .25s ease-out both}.blink{animation:blink 1s ease-in-out infinite}.glow30{animation:glow30 2s ease-in-out infinite}.fire{animation:fireGlow 1.5s ease-in-out infinite}

select,input,textarea{font-family:inherit;font-size:16px}
::-webkit-scrollbar{width:3px;height:3px}::-webkit-scrollbar-thumb{background:#C4B9A8;border-radius:2px}

.overlay{position:fixed;inset:0;z-index:1000;display:flex;align-items:flex-end;justify-content:center;animation:fadeIn .15s}
.overlay-bg{position:absolute;inset:0;background:rgba(61,52,40,.45);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px)}
.modal{position:relative;background:rgba(242,235,224,.92);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid rgba(213,204,189,.6);border-radius:22px 22px 0 0;padding:24px;width:100%;max-width:540px;max-height:92vh;overflow-y:auto;box-shadow:0 -20px 60px rgba(61,52,40,.15),0 0 0 1px rgba(255,255,255,.1) inset;animation:slideUp .25s ease-out}
.modal::-webkit-scrollbar{width:2px}
.sync-dot{width:7px;height:7px;border-radius:50%;display:inline-block;flex-shrink:0}
.sync-dot.on{background:#6B8E5A;box-shadow:0 0 8px #6B8E5A55}.sync-dot.off{background:#C0392B}.sync-dot.loading{background:#D4A03C;animation:pulse 1s infinite}

.search-bar{position:relative}.search-bar input{width:100%;padding:8px 12px 8px 32px;border-radius:10px;border:1px solid #D5CCBD;background:rgba(242,235,224,.9);backdrop-filter:blur(8px);color:#3D3428;font-size:14px;outline:none}.search-bar input:focus{border-color:#8B5CF650}

.obj-bar{height:6px;border-radius:3px;background:#D5CCBD;overflow:hidden;width:100%}.obj-fill{height:100%;border-radius:3px;transition:width .5s}
.sep{height:1px;background:linear-gradient(90deg,transparent,#8B5CF640,transparent);margin:6px 0}
.blur{filter:blur(6px);user-select:none;pointer-events:none;transition:filter .3s}
.glass-stat{background:rgba(242,235,224,.7);backdrop-filter:blur(8px);border:1px solid rgba(213,204,189,.5);border-radius:12px;padding:7px 9px;transition:all .25s}
.glass-stat:hover{box-shadow:0 4px 16px rgba(61,52,40,.08);transform:translateY(-1px)}
.match-card{background:rgba(139,92,246,.06);border:1px solid rgba(139,92,246,.15);border-radius:10px;padding:10px;margin-top:4px;transition:all .2s}
.match-card:hover{background:rgba(139,92,246,.1)}
.test-badge{font-size:9px;font-weight:700;color:#D4A03C;background:#D4A03C12;padding:1px 6px;border-radius:4;border:1px dashed #D4A03C40}
@media(min-width:640px){.cards-grid,.presta-grid{grid-template-columns:repeat(2,1fr)}}
@media(min-width:1024px){.cards-grid,.presta-grid{grid-template-columns:repeat(3,1fr)}}
@media(min-width:768px){
.stats-grid{grid-template-columns:repeat(7,1fr);padding:10px 20px;gap:6px}
.overlay{align-items:center}.modal{border-radius:18px;max-height:88vh;border-radius:18px}
.kanban-scroll{padding:0 20px 20px}.kanban-col{min-width:0;max-width:none;flex:1}
}
@media(max-width:639px){.stats-grid .stat-5,.stats-grid .stat-6,.stats-grid .stat-7{display:none}}
</style>

const COLS=[{id:"nouveau",label:"Nouveau",icon:"✦",accent:"#8B5CF6",proba:.10,urgDays:5},{id:"contacte",label:"Contacté",icon:"◈",accent:"#D4A03C",proba:.25,urgDays:3},{id:"relance1",label:"Relance 1",icon:"◉",accent:"#C67B3C",proba:.30,urgDays:4},{id:"relance2",label:"Relance 2",icon:"◎",accent:"#C0392B",proba:.40,urgDays:7},{id:"call",label:"Call",icon:"☎",accent:"#7C5CBF",proba:.70,urgDays:5},{id:"injoignable",label:"Injoignable",icon:"⊘",accent:"#8C7E6A",proba:0,urgDays:999},{id:"signe",label:"Signé",icon:"✓",accent:"#6B8E5A",proba:1,urgDays:999}];

const VERIFS=[{id:"none",label:"—",color:"#8C7E6A"},{id:"pending",label:"⏳ Attente",color:"#D4A03C"},{id:"confirmed",label:"✓ OK",color:"#6B8E5A"},{id:"alert",label:"⚠ Alerte",color:"#C0392B"}];

const TEMPS=[{id:"froid",label:"❄️ Froid",color:"#6B9BD2"},{id:"tiede",label:"☁️ Tiède",color:"#D4A03C"},{id:"chaud",label:"🔥 Chaud",color:"#C0392B"}];
const MONTHLY_OBJ=15000;const HOT_THRESHOLD=3000;

const MSG_TEMPLATES={nouveau:"Bonjour [NOM],\n\nJe suis [PROSPECTEUR] de Webo. Nous aidons les entreprises comme [ENTREPRISE] à booster leur croissance digitale via [SERVICE].\n\nDisponible pour un échange ?\n\n[PROSPECTEUR] — Webo",contacte:"Bonjour [NOM],\n\nSuite à notre échange, avez-vous réfléchi à notre proposition pour [ENTREPRISE] ?\n\n[PROSPECTEUR] — Webo",relance1:"Bonjour [NOM],\n\nJe reviens vers vous pour le projet [SERVICE] de [ENTREPRISE]. Un call de 15min ?\n\n[PROSPECTEUR] — Webo",relance2:"Bonjour [NOM],\n\nJe tenais à m'assurer que vous aviez reçu mes messages pour [ENTREPRISE].\n\n[PROSPECTEUR] — Webo",call:"Bonjour [NOM],\n\nSuite à notre call pour [ENTREPRISE] :\n- Service : [SERVICE]\n- Prochaines étapes : [à compléter]\n\n[PROSPECTEUR] — Webo",signe:"Bonjour [NOM],\n\nMerci pour votre confiance ! Le projet [SERVICE] pour [ENTREPRISE] est lancé.\n\n[PROSPECTEUR] — Webo"};

const hAgo=iso=>iso?(Date.now()-new Date(iso).getTime())/3.6e6:null;
const dAgo=iso=>iso?(Date.now()-new Date(iso).getTime())/8.64e7:null;
const fAgo=h=>{if(!h)return"";if(h<1)return"<1h";if(h<24)return Math.floor(h)+"h";return Math.floor(h/24)+"j"};
const dUntil=iso=>{if(!iso)return null;return Math.ceil((new Date(iso+"T23:59:59").getTime()-Date.now())/8.64e7)};
const sC=s=>s==="Web Design"?"#8B5CF6":s==="Montage Vidéo"?"#D4A03C":"#6B8E5A";

function isSmartUrgent(lead){const col=COLS.find(c=>c.id===lead.status);if(!col||col.urgDays>=999)return false;const d=dAgo(lead.lastInteraction);return d!==null&&d>=col.urgDays}
function genTemplate(lead,mn){const t=MSG_TEMPLATES[lead.status]||MSG_TEMPLATES.nouveau;return t.replace(/\[NOM\]/g,lead.nom.split(" ")[0]).replace(/\[ENTREPRISE\]/g,lead.nom).replace(/\[SERVICE\]/g,lead.service).replace(/\[PROSPECTEUR\]/g,mn)}
function genBrief(lead,pn,mn){const col=COLS.find(c=>c.id===lead.status);const L=["📋 *BRIEF — "+lead.nom+"*","","🎯 "+lead.service,"💰 "+eur(lead.valeur)+" HT","📊 "+(col?col.label:""),"👤 "+mn];if(pn)L.push("🤝 "+pn);if(lead.phone)L.push("📞 "+lead.phone);if(lead.email)L.push("✉️ "+lead.email);if(lead.adresse)L.push("📍 "+lead.adresse);if(lead.notes){L.push("");L.push("📝 "+lead.notes)}L.push("");L.push("Webo — Votre croissance, notre expertise.");return L.join("\n")}

/* Matching: score prestas for a lead */
function matchPrestas(lead,prestas){const svc=lead.service.toLowerCase();const notes=(lead.notes||"").toLowerCase();return prestas.map(p=>{let score=0;const spec=(p.specialite||"").toLowerCase();const pn=(p.notes||"").toLowerCase();if(spec===svc||svc.includes(spec)||spec.includes(svc))score+=50;if(svc.includes("vidéo")&&(spec.includes("vidéo")||spec.includes("motion")))score+=30;if(svc.includes("web")&&(spec.includes("web")||spec.includes("landing")))score+=30;if(notes&&pn){const words=notes.split(/\s+/).filter(w=>w.length>3);words.forEach(w=>{if(pn.includes(w))score+=5})}if(p.tjm&&lead.valeur){const budget=lead.valeur;const tjm=Number(p.tjm);if(tjm>0&&budget/tjm>=3)score+=10}return{...p,score}}).filter(p=>p.score>0).sort((a,b)=>b.score-a.score).slice(0,2)}

function exportCloudJSON(leads,prestas,flash){const data={exportDate:new Date().toISOString(),version:"9.2",leads,prestas};const json=JSON.stringify(data,null,2);const blob=new Blob([json],{type:"application/json"});const url=URL.createObjectURL(blob);const a=document.createElement("a");a.href=url;a.download="webo-backup-"+td()+".json";a.click();URL.revokeObjectURL(url);flash("Backup JSON téléchargé ✓")}

function StaleTag({li,st}){if(["signe","injoignable"].includes(st))return null;const h=hAgo(li);if(!h||h<48)return null;const c=h>=120?"#C0392B":h>=72?"#C67B3C":"#D4A03C";return <span style={{display:"inline-flex",alignItems:"center",gap:3,padding:"2px 6px",borderRadius:5,background:c+"12",fontSize:10,fontWeight:600,color:c}}><span style={{width:4,height:4,borderRadius:"50%",background:c}}/>{fAgo(h)}</span>}

function RelanceTag({nr,st}){if(!nr||["signe","injoignable"].includes(st))return null;const d=dUntil(nr);if(d===null)return null;if(d<0)return <span className="blink" style={{fontSize:10,fontWeight:600,color:"#C0392B",background:"#C0392B10",padding:"2px 6px",borderRadius:5}}>⏰J{d}</span>;if(d===0)return <span style={{fontSize:10,fontWeight:600,color:"#D4A03C",background:"#D4A03C12",padding:"2px 6px",borderRadius:5}}>Aujourd'hui</span>;return null}
function Tent({n}){if(!n)return null;const c=n>=4?"#C0392B":n>=2?"#C67B3C":"#8C7E6A";return <span style={{fontSize:10,fontWeight:600,color:c,fontFamily:"'JetBrains Mono'"}}>{n}×</span>}
function VBadge({s}){const v=VERIFS.find(x=>x.id===s);if(!v||s==="none")return null;return <span style={{fontSize:10,fontWeight:600,color:v.color,background:v.color+"12",padding:"2px 6px",borderRadius:5}}>{v.label}</span>}
function SignedAlert({dc,st}){if(st!=="signe"||!dc)return null;const d=dAgo(dc);if(!d||d<30)return null;return <span className="glow30" style={{padding:"2px 6px",borderRadius:5,background:"#C0392B10",fontSize:10,fontWeight:600,color:"#C0392B"}}>🔄{Math.floor(d)}j</span>}
function TempIcon({t}){return <span style={{fontSize:10}}>{t==="chaud"?"🔥":t==="froid"?"❄️":"☁️"}</span>}
function P$({v,p}){return <span className={p?"blur":""}>{v}</span>}
function PitchName({nom,pitch}){if(!pitch)return nom;const parts=nom.split(" ");return parts[0]+(parts.length>1?" "+parts.slice(1).map(p=>p[0]+".").join(""):"") }
function FF({l,children}){return <div style={{marginBottom:10}}><label style={{display:"block",fontSize:9,fontWeight:600,color:"#8C7E6A",marginBottom:4,letterSpacing:1.2,textTransform:"uppercase",fontFamily:"'JetBrains Mono'"}}>{l}</label>{children}</div>}
function doExportCSV(leads,so){const src=so?leads.filter(l=>l.status==="signe"):leads;const h=["Nom","Email","Téléphone","Adresse","Service","Statut","Valeur","Com.Webo","Com.Prosp","Température","Prospecteur","Source","Tentatives","Relance","Notes"];const rows=src.map(l=>[l.nom,l.email||"",l.phone||"",l.adresse||"",l.service,COLS.find(c=>c.id===l.status)?.label||"",l.valeur,Math.round(l.valeur*.2),Math.round(l.valeur*.10),(TEMPS.find(t=>t.id===l.temperature)?.label||""),mN(l.memberId),l.source||"",l.tentatives||0,l.nextRelance||"",'"'+(l.notes||"").replace(/"/g,'""')+'"']);const csv=[h.join(";"),...rows.map(r=>r.join(";"))].join("\n");const blob=new Blob(["\uFEFF"+csv],{type:"text/csv;charset=utf-8"});const url=URL.createObjectURL(blob);const a=document.createElement("a");a.href=url;a.download="webo-"+(so?"signes-":"")+td()+".csv";a.click();URL.revokeObjectURL(url)}
const WLogo=({big})=><div style={{display:"flex",alignItems:"baseline"}}><span style={{fontFamily:"'Playfair Display'",fontWeight:700,fontSize:big?42:20,color:"#8B5CF6",fontStyle:"italic"}}>W</span><span style={{fontFamily:"'Playfair Display'",fontWeight:600,fontSize:big?38:17,color:"#3D3428"}}>ebo</span></div>;
const SearchIcon=()=><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#8C7E6A" strokeWidth="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>;

const[loginId,setLoginId]=useState("");const[loginPass,setLoginPass]=useState("");const[loginErr,setLoginErr]=useState("");
const isAdmin=TEAM.find(t=>t.id===session)?.isAdmin||false;const sessionUser=TEAM.find(t=>t.id===session);
const[leads,setLeads]=useState([]);const[prestas,setPrestas]=useState([]);const[ready,setReady]=useState(false);const[syncStatus,setSyncStatus]=useState("loading");
const[mainTab,setMainTab]=useState("leads");const[view,setView]=useState("kanban");const[showForm,setShowForm]=useState(false);const[editId,setEditId]=useState(null);
const[dragId,setDragId]=useState(null);const[dragOver,setDragOver]=useState(null);const[fM,setFM]=useState("all");const[fS,setFS]=useState("all");
const[toast,setToast]=useState(null);const[showVerif,setShowVerif]=useState(null);const[showFilters,setShowFilters]=useState(false);
const[showPrestaForm,setShowPrestaForm]=useState(false);const[editPresta,setEditPresta]=useState(null);
const[now,setNow]=useState(Date.now());const[aiMessages,setAiMessages]=useState([]);const[aiInput,setAiInput]=useState("");
const[aiLoading,setAiLoading]=useState(false);const[aiShowActions,setAiShowActions]=useState(true);
const[searchQ,setSearchQ]=useState("");const[searchOpen,setSearchOpen]=useState(false);
const[privacy,setPrivacy]=useState(false);const[pitchMode,setPitchMode]=useState(false);const[focusMode,setFocusMode]=useState(false);const[sortBy,setSortBy]=useState("default");
const aiEndRef=useRef(null);const searchRef=useRef(null);

const doLogin=()=>{const q=loginId.trim().toLowerCase();const acc=ACCOUNTS.find(a=>a.login===q||a.email===q);if(!acc){setLoginErr("Identifiant inconnu");return}if(loginPass!==acc.pass){setLoginErr("Mot de passe incorrect");return}setSession(acc.id);try{localStorage.setItem("webo_session",acc.id)}catch(e){}setLoginErr("")};

useEffect(()=>{const h=e=>{if(e.target.tagName==="INPUT"||e.target.tagName==="TEXTAREA"||e.target.tagName==="SELECT")return;if(e.key==="n"||e.key==="N"){e.preventDefault();setMainTab("leads");setEditId(null);setShowForm(true)}if(e.key==="/"){e.preventDefault();setSearchOpen(true);setTimeout(()=>{if(searchRef.current)searchRef.current.focus()},50)}if(e.key==="f"||e.key==="F"){e.preventDefault();setMainTab("leads");setView("focus")}if(e.key==="p"||e.key==="P"){e.preventDefault();setSession("");try{localStorage.removeItem("webo_session")}catch(e){}}if(e.key==="Escape"){setSearchOpen(false);setSearchQ("")}};window.addEventListener("keydown",h);return()=>window.removeEventListener("keydown",h)},[]);

useEffect(()=>{if(!isConfigured){setSyncStatus("off");setReady(true);return}(async()=>{setSyncStatus("loading");try{const lr=await supabase.from("leads").select("*");setLeads((lr.data||[]).map(dbToLead));try{const pr=await supabase.from("prestataires").select("*");setPrestas(pr.data||[])}catch(e){}setSyncStatus(lr.error?"off":"on")}catch(e){setSyncStatus("off")}setReady(true)})()},[]);
useEffect(()=>{if(!isConfigured)return;const ch=supabase.channel("rt").on("postgres_changes",{event:"*",schema:"public",table:"leads"},p=>{if(p.eventType==="INSERT"){const n=dbToLead(p.new);setLeads(pr=>pr.some(l=>l.id===n.id)?pr:[...pr,n])}if(p.eventType==="UPDATE"){const u=dbToLead(p.new);setLeads(pr=>pr.map(l=>l.id===u.id?u:l))}if(p.eventType==="DELETE")setLeads(pr=>pr.filter(l=>l.id!==p.old.id))}).on("postgres_changes",{event:"*",schema:"public",table:"prestataires"},p=>{if(p.eventType==="INSERT")setPrestas(pr=>pr.some(x=>x.id===p.new.id)?pr:[...pr,p.new]);if(p.eventType==="UPDATE")setPrestas(pr=>pr.map(x=>x.id===p.new.id?p.new:x));if(p.eventType==="DELETE")setPrestas(pr=>pr.filter(x=>x.id!==p.old.id))}).subscribe(s=>{if(s==="SUBSCRIBED")setSyncStatus("on")});return()=>supabase.removeChannel(ch)},[]);
useEffect(()=>{const t=setInterval(()=>setNow(Date.now()),60000);return()=>clearInterval(t)},[]);

const upsertLead=useCallback(async(l)=>{const c={...l};delete c._isNew;setLeads(p=>p.some(x=>x.id===c.id)?p.map(x=>x.id===c.id?c:x):[...p,c]);setShowForm(false);setEditId(null);flash(l._isNew?"Lead ajouté ✓":"Mis à jour ✓");if(isConfigured)await supabase.from("leads").upsert(leadToDb(c))},[]);

const touchLead=useCallback(async(id,msg)=>{const lead=leads.find(l=>l.id===id);if(!lead)return;const t=(lead.tentatives||0)+1;const nl=addLog(lead.activityLog,msg||"Contact #"+t);setLeads(p=>p.map(l=>l.id===id?{...l,lastInteraction:new Date().toISOString(),tentatives:t,activityLog:nl}:l));if(isConfigured)await supabase.from("leads").update({last_interaction:new Date().toISOString(),tentatives:t,activity_log:nl}).eq("id",id)},[leads]);
const updateField=useCallback(async(id,f)=>{setLeads(p=>p.map(l=>l.id===id?{...l,...f}:l));if(isConfigured){const db={};const map={status:"status",lastInteraction:"last_interaction",tentatives:"tentatives",nextRelance:"next_relance",verifStatus:"verif_status",verifNote:"verif_note",verifDate:"verif_date",activityLog:"activity_log"};Object.keys(f).forEach(k=>{if(map[k])db[map[k]]=f[k]});await supabase.from("leads").update(db).eq("id",id)}},[]);
const updVerif=useCallback(async(id,vs,vn)=>{const nl=addLog(leads.find(l=>l.id===id)?.activityLog||"","Vérif: "+vs);setLeads(p=>p.map(l=>l.id===id?{...l,verifStatus:vs,verifNote:vn,verifDate:td(),activityLog:nl}:l));setShowVerif(null);flash("Vérification ✓");if(isConfigured)await supabase.from("leads").update({verif_status:vs,verif_note:vn,verif_date:td(),activity_log:nl}).eq("id",id)},[leads]);
const upsertPresta=useCallback(async(p)=>{const c={...p};delete c._isNew;setPrestas(pr=>pr.some(x=>x.id===c.id)?pr.map(x=>x.id===c.id?c:x):[...pr,c]);setShowPrestaForm(false);setEditPresta(null);flash(p._isNew?"Prestataire ✓":"Mis à jour ✓");if(isConfigured)await supabase.from("prestataires").upsert(c)},[]);

const stats=useMemo(()=>{const src=isAdmin?leads:myLeads;const sg=src.filter(l=>l.status==="signe");const pipe=src.filter(l=>!["injoignable","signe"].includes(l.status));const stale=src.filter(l=>!["signe","injoignable"].includes(l.status)&&hAgo(l.lastInteraction)>=48);const overdue=src.filter(l=>l.nextRelance&&!["signe","injoignable"].includes(l.status)&&dUntil(l.nextRelance)<0);const caSigne=sg.reduce((s,l)=>s+l.valeur,0);const weighted=pipe.reduce((s,l)=>{const col=COLS.find(c=>c.id===l.status);return s+(l.valeur*(col?.proba||0))},0);const totalW=weighted+caSigne;

const bySrc=SOURCES.map(s=>{const sl=src.filter(l=>l.source===s);const ss=sl.filter(l=>l.status==="signe");const ca=ss.reduce((a,l)=>a+l.valeur,0);return{source:s,total:sl.length,signes:ss.length,rate:sl.length?Math.round(ss.length/sl.length*100):0,ca,com:ca*.2}}).filter(s=>s.total>0).sort((a,b)=>b.com-a.com);

return{total:src.length,signes:sg.length,stale:stale.length,overdue:overdue.length,smartUrgent:smartUrgent.length,caSigne,weighted,totalW,profitNet,commission:caSigne*.2,commProsp:caSigne*.10,avgClosing,bySrc,byM,objPct:Math.min(Math.round(caSigne/MONTHLY_OBJ*100),100)}},[leads,myLeads,isAdmin,now,smartUrgent]);

</div>
<div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:7}}>
  <FF l="Statut"><select style={IS} value={f.status} onChange={e=>s("status",e.target.value)}>{COLS.map(c=><option key={c.id} value={c.id}>{c.icon} {c.label}</option>)}</select></FF>
  <FF l="Temp."><select style={IS} value={f.temperature} onChange={e=>s("temperature",e.target.value)}>{TEMPS.map(t=><option key={t.id} value={t.id}>{t.label}</option>)}</select></FF>
  <FF l="Relance"><input style={IS} type="date" value={f.nextRelance} onChange={e=>s("nextRelance",e.target.value)}/></FF>
</div>

{/* PRESTA with Matching */}
<FF l="🤝 Prestataire">
{selPresta?<div style={{display:"flex",alignItems:"center",gap:7,padding:"7px 10px",borderRadius:10,border:"1px solid #D4A03C25",background:"#D4A03C06"}}><div style={{width:26,height:26,borderRadius:7,background:"#D4A03C10",display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,fontWeight:700,color:"#D4A03C"}}>{selPresta.nom[0]}</div><div style={{flex:1}}><div style={{fontWeight:600,color:"#3D3428",fontSize:12}}>{selPresta.nom}</div><div style={{fontSize:10,color:"#D4A03C"}}>{selPresta.specialite}</div></div><button onClick={()=>s("prestaId","")} style={{padding:"2px 5px",borderRadius:4,border:"1px solid #C0392B15",background:"transparent",color:"#C0392B",fontSize:9}}>✕</button></div>:<div>
  <div style={{display:"flex",gap:4,marginBottom:4}}>
    <input value={prestaQ} onChange={e=>setPrestaQ(e.target.value)} placeholder="Chercher…" style={{...IS,flex:1,fontSize:14}}/>
    <button onClick={()=>setShowMatch(p=>!p)} style={{padding:"7px 10px",borderRadius:10,border:"1px solid #8B5CF620",background:showMatch?"#8B5CF608":"transparent",color:"#8B5CF6",fontSize:11,fontWeight:600,whiteSpace:"nowrap"}}>🧠 Suggérer</button>
  </div>
  {/* AI Matching suggestions */}
  {showMatch&&matches.length>0&&<div style={{marginBottom:6}}>{matches.map(m=><div key={m.id} className="match-card" onClick={()=>{s("prestaId",m.id);setShowMatch(false)}} style={{cursor:"pointer"}}>
    <div style={{display:"flex",alignItems:"center",gap:6}}><div style={{width:24,height:24,borderRadius:6,background:"#8B5CF610",display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,fontWeight:700,color:"#8B5CF6"}}>{m.nom[0]}</div><div style={{flex:1}}><div style={{fontWeight:600,fontSize:12,color:"#3D3428"}}>{m.nom}</div><div style={{fontSize:10,color:"#8B5CF6"}}>{m.specialite} · Score: {m.score}%</div></div><span style={{fontSize:11,color:"#6B8E5A",fontWeight:700}}>Sélectionner</span></div>
  </div>)}</div>}
  {showMatch&&matches.length===0&&<div style={{fontSize:11,color:"#8C7E6A",padding:6}}>Aucun match trouvé</div>}
  {prestas.length>0&&!showMatch&&<div style={{maxHeight:100,overflowY:"auto",display:"flex",flexDirection:"column",gap:2,borderRadius:8,border:"1px solid #D5CCBD",background:"rgba(237,230,217,.7)",padding:3}}>
    {fPrestas.map(p=><button key={p.id} onClick={()=>{s("prestaId",p.id);setPrestaQ("")}} type="button" style={{display:"flex",alignItems:"center",gap:5,padding:"6px 7px",borderRadius:6,border:"none",background:"transparent",cursor:"pointer",textAlign:"left",width:"100%"}}><div style={{width:22,height:22,borderRadius:5,background:"#D4A03C10",display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,fontWeight:700,color:"#D4A03C"}}>{p.nom[0]}</div><div><div style={{fontWeight:600,color:"#3D3428",fontSize:11}}>{p.nom}</div><div style={{fontSize:9,color:"#8C7E6A"}}>{p.specialite}</div></div></button>)}
  </div>}
</div>}
</FF>
<FF l="🔗 Lien externe"><input style={IS} value={f.externalLink} onChange={e=>s("externalLink",e.target.value)} placeholder="https://loom.com/…"/></FF>
<FF l="Notes"><textarea style={{...IS,height:40,resize:"vertical",fontSize:14}} value={f.notes} onChange={e=>s("notes",e.target.value)} placeholder="Contexte…"/></FF>
{f.activityLog&&<FF l="📜 Historique"><div style={{background:"rgba(237,230,217,.7)",borderRadius:8,padding:7,fontSize:11,color:"#8C7E6A",whiteSpace:"pre-wrap",maxHeight:70,overflowY:"auto",lineHeight:1.5}}>{f.activityLog}</div></FF>}
{(f.status==="signe"||lead?.status==="signe")&&<><FF l="Preuve paiement"><input style={IS} value={f.paymentProof} onChange={e=>s("paymentProof",e.target.value)} placeholder="Lien Stripe…"/></FF>
<FF l="💳 Lien paiement"><input style={IS} value={f.paymentLink} onChange={e=>s("paymentLink",e.target.value)} placeholder="https://pay.stripe.com/…"/></FF></>}
{(f.status==="injoignable"||lead?.status==="injoignable")&&<FF l="Raison"><select style={IS} value={f.echecReason} onChange={e=>s("echecReason",e.target.value)}>{ECHECS.map(r=><option key={r}>{r}</option>)}</select></FF>}
{f.valeur&&Number(f.valeur)>0&&showFin&&<div style={{background:"#8B5CF608",border:"1px solid #8B5CF615",borderRadius:12,padding:"9px 11px",marginBottom:8,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
  <div><div style={{fontSize:11,color:"#8B5CF6"}}>Com. Webo 20%</div><div style={{fontSize:10,color:"#D4A03C"}}>Prosp. 50%→{eur(Number(f.valeur)*.10)}</div>{col&&<div style={{fontSize:9,color:"#7C5CBF"}}>Prob: {Math.round(col.proba*100)}%</div>}</div>
  <div style={{textAlign:"right"}}><div style={{fontSize:14,fontWeight:700,color:"#8B5CF6"}}>{eur(Number(f.valeur)*.2)}</div></div>
</div>}
<div className="sep"/>
<div style={{display:"flex",gap:5,justifyContent:"flex-end",marginTop:12,flexWrap:"wrap"}}>
  {onDel&&<button onClick={onDel} style={{padding:"9px 11px",borderRadius:10,border:"1px solid #C0392B18",background:"transparent",color:"#C0392B",fontSize:12,fontWeight:600,marginRight:"auto"}}>Supprimer</button>}
  <button onClick={onX} style={{padding:"9px 13px",borderRadius:10,border:"1px solid #D5CCBD",background:"transparent",color:"#8C7E6A",fontSize:12}}>Annuler</button>
  <button onClick={()=>{if(!f.nom.trim())return;const nl=f.id?f.activityLog:addLog("","Créé");onSave({...f,id:f.id||uid(),valeur:Number(f.valeur)||0,lastInteraction:new Date().toISOString(),activityLog:nl,_isNew:!f.id})}} style={{padding:"9px 18px",borderRadius:10,border:"none",background:"#8B5CF6",color:"#fff",fontSize:13,fontWeight:600}}>{lead?"Enregistrer":"Ajouter"}</button>
</div></div>}

function VerifForm({lead,onSave,onX,IS}){const[st,setSt]=useState(lead?.verifStatus||"pending");const[note,setNote]=useState(lead?.verifNote||"");if(!lead)return null;
return <div><div style={{display:"flex",justifyContent:"space-between",marginBottom:12}}><h3 style={{fontFamily:"'Playfair Display'",fontSize:16,fontWeight:600,color:"#3D3428"}}>🛡 {lead.nom}</h3><button onClick={onX} style={{background:"none",border:"none",color:"#C4B9A8",fontSize:17}}>✕</button></div>
<FF l="Statut"><div style={{display:"flex",gap:4,flexWrap:"wrap"}}>{VERIFS.filter(v=>v.id!=="none").map(v=><button key={v.id} onClick={()=>setSt(v.id)} style={{flex:1,minWidth:70,padding:7,borderRadius:10,border:"1px solid "+(st===v.id?v.color+"40":"#D5CCBD"),background:st===v.id?v.color+"10":"transparent",color:st===v.id?v.color:"#8C7E6A",fontSize:12,fontWeight:600}}>{v.label}</button>)}</div></FF>
<FF l="Note"><textarea style={{...IS,height:45,resize:"vertical",fontSize:14}} value={note} onChange={e=>setNote(e.target.value)}/></FF>
<div style={{display:"flex",gap:5,justifyContent:"flex-end",marginTop:12}}><button onClick={onX} style={{padding:"9px 13px",borderRadius:10,border:"1px solid #D5CCBD",background:"transparent",color:"#8C7E6A",fontSize:12}}>Annuler</button><button onClick={()=>onSave(lead.id,st,note)} style={{padding:"9px 18px",borderRadius:10,border:"none",background:"#D4A03C",color:"#fff",fontSize:13,fontWeight:700}}>OK</button></div></div>}

function PrestaForm({presta,onSave,onDel,onX,IS}){
const[f,setF]=useState(presta?{...presta}:{nom:"",specialite:SPECIALITES[0],contact:"",email:"",notes:"",portfolio:"",tjm:""});const s=(k,v)=>setF(p=>({...p,[k]:v}));
return <div><div style={{display:"flex",justifyContent:"space-between",marginBottom:12}}><h3 style={{fontFamily:"'Playfair Display'",fontSize:16,fontWeight:600,color:"#3D3428"}}>{presta?"✎ "+presta.nom:"🤝 Nouveau"}</h3><button onClick={onX} style={{background:"none",border:"none",color:"#C4B9A8",fontSize:17}}>✕</button></div><div className="sep"/>
<FF l="Nom"><input style={IS} value={f.nom} onChange={e=>s("nom",e.target.value)} placeholder="Jean Dupont"/></FF>
<FF l="Spécialité"><select style={IS} value={f.specialite} onChange={e=>s("specialite",e.target.value)}>{SPECIALITES.map(sp=><option key={sp}>{sp}</option>)}</select></FF>
<div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:7}}>
  <FF l="📞 Tél"><input style={IS} value={f.contact} onChange={e=>s("contact",e.target.value)} type="tel"/></FF>
  <FF l="✉️ Email"><input style={IS} value={f.email} onChange={e=>s("email",e.target.value)} type="email"/></FF>
</div>
<div style={{display:"grid",gridTemplateColumns:"2fr 1fr",gap:7}}>
  <FF l="🔗 Portfolio"><input style={IS} value={f.portfolio||""} onChange={e=>s("portfolio",e.target.value)} placeholder="https://…"/></FF>
  <FF l="TJM (€)"><input style={IS} type="number" value={f.tjm||""} onChange={e=>s("tjm",e.target.value)} placeholder="350"/></FF>
</div>
<FF l="Notes"><textarea style={{...IS,height:40,resize:"vertical",fontSize:14}} value={f.notes} onChange={e=>s("notes",e.target.value)}/></FF><div className="sep"/>
<div style={{display:"flex",gap:5,justifyContent:"flex-end",marginTop:12,flexWrap:"wrap"}}>
  {onDel&&<button onClick={onDel} style={{padding:"9px 11px",borderRadius:10,border:"1px solid #C0392B18",background:"transparent",color:"#C0392B",fontSize:12,fontWeight:600,marginRight:"auto"}}>Supprimer</button>}
  <button onClick={onX} style={{padding:"9px 13px",borderRadius:10,border:"1px solid #D5CCBD",background:"transparent",color:"#8C7E6A",fontSize:12}}>Annuler</button>
  <button onClick={()=>{if(!f.nom.trim())return;onSave({...f,id:f.id||uid(),_isNew:!f.id})}} style={{padding:"9px 18px",borderRadius:10,border:"none",background:"#D4A03C",color:"#fff",fontSize:13,fontWeight:600}}>{presta?"OK":"Ajouter"}</button>
</div></div>}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
